<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>디자인 상담</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#e9ecef;
}

/* 헤더 */
#header {
  position:fixed;
  top:0;
  width:100%;
  background:white;
  padding:12px;
  border-bottom:1px solid #ddd;
  text-align:center;
  font-weight:bold;
}

#statusIcon {
  position:absolute;
  right:15px;
  top:12px;
  font-size:20px;
  cursor:pointer;
}

/* 채팅 */
#chatBox {
  margin-top:60px;
  height:70vh;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
}

/* 메시지 */
.message {
  max-width:65%;
  padding:10px 14px;
  margin:5px 0;
  border-radius:18px;
}

.me {
  align-self:flex-end;
  background:#4dabf7;
  color:white;
}

.other {
  align-self:flex-start;
  background:white;
  border:1px solid #ddd;
}

/* 이미지 */
.chat-img {
  max-width:200px;
  border-radius:10px;
  cursor:pointer;
}

/* 다운로드 버튼 */
.download-btn {
  margin-top:5px;
  text-decoration:none;
  font-size:14px;
}

/* 입력 */
#inputArea {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:10px;
  border-top:1px solid #ddd;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#inputRow {
  display:flex;
  width:90%;
  max-width:500px;
}

#msg {
  flex:1;
  padding:12px;
  border-radius:25px;
  border:1px solid #ccc;
}

#sendBtn {
  margin-left:8px;
  padding:10px;
  border:none;
  background:#4dabf7;
  color:white;
  border-radius:50%;
}

#file {
  display:none;
}

#fileLabel {
  margin-left:8px;
  background:#f1f3f5;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}

/* 주문 버튼 */
#orderBtn {
  margin-top:8px;
  width:90%;
  max-width:500px;
  padding:12px;
  background:#ff6b6b;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

/* ===== 이미지 모달 ===== */
#imageModal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  z-index:9999;
  justify-content:center;
  align-items:center;
}

#modalImg {
  max-width:90%;
  max-height:90%;
  transition:transform 0.2s;
}

#closeBtn {
  position:absolute;
  top:20px;
  right:20px;
  color:white;
  font-size:28px;
}

#downloadBtn {
  position:absolute;
  bottom:20px;
  right:20px;
  color:white;
  font-size:24px;
}

#drawCanvas {
  position:absolute;
  top:0;
  left:0;
}
</style>
</head>

<body>

<div id="header">
  디자인 상담
  <span id="statusIcon" onclick="toggleStatus()">🟢</span>
</div>

<div id="chatBox"></div>

<div id="inputArea">
  <div id="inputRow">
    <input id="msg" placeholder="메시지 입력..." />
    <button id="sendBtn" onclick="send()">➤</button>
    <label id="fileLabel" for="file">📎</label>
    <input type="file" id="file">
  </div>
  <button id="orderBtn">🛒 주문하기</button>
</div>

<!-- 이미지 모달 -->
<div id="imageModal">
  <span id="closeBtn">✕</span>
  <a id="downloadBtn" download>⬇️</a>
  <canvas id="drawCanvas"></canvas>
  <img id="modalImg">
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
const chatBox = document.getElementById('chatBox');

let isOpen = true;

/* 상담 상태 */
function toggleStatus(){
  isOpen = !isOpen;
  document.getElementById("statusIcon").innerText = isOpen ? "🟢" : "🔴";
}

/* 메시지 전송 */
function send(){
  const input = document.getElementById('msg');
  const msg = input.value.trim();
  if(!msg) return;

  if(!isOpen){
    system("상담 불가 상태입니다");
    return;
  }

  socket.emit('message', msg);
  addMessage(msg,'me');
  input.value="";
}

/* 엔터 */
document.getElementById("msg").addEventListener("keydown", e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    send();
  }
});

/* 메시지 수신 */
socket.on('message', msg=>{
  addMessage(msg,'other');
});

/* 메시지 UI */
function addMessage(text,type){
  const div=document.createElement('div');
  div.className='message '+type;
  div.innerText=text;
  chatBox.appendChild(div);
}

/* 시스템 */
function system(text){
  const div=document.createElement('div');
  div.className='message other';
  div.style.background="#fff3cd";
  div.innerText=text;
  chatBox.appendChild(div);
}

/* 이미지 업로드 */
document.getElementById('file').addEventListener('change', function(){

  const file=this.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=e=>{
    createImage(e.target.result,'me');
  };
  reader.readAsDataURL(file);

  const formData=new FormData();
  formData.append('image', file);

  fetch('/upload',{method:'POST',body:formData})
    .then(res=>res.json())
    .then(data=>{
      socket.emit('image',data.url);
    });
});

/* 이미지 수신 */
socket.on('image', url=>{
  createImage(url,'other');
});

/* 이미지 UI */
function createImage(src,type){
  const wrap=document.createElement('div');
  wrap.className='message '+type;

  const img=document.createElement('img');
  img.src=src;
  img.className='chat-img';
  img.onclick=()=>openImage(src);

  const down=document.createElement('a');
  down.href=src;
  down.download="";
  down.className="download-btn";
  down.innerText="⬇️ 다운로드";

  wrap.appendChild(img);
  wrap.appendChild(down);
  chatBox.appendChild(wrap);
}

/* ===== 이미지 모달 ===== */
const modal=document.getElementById("imageModal");
const modalImg=document.getElementById("modalImg");
const downloadBtn=document.getElementById("downloadBtn");
const canvas=document.getElementById("drawCanvas");
const ctx=canvas.getContext("2d");

let scale=1,posX=0,posY=0;

/* 열기 */
function openImage(src){
  modal.style.display="flex";
  modalImg.src=src;
  downloadBtn.href=src;
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}

/* 닫기 */
document.getElementById("closeBtn").onclick=()=>modal.style.display="none";
modal.onclick=e=>{
  if(e.target===modal) modal.style.display="none";
};

/* 드래그 */
modalImg.onmousedown=e=>{
  const startX=e.clientX-posX;
  const startY=e.clientY-posY;

  document.onmousemove=e=>{
    posX=e.clientX-startX;
    posY=e.clientY-startY;
    modalImg.style.transform=`translate(${posX}px,${posY}px) scale(${scale})`;
  };

  document.onmouseup=()=>document.onmousemove=null;
};

/* 더블클릭 확대 */
modalImg.ondblclick=()=>{
  scale = scale===1?2:1;
  modalImg.style.transform=`scale(${scale})`;
};

/* 스케치 */
let drawing=false;

canvas.onmousedown=e=>{
  drawing=true;
  ctx.beginPath();
  ctx.moveTo(e.clientX,e.clientY);
};

canvas.onmousemove=e=>{
  if(!drawing) return;
  ctx.lineTo(e.clientX,e.clientY);
  ctx.strokeStyle="red";
  ctx.lineWidth=3;
  ctx.stroke();
};

canvas.onmouseup=()=>drawing=false;

</script>

</body>
</html>
