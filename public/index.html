<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>디자인 상담</title>
<style>
:root{--bg:#f4f8fc;--bg-soft:#f8fbff;--line:#e3ebf3;--line-strong:#d6e0ea;--text:#17212b;--text-soft:#24313f;--sub:#728292;--primary:#2491ff;--primary-soft:#79c7ff;--danger:#ff5b5b;--warning:#9a6500;--warning-soft:#fff7ea;--success-soft:#ebf9ee;--shadow:0 18px 50px rgba(18,36,61,.10);--radius-xl:28px;--safe-bottom:max(env(safe-area-inset-bottom),0px)}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(36,145,255,.08),transparent 24%),linear-gradient(180deg,#f9fbff 0%,#edf4fa 100%)}
body{overflow:hidden;-webkit-text-size-adjust:100%;overscroll-behavior:none}button,input,textarea,label{font:inherit}button{border:none;cursor:pointer}button:disabled{opacity:.45;cursor:not-allowed}input,textarea{outline:none}button:focus-visible,input:focus-visible,textarea:focus-visible,label:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(36,145,255,.14)}
.btnIcon{display:inline-flex;align-items:center;justify-content:center;width:1em;height:1em;line-height:1;flex-shrink:0}.btnText{display:none}
#app{width:100%;height:100%;display:flex;align-items:stretch;justify-content:center}#chatCard{width:min(1120px,100%);height:100%;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.82);border-radius:var(--radius-xl);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
#header{height:44px;flex-shrink:0;border-bottom:1px solid var(--line);background:rgba(255,255,255,.96);display:flex;align-items:center;justify-content:center}#title{font-size:14px;font-weight:800;color:var(--text-soft)}
#quickRequestBar{flex-shrink:0;padding:10px 14px 8px;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:8px}#quickRequestTitle{font-size:13px;font-weight:700;color:var(--text-soft)}#quickRequestButtons{display:flex;gap:6px;flex-wrap:wrap}.quickChip{height:34px;padding:0 12px;border-radius:999px;background:#edf4fa;color:#425466;font-size:12px;font-weight:800;display:inline-flex;align-items:center;justify-content:center}.quickChip.active{background:linear-gradient(135deg,var(--primary-soft),var(--primary));color:#fff}
#summaryCard{flex-shrink:0;margin:0 12px 6px;padding:8px 10px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#fbfdff,#f5f9fd);display:flex;flex-direction:column;gap:6px}#summaryHeader{display:flex;align-items:center;justify-content:space-between;gap:10px}#summaryHeaderLeft{min-width:0;display:flex;align-items:center;gap:8px;flex:1}#summaryTitle{font-size:12px;font-weight:800;color:var(--text-soft)}#summaryToggleBtn{width:26px;min-width:26px;height:26px;border-radius:999px;background:#edf4fa;color:#4f6579;font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center}#summaryToggleBtn::before{content:"⌃"}#summaryCard.collapsed #summaryToggleBtn::before{content:"⌄"}#summaryPreview{min-width:0;flex:1;display:flex;align-items:center;gap:5px;overflow:hidden;white-space:nowrap}.summaryInlineChip{height:24px;padding:0 10px;border-radius:999px;display:inline-flex;align-items:center;background:#f5f9fd;color:#53687a;font-size:11px;font-weight:800;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}.summaryInlineChip.empty{max-width:none}#summaryRows{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.summaryItem{min-width:0;padding:10px;border-radius:14px;background:#fff;border:1px solid #e9eff5;display:flex;flex-direction:column;gap:4px}.summaryLabel{font-size:10px;font-weight:800;color:#91a0af;text-transform:uppercase;letter-spacing:.04em}.summaryValue{min-height:18px;font-size:13px;font-weight:700;line-height:1.45;color:var(--text);word-break:break-word}#summaryActions{display:flex;gap:8px;flex-wrap:wrap}.summaryActionBtn{height:36px;padding:0 12px;border-radius:12px;background:#edf4fa;color:#425466;font-size:12px;font-weight:800}.summaryActionBtn.primary{background:linear-gradient(135deg,var(--primary-soft),var(--primary));color:#fff}#summaryCard.collapsed #summaryRows,#summaryCard.collapsed #summaryActions{display:none}
#chatBox{flex:1;min-height:0;overflow-y:auto;padding:0 14px 8px;background:var(--bg-soft)}#chatInner{display:flex;flex-direction:column;gap:14px;min-height:100%}.messageRow{display:flex;flex-direction:column;gap:5px}.messageRow.me{align-items:flex-end}.messageRow.other{align-items:flex-start}.bubble{max-width:min(76%,640px);padding:12px 16px;border-radius:22px;font-size:15px;line-height:1.52;letter-spacing:-.02em;word-break:break-word}.messageRow.me .bubble{background:linear-gradient(135deg,var(--primary-soft),var(--primary));color:#fff;border-bottom-right-radius:8px;box-shadow:0 8px 20px rgba(36,145,255,.16)}.messageRow.other .bubble{background:#fff;border:1px solid var(--line);color:var(--text);border-bottom-left-radius:8px}.meta{font-size:10px;color:#95a3b1;padding:0 8px}.imageBubble{max-width:min(86%,760px);background:#fff;border:1px solid var(--line);border-radius:22px;padding:8px;cursor:pointer;box-shadow:0 8px 18px rgba(18,36,61,.04)}.chatImg{display:block;width:100%;max-width:420px;border-radius:14px}.imageHint{margin-top:8px;padding:8px 10px;border-radius:12px;background:#f6fbff;color:#557086;font-size:10px;font-weight:800}
#inputArea{flex-shrink:0;border-top:1px solid var(--line);background:rgba(255,255,255,.97);padding:10px 12px calc(12px + var(--safe-bottom));display:flex;flex-direction:column;gap:6px}#contactInlineBar{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid var(--line);border-radius:16px;background:#fbfdff}#phoneGroup{display:flex;align-items:center;gap:6px;flex:0 0 auto}#phoneStatus{display:none;font-size:11px;color:#5f7286;padding:0 2px}#phoneStatus.show{display:block}#phoneInput,#msgInput,#viewerMsgInput,#noteEditorTextarea{border:1px solid var(--line-strong);background:#f8fbff}#phoneInput{width:118px;height:32px;border-radius:10px;padding:0 10px;font-size:12px}#savePhoneBtn,#deletePhoneBtn{height:32px;min-width:44px;padding:0 10px;border-radius:10px;font-size:12px;font-weight:800}#savePhoneBtn{background:linear-gradient(135deg,var(--primary-soft),var(--primary));color:#fff}#deletePhoneBtn{background:#edf4fa;color:#425466}#messageRow{flex:1 1 auto;min-width:0;display:flex;align-items:center;gap:6px}#msgInput{flex:1;min-width:0;height:34px;border-radius:10px;padding:0 12px;font-size:13px}#sendBtn,#fileLabel{width:32px;height:32px;min-width:32px;border-radius:10px;font-size:14px}#sendBtn{background:linear-gradient(135deg,var(--primary-soft),var(--primary));color:#fff}#fileInput{display:none}#fileLabel{background:#f2f6fa;color:#7b8d9f;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid #e5edf4}#fileLabel.disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
#viewerOverlay{position:fixed;inset:0;z-index:1200;display:none;flex-direction:column;width:100vw;height:100vh;min-height:100dvh;background:rgba(245,248,252,.985)}#viewerOverlay.open{display:flex}body.viewer-inline-open{overflow:hidden;touch-action:none}#viewerTopbar{height:52px;flex-shrink:0;border-bottom:1px solid var(--line);background:rgba(255,255,255,.96);display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:8px;padding:0 10px}#viewerTopLeft{min-width:0;display:flex;align-items:center}#viewerTitle{border:none;background:transparent;padding:0;font-size:15px;font-weight:800;color:var(--text);cursor:pointer}#viewerSubtitle{display:none}#viewerStats{display:none}#viewerActions{display:flex;gap:6px;flex-shrink:0}.viewerBtn{min-width:40px;width:40px;height:40px;padding:0;border-radius:12px;background:#edf4fa;color:#425466;display:flex;align-items:center;justify-content:center;gap:0;font-weight:800}#viewerMain{flex:1;min-height:0;display:grid;grid-template-columns:minmax(0,1.35fr) minmax(320px,.65fr)}#viewerLeft{min-width:0;display:flex;flex-direction:column;border-right:1px solid var(--line);background:#f8fbff}#canvasWrap{flex:1;min-height:0;padding:10px;display:flex;align-items:center;justify-content:center}#imageStage{position:relative;width:100%;height:min(100%,760px);min-height:420px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(247,251,255,.96));border:1px solid #dfe9f3;box-shadow:0 18px 38px rgba(18,36,61,.08);overflow:hidden}#viewerImage{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);max-width:84%;max-height:84%;border-radius:18px;box-shadow:0 14px 32px rgba(18,36,61,.12);pointer-events:none;user-select:none;-webkit-user-drag:none;z-index:1}#drawCanvas{position:absolute;inset:0;width:100%;height:100%;border-radius:22px;touch-action:none;z-index:2}#textLayer{position:absolute;inset:0;z-index:3;pointer-events:none}.noteMarker{position:absolute;min-width:56px;height:42px;padding:0 12px;border-radius:14px;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.74);backdrop-filter:blur(8px);border:1px solid rgba(36,145,255,.18);box-shadow:0 10px 18px rgba(18,36,61,.08);transform:translate(-50%,-50%);pointer-events:auto;user-select:none}.noteMarker.selected{border-color:rgba(255,139,61,.55);box-shadow:0 0 0 3px rgba(255,139,61,.14),0 10px 18px rgba(18,36,61,.10)}.noteMarkerText{max-width:132px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;font-weight:800;color:var(--text)}.noteResize{position:absolute;right:-5px;bottom:-5px;width:14px;height:14px;border-radius:5px;background:#2491ff;box-shadow:0 4px 10px rgba(36,145,255,.18)}
#toolbar{flex-shrink:0;border-top:1px solid var(--line);background:#fff;padding:10px 12px 12px;display:flex;flex-direction:column;gap:10px}.toolSection{display:flex;flex-direction:column;gap:6px}.toolRow{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px}#drawControlSide{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:nowrap}.toolGroup{display:flex;align-items:center;gap:8px;flex-wrap:nowrap}.toolGroup.fill{flex:1;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.toolBtn{min-width:44px;width:100%;height:44px;padding:0;border-radius:14px;background:#edf4fa;color:#425466;display:inline-flex;align-items:center;justify-content:center;gap:0;font-weight:800}.toolBtn.active{background:linear-gradient(135deg,var(--primary-soft),var(--primary));color:#fff}#thicknessWrap{display:flex;align-items:center;gap:8px;color:var(--sub)}#thicknessWrap span{font-size:11px;font-weight:800}#thicknessRange{width:110px}#colorRow{display:flex;gap:8px;flex-wrap:nowrap;align-items:center}.colorSwatch,.noteColorSwatch{border-radius:50%;box-shadow:0 0 0 1px rgba(0,0,0,.10);display:inline-flex}.colorSwatch{width:24px;height:24px}.noteColorSwatch{width:22px;height:22px}.colorSwatch.active{box-shadow:0 0 0 3px rgba(36,145,255,.20)}.noteColorSwatch.active{box-shadow:0 0 0 3px rgba(36,145,255,.18)}#customColorBtn{position:relative;overflow:hidden;width:40px;height:40px;background:linear-gradient(135deg,rgba(255,255,255,.98),rgba(235,241,247,.98)),conic-gradient(from 180deg,#ff3b30,#2491ff,#22c55e,#facc15,#111827,#ffffff,#ff3b30)}#customColorBtn::before{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--custom-color-preview,#ffffff)}#customColorBtn::after{content:"";position:absolute;inset:7px;border-radius:50%;border:1.5px dashed rgba(79,101,121,.55)}#customColorInput{position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;opacity:.01;pointer-events:none}
#viewerChatBox{flex:1;min-height:0;overflow-y:auto;padding:12px;background:#fbfdff}#viewerChatInner{display:flex;flex-direction:column;gap:10px}#viewerInputBar{flex-shrink:0;border-top:1px solid var(--line);padding:12px 14px calc(14px + var(--safe-bottom));background:#fff;display:flex;gap:10px}#viewerMsgInput{flex:1;height:46px;border-radius:16px;padding:0 14px;font-size:15px}#viewerSendBtn{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,var(--primary-soft),var(--primary));color:#fff;font-size:18px;font-weight:800}
#noteEditorOverlay{position:fixed;inset:0;z-index:220;display:none;flex-direction:column;width:100vw;height:100vh;background:rgba(245,248,252,.99)}#noteEditorOverlay.open{display:flex}#noteEditorHeader{min-height:70px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);background:#fff}#noteEditorTitleWrap{min-width:0;display:flex;flex-direction:column;gap:4px}#noteEditorTitle{font-size:17px;font-weight:800}#noteEditorMeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}#noteEditorSaveBadge{height:24px;padding:0 8px;border-radius:999px;display:inline-flex;align-items:center;background:#eef4fa;color:#587085;font-size:11px;font-weight:800}#noteEditorSaveBadge.pending{background:var(--warning-soft);color:var(--warning)}#noteEditorSaveBadge.saved{background:var(--success-soft);color:#2f7b42}#noteEditorSaveBadge.offline{background:#fff3f3;color:#c74242}#noteEditorActions{display:flex;align-items:center;gap:8px}.noteEditorDangerBtn,#noteEditorDoneBtn{height:38px;padding:0 12px;border-radius:12px;font-weight:800}.noteEditorDangerBtn{background:#fff1f1;color:#c74242}#noteEditorDoneBtn{background:linear-gradient(135deg,var(--primary-soft),var(--primary));color:#fff}#noteEditorBody{flex:1;min-height:0;padding:14px;background:#f7fbff;display:flex;flex-direction:column;gap:10px}#noteEditorTools{display:flex;flex-direction:column;gap:8px}#noteEditorColorRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}#noteEditorMetaLine{display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--sub);font-size:12px;font-weight:700}#noteEditorTextarea{width:100%;height:100%;border-radius:20px;resize:none;padding:16px;font-size:16px;line-height:1.55;color:var(--text)}
#uploadLoading{position:fixed;inset:0;z-index:260;display:none;align-items:center;justify-content:center;background:rgba(245,248,252,.72);backdrop-filter:blur(4px)}#uploadLoading.show{display:flex}#uploadLoadingCard{min-width:180px;padding:18px 20px;border-radius:18px;background:rgba(255,255,255,.96);border:1px solid var(--line);box-shadow:0 18px 40px rgba(18,36,61,.12);display:flex;align-items:center;gap:12px}.uploadSpinner{width:22px;height:22px;border-radius:50%;border:2px solid rgba(36,145,255,.18);border-top-color:var(--primary);animation:spin .85s linear infinite}#uploadLoadingText{font-size:13px;font-weight:700;color:var(--text-soft)}@keyframes spin{to{transform:rotate(360deg)}}
.embed-mode #header,.embed-mode #quickRequestBar,.embed-mode #summaryCard{display:none !important}.embed-mode #chatCard{width:100% !important;height:100% !important;border-radius:0 !important;border:none !important;box-shadow:none !important}
@media (min-width:901px){#viewerOverlay{display:none !important;}#inputArea{padding:12px 14px calc(14px + var(--safe-bottom))}#contactInlineBar{gap:10px;padding:10px;border-radius:18px}#phoneInput{width:132px;height:34px}#savePhoneBtn,#deletePhoneBtn{height:34px;min-width:48px}#msgInput{height:36px;border-radius:12px}}
@media (max-width:900px){#chatCard{width:100%;border-radius:0}#header{height:40px}#quickRequestBar{padding:8px 10px 6px;gap:6px}#quickRequestButtons{flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}#quickRequestButtons::-webkit-scrollbar{display:none}.quickChip{flex:0 0 auto}#summaryCard{margin:0 8px 4px;gap:4px}#summaryHeaderLeft{gap:6px}#summaryPreview{gap:4px}.summaryInlineChip{max-width:110px;font-size:10px;padding:0 8px}#summaryRows{grid-template-columns:1fr 1fr;gap:6px}#chatBox{padding:0 10px 6px}.bubble{max-width:86%;font-size:14px;padding:11px 14px}.chatImg{max-width:220px}#inputArea{padding:8px 8px calc(10px + var(--safe-bottom));gap:4px}#contactInlineBar{gap:6px;padding:6px;border-radius:14px}#phoneGroup{gap:4px}#phoneInput{width:84px;height:30px;padding:0 8px;font-size:11px}#savePhoneBtn,#deletePhoneBtn{height:30px;min-width:40px;padding:0 8px;border-radius:9px;font-size:11px}#messageRow{gap:5px}#msgInput{height:32px;border-radius:10px;padding:0 10px;font-size:12px}#sendBtn,#fileLabel{width:30px;height:30px;min-width:30px;border-radius:9px}#viewerOverlay{width:100vw !important;height:100dvh !important;min-height:100dvh !important}#viewerMain{display:flex !important;flex-direction:column !important;min-height:0 !important;height:calc(100dvh - 52px) !important;flex:1 !important}#viewerLeft{display:flex !important;flex-direction:column !important;min-height:0 !important;flex:3 1 0 !important;border-right:none !important}#canvasWrap{flex:2 1 0 !important;min-height:0 !important;padding:8px !important}#imageStage{min-height:0 !important;height:100% !important;border-radius:16px !important}#toolbar{position:static !important;flex:1 1 0 !important;min-height:0 !important;padding:8px 10px 10px !important;gap:10px !important;overflow:hidden !important}#viewerRight{display:flex !important;flex-direction:column !important;flex:2 1 0 !important;min-height:0 !important;border-top:1px solid var(--line) !important;border-left:none !important}#viewerChatBox{flex:1 1 auto !important;min-height:0 !important;overflow-y:auto !important;padding:12px 12px 8px !important}#viewerInputBar{flex-shrink:0 !important;border-top:1px solid var(--line) !important;padding:8px 10px calc(10px + var(--safe-bottom)) !important;display:flex !important;gap:8px !important}#viewerMsgInput{flex:1 !important;height:44px !important;border-radius:14px !important;padding:0 12px !important;font-size:15px !important}#viewerSendBtn{width:44px !important;height:44px !important;border-radius:14px !important;font-size:18px !important}}
</style>
</head>
<body>
<div id="app">
  <section id="chatCard">
    <div id="header"><div id="title">디자인 상담</div></div>
    <div id="quickRequestBar"><div id="quickRequestTitle">커스텀 내용을 선택해주세요.</div><div id="quickRequestButtons"><button class="quickChip" type="button" data-request="색상 변경" data-draft="색상을 변경하고 싶어요.">색상 변경</button><button class="quickChip" type="button" data-request="문구 추가" data-draft="문구를 추가하고 싶어요.">문구 추가</button><button class="quickChip" type="button" data-request="사이즈 조정" data-draft="사이즈를 조정하고 싶어요.">사이즈 조정</button><button class="quickChip" type="button" data-request="디자인 수정" data-draft="디자인 일부를 수정하고 싶어요.">디자인 수정</button><button class="quickChip" type="button" data-request="추천 요청" data-draft="제 취향에 맞는 추천을 받고 싶어요.">추천 요청</button></div></div>
    <div id="summaryCard" class="collapsed"><div id="summaryHeader"><div id="summaryHeaderLeft"><div id="summaryTitle">현재 요청</div><button id="summaryToggleBtn" type="button" aria-label="현재 요청 요약 펼치기"></button><div id="summaryPreview" aria-live="polite"></div></div></div><div id="summaryRows"><div class="summaryItem"><div class="summaryLabel">제품</div><div class="summaryValue" id="summaryProductValue">선택 대기</div></div><div class="summaryItem"><div class="summaryLabel">상세</div><div class="summaryValue" id="summaryDetailValue">상담 시작</div></div></div><div id="summaryActions"><button id="summaryComposeBtn" class="summaryActionBtn" type="button">요청 정리하기</button><button id="summaryQuoteBtn" class="summaryActionBtn primary" type="button">견적 요청 문구 만들기</button></div></div>
    <div id="chatBox"><div id="chatInner"></div></div>
    <div id="inputArea"><div id="contactInlineBar"><div id="phoneGroup"><input id="phoneInput" type="tel" placeholder="연락처" /><button id="savePhoneBtn" type="button">등록</button><button id="deletePhoneBtn" type="button">삭제</button></div><div id="messageRow"><input id="msgInput" type="text" placeholder="원하는 제품과 수정할 부분을 남겨주세요" autocomplete="off" /><button id="sendBtn" type="button" aria-label="메시지 전송"><span class="btnIcon">➤</span></button><label id="fileLabel" for="fileInput" aria-label="이미지 첨부"><span class="btnIcon">📎</span></label><input id="fileInput" type="file" accept="image/*" /></div></div><div id="phoneStatus" aria-live="polite"></div></div>
