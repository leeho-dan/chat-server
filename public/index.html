<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>디자인 상담</title>

<style>
:root{
  --primary:#0a84ff;
  --bg:#f5f6f8;
  --card:#ffffff;
  --text:#1c1c1e;
  --sub:#8e8e93;
  --border:#e5e5ea;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:var(--bg);
}

/* 헤더 */
#header{
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
}

#statusIcon{
  position:absolute;
  right:15px;
  cursor:pointer;
}

/* 채팅 */
#chatBox{
  position:fixed;
  top:60px;
  bottom:100px;
  width:100%;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.message{
  max-width:65%;
  padding:12px 16px;
  border-radius:18px;
  font-size:14px;
  line-height:1.4;
}

.me{
  align-self:flex-end;
  background:var(--primary);
  color:white;
}

.other{
  align-self:flex-start;
  background:var(--card);
  border:1px solid var(--border);
}

.system{
  align-self:center;
  font-size:12px;
  color:var(--sub);
}

/* 입력 */
#inputArea{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:10px;
  border-top:1px solid var(--border);
}

#inputRow{
  display:flex;
  max-width:700px;
  margin:auto;
}

#msg{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:1px solid var(--border);
}

#sendBtn{
  margin-left:8px;
  padding:0 16px;
  border:none;
  border-radius:20px;
  background:var(--primary);
  color:white;
  cursor:pointer;
}

#file{display:none;}

#fileLabel{
  margin-left:8px;
  padding:10px;
  border-radius:50%;
  background:#eee;
  cursor:pointer;
}

/* 이미지 */
.chat-img{
  max-width:180px;
  border-radius:12px;
  cursor:pointer;
}

/* 사이드 */
#sideViewer{
  position:fixed;
  top:60px;
  right:0;
  width:38%;
  height:calc(100% - 60px);
  background:white;
  border-left:1px solid var(--border);
  display:none;
  flex-direction:column;
}

#viewerBody{
  position:relative;
  flex:1;
}

#sideImg{
  width:100%;
  height:100%;
  object-fit:contain;
}

#drawCanvas{
  position:absolute;
  top:0;
  left:0;
}

#chatBox.shrink{width:62%;}
</style>
</head>

<body>

<div id="header">
  디자인 상담
  <span id="statusIcon">🟢</span>
</div>

<div id="chatBox"></div>

<div id="inputArea">
  <div id="inputRow">
    <input id="msg" placeholder="메시지 입력...">
    <button id="sendBtn">전송</button>
    <label id="fileLabel" for="file">📎</label>
    <input type="file" id="file">
  </div>
</div>

<div id="sideViewer">
  <div id="viewerBody">
    <img id="sideImg">
    <canvas id="drawCanvas"></canvas>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

/* ===== 초기 설정 ===== */
const socket = io();
const role = "admin";

const chatBox = document.getElementById('chatBox');
const msg = document.getElementById('msg');
const file = document.getElementById('file');

/* room */
let roomId = localStorage.getItem("roomId") || crypto.randomUUID();
localStorage.setItem("roomId", roomId);

socket.emit("join",{ roomId, role });

/* ===== 메시지 ===== */
function send(){
  const text = msg.value.trim();
  if(!text) return;

  socket.emit('message',{ roomId, text, sender:role });
  msg.value="";
}

/* 엔터 */
msg.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    send();
  }
});

sendBtn.onclick = send;

/* 수신 */
socket.on('message',data=>{
  const type = data.sender === role ? 'me' :
               data.sender === "system" ? 'system' : 'other';
  renderMessage(data.text,type);
});

/* 렌더 */
function renderMessage(text,type){
  const div=document.createElement('div');
  div.className='message '+type;
  div.textContent=text;
  chatBox.appendChild(div);

  requestAnimationFrame(()=>{
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

/* ===== 이미지 ===== */
file.onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;

  const reader=new FileReader();
  reader.onload=ev=>{
    renderImage(ev.target.result,'me');
  };
  reader.readAsDataURL(f);

  const fd=new FormData();
  fd.append('image',f);

  fetch('/upload',{method:'POST',body:fd})
    .then(r=>r.json())
    .then(d=>{
      socket.emit('image',{ roomId, url:d.url, sender:role });
    });
};

socket.on('image',data=>{
  renderImage(data.url,data.sender===role?'me':'other');
});

function renderImage(src,type){
  const wrap=document.createElement('div');
  wrap.className='message '+type;

  const img=document.createElement('img');
  img.src=src;
  img.className='chat-img';
  img.onclick=()=>openImage(src);

  wrap.appendChild(img);
  chatBox.appendChild(wrap);

  chatBox.scrollTop = chatBox.scrollHeight;
}

/* ===== 사이드뷰 ===== */
const sideViewer=document.getElementById("sideViewer");
const sideImg=document.getElementById("sideImg");
const drawCanvas=document.getElementById("drawCanvas");
const ctx=drawCanvas.getContext("2d");

function openImage(src){
  sideViewer.style.display="flex";
  sideImg.src=src;

  setTimeout(resizeCanvas,50);
}

function resizeCanvas(){
  drawCanvas.width = sideImg.clientWidth;
  drawCanvas.height = sideImg.clientHeight;
}

/* ===== draw (최적화) ===== */
let drawing=false;
let last=0;

drawCanvas.onmousedown=e=>{
  drawing=true;
  ctx.beginPath();
  ctx.moveTo(e.offsetX,e.offsetY);
};

drawCanvas.onmousemove=e=>{
  if(!drawing) return;

  const now=Date.now();
  if(now-last<16) return; // 60fps 제한
  last=now;

  ctx.lineTo(e.offsetX,e.offsetY);
  ctx.stroke();

  socket.emit('draw',{ roomId,x:e.offsetX,y:e.offsetY });
};

drawCanvas.onmouseup=()=>drawing=false;

socket.on('draw',d=>{
  ctx.lineTo(d.x,d.y);
  ctx.stroke();
});

/* ===== 상태 ===== */
let isOpen=true;
statusIcon.onclick=()=>{
  isOpen=!isOpen;

  socket.emit('message',{
    roomId,
    text:isOpen?"상담 시작":"상담 종료",
    sender:"system"
  });
};

</script>

</body>
</html>
