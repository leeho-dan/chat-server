<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>디자인 상담</title>

<style>
:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --soft:#f8fbff;
  --line:#e4e8ef;
  --text:#16202a;
  --sub:#7a8795;
  --primary:#2491ff;
  --primary-soft:#63b8ff;
  --shadow:0 20px 60px rgba(18, 36, 61, 0.10);
  --radius-xl:30px;
  --radius-lg:24px;
  --radius-md:18px;
}

*{
  box-sizing:border-box;
}

html, body{
  margin:0;
  width:100%;
  height:100%;
  font-family:-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  background:
    radial-gradient(circle at top left, rgba(36,145,255,0.10), transparent 24%),
    linear-gradient(180deg, #f9fbff 0%, #eef3f8 100%);
  color:var(--text);
}

body{
  overflow:hidden;
}

button,
input,
label{
  font:inherit;
}

button{
  cursor:pointer;
}

#app{
  width:100%;
  height:100%;
  padding:20px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 기본 채팅 카드 */
#chatCard{
  width:min(920px, 100%);
  height:min(92vh, 920px);
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.8);
  border-radius:32px;
  box-shadow:var(--shadow);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* 1 : 6 : 3 */
#header{
  flex:1;
  min-height:90px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  background:rgba(255,255,255,0.86);
}

#title{
  font-size:30px;
  font-weight:800;
  letter-spacing:-0.03em;
}

#roleBadge{
  position:absolute;
  left:22px;
  top:50%;
  transform:translateY(-50%);
  padding:10px 14px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#f8fafc;
  color:var(--sub);
  font-size:13px;
  font-weight:700;
}

#headerActions{
  position:absolute;
  right:18px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  gap:10px;
}

.iconBtn{
  width:46px;
  height:46px;
  border:none;
  border-radius:50%;
  background:#edf3f8;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  color:#4f6277;
}

#chatBox{
  flex:6;
  min-height:0;
  overflow-y:auto;
  padding:22px 22px 14px;
  background:#f8fbff;
}

#chatInner{
  display:flex;
  flex-direction:column;
  gap:14px;
  min-height:100%;
}

.messageRow{
  display:flex;
  flex-direction:column;
  gap:5px;
}

.messageRow.me{
  align-items:flex-end;
}

.messageRow.other{
  align-items:flex-start;
}

.bubble{
  max-width:min(76%, 560px);
  padding:14px 18px;
  border-radius:26px;
  line-height:1.48;
  font-size:16px;
  letter-spacing:-0.02em;
  word-break:break-word;
}

.messageRow.me .bubble{
  background:linear-gradient(135deg, var(--primary-soft), var(--primary));
  color:white;
  border-bottom-right-radius:10px;
  box-shadow:0 8px 24px rgba(36,145,255,0.18);
}

.messageRow.other .bubble{
  background:#fff;
  border:1px solid var(--line);
  color:var(--text);
  border-bottom-left-radius:10px;
}

.meta{
  font-size:11px;
  color:var(--sub);
  padding:0 6px;
}

.imageBubble{
  max-width:min(76%, 560px);
  background:#fff;
  border:1px solid var(--line);
  border-radius:24px;
  padding:10px;
  cursor:pointer;
}

.messageRow.me .imageBubble{
  border-bottom-right-radius:10px;
}

.messageRow.other .imageBubble{
  border-bottom-left-radius:10px;
}

.chatImg{
  display:block;
  width:100%;
  max-width:250px;
  border-radius:16px;
}

/* 입력영역 */
#inputArea{
  flex:3;
  min-height:210px;
  border-top:1px solid var(--line);
  background:rgba(255,255,255,0.9);
  padding:16px 18px 18px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

#phoneRow{
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

#phoneInput,
#msgInput{
  width:100%;
  height:56px;
  border:1px solid #d8e0ea;
  background:#f8fbff;
  border-radius:22px;
  outline:none;
  padding:0 18px;
  font-size:16px;
  color:var(--text);
  transition:.2s ease;
}

#phoneInput:focus,
#msgInput:focus{
  border-color:rgba(36,145,255,0.45);
  box-shadow:0 0 0 4px rgba(36,145,255,0.10);
  background:#fff;
}

#savePhoneBtn{
  height:56px;
  border:none;
  border-radius:22px;
  padding:0 22px;
  background:#5f6f82;
  color:white;
  font-weight:800;
}

#messageRow{
  display:flex;
  align-items:center;
  gap:10px;
}

#sendBtn{
  width:58px;
  height:58px;
  border:none;
  border-radius:50%;
  background:linear-gradient(135deg, #72c2ff, var(--primary));
  color:white;
  font-size:24px;
  font-weight:800;
  box-shadow:0 8px 24px rgba(36,145,255,0.18);
}

#fileInput{
  display:none;
}

#fileLabel{
  width:58px;
  height:58px;
  border-radius:50%;
  background:#edf3f8;
  color:#5f7286;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  cursor:pointer;
}

/* 전체화면 이미지+채팅 뷰어 */
#viewerOverlay{
  position:fixed;
  inset:0;
  background:rgba(244,247,251,0.97);
  z-index:100;
  display:none;
  flex-direction:column;
}

#viewerOverlay.open{
  display:flex;
}

#viewerTopbar{
  height:72px;
  flex-shrink:0;
  border-bottom:1px solid var(--line);
  background:rgba(255,255,255,0.92);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
}

#viewerTitle{
  font-size:20px;
  font-weight:800;
}

#viewerActions{
  display:flex;
  gap:10px;
}

.viewerBtn{
  height:44px;
  border:none;
  border-radius:14px;
  padding:0 16px;
  background:#edf3f8;
  color:#425466;
  font-weight:700;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
}

#viewerMain{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns: 7fr 3fr;
}

#viewerLeft{
  min-width:0;
  border-right:1px solid var(--line);
  display:flex;
  flex-direction:column;
  background:#f8fbff;
}

#canvasWrap{
  flex:1;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
}

#imageStage{
  position:relative;
  max-width:100%;
  max-height:100%;
  display:inline-block;
}

#viewerImage{
  display:block;
  max-width:100%;
  max-height:calc(100vh - 200px);
  border-radius:22px;
  box-shadow:0 18px 36px rgba(18,36,61,0.12);
}

#drawCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border-radius:22px;
  touch-action:none;
}

#toolbar{
  padding:14px 18px;
  border-top:1px solid var(--line);
  background:#fff;
  display:flex;
  flex-direction:column;
  gap:12px;
}

#toolRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

#drawModeWrap{
  display:flex;
  gap:8px;
}

.toolBtn{
  height:42px;
  border:none;
  border-radius:14px;
  padding:0 14px;
  background:#edf3f8;
  color:#425466;
  font-weight:700;
}

.toolBtn.active{
  background:linear-gradient(135deg, #72c2ff, var(--primary));
  color:white;
}

#thicknessWrap{
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--sub);
  font-size:13px;
  font-weight:700;
}

#thicknessRange{
  width:150px;
}

#colorRow{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.colorSwatch{
  width:28px;
  height:28px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  box-shadow:0 0 0 1px rgba(0,0,0,0.10);
}

.colorSwatch.active{
  box-shadow:0 0 0 3px rgba(36,145,255,0.22);
}

#viewerRight{
  min-width:0;
  display:flex;
  flex-direction:column;
  background:#fff;
}

#viewerChatHeader{
  height:64px;
  flex-shrink:0;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  font-weight:800;
}

#viewerChatBox{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding:16px;
  background:#fbfdff;
}

#viewerChatInner{
  display:flex;
  flex-direction:column;
  gap:12px;
}

#viewerMessageRow{
  display:flex;
  gap:8px;
  align-items:center;
  padding:14px 16px 18px;
  border-top:1px solid var(--line);
  background:#fff;
}

#viewerMsgInput{
  flex:1;
  height:54px;
  border:1px solid #d8e0ea;
  background:#f8fbff;
  border-radius:20px;
  outline:none;
  padding:0 18px;
  font-size:16px;
}

#viewerMsgInput:focus{
  border-color:rgba(36,145,255,0.45);
  box-shadow:0 0 0 4px rgba(36,145,255,0.10);
  background:#fff;
}

#viewerSendBtn{
  width:54px;
  height:54px;
  border:none;
  border-radius:50%;
  background:linear-gradient(135deg, #72c2ff, var(--primary));
  color:white;
  font-size:22px;
  font-weight:800;
}

/* 모바일 */
@media (max-width: 900px){
  #app{
    padding:0;
  }

  #chatCard{
    width:100%;
    height:100%;
    border-radius:0;
  }

  #viewerMain{
    grid-template-columns: 1fr;
    grid-template-rows: 58vh 42vh;
  }

  #viewerLeft{
    border-right:none;
    border-bottom:1px solid var(--line);
  }

  #title{
    font-size:24px;
  }

  .bubble{
    max-width:84%;
    font-size:15px;
  }
}
</style>
</head>
<body>

<div id="app">
  <section id="chatCard">
    <div id="header">
      <div id="roleBadge">고객 채팅</div>
      <div id="title">디자인 상담</div>
      <div id="headerActions">
        <button id="openFullscreenBtn" class="iconBtn" type="button" aria-label="전체화면 보기">⛶</button>
      </div>
    </div>

    <div id="chatBox">
      <div id="chatInner"></div>
    </div>

    <div id="inputArea">
      <div id="phoneRow">
        <input id="phoneInput" type="tel" placeholder="알림 받을 전화번호 입력" />
        <button id="savePhoneBtn" type="button">등록</button>
      </div>

      <div id="messageRow">
        <input id="msgInput" type="text" placeholder="메시지 입력..." autocomplete="off" />
        <button id="sendBtn" type="button" aria-label="전송">➤</button>
        <label id="fileLabel" for="fileInput" aria-label="이미지 첨부">📎</label>
        <input id="fileInput" type="file" accept="image/*" />
      </div>
    </div>
  </section>
</div>

<div id="viewerOverlay" aria-hidden="true">
  <div id="viewerTopbar">
    <div id="viewerTitle">이미지 협업 상담</div>
    <div id="viewerActions">
      <a id="downloadSketchBtn" class="viewerBtn" download="sketch.png">스케치 다운로드</a>
      <button id="closeViewerBtn" class="viewerBtn" type="button">닫기</button>
    </div>
  </div>

  <div id="viewerMain">
    <section id="viewerLeft">
      <div id="canvasWrap">
        <div id="imageStage">
          <img id="viewerImage" alt="상담 이미지" />
          <canvas id="drawCanvas"></canvas>
        </div>
      </div>

      <div id="toolbar">
        <div id="toolRow">
          <div id="drawModeWrap">
            <button id="penBtn" class="toolBtn active" type="button">펜</button>
            <button id="eraserBtn" class="toolBtn" type="button">지우개</button>
            <button id="clearBtn" class="toolBtn" type="button">전체지우기</button>
          </div>

          <div id="thicknessWrap">
            <span>두께</span>
            <input id="thicknessRange" type="range" min="1" max="48" value="3" />
          </div>
        </div>

        <div id="colorRow">
          <button class="colorSwatch active" type="button" data-color="#ff3b30" style="background:#ff3b30;"></button>
          <button class="colorSwatch" type="button" data-color="#2491ff" style="background:#2491ff;"></button>
          <button class="colorSwatch" type="button" data-color="#22c55e" style="background:#22c55e;"></button>
          <button class="colorSwatch" type="button" data-color="#111827" style="background:#111827;"></button>
          <button class="colorSwatch" type="button" data-color="#f59e0b" style="background:#f59e0b;"></button>
          <button class="colorSwatch" type="button" data-color="#a855f7" style="background:#a855f7;"></button>
        </div>
      </div>
    </section>

    <section id="viewerRight">
      <div id="viewerChatHeader">채팅</div>
      <div id="viewerChatBox">
        <div id="viewerChatInner"></div>
      </div>
      <div id="viewerMessageRow">
        <input id="viewerMsgInput" type="text" placeholder="메시지 입력..." autocomplete="off" />
        <button id="viewerSendBtn" type="button">➤</button>
      </div>
    </section>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* 역할 및 방 */
const params = new URLSearchParams(location.search);
const role = params.has("admin") ? "admin" : "user";
let roomId = params.get("room") || localStorage.getItem("roomId") || crypto.randomUUID();
localStorage.setItem("roomId", roomId);

/* 소켓 */
const socket = io({
  transports: ["websocket", "polling"]
});

/* DOM */
const roleBadge = document.getElementById("roleBadge");
const chatInner = document.getElementById("chatInner");
const chatBox = document.getElementById("chatBox");
const msgInput = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");
const fileInput = document.getElementById("fileInput");
const phoneInput = document.getElementById("phoneInput");
const savePhoneBtn = document.getElementById("savePhoneBtn");
const openFullscreenBtn = document.getElementById("openFullscreenBtn");

const viewerOverlay = document.getElementById("viewerOverlay");
const closeViewerBtn = document.getElementById("closeViewerBtn");
const downloadSketchBtn = document.getElementById("downloadSketchBtn");
const viewerImage = document.getElementById("viewerImage");
const drawCanvas = document.getElementById("drawCanvas");
const viewerChatInner = document.getElementById("viewerChatInner");
const viewerChatBox = document.getElementById("viewerChatBox");
const viewerMsgInput = document.getElementById("viewerMsgInput");
const viewerSendBtn = document.getElementById("viewerSendBtn");

const penBtn = document.getElementById("penBtn");
const eraserBtn = document.getElementById("eraserBtn");
const clearBtn = document.getElementById("clearBtn");
const thicknessRange = document.getElementById("thicknessRange");
const colorSwatches = Array.from(document.querySelectorAll(".colorSwatch"));

const ctx = drawCanvas.getContext("2d");

/* 역할 표시 */
roleBadge.textContent = role === "admin" ? "관리자 화면" : "고객 채팅";
if (role === "admin") {
  document.getElementById("phoneRow").style.display = "none";
}

/* 한글 조합 방지 */
let isComposingMain = false;
let isComposingViewer = false;

msgInput.addEventListener("compositionstart", () => { isComposingMain = true; });
msgInput.addEventListener("compositionend", () => { isComposingMain = false; });
viewerMsgInput.addEventListener("compositionstart", () => { isComposingViewer = true; });
viewerMsgInput.addEventListener("compositionend", () => { isComposingViewer = false; });

/* 뷰어 상태 */
let currentViewerImageId = "";
let currentViewerImageUrl = "";
let currentStrokes = [];
let drawMode = "draw";
let currentColor = "#ff3b30";
let currentSize = 3;
let isDrawing = false;
let lastPoint = null;

/* 입장 */
socket.emit("join", { roomId, role });

function scrollBottom(container) {
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

function formatTime(ts) {
  try {
    return new Date(ts).toLocaleTimeString("ko-KR", {
      hour: "numeric",
      minute: "2-digit"
    });
  } catch {
    return "";
  }
}

function createMessageNode(data) {
  const row = document.createElement("div");
  row.className = "messageRow " + (data.sender === role ? "me" : "other");

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = data.text || "";

  const meta = document.createElement("div");
  meta.className = "meta";
  meta.textContent = formatTime(data.time);

  row.appendChild(bubble);
  row.appendChild(meta);
  return row;
}

function createImageNode(data) {
  const row = document.createElement("div");
  row.className = "messageRow " + (data.sender === role ? "me" : "other");

  const wrap = document.createElement("div");
  wrap.className = "imageBubble";

  const img = document.createElement("img");
  img.className = "chatImg";
  img.src = data.imageUrl;
  img.alt = "첨부 이미지";

  wrap.appendChild(img);
  wrap.addEventListener("click", () => {
    openViewer(data.imageId, data.imageUrl);
  });

  const meta = document.createElement("div");
  meta.className = "meta";
  meta.textContent = formatTime(data.time);

  row.appendChild(wrap);
  row.appendChild(meta);
  return row;
}

function appendToBothChats(nodeMain, nodeViewer) {
  chatInner.appendChild(nodeMain);
  viewerChatInner.appendChild(nodeViewer);
  scrollBottom(chatBox);
  scrollBottom(viewerChatBox);
}

function renderTextMessage(data) {
  appendToBothChats(
    createMessageNode(data),
    createMessageNode(data)
  );
}

function renderImageMessage(data) {
  appendToBothChats(
    createImageNode(data),
    createImageNode(data)
  );
}

function sendMessageFromMain() {
  const text = msgInput.value.trim();
  if (!text) return;
  if (isComposingMain) return;

  socket.emit("message", { text });
  msgInput.value = "";
}

function sendMessageFromViewer() {
  const text = viewerMsgInput.value.trim();
  if (!text) return;
  if (isComposingViewer) return;

  socket.emit("message", { text });
  viewerMsgInput.value = "";
}

async function savePhone() {
  const phone = phoneInput.value.trim();
  if (!phone) {
    alert("전화번호를 입력해주세요.");
    return;
  }

  try {
    const response = await fetch("/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ roomId, phone })
    });

    const result = await response.json().catch(() => ({}));
    if (!response.ok) {
      throw new Error(result.error || "전화번호 등록 실패");
    }

    alert("전화번호가 등록되었습니다.");
  } catch (error) {
    console.error(error);
    alert("전화번호 등록에 실패했습니다.");
  }
}

async function uploadImage(file) {
  const formData = new FormData();
  formData.append("image", file);

  const response = await fetch("/upload", {
    method: "POST",
    body: formData
  });

  const result = await response.json().catch(() => ({}));
  if (!response.ok) {
    throw new Error(result.error || "이미지 업로드 실패");
  }

  if (!result.url) {
    throw new Error("업로드된 이미지 URL이 없습니다.");
  }

  socket.emit("image", { url: result.url });
}

function openViewer(imageId, imageUrl) {
  currentViewerImageId = imageId;
  currentViewerImageUrl = imageUrl;
  currentStrokes = [];
  viewerOverlay.classList.add("open");
  viewerOverlay.setAttribute("aria-hidden", "false");
  viewerImage.src = imageUrl;
  viewerChatInner.innerHTML = chatInner.innerHTML;
  scrollBottom(viewerChatBox);
}

function closeViewer() {
  viewerOverlay.classList.remove("open");
  viewerOverlay.setAttribute("aria-hidden", "true");
  currentViewerImageId = "";
  currentViewerImageUrl = "";
  currentStrokes = [];
  clearCanvas();
}

function updateCanvasSize() {
  const width = viewerImage.clientWidth;
  const height = viewerImage.clientHeight;
  if (!width || !height) return;

  drawCanvas.width = width;
  drawCanvas.height = height;
  redrawAllStrokes();
}

function clearCanvas() {
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
}

function drawStroke(stroke) {
  if (!drawCanvas.width || !drawCanvas.height) return;

  const x1 = stroke.last.x * drawCanvas.width;
  const y1 = stroke.last.y * drawCanvas.height;
  const x2 = stroke.current.x * drawCanvas.width;
  const y2 = stroke.current.y * drawCanvas.height;

  ctx.save();
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.lineWidth = stroke.size || 3;

  if (stroke.mode === "erase") {
    ctx.globalCompositeOperation = "destination-out";
    ctx.strokeStyle = "rgba(0,0,0,1)";
  } else {
    ctx.globalCompositeOperation = "source-over";
    ctx.strokeStyle = stroke.color || "#ff3b30";
  }

  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.restore();
}

function redrawAllStrokes() {
  clearCanvas();
  currentStrokes.forEach(drawStroke);
}

function getNormalizedPoint(evt) {
  const rect = drawCanvas.getBoundingClientRect();
  return {
    x: Math.max(0, Math.min(1, (evt.clientX - rect.left) / rect.width)),
    y: Math.max(0, Math.min(1, (evt.clientY - rect.top) / rect.height))
  };
}

function setActiveTool() {
  penBtn.classList.toggle("active", drawMode === "draw");
  eraserBtn.classList.toggle("active", drawMode === "erase");
}

function setActiveColor(color) {
  colorSwatches.forEach((btn) => {
    btn.classList.toggle("active", btn.dataset.color === color);
  });
}

function buildSketchDownload() {
  if (!currentViewerImageUrl) return;

  const img = new Image();
  img.crossOrigin = "anonymous";
  img.onload = () => {
    const exportCanvas = document.createElement("canvas");
    exportCanvas.width = img.naturalWidth;
    exportCanvas.height = img.naturalHeight;

    const exportCtx = exportCanvas.getContext("2d");
    exportCtx.drawImage(img, 0, 0);

    currentStrokes.forEach((stroke) => {
      const x1 = stroke.last.x * exportCanvas.width;
      const y1 = stroke.last.y * exportCanvas.height;
      const x2 = stroke.current.x * exportCanvas.width;
      const y2 = stroke.current.y * exportCanvas.height;

      exportCtx.save();
      exportCtx.lineCap = "round";
      exportCtx.lineJoin = "round";
      exportCtx.lineWidth = stroke.size || 3;

      if (stroke.mode === "erase") {
        exportCtx.globalCompositeOperation = "destination-out";
        exportCtx.strokeStyle = "rgba(0,0,0,1)";
      } else {
        exportCtx.globalCompositeOperation = "source-over";
        exportCtx.strokeStyle = stroke.color || "#ff3b30";
      }

      exportCtx.beginPath();
      exportCtx.moveTo(x1, y1);
      exportCtx.lineTo(x2, y2);
      exportCtx.stroke();
      exportCtx.restore();
    });

    downloadSketchBtn.href = exportCanvas.toDataURL("image/png");
  };
  img.src = currentViewerImageUrl;
}

/* 메인 이벤트 */
sendBtn.addEventListener("click", sendMessageFromMain);

msgInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    if (isComposingMain || e.isComposing) return;
    e.preventDefault();
    sendMessageFromMain();
  }
});

viewerSendBtn.addEventListener("click", sendMessageFromViewer);

viewerMsgInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    if (isComposingViewer || e.isComposing) return;
    e.preventDefault();
    sendMessageFromViewer();
  }
});

savePhoneBtn.addEventListener("click", savePhone);

fileInput.addEventListener("change", async (e) => {
  const selected = e.target.files[0];
  if (!selected) return;

  try {
    await uploadImage(selected);
  } catch (error) {
    console.error(error);
    alert(error.message || "이미지 업로드에 실패했습니다.");
  } finally {
    fileInput.value = "";
  }
});

openFullscreenBtn.addEventListener("click", () => {
  if (currentViewerImageId && currentViewerImageUrl) {
    openViewer(currentViewerImageId, currentViewerImageUrl);
  } else {
    alert("먼저 채팅에서 이미지를 선택해주세요.");
  }
});

closeViewerBtn.addEventListener("click", closeViewer);

viewerImage.addEventListener("load", () => {
  updateCanvasSize();
  if (currentViewerImageId) {
    socket.emit("request-drawing-history", { imageId: currentViewerImageId });
  }
});

window.addEventListener("resize", updateCanvasSize);

penBtn.addEventListener("click", () => {
  drawMode = "draw";
  setActiveTool();
});

eraserBtn.addEventListener("click", () => {
  drawMode = "erase";
  setActiveTool();
});

clearBtn.addEventListener("click", () => {
  if (!currentViewerImageId) return;
  socket.emit("clear-drawing", { imageId: currentViewerImageId });
});

thicknessRange.addEventListener("input", () => {
  currentSize = Number(thicknessRange.value || 3);
});

colorSwatches.forEach((btn) => {
  btn.addEventListener("click", () => {
    currentColor = btn.dataset.color || "#ff3b30";
    setActiveColor(currentColor);
  });
});

drawCanvas.addEventListener("pointerdown", (evt) => {
  if (!currentViewerImageId) return;

  isDrawing = true;
  lastPoint = getNormalizedPoint(evt);
  drawCanvas.setPointerCapture(evt.pointerId);
});

drawCanvas.addEventListener("pointermove", (evt) => {
  if (!isDrawing || !currentViewerImageId || !lastPoint) return;

  const current = getNormalizedPoint(evt);
  const stroke = {
    imageId: currentViewerImageId,
    mode: drawMode,
    color: currentColor,
    size: currentSize,
    last: lastPoint,
    current
  };

  currentStrokes.push(stroke);
  drawStroke(stroke);
  socket.emit("draw-stroke", stroke);

  lastPoint = current;
});

function stopDrawing() {
  isDrawing = false;
  lastPoint = null;
}

drawCanvas.addEventListener("pointerup", stopDrawing);
drawCanvas.addEventListener("pointercancel", stopDrawing);
drawCanvas.addEventListener("pointerleave", stopDrawing);

downloadSketchBtn.addEventListener("click", buildSketchDownload);

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    closeViewer();
  }
});

/* 소켓 수신 */
socket.on("history", (messages) => {
  chatInner.innerHTML = "";
  viewerChatInner.innerHTML = "";

  (messages || []).forEach((item) => {
    if (item.type === "text") renderTextMessage(item);
    if (item.type === "image") renderImageMessage(item);
  });
});

socket.on("message", (data) => {
  renderTextMessage(data);
});

socket.on("image", (data) => {
  currentViewerImageId = data.imageId;
  currentViewerImageUrl = data.imageUrl;
  renderImageMessage(data);
});

socket.on("drawing-history", (payload) => {
  if (!payload || payload.imageId !== currentViewerImageId) return;
  currentStrokes = Array.isArray(payload.strokes) ? payload.strokes : [];
  redrawAllStrokes();
});

socket.on("draw-stroke", (stroke) => {
  if (!stroke || stroke.imageId !== currentViewerImageId) return;
  currentStrokes.push(stroke);
  drawStroke(stroke);
});

socket.on("clear-drawing", (payload) => {
  if (!payload || payload.imageId !== currentViewerImageId) return;
  currentStrokes = [];
  clearCanvas();
});
</script>
</body>
