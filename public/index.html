<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>

const socket = io("https://너의-render주소.onrender.com");

const role = location.search.includes("admin") ? "admin" : "user";

let roomId = localStorage.getItem("roomId") || crypto.randomUUID();
localStorage.setItem("roomId", roomId);

socket.emit("join", { roomId, role });

function send(){
  const text = msg.value.trim();
  if(!text) return;
  socket.emit("message",{ text });
  msg.value="";
}

msg.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    send();
  }
});

/* 전화번호 등록 */
function savePhone(){
  fetch("https://너의-render주소.onrender.com/register",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ roomId, phone:phoneInput.value })
  })
  .then(()=>alert("등록 완료"));
}

/* 메시지 */
socket.on("message", d=>{
  const div=document.createElement("div");
  div.innerText=d.text;
  chatBox.appendChild(div);
});

/* 이미지 */
socket.on("image", d=>{
  const img=document.createElement("img");
  img.src=d.image;
  chatBox.appendChild(img);
});

</script>
