<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>디자인 상담</title>

<style>
:root{
  --bg:#f4f8fc;
  --bg-soft:#f8fbff;
  --card:#ffffff;
  --card-soft:rgba(255,255,255,0.92);
  --line:#e4ebf3;
  --line-strong:#d8e2ec;
  --text:#17212b;
  --text-soft:#24313f;
  --sub:#758394;
  --sub-soft:#8e9baa;
  --primary:#2491ff;
  --primary-soft:#6fc3ff;
  --primary-faint:rgba(36,145,255,0.10);
  --success:#2f9e44;
  --danger:#ff5b5b;
  --danger-soft:#fff3f3;
  --shadow:0 18px 50px rgba(18,36,61,0.10);
  --shadow-soft:0 10px 28px rgba(18,36,61,0.08);
  --radius-xl:30px;
  --radius-lg:22px;
  --radius-md:18px;
  --radius-sm:14px;
}

*{ box-sizing:border-box; }

html, body{
  margin:0;
  width:100%;
  height:100%;
  font-family:-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  background:
    radial-gradient(circle at top left, rgba(36,145,255,0.08), transparent 24%),
    linear-gradient(180deg, #f9fbff 0%, #edf4fa 100%);
  color:var(--text);
}

body{
  overflow:hidden;
  -webkit-text-size-adjust:100%;
}

button, input, textarea, label{
  font:inherit;
}

button{
  cursor:pointer;
  border:none;
}

button:disabled{
  cursor:not-allowed;
  opacity:0.5;
}

input, textarea{
  border:none;
  outline:none;
}

.srOnly{
  position:absolute;
  width:1px;
  height:1px;
  padding:0;
  margin:-1px;
  overflow:hidden;
  clip:rect(0,0,0,0);
  white-space:nowrap;
  border:0;
}

.btnIcon{
  display:none;
  align-items:center;
  justify-content:center;
  width:1em;
  height:1em;
  line-height:1;
  flex-shrink:0;
  transform:translateY(-0.02em);
}

#app{
  width:100%;
  height:100%;
  padding:14px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#chatCard{
  width:min(940px, 100%);
  height:min(94dvh, 900px);
  background:var(--card-soft);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.84);
  border-radius:var(--radius-xl);
  box-shadow:var(--shadow);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

#header{
  height:76px;
  flex-shrink:0;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  background:rgba(255,255,255,0.94);
}

#title{
  font-size:26px;
  font-weight:800;
  letter-spacing:-0.03em;
}

#roleBadge{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  padding:8px 12px;
  border-radius:999px;
  background:#f7faff;
  border:1px solid var(--line);
  color:var(--sub);
  font-size:12px;
  font-weight:700;
}

#headerActions{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  gap:8px;
}

.iconBtn{
  width:42px;
  height:42px;
  border-radius:50%;
  background:#edf4fa;
  color:#557086;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  line-height:1;
  box-shadow:0 1px 0 rgba(255,255,255,0.6) inset;
}

#chatBox{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding:18px 16px 10px;
  background:var(--bg-soft);
}

#chatInner{
  display:flex;
  flex-direction:column;
  gap:14px;
  min-height:100%;
}

.messageRow{
  display:flex;
  flex-direction:column;
  gap:5px;
}

.messageRow.me{ align-items:flex-end; }
.messageRow.other{ align-items:flex-start; }

.bubble{
  max-width:min(74%, 560px);
  padding:12px 16px;
  border-radius:22px;
  font-size:15px;
  line-height:1.52;
  letter-spacing:-0.02em;
  word-break:break-word;
}

.messageRow.me .bubble{
  background:linear-gradient(135deg, var(--primary-soft), var(--primary));
  color:white;
  border-bottom-right-radius:8px;
  box-shadow:0 8px 20px rgba(36,145,255,0.16);
}

.messageRow.other .bubble{
  background:#ffffff;
  color:var(--text);
  border:1px solid var(--line);
  border-bottom-left-radius:8px;
}

.meta{
  font-size:10px;
  color:#95a3b1;
  padding:0 8px;
}

.imageBubble{
  max-width:min(72%, 520px);
  background:#ffffff;
  border:1px solid var(--line);
  border-radius:22px;
  padding:8px;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(18,36,61,0.04);
  transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
}

.imageBubble:hover{
  transform:translateY(-1px);
  box-shadow:0 14px 26px rgba(18,36,61,0.08);
  border-color:#d5e4f3;
}

.messageRow.me .imageBubble{ border-bottom-right-radius:8px; }
.messageRow.other .imageBubble{ border-bottom-left-radius:8px; }

.chatImg{
  display:block;
  width:100%;
  max-width:240px;
  border-radius:14px;
}

#inputArea{
  flex-shrink:0;
  border-top:1px solid var(--line);
  background:rgba(255,255,255,0.96);
  padding:10px 14px 12px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

#contactToggleBar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 12px;
  border:1px solid var(--line);
  border-radius:16px;
  background:#fbfdff;
}

#contactToggleText{
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:2px;
}

#contactToggleTitle{
  font-size:13px;
  font-weight:800;
  color:var(--text-soft);
}

#contactToggleDesc{
  font-size:11px;
  color:var(--sub);
  line-height:1.4;
}

#toggleContactPanelBtn{
  height:34px;
  border-radius:999px;
  padding:0 12px;
  background:#edf4fa;
  color:#425466;
  font-size:12px;
  font-weight:800;
  flex-shrink:0;
}

#utilityRow{
  display:none;
}

#utilityRow.open{
  display:block;
}

#phonePanel{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:12px;
  border:1px solid #dce7f1;
  border-radius:18px;
  background:linear-gradient(180deg, #f8fbff, #f3f8fd);
}

#phonePanelHeader{
  display:flex;
  align-items:flex-start;
  gap:10px;
}

#phonePanelIcon{
  width:34px;
  height:34px;
  border-radius:12px;
  background:#e8f2ff;
  color:#3d88ea;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  line-height:1;
  flex-shrink:0;
}

#phonePanelText{
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:3px;
}

#phonePanelTitle{
  font-size:13px;
  font-weight:800;
  color:var(--text-soft);
  letter-spacing:-0.01em;
}

#phonePanelDesc{
  font-size:12px;
  color:#708092;
  line-height:1.45;
}

#phoneRow{
  display:flex;
  gap:8px;
}

#phoneStatus{
  display:none;
  font-size:12px;
  color:#5f7286;
  padding:0 2px;
}

#phoneStatus.show{
  display:block;
}

#phoneInput{
  flex:1;
  height:42px;
  border:1px solid var(--line-strong);
  background:#f8fbff;
  border-radius:16px;
  padding:0 14px;
  font-size:16px;
}

#savePhoneBtn{
  height:42px;
  border-radius:16px;
  min-width:64px;
  padding:0 16px;
  background:#607082;
  color:white;
  font-weight:800;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

#messageRow{
  display:flex;
  align-items:center;
  gap:8px;
}

#msgInput{
  flex:1;
  height:48px;
  border:1px solid var(--line-strong);
  background:#f8fbff;
  border-radius:18px;
  padding:0 16px;
  font-size:16px;
}

#msgInput:focus,
#phoneInput:focus,
#viewerMsgInput:focus,
#noteEditorTextarea:focus{
  background:#ffffff;
  border-color:rgba(36,145,255,0.45);
  box-shadow:0 0 0 4px rgba(36,145,255,0.08);
}

#sendBtn{
  width:48px;
  height:48px;
  border-radius:50%;
  background:linear-gradient(135deg, #79c7ff, var(--primary));
  color:white;
  font-size:20px;
  font-weight:800;
  box-shadow:0 8px 20px rgba(36,145,255,0.16);
}

#fileInput{
  display:none;
}

#fileLabel{
  width:48px;
  height:48px;
  border-radius:50%;
  background:#f2f6fa;
  color:#7b8d9f;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
  border:1px solid #e5edf4;
}

#viewerOverlay{
  position:fixed;
  inset:0;
  z-index:100;
  display:none;
  flex-direction:column;
  background:rgba(245,248,252,0.98);
}

#viewerOverlay.open{
  display:flex;
}

#viewerTopbar{
  height:72px;
  flex-shrink:0;
  border-bottom:1px solid var(--line);
  background:rgba(255,255,255,0.96);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 14px;
  gap:12px;
}

#viewerTopLeft{
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:4px;
}

#viewerTitle{
  font-size:18px;
  font-weight:800;
}

#viewerSubtitle{
  font-size:12px;
  color:var(--sub);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

#viewerStats{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.statBadge{
  height:30px;
  padding:0 10px;
  border-radius:999px;
  background:#eef4fa;
  color:#587085;
  font-size:12px;
  display:flex;
  align-items:center;
  font-weight:700;
}

#viewerActions{
  display:flex;
  gap:8px;
  flex-shrink:0;
}

.viewerBtn{
  height:38px;
  border-radius:12px;
  padding:0 14px;
  background:#edf4fa;
  color:#425466;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-weight:700;
  line-height:1;
}

#viewerMain{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:7fr 3fr;
}

#viewerLeft{
  min-width:0;
  display:flex;
  flex-direction:column;
  border-right:1px solid var(--line);
  background:#f8fbff;
}

#canvasWrap{
  flex:1;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:14px;
  background:#f7fbff;
}

#imageStage{
  position:relative;
  width:min(100%, 1200px);
  height:min(100%, 760px);
  min-height:420px;
  border-radius:22px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.92), rgba(247,251,255,0.96));
  border:1px solid #dfe9f3;
  box-shadow:0 18px 38px rgba(18,36,61,0.08);
  overflow:hidden;
}

#viewerImage{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%);
  max-width:84%;
  max-height:84%;
  border-radius:18px;
  box-shadow:0 14px 32px rgba(18,36,61,0.12);
  pointer-events:none;
  user-select:none;
  -webkit-user-drag:none;
  z-index:1;
}

#drawCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border-radius:22px;
  touch-action:none;
  pointer-events:auto;
  z-index:2;
}

#textLayer{
  position:absolute;
  inset:0;
  z-index:3;
  pointer-events:none;
}

.noteMarker{
  position:absolute;
  min-width:56px;
  height:42px;
  padding:0 12px;
  border-radius:14px;
  display:flex;
  align-items:center;
  gap:6px;
  background:rgba(255,255,255,0.70);
  backdrop-filter:blur(8px);
  color:#24313f;
  border:1px solid rgba(36,145,255,0.16);
  box-shadow:0 10px 18px rgba(18,36,61,0.08);
  transform:translate(-50%, -50%);
  pointer-events:auto;
  user-select:none;
  touch-action:none;
}

.noteMarker[data-author="admin"]{
  border-color:rgba(138,92,255,0.18);
}

.noteMarker.selected{
  border-color:rgba(255,139,61,0.55);
  box-shadow:0 0 0 3px rgba(255,139,61,0.14), 0 10px 18px rgba(18,36,61,0.10);
}

.noteMarkerText{
  max-width:132px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-size:12px;
  font-weight:800;
}

.noteResize{
  position:absolute;
  right:-5px;
  bottom:-5px;
  width:14px;
  height:14px;
  border-radius:5px;
  background:#2491ff;
  box-shadow:0 4px 10px rgba(36,145,255,0.18);
  cursor:nwse-resize;
}

.noteMarker[data-author="admin"] .noteResize{
  background:#8a5cff;
}

#toolbar{
  border-top:1px solid var(--line);
  background:#ffffff;
  padding:14px 12px 16px;
  display:flex;
  flex-direction:column;
  gap:16px;
  flex-shrink:0;
}

#mobileToolHint{
  display:none;
  padding:8px 10px;
  border-radius:12px;
  background:#f6fbff;
  border:1px solid #dceaf8;
  color:#5b7085;
  font-size:11px;
  font-weight:700;
  line-height:1.4;
}

.toolSection{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.toolSectionLabel{
  font-size:11px;
  font-weight:800;
  color:var(--sub-soft);
  padding:0 2px;
  letter-spacing:0.02em;
  text-transform:uppercase;
}

.toolRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.toolGroup{
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
  padding-bottom:8px;
}

.toolGroup.fill{
  flex:1;
}

.toolBtn{
  height:38px;
  border-radius:12px;
  padding:0 12px;
  background:#edf4fa;
  color:#425466;
  font-weight:700;
  white-space:nowrap;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  line-height:1;
}

.toolBtn.active{
  background:linear-gradient(135deg, #79c7ff, var(--primary));
  color:white;
}

.toolBtn.danger{
  background:var(--danger-soft);
  color:#c74242;
}

#thicknessWrap{
  display:flex;
  align-items:center;
  gap:8px;
  color:var(--sub);
  font-size:12px;
  font-weight:700;
  flex-shrink:0;
}

#thicknessRange{
  width:120px;
}

#colorRow,
#noteColorRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
  min-height:30px;
}

#colorRow{
  display:none;
  padding:10px 10px 12px;
  border:1px solid #dce7f1;
  border-radius:14px;
  background:#f8fbff;
  box-shadow:0 10px 24px rgba(18,36,61,0.08);
}

#colorRow.open{
  display:flex;
}

#noteColorHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}

#noteColorTitle{
  font-size:12px;
  font-weight:800;
  color:var(--sub);
}

#toggleNoteColorsBtn{
  height:30px;
  border-radius:999px;
  padding:0 12px;
  background:#edf4fa;
  color:#425466;
  font-size:12px;
  font-weight:700;
}

.colorSwatch{
  width:26px;
  height:26px;
  border-radius:50%;
  box-shadow:0 0 0 1px rgba(0,0,0,0.10);
  flex:0 0 auto;
}

.colorSwatch.active{
  box-shadow:0 0 0 3px rgba(36,145,255,0.20);
}

#customColorBtn{
  position:relative;
  overflow:hidden;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.95), rgba(228,236,245,0.95)),
    conic-gradient(from 180deg, #ff3b30, #f59e0b, #22c55e, #2491ff, #a855f7, #ff3b30);
}

#customColorBtn::before{
  content:"";
  position:absolute;
  inset:4px;
  border-radius:50%;
  background:var(--custom-color-preview, conic-gradient(from 180deg, #ff3b30, #f59e0b, #22c55e, #2491ff, #a855f7, #ff3b30));
}

#customColorBtn::after{
  content:"+";
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ffffff;
  font-size:14px;
  font-weight:900;
  text-shadow:0 1px 2px rgba(0,0,0,0.35);
}

#customColorInput{
  position:absolute;
  pointer-events:none;
  opacity:0;
}

.noteColorSwatch{
  width:22px;
  height:22px;
  border-radius:50%;
  box-shadow:0 0 0 1px rgba(0,0,0,0.10);
}

.noteColorSwatch.active{
  box-shadow:0 0 0 3px rgba(36,145,255,0.18);
}

#noteColorRow{
  padding-bottom:8px;
}

#viewerRight{
  min-width:0;
  display:flex;
  flex-direction:column;
  background:#ffffff;
}

#viewerChatHeader{
  height:52px;
  flex-shrink:0;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  font-weight:800;
}

#viewerChatBox{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding:12px;
  background:#fbfdff;
}

#viewerChatInner{
  display:flex;
  flex-direction:column;
  gap:10px;
}

#viewerInputBar{
  flex-shrink:0;
  border-top:1px solid var(--line);
  padding:10px 12px 12px;
  background:#ffffff;
  display:flex;
  gap:8px;
}

#viewerMsgInput{
  flex:1;
  height:44px;
  border:1px solid var(--line-strong);
  background:#f8fbff;
  border-radius:16px;
  padding:0 14px;
  font-size:16px;
}

#viewerSendBtn{
  width:44px;
  height:44px;
  border-radius:50%;
  background:linear-gradient(135deg, #79c7ff, var(--primary));
  color:white;
  font-size:18px;
  font-weight:800;
}

#noteEditorOverlay{
  position:fixed;
  inset:0;
  z-index:220;
  display:none;
  flex-direction:column;
  background:rgba(245,248,252,0.98);
}

#noteEditorOverlay.open{
  display:flex;
}

#noteEditorHeader{
  height:64px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:0 14px;
  border-bottom:1px solid var(--line);
  background:#ffffff;
}

#noteEditorTitleWrap{
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:3px;
}

#noteEditorTitle{
  font-size:17px;
  font-weight:800;
}

#noteEditorMeta{
  font-size:12px;
  color:var(--sub);
}

#noteEditorDoneBtn{
  height:38px;
  border-radius:12px;
  padding:0 14px;
  background:linear-gradient(135deg, #79c7ff, var(--primary));
  color:#fff;
  font-weight:800;
}

#noteEditorBody{
  flex:1;
  min-height:0;
  padding:14px;
  background:#f7fbff;
}

#noteEditorTextarea{
  width:100%;
  height:100%;
  border:1px solid var(--line-strong);
  border-radius:20px;
  background:#fffef8;
  resize:none;
  padding:16px;
  font-size:16px;
  line-height:1.55;
  color:var(--text);
}

@media (max-width: 900px){
  #app{
    padding:0;
  }

  #chatCard{
    width:100%;
    height:100dvh;
    border-radius:0;
  }

  #header{
    height:64px;
    min-height:64px;
  }

  #title{
    font-size:22px;
  }

  #roleBadge{
    left:10px;
    padding:6px 10px;
    font-size:11px;
  }

  #chatBox{
    padding:14px 12px 8px;
  }

  .bubble{
    max-width:84%;
    font-size:14px;
    padding:11px 14px;
  }

  .chatImg{
    max-width:200px;
  }

  #inputArea{
    padding:8px 10px 10px;
    gap:6px;
  }

  #msgInput, #sendBtn, #fileLabel{
    height:44px;
  }

  #sendBtn, #fileLabel{

<body>

<script src="/socket.io/socket.io.js"></script>
<script>
(() => {
  "use strict";

  const STORAGE_KEYS = {
    roomId: "chat_room_id",
    viewerState: "chat_last_viewer_state",
    userName: "chat_user_name"
  };

  const MAX_CLIENT_STROKES = 2000;
  const MAX_CLIENT_NOTES = 100;
  const MAX_NOTE_CHARS = 500;
  const HISTORY_LIMIT = 50;

  const params = new URLSearchParams(location.search);
  const role = params.get("role") === "admin" || params.has("admin") ? "admin" : "user";
  const userName =
    params.get("userName") ||
    localStorage.getItem(STORAGE_KEYS.userName) ||
    "상담자";

  localStorage.setItem(STORAGE_KEYS.userName, userName);

  const isViewerMode = params.get("viewer") === "1";
  const isEmbeddedMode = params.get("embed") === "1" || window.parent !== window;
  const initialImageId = params.get("imageId") || "";
  const initialImageUrl = params.get("imageUrl") || "";

  const state = {
    roomId: params.get("room") || localStorage.getItem(STORAGE_KEYS.roomId) || crypto.randomUUID(),
    currentViewerImageId: "",
    currentViewerImageUrl: "",
    lastSelectedImageId: "",
    lastSelectedImageUrl: "",
    drawMode: "draw",
    currentColor: "#ff3b30",
    currentSize: 3,
    currentNoteColor: "#fff7c2",
    currentStrokes: [],
    currentNotes: [],
    isDrawing: false,
    lastPoint: null,
    pendingStrokeBatch: [],
    pendingStrokeImageId: "",
    strokeBatchRaf: null,
    isComposingMain: false,
    isComposingViewer: false,
    historyUndoStack: [],
    historyRedoStack: [],
    historyLock: false,
    activeMarkerId: "",
    activeNoteEditorId: "",
    noteInteraction: {
      type: "",
      noteId: "",
      pointerId: null,
      dragOffsetX: 0,
      dragOffsetY: 0,
      startWidth: 0,
      startHeight: 0,
      startClientX: 0,
      startClientY: 0,
      moved: false
    }
  };

  localStorage.setItem(STORAGE_KEYS.roomId, state.roomId);

  const socket = io({
    transports: ["websocket", "polling"]
  });

  const el = {
    app: document.getElementById("app"),
    roleBadge: document.getElementById("roleBadge"),
    chatInner: document.getElementById("chatInner"),
    chatBox: document.getElementById("chatBox"),
    msgInput: document.getElementById("msgInput"),
    sendBtn: document.getElementById("sendBtn"),
    fileInput: document.getElementById("fileInput"),
    phoneInput: document.getElementById("phoneInput"),
    phoneStatus: document.getElementById("phoneStatus"),
    savePhoneBtn: document.getElementById("savePhoneBtn"),
    openViewerBtn: document.getElementById("openViewerBtn"),

    toggleContactPanelBtn: document.getElementById("toggleContactPanelBtn"),
    utilityRow: document.getElementById("utilityRow"),

    viewerOverlay: document.getElementById("viewerOverlay"),
    closeViewerBtn: document.getElementById("closeViewerBtn"),
    viewerImage: document.getElementById("viewerImage"),
    viewerChatInner: document.getElementById("viewerChatInner"),
    viewerChatBox: document.getElementById("viewerChatBox"),
    viewerMsgInput: document.getElementById("viewerMsgInput"),
    viewerSendBtn: document.getElementById("viewerSendBtn"),
    downloadSketchBtn: document.getElementById("downloadSketchBtn"),
    viewerSubtitle: document.getElementById("viewerSubtitle"),
    drawingCountBadge: document.getElementById("drawingCountBadge"),
    noteCountBadge: document.getElementById("noteCountBadge"),
    connectionBadge: document.getElementById("connectionBadge"),

    imageStage: document.getElementById("imageStage"),
    drawCanvas: document.getElementById("drawCanvas"),
    textLayer: document.getElementById("textLayer"),

    penBtn: document.getElementById("penBtn"),
    eraserBtn: document.getElementById("eraserBtn"),
    addTextBtn: document.getElementById("addTextBtn"),
    clearDrawingBtn: document.getElementById("clearDrawingBtn"),
    clearNotesBtn: document.getElementById("clearNotesBtn"),
    undoBtn: document.getElementById("undoBtn"),
    redoBtn: document.getElementById("redoBtn"),
    thicknessRange: document.getElementById("thicknessRange"),
    colorRow: document.getElementById("colorRow"),
    colorSwatches: Array.from(document.querySelectorAll(".colorSwatch")),
    customColorBtn: document.getElementById("customColorBtn"),
    customColorInput: document.getElementById("customColorInput"),
    noteColorSwatches: Array.from(document.querySelectorAll(".noteColorSwatch")),
    noteColorRow: document.getElementById("noteColorRow"),
    toggleNoteColorsBtn: document.getElementById("toggleNoteColorsBtn"),

    noteEditorOverlay: document.getElementById("noteEditorOverlay"),
    noteEditorMeta: document.getElementById("noteEditorMeta"),
    noteEditorTextarea: document.getElementById("noteEditorTextarea"),
    noteEditorDoneBtn: document.getElementById("noteEditorDoneBtn")
  };

  const ctx = el.drawCanvas.getContext("2d");

  el.roleBadge.textContent = role === "admin" ? "관리자 화면" : "고객 채팅";

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value));
  }

  function deepClone(value) {
    return JSON.parse(JSON.stringify(value));
  }

  function isMobileViewport() {
    return window.innerWidth <= 900;
  }

  function formatTime(ts) {
    try {
      return new Date(ts).toLocaleTimeString("ko-KR", {
        hour: "numeric",
        minute: "2-digit"
      });
    } catch {
      return "";
    }
  }

  function formatNoteTimestamp(ts) {
    if (!ts) return "최종 수정 없음";
    try {
      return "최종 수정 " + new Date(ts).toLocaleString("ko-KR", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    } catch {
      return "최종 수정 없음";
    }
  }

  function formatFileDate(date = new Date()) {
    const yyyy = date.getFullYear();
    const mm = String(date.getMonth() + 1).padStart(2, "0");
    const dd = String(date.getDate()).padStart(2, "0");
    const hh = String(date.getHours()).padStart(2, "0");
    const mi = String(date.getMinutes()).padStart(2, "0");
    return `${yyyy}${mm}${dd}_${hh}${mi}`;
  }

  function sanitizeFileName(name) {
    return String(name || "상담자")
      .replace(/[\\/:*?"<>|]/g, "_")
      .replace(/\s+/g, "_")
      .slice(0, 40);
  }

  function getCurrentImageId() {
    return state.currentViewerImageId;
  }

  function setPhoneStatus(message, isError = false) {
    el.phoneStatus.textContent = message;
    el.phoneStatus.style.color = isError ? "#d14343" : "#5f7286";
    el.phoneStatus.classList.toggle("show", Boolean(message));
  }

  function scrollBottom(container) {
    requestAnimationFrame(() => {
      container.scrollTop = container.scrollHeight;
    });
  }

  function restoreMobileViewport() {
    if (!isMobileViewport()) return;

    const active = document.activeElement;
    if (active && typeof active.blur === "function") {
      active.blur();
    }

    requestAnimationFrame(() => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    if (window.visualViewport) {
      requestAnimationFrame(() => {
        const offsetTop = window.visualViewport.offsetTop || 0;
        if (offsetTop > 0) {
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      });
    }
  }

  function toggleContactPanel(forceOpen = null) {
    const next = forceOpen === null
      ? !el.utilityRow.classList.contains("open")
      : Boolean(forceOpen);

    el.utilityRow.classList.toggle("open", next);
    el.toggleContactPanelBtn.textContent = next ? "닫기" : "열기";
    el.toggleContactPanelBtn.setAttribute("aria-expanded", String(next));
  }

  function updateViewerSubtitle() {
    if (!state.currentViewerImageId) {
      el.viewerSubtitle.textContent = "현재 이미지 선택 대기 중";
      return;
    }

    const modeLabel =
      state.drawMode === "draw" ? "주석 작성 모드" :
      state.drawMode === "erase" ? "지우개 모드" :
      "메모 작성 모드";

    el.viewerSubtitle.textContent = `${modeLabel} · 실시간 상담 연결됨`;
  }

  function updateViewerStats() {
    el.drawingCountBadge.textContent = `선 ${state.currentStrokes.length}`;
    el.drawingCountBadge.dataset.count = String(state.currentStrokes.length);
    el.noteCountBadge.textContent = `메모 ${state.currentNotes.length}`;
    el.noteCountBadge.dataset.count = String(state.currentNotes.length);
    updateViewerSubtitle();
  }

  function setDrawMode(mode) {
    state.drawMode = mode;
    el.penBtn.classList.toggle("active", mode === "draw");
    el.eraserBtn.classList.toggle("active", mode === "erase");
    el.colorRow.classList.toggle("open", mode === "draw");
    updateViewerStats();
  }

  function setActiveColor(color) {
    state.currentColor = color;

    let matchedPreset = false;
    el.colorSwatches.forEach((button) => {
      const isActive = button.dataset.color === color;
      button.classList.toggle("active", isActive);
      if (isActive) matchedPreset = true;
    });

    el.customColorBtn.classList.toggle("active", !matchedPreset);
    el.customColorBtn.style.setProperty("--custom-color-preview", color);
    el.customColorInput.value = color;
  }

  function setActiveNoteColor(color) {
    state.currentNoteColor = color;
    el.noteColorSwatches.forEach((button) => {
      button.classList.toggle("active", button.dataset.noteColor === color);
    });
  }

  function createTextRow(data) {
    const row = document.createElement("div");
    row.className = "messageRow " + (data.sender === role ? "me" : "other");

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = data.text || "";

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = formatTime(data.time);

    row.appendChild(bubble);
    row.appendChild(meta);
    return row;
  }

  function createImageRow(data) {
    const row = document.createElement("div");
    row.className = "messageRow " + (data.sender === role ? "me" : "other");

    const wrap = document.createElement("div");
    wrap.className = "imageBubble";

    const img = document.createElement("img");
    img.className = "chatImg";
    img.src = data.imageUrl;
    img.alt = "첨부 이미지";

    wrap.appendChild(img);
    wrap.addEventListener("click", () => {
      openViewerPopup(data.imageId, data.imageUrl);
    });

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = formatTime(data.time);

    row.appendChild(wrap);
    row.appendChild(meta);
    return row;
  }

  function renderTextMessage(data) {
    el.chatInner.appendChild(createTextRow(data));
    scrollBottom(el.chatBox);

    if (el.viewerOverlay.classList.contains("open")) {
      el.viewerChatInner.appendChild(createTextRow(data));
      scrollBottom(el.viewerChatBox);
    }
  }

  function renderImageMessage(data) {
    el.chatInner.appendChild(createImageRow(data));
    scrollBottom(el.chatBox);

    if (el.viewerOverlay.classList.contains("open")) {
      el.viewerChatInner.appendChild(createImageRow(data));
      scrollBottom(el.viewerChatBox);
    }

    state.lastSelectedImageId = data.imageId;
    state.lastSelectedImageUrl = data.imageUrl;
  }

  function getNormalizedPoint(evt) {
    const rect = el.drawCanvas.getBoundingClientRect();
    return {
      x: clamp((evt.clientX - rect.left) / rect.width, 0, 1),
      y: clamp((evt.clientY - rect.top) / rect.height, 0, 1)
    };
  }

  function clearCanvas() {
    ctx.clearRect(0, 0, el.drawCanvas.width, el.drawCanvas.height);
  }

  function drawStroke(stroke) {
    if (!el.drawCanvas.width || !el.drawCanvas.height) return;

    const x1 = stroke.last.x * el.drawCanvas.width;
    const y1 = stroke.last.y * el.drawCanvas.height;
    const x2 = stroke.current.x * el.drawCanvas.width;
    const y2 = stroke.current.y * el.drawCanvas.height;

    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.lineWidth = stroke.size || 3;

    if (stroke.mode === "erase") {
      ctx.globalCompositeOperation = "destination-out";
      ctx.strokeStyle = "rgba(0,0,0,1)";
    } else {
      ctx.globalCompositeOperation = "source-over";
      ctx.strokeStyle = stroke.color || "#ff3b30";
    }

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.restore();
  }

  function redrawAllStrokes() {
    clearCanvas();
    state.currentStrokes.forEach(drawStroke);
    updateViewerStats();
  }

  function updateCanvasSize() {
    const width = el.imageStage.clientWidth;
    const height = el.imageStage.clientHeight;
    if (!width || !height) return;

    el.drawCanvas.width = width;
    el.drawCanvas.height = height;

    redrawAllStrokes();
    renderNotes();
  }

  function pushHistory() {
    if (state.historyLock || !state.currentViewerImageId) return;

    state.historyUndoStack.push(deepClone({
      strokes: state.currentStrokes,
      notes: state.currentNotes
    }));

    if (state.historyUndoStack.length > HISTORY_LIMIT) {
      state.historyUndoStack.shift();
    }

    state.historyRedoStack = [];
    updateHistoryButtons();
  }

  function updateHistoryButtons() {
    el.undoBtn.disabled = state.historyUndoStack.length === 0;
    el.redoBtn.disabled = state.historyRedoStack.length === 0;
  }

  function applyFullState(snapshot, sync = true) {
    if (!snapshot || !getCurrentImageId()) return;

    state.historyLock = true;
    state.currentStrokes = deepClone(snapshot.strokes || []).slice(-MAX_CLIENT_STROKES);
    state.currentNotes = deepClone(snapshot.notes || []).slice(-MAX_CLIENT_NOTES);
    redrawAllStrokes();
    renderNotes();
    state.historyLock = false;

    if (sync) {
      socket.emit("replace-drawing-history", {
        imageId: getCurrentImageId(),
        strokes: state.currentStrokes
      });

      socket.emit("replace-note-history", {
        imageId: getCurrentImageId(),
        notes: state.currentNotes
      });
    }
  }

  function undoAction() {
    if (!state.historyUndoStack.length) return;

    state.historyRedoStack.push(deepClone({
      strokes: state.currentStrokes,
      notes: state.currentNotes
    }));

    const previous = state.historyUndoStack.pop();
    applyFullState(previous, true);
    updateHistoryButtons();
  }

  function redoAction() {
    if (!state.historyRedoStack.length) return;

    state.historyUndoStack.push(deepClone({
      strokes: state.currentStrokes,
      notes: state.currentNotes
    }));

    const next = state.historyRedoStack.pop();
    applyFullState(next, true);
    updateHistoryButtons();
  }

  function queueStrokeSync(stroke) {
    state.pendingStrokeImageId = stroke.imageId;
    state.pendingStrokeBatch.push(stroke);

    if (state.strokeBatchRaf) return;

    state.strokeBatchRaf = requestAnimationFrame(() => {
      socket.emit("draw-strokes", {
        imageId: state.pendingStrokeImageId,
        strokes: state.pendingStrokeBatch
      });

      state.pendingStrokeBatch = [];
      state.pendingStrokeImageId = "";
      state.strokeBatchRaf = null;
    });
  }

  function estimateNoteSize(text) {
    const normalized = String(text || "");
    const lines = normalized.split("\n").length || 1;
    const longest = Math.max(...normalized.split("\n").map((line) => line.length), 6);
    const width = clamp(0.12 + longest * 0.008, 0.12, 0.30);
    const height = clamp(0.09 + lines * 0.03, 0.09, 0.28);
    return { width, height };
  }

  function estimateMarkerPosition(index = 0) {
    return {
      x: clamp(0.14 + (index % 3) * 0.12, 0.08, 0.90),
      y: clamp(0.16 + Math.floor(index / 3) * 0.10, 0.10, 0.88)
    };
  }

  function normalizeNote(note, index = 0) {
    const base = estimateMarkerPosition(index);
    const text = String(note?.text || "").slice(0, MAX_NOTE_CHARS);
    const estimated = estimateNoteSize(text);

    return {
      id: note?.id || crypto.randomUUID(),
      x: typeof note?.x === "number" ? clamp(note.x, 0.06, 0.94) : base.x,
      y: typeof note?.y === "number" ? clamp(note.y, 0.08, 0.92) : base.y,
      width: typeof note?.width === "number" ? clamp(note.width, 0.12, 0.30) : estimated.width,
      height: typeof note?.height === "number" ? clamp(note.height, 0.09, 0.28) : estimated.height,
      text,
      color: note?.color || "#fff7c2",
      author: note?.author === "admin" ? "admin" : "user",
      updatedAt: typeof note?.updatedAt === "number" ? note.updatedAt : Date.now()
    };
  }

  function getNoteById(noteId) {
    return state.currentNotes.find((note) => note.id === noteId);
  }

  function getNotePreview(text) {
    const normalized = String(text || "").replace(/\s+/g, " ").trim();
    return normalized ? normalized.slice(0, 10) : "새 메모";
  }

  function selectMarker(noteId) {
    state.activeMarkerId = noteId || "";
    el.textLayer.querySelectorAll(".noteMarker").forEach((node) => {
      node.classList.toggle("selected", node.dataset.id === state.activeMarkerId);
    });
  }

  function getMarkerPosition(note) {
    const width = el.imageStage.clientWidth || 1;
    const height = el.imageStage.clientHeight || 1;

    return {
      left: note.x * width,
      top: note.y * height
    };
  }

  function applyMarkerLayout(marker, note) {
    const pos = getMarkerPosition(note);
    marker.style.left = `${pos.left}px`;
    marker.style.top = `${pos.top}px`;
    marker.style.background = note.color;

    const text = marker.querySelector(".noteMarkerText");
    if (text) text.textContent = getNotePreview(note.text);
  }

  function createNoteMarker(note) {
    const marker = document.createElement("div");
    marker.className = "noteMarker";
    marker.dataset.id = note.id;
    marker.dataset.author = note.author;
    marker.style.background = note.color;

    const text = document.createElement("span");
    text.className = "noteMarkerText";
    text.textContent = getNotePreview(note.text);

    const resize = document.createElement("button");
    resize.className = "noteResize";
    resize.type = "button";
    resize.setAttribute("aria-label", "메모 크기 조절");

    marker.appendChild(text);
    marker.appendChild(resize);

    marker.addEventListener("click", (event) => {
      event.stopPropagation();

      const interaction = state.noteInteraction;
      if (interaction.noteId === note.id && interaction.moved) return;

      selectMarker(note.id);
      openNoteEditor(note.id);
    });

    marker.addEventListener("pointerdown", (event) => {
      const current = getNoteById(note.id);
      if (!current) return;

      selectMarker(note.id);

      if (event.target === resize) {
        event.preventDefault();
        pushHistory();

        state.noteInteraction = {
          type: "resize",
          noteId: note.id,
          pointerId: event.pointerId,
          dragOffsetX: 0,
          dragOffsetY: 0,
          startWidth: current.width,
          startHeight: current.height,
          startClientX: event.clientX,
          startClientY: event.clientY,
          moved: false
        };

        marker.setPointerCapture?.(event.pointerId);
        return;
      }

      event.preventDefault();
      pushHistory();

      const stageRect = el.imageStage.getBoundingClientRect();
      const pos = getMarkerPosition(current);

      state.noteInteraction = {
        type: "drag",
        noteId: note.id,
        pointerId: event.pointerId,
        dragOffsetX: event.clientX - (stageRect.left + pos.left),
        dragOffsetY: event.clientY - (stageRect.top + pos.top),
        startWidth: current.width,
        startHeight: current.height,
        startClientX: event.clientX,
        startClientY: event.clientY,
        moved: false
      };

      marker.setPointerCapture?.(event.pointerId);
    });

    applyMarkerLayout(marker, note);
    return marker;
  }

  function renderNotes() {
    el.textLayer.innerHTML = "";

    state.currentNotes = state.currentNotes
      .slice(-MAX_CLIENT_NOTES)
      .map((note, index) => normalizeNote(note, index));

    state.currentNotes.forEach((note) => {
      el.textLayer.appendChild(createNoteMarker(note));
    });

    selectMarker(state.activeMarkerId);
    updateViewerStats();
  }

  function upsertMarker(note) {
    const existing = el.textLayer.querySelector(`.noteMarker[data-id="${note.id}"]`);
    if (!existing) {
      el.textLayer.appendChild(createNoteMarker(note));
      selectMarker(state.activeMarkerId);
      return;
    }

    applyMarkerLayout(existing, note);
    existing.classList.toggle("selected", existing.dataset.id === state.activeMarkerId);
  }

  function openNoteEditor(noteId) {
    const note = getNoteById(noteId);
    if (!note) return;

    state.activeNoteEditorId = noteId;
    el.noteEditorTextarea.value = note.text || "";
    el.noteEditorMeta.textContent = formatNoteTimestamp(note.updatedAt);
    el.noteEditorOverlay.classList.add("open");
    el.noteEditorOverlay.setAttribute("aria-hidden", "false");

    requestAnimationFrame(() => {
      el.noteEditorTextarea.focus();
      const length = el.noteEditorTextarea.value.length;
      try {
        el.noteEditorTextarea.setSelectionRange(length, length);
      } catch {}
    });
  }

  function closeNoteEditor(save = true) {
    const note = getNoteById(state.activeNoteEditorId);

    if (save && note) {
      const nextText = String(el.noteEditorTextarea.value || "").slice(0, MAX_NOTE_CHARS);
      const size = estimateNoteSize(nextText);

      note.text = nextText;
      note.width = clamp(Math.max(note.width, size.width), 0.12, 0.30);
      note.height = clamp(Math.max(note.height, size.height), 0.09, 0.28);
      note.updatedAt = Date.now();

      upsertMarker(note);

      socket.emit("update-note", {
        imageId: getCurrentImageId(),
        noteId: note.id,
        patch: {
          text: note.text,
          width: note.width,
          height: note.height,
          updatedAt: note.updatedAt
        }
      });
    }

    state.activeNoteEditorId = "";
    el.noteEditorOverlay.classList.remove("open");
    el.noteEditorOverlay.setAttribute("aria-hidden", "true");
    el.noteEditorTextarea.blur();
    renderNotes();
  }

  function addTextNote() {
    if (!getCurrentImageId()) return;

    pushHistory();

    const note = normalizeNote({
      id: crypto.randomUUID(),
      x: 0.14,
      y: 0.16,
      text: "",
      color: state.currentNoteColor,
      author: role,
      updatedAt: Date.now()
    }, state.currentNotes.length);

    state.currentNotes.push(note);
    renderNotes();
    selectMarker(note.id);
    openNoteEditor(note.id);

    socket.emit("add-note", {
      imageId: getCurrentImageId(),
      note
    });
  }

  function handleNoteInteractionMove(event) {
    const interaction = state.noteInteraction;
    if (!interaction.type || !interaction.noteId || !getCurrentImageId()) return;

    const note = getNoteById(interaction.noteId);
    if (!note) return;

    const marker = el.textLayer.querySelector(`.noteMarker[data-id="${interaction.noteId}"]`);
    const stageRect = el.imageStage.getBoundingClientRect();
    if (!marker || !stageRect.width || !stageRect.height) return;

    const moveX = Math.abs(event.clientX - interaction.startClientX);
    const moveY = Math.abs(event.clientY - interaction.startClientY);

    if (moveX > 4 || moveY > 4) {
      interaction.moved = true;
    }

    if (interaction.type === "drag") {
      note.x = clamp(
        (event.clientX - stageRect.left - interaction.dragOffsetX) / stageRect.width,
        0.06,
        0.94
      );
      note.y = clamp(
        (event.clientY - stageRect.top - interaction.dragOffsetY) / stageRect.height,
        0.08,
        0.92
      );
      note.updatedAt = Date.now();
      applyMarkerLayout(marker, note);
      return;
    }

    if (interaction.type === "resize") {
      const deltaX = event.clientX - interaction.startClientX;
      const deltaY = event.clientY - interaction.startClientY;

      note.width = clamp(interaction.startWidth + (deltaX / stageRect.width), 0.12, 0.30);
      note.height = clamp(interaction.startHeight + (deltaY / stageRect.height), 0.09, 0.28);
      note.updatedAt = Date.now();
      interaction.moved = true;
      applyMarkerLayout(marker, note);
    }
  }

  function finishNoteInteraction() {
    const interaction = state.noteInteraction;

    if (!interaction.type || !interaction.noteId) {
      state.noteInteraction = {
        type: "",
        noteId: "",
        pointerId: null,
        dragOffsetX: 0,
        dragOffsetY: 0,
        startWidth: 0,
        startHeight: 0,
        startClientX: 0,
        startClientY: 0,
        moved: false
      };
      return;
    }

    const note = getNoteById(interaction.noteId);

    if (note && interaction.moved) {
      socket.emit("update-note", {
        imageId: getCurrentImageId(),
        noteId: note.id,
        patch: {
          x: note.x,
          y: note.y,
          width: note.width,
          height: note.height,
          updatedAt: note.updatedAt
        }
      });
    }

    state.noteInteraction = {
      type: "",
      noteId: "",
      pointerId: null,
      dragOffsetX: 0,
      dragOffsetY: 0,
      startWidth: 0,
      startHeight: 0,
      startClientX: 0,
      startClientY: 0,
      moved: false
    };
  }

  function startDrawing(event) {
    if (!getCurrentImageId()) return;
    if (state.drawMode === "text") return;
    if (event.pointerType === "mouse" && event.button !== 0) return;

    state.isDrawing = true;
    state.lastPoint = getNormalizedPoint(event);
    pushHistory();
    el.drawCanvas.setPointerCapture?.(event.pointerId);
  }

  function moveDrawing(event) {
    if (!state.isDrawing || !state.lastPoint || !getCurrentImageId()) return;

    const point = getNormalizedPoint(event);
    const stroke = {
      imageId: getCurrentImageId(),
      mode: state.drawMode === "erase" ? "erase" : "draw",
      color: state.currentColor,
      size: state.currentSize,
      last: state.lastPoint,
      current: point
    };

    state.currentStrokes.push(stroke);
    if (state.currentStrokes.length > MAX_CLIENT_STROKES) {
      state.currentStrokes = state.currentStrokes.slice(-MAX_CLIENT_STROKES);
    }

    drawStroke(stroke);
    queueStrokeSync(stroke);
    state.lastPoint = point;
    updateViewerStats();
  }

  function endDrawing(event) {
    state.isDrawing = false;
    state.lastPoint = null;
    el.drawCanvas.releasePointerCapture?.(event?.pointerId);
  }

  function resetViewerState() {
    state.currentStrokes = [];
    state.currentNotes = [];
    state.historyUndoStack = [];
    state.historyRedoStack = [];
    state.activeMarkerId = "";
    state.activeNoteEditorId = "";
    clearCanvas();
    renderNotes();
    updateHistoryButtons();
  }

  function saveViewerState() {
    if (!state.currentViewerImageId || !state.currentViewerImageUrl) return;
    localStorage.setItem(STORAGE_KEYS.viewerState, JSON.stringify({
      roomId: state.roomId,
      role,
      imageId: state.currentViewerImageId,
      imageUrl: state.currentViewerImageUrl,
      isOpen: el.viewerOverlay.classList.contains("open"),
      savedAt: Date.now()
    }));
  }

  function clearViewerState() {
    localStorage.removeItem(STORAGE_KEYS.viewerState);
  }

  function requestViewerHistory(imageId) {
    socket.emit("request-drawing-history", { imageId });
    socket.emit("request-note-history", { imageId });
  }

  function openViewerInline(imageId, imageUrl) {
    if (!imageId || !imageUrl) return;

    resetViewerState();
    state.currentViewerImageId = imageId;
    state.currentViewerImageUrl = imageUrl;

    document.body.classList.add("viewer-inline-open");
    el.viewerOverlay.classList.add("open");
    el.viewerOverlay.setAttribute("aria-hidden", "false");
    el.viewerImage.src = imageUrl;

    updateViewerStats();
    saveViewerState();
    requestViewerHistory(imageId);
  }

  function openViewerPopup(imageId, imageUrl) {
    if (!imageId || !imageUrl) return;

    if (window.innerWidth <= 900) {
      openViewerInline(imageId, imageUrl);
      return;
    }

    const url = new URL(window.location.origin + window.location.pathname);
    url.searchParams.set("viewer", "1");
    url.searchParams.set("room", state.roomId);
    url.searchParams.set("role", role);
    url.searchParams.set("imageId", imageId);
    url.searchParams.set("imageUrl", imageUrl);
    url.searchParams.set("userName", userName);

    const popup = window.open(
      url.toString(),
      "designImageViewer",
      `width=${Math.max(window.screen.availWidth || 1400, 1200)},height=${Math.max(window.screen.availHeight || 900, 800)},left=0,top=0,resizable=yes,scrollbars=yes`
    );

    if (!popup) {
      alert("브라우저에서 새 창이 차단되었습니다. 팝업 허용 후 다시 시도해주세요.");
    }
  }

  function closeViewer() {
    document.body.classList.remove("viewer-inline-open");
    el.viewerOverlay.classList.remove("open");
    el.viewerOverlay.setAttribute("aria-hidden", "true");

    state.currentViewerImageId = "";
    state.currentViewerImageUrl = "";
    state.pendingStrokeBatch = [];
    state.pendingStrokeImageId = "";

    if (state.strokeBatchRaf) {
      cancelAnimationFrame(state.strokeBatchRaf);
      state.strokeBatchRaf = null;
    }

    resetViewerState();
    clearViewerState();
  }

  function restoreViewerState() {
    if (params.get("viewer") === "1") return;

    try {
      const raw = localStorage.getItem(STORAGE_KEYS.viewerState);
      if (!raw) return;

      const data = JSON.parse(raw);
      if (!data?.isOpen) return;
      if (data.roomId !== state.roomId) return;
      if (!data.imageId || !data.imageUrl) return;

      openViewerInline(data.imageId, data.imageUrl);
    } catch (error) {
      console.error("viewer 상태 복원 실패:", error);
    }
  }

  async function savePhone() {
    const phone = el.phoneInput.value.trim();
    if (!phone) {
      setPhoneStatus("전화번호를 입력해주세요.", true);
      return;
    }

    el.savePhoneBtn.disabled = true;
    setPhoneStatus("저장 중...");

    try {
      const response = await fetch("/contact", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          roomId: state.roomId,
          role,
          phone
        })
      });

      const result = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(result.error || "전화번호 저장에 실패했습니다.");
      }

      el.phoneInput.value = result.phone || phone;
      setPhoneStatus("전화번호가 저장되었습니다.");
      toggleContactPanel(false);
    } catch (error) {
      setPhoneStatus(error.message || "전화번호 저장에 실패했습니다.", true);
    } finally {
      el.savePhoneBtn.disabled = false;
    }
  }

  async function uploadImage(file) {
    const formData = new FormData();
    formData.append("image", file);

    const response = await fetch("/upload", {
      method: "POST",
      body: formData
    });

    const result = await response.json().catch(() => ({}));
    if (!response.ok) {
      throw new Error(result.error || "이미지 업로드 실패");
    }

    if (!result.url) {
      throw new Error("업로드된 이미지 URL이 없습니다.");
    }

    socket.emit("image", { url: result.url });
  }

  function sendMainMessage() {
    const text = el.msgInput.value.trim();
    if (!text || state.isComposingMain) return;

    socket.emit("message", { text });
    el.msgInput.value = "";
    restoreMobileViewport();
  }

  function sendViewerMessage() {
    const text = el.viewerMsgInput.value.trim();
    if (!text || state.isComposingViewer) return;

    socket.emit("message", { text });
    el.viewerMsgInput.value = "";
    restoreMobileViewport();
  }

  function roundRect(ctx2d, x, y, width, height, radius) {
    ctx2d.beginPath();
    ctx2d.moveTo(x + radius, y);
    ctx2d.arcTo(x + width, y, x + width, y + height, radius);
    ctx2d.arcTo(x + width, y + height, x, y + height, radius);
    ctx2d.arcTo(x, y + height, x, y, radius);
    ctx2d.arcTo(x, y, x + width, y, radius);
    ctx2d.closePath();
  }

  function wrapTextLines(text, maxCharsPerLine) {
    const result = [];
    const source = String(text || "").split("\n");

    source.forEach((part) => {
      if (!part) {
        result.push("");
        return;
      }
      let current = "";
      for (const ch of part) {
        current += ch;
        if (current.length >= maxCharsPerLine) {
          result.push(current);
          current = "";
        }
      }
      if (current) result.push(current);
    });

    return result.slice(0, 10);
  }

  function buildDownload() {
    if (!state.currentViewerImageUrl) return;

    const stageWidth = el.imageStage.clientWidth || 1200;
    const stageHeight = el.imageStage.clientHeight || 760;
    const fileName = `${sanitizeFileName(userName)}_상담이미지_${formatFileDate()}.png`;
    const img = new Image();

    img.onload = () => {
      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = Math.round(stageWidth * 2);
      exportCanvas.height = Math.round(stageHeight * 2);

      const exportCtx = exportCanvas.getContext("2d");

      exportCtx.fillStyle = "#f7fbff";
      exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

      exportCtx.fillStyle = "#ffffff";
      roundRect(exportCtx, 8, 8, exportCanvas.width - 16, exportCanvas.height - 16, 24);
      exportCtx.fill();

      const stageRect = el.imageStage.getBoundingClientRect();
      const imageRect = el.viewerImage.getBoundingClientRect();

      const relX = Math.max(0, imageRect.left - stageRect.left);
      const relY = Math.max(0, imageRect.top - stageRect.top);
      const relW = imageRect.width;
      const relH = imageRect.height;

      const drawX = (relX / stageRect.width) * exportCanvas.width;
      const drawY = (relY / stageRect.height) * exportCanvas.height;
      const drawW = (relW / stageRect.width) * exportCanvas.width;
      const drawH = (relH / stageRect.height) * exportCanvas.height;

      exportCtx.save();
      roundRect(exportCtx, drawX, drawY, drawW, drawH, 18);
      exportCtx.clip();
      exportCtx.drawImage(img, drawX, drawY, drawW, drawH);
      exportCtx.restore();

      state.currentStrokes.forEach((stroke) => {
        const x1 = stroke.last.x * exportCanvas.width;
        const y1 = stroke.last.y * exportCanvas.height;
        const x2 = stroke.current.x * exportCanvas.width;
        const y2 = stroke.current.y * exportCanvas.height;

        exportCtx.save();
        exportCtx.lineCap = "round";
        exportCtx.lineJoin = "round";
        exportCtx.lineWidth = (stroke.size || 3) * 2;

        if (stroke.mode === "erase") {
          exportCtx.globalCompositeOperation = "destination-out";
          exportCtx.strokeStyle = "rgba(0,0,0,1)";
        } else {
          exportCtx.globalCompositeOperation = "source-over";
          exportCtx.strokeStyle = stroke.color || "#ff3b30";
        }

        exportCtx.beginPath();
        exportCtx.moveTo(x1, y1);
        exportCtx.lineTo(x2, y2);
        exportCtx.stroke();
        exportCtx.restore();
      });

      state.currentNotes.forEach((note) => {
        const x = note.x * exportCanvas.width;
        const y = note.y * exportCanvas.height;
        const width = note.width * exportCanvas.width;
        const height = note.height * exportCanvas.height;

        exportCtx.save();
        exportCtx.fillStyle = note.color || "#fff7c2";
        exportCtx.strokeStyle = note.author === "admin" ? "#8a5cff" : "#2491ff";
        exportCtx.lineWidth = 2.5;

        roundRect(exportCtx, x, y, width, height, 16);
        exportCtx.fill();
        exportCtx.stroke();

        exportCtx.fillStyle = "#17212b";
        exportCtx.font = "bold 24px sans-serif";
        exportCtx.fillText(note.author === "admin" ? "관리자" : "고객", x + 18, y + 30);

        exportCtx.font = "24px sans-serif";
        const lines = wrapTextLines(note.text || "", 20);
        const lineHeight = 30;
        lines.forEach((line, idx) => {
          exportCtx.fillText(line, x + 18, y + 64 + idx * lineHeight);
        });

        exportCtx.restore();
      });

      exportCtx.save();
      exportCtx.fillStyle = "rgba(0,0,0,0.55)";
      exportCtx.font = "20px sans-serif";
      exportCtx.fillText(
        `${userName} · ${new Date().toLocaleString("ko-KR")}`,
        20,
        exportCanvas.height - 20
      );
      exportCtx.restore();

      const link = document.createElement("a");
      link.href = exportCanvas.toDataURL("image/png");
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
    };

    img.onerror = () => {
      alert("이미지를 다운로드용으로 불러오지 못했습니다.");
    };

    img.src = state.currentViewerImageUrl;
  }

  function bindUIEvents() {
    el.toggleContactPanelBtn.addEventListener("click", () => toggleContactPanel());

    el.msgInput.addEventListener("compositionstart", () => { state.isComposingMain = true; });
    el.msgInput.addEventListener("compositionend", () => { state.isComposingMain = false; });
    el.viewerMsgInput.addEventListener("compositionstart", () => { state.isComposingViewer = true; });
    el.viewerMsgInput.addEventListener("compositionend", () => { state.isComposingViewer = false; });

    el.sendBtn.addEventListener("click", sendMainMessage);
    el.viewerSendBtn.addEventListener("click", sendViewerMessage);

    el.msgInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !state.isComposingMain) {
        event.preventDefault();
        sendMainMessage();
      }
    });

    el.viewerMsgInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !state.isComposingViewer) {
        event.preventDefault();
        sendViewerMessage();
      }
    });

    el.savePhoneBtn.addEventListener("click", savePhone);

    el.phoneInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        savePhone();
      }
    });

    el.fileInput.addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;

      try {
        await uploadImage(file);
      } catch (error) {
        alert(error.message || "이미지 업로드 중 오류가 발생했습니다.");
      } finally {
        el.fileInput.value = "";
      }
    });

    el.openViewerBtn.addEventListener("click", () => {
      const imageId = state.currentViewerImageId || state.lastSelectedImageId;
      const imageUrl = state.currentViewerImageUrl || state.lastSelectedImageUrl;

      if (!imageId || !imageUrl) {
        alert("먼저 이미지를 선택해 주세요.");
        return;
      }

      openViewerPopup(imageId, imageUrl);
    });

    el.closeViewerBtn.addEventListener("click", closeViewer);
    el.downloadSketchBtn.addEventListener("click", buildDownload);

    el.penBtn.addEventListener("click", () => setDrawMode("draw"));
    el.eraserBtn.addEventListener("click", () => setDrawMode("erase"));
    el.addTextBtn.addEventListener("click", () => {
      setDrawMode("text");
      addTextNote();
    });

    el.clearDrawingBtn.addEventListener("click", () => {
      if (!getCurrentImageId() || !state.currentStrokes.length) return;
      if (!confirm("현재 이미지의 선을 모두 지울까요?")) return;

      pushHistory();
      state.currentStrokes = [];
      redrawAllStrokes();
      socket.emit("clear-drawing", { imageId: getCurrentImageId() });
    });

    el.clearNotesBtn.addEventListener("click", () => {
      if (!getCurrentImageId() || !state.currentNotes.length) return;
      if (!confirm("현재 이미지의 메모를 모두 지울까요?")) return;

      pushHistory();
      state.currentNotes = [];
      renderNotes();
      socket.emit("clear-notes", { imageId: getCurrentImageId() });
    });

    el.undoBtn.addEventListener("click", undoAction);
    el.redoBtn.addEventListener("click", redoAction);

    el.thicknessRange.addEventListener("input", () => {
      state.currentSize = Number(el.thicknessRange.value) || 3;
    });

    el.colorSwatches.forEach((button) => {
      button.addEventListener("click", () => {
        const color = button.dataset.color;
        if (!color) return;
        setActiveColor(color);
        setDrawMode("draw");
      });
    });

    el.customColorBtn.addEventListener("click", () => {
      el.customColorInput.click();
    });

    el.customColorInput.addEventListener("input", () => {
      setActiveColor(el.customColorInput.value);
      setDrawMode("draw");
    });

    el.noteColorSwatches.forEach((button) => {
      button.addEventListener("click", () => {
        setActiveNoteColor(button.dataset.noteColor);
      });
    });

    el.toggleNoteColorsBtn.addEventListener("click", () => {
      el.noteColorRow.classList.toggle("open");
    });

    el.drawCanvas.addEventListener("pointerdown", startDrawing);
    el.drawCanvas.addEventListener("pointermove", moveDrawing);
    el.drawCanvas.addEventListener("pointerup", endDrawing);
    el.drawCanvas.addEventListener("pointercancel", endDrawing);
    el.drawCanvas.addEventListener("pointerleave", endDrawing);

    window.addEventListener("pointermove", handleNoteInteractionMove);
    window.addEventListener("pointerup", finishNoteInteraction);
    window.addEventListener("pointercancel", finishNoteInteraction);

    el.textLayer.addEventListener("click", (event) => {
      const marker = event.target.closest(".noteMarker");
      if (!marker) {
        selectMarker("");
      }
    });

    el.noteEditorDoneBtn.addEventListener("click", () => closeNoteEditor(true));

    el.noteEditorOverlay.addEventListener("click", (event) => {
      if (event.target === el.noteEditorOverlay) {
        closeNoteEditor(true);
      }
    });

    el.noteEditorTextarea.addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        event.preventDefault();
        closeNoteEditor(true);
      }

      if (event.key === "Escape") {
        event.preventDefault();
        closeNoteEditor(true);
      }
    });

    el.viewerImage.addEventListener("load", () => {
      updateCanvasSize();
      if (getCurrentImageId()) {
        requestViewerHistory(getCurrentImageId());
      }
    });

    window.addEventListener("resize", updateCanvasSize);

    window.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z" && !event.shiftKey) {
        event.preventDefault();
        undoAction();
        return;
      }

      if (
        ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "y") ||
        ((event.ctrlKey || event.metaKey) && event.shiftKey && event.key.toLowerCase() === "z")
      ) {
        event.preventDefault();
        redoAction();
        return;
      }

      if (event.key === "Escape") {
        if (el.noteEditorOverlay.classList.contains("open")) {
          closeNoteEditor(true);
          return;
        }

        if (el.viewerOverlay.classList.contains("open")) {
          closeViewer();
        }
      }
    });
  }

  function bindSocketEvents() {
    socket.emit("join", {
      roomId: state.roomId,
      role
    });

    socket.on("connect", () => {
      el.connectionBadge.textContent = "연결됨";
      el.connectionBadge.dataset.count = "on";
    });

    socket.on("disconnect", () => {
      el.connectionBadge.textContent = "연결 끊김";
      el.connectionBadge.dataset.count = "off";
    });

    socket.on("history", (messages) => {
      el.chatInner.innerHTML = "";
      el.viewerChatInner.innerHTML = "";

      (messages || []).forEach((item) => {
        if (item.type === "text") renderTextMessage(item);
        if (item.type === "image") renderImageMessage(item);
      });
    });

    socket.on("message", renderTextMessage);
    socket.on("image", renderImageMessage);

    socket.on("drawing-history", (payload) => {
      if (!payload || payload.imageId !== getCurrentImageId()) return;
      state.currentStrokes = Array.isArray(payload.strokes)
        ? payload.strokes.slice(-MAX_CLIENT_STROKES)
        : [];
      redrawAllStrokes();
    });

    socket.on("draw-stroke", (stroke) => {
      if (!stroke || stroke.imageId !== getCurrentImageId()) return;

      state.currentStrokes.push(stroke);
      if (state.currentStrokes.length > MAX_CLIENT_STROKES) {
        state.currentStrokes = state.currentStrokes.slice(-MAX_CLIENT_STROKES);
      }

      drawStroke(stroke);
      updateViewerStats();
    });

    socket.on("draw-strokes", (payload) => {
      if (!payload || payload.imageId !== getCurrentImageId()) return;
      const strokes = Array.isArray(payload.strokes) ? payload.strokes : [];

      strokes.forEach((stroke) => {
        state.currentStrokes.push(stroke);
      });

      if (state.currentStrokes.length > MAX_CLIENT_STROKES) {
        state.currentStrokes = state.currentStrokes.slice(-MAX_CLIENT_STROKES);
        redrawAllStrokes();
      } else {
        strokes.forEach(drawStroke);
      }

      updateViewerStats();
    });

    socket.on("clear-drawing", (payload) => {
      if (!payload || payload.imageId !== getCurrentImageId()) return;
      state.currentStrokes = [];
      redrawAllStrokes();
    });

    socket.on("note-history", (payload) => {
      if (!payload || payload.imageId !== getCurrentImageId()) return;
      state.currentNotes = Array.isArray(payload.notes)
        ? payload.notes.map((note, index) => normalizeNote(note, index)).slice(-MAX_CLIENT_NOTES)
        : [];
      renderNotes();
    });

    socket.on("note-added", (payload) => {
      if (!payload || payload.imageId !== getCurrentImageId() || !payload.note) return;

      const exists = state.currentNotes.some((note) => note.id === payload.note.id);
      if (exists) return;

      state.currentNotes.push(normalizeNote(payload.note, state.currentNotes.length));
      state.currentNotes = state.currentNotes.slice(-MAX_CLIENT_NOTES);
      renderNotes();
    });

    socket.on("note-live-update", (payload) => {
      if (!payload || payload.imageId !== getCurrentImageId() || !payload.noteId) return;
      const note = getNoteById(payload.noteId);
      if (!note) return;

      Object.assign(note, payload.patch || {});
      upsertMarker(note);
    });

    socket.on("note-updated", (payload) => {
      if (!payload || payload.imageId !== getCurrentImageId() || !payload.noteId) return;
      const note = getNoteById(payload.noteId);
      if (!note) return;

      Object.assign(note, payload.patch || {});
      note.text = String(note.text || "").slice(0, MAX_NOTE_CHARS);
      note.width = clamp(note.width || 0.12, 0.12, 0.30);
      note.height = clamp(note.height || 0.09, 0.09, 0.28);
      note.updatedAt = note.updatedAt || Date.now();

      upsertMarker(note);

      if (state.activeNoteEditorId === note.id) {
        el.noteEditorMeta.textContent = formatNoteTimestamp(note.updatedAt);
      }

      updateViewerStats();
    });

    socket.on("note-deleted", (payload) => {
      if (!payload || payload.imageId !== getCurrentImageId() || !payload.noteId) return;

      state.currentNotes = state.currentNotes.filter((note) => note.id !== payload.noteId);
      if (state.activeMarkerId === payload.noteId) {
        state.activeMarkerId = "";
      }
      renderNotes();
    });

    socket.on("clear-notes", (payload) => {
      if (!payload || payload.imageId !== getCurrentImageId()) return;
      state.currentNotes = [];
      state.activeMarkerId = "";
      renderNotes();
    });
  }

  function init() {
    bindUIEvents();
    bindSocketEvents();
    setDrawMode("draw");
    setActiveColor(state.currentColor);
    setActiveNoteColor(state.currentNoteColor);
    updateHistoryButtons();
    toggleContactPanel(false);

    if (isViewerMode) {
      el.app.style.display = "none";
      el.viewerOverlay.classList.add("open");
      el.viewerOverlay.setAttribute("aria-hidden", "false");

      if (initialImageId && initialImageUrl) {
        state.currentViewerImageId = initialImageId;
        state.currentViewerImageUrl = initialImageUrl;
        el.viewerImage.src = initialImageUrl;
        updateViewerStats();
      }
      return;
    }

    if (!isEmbeddedMode) {
      restoreViewerState();
    } else {
      clearViewerState();
    }
  }

  init();
})();
</script>
</body>
</html>
