<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>디자인 상담</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-soft: #f8fbff;
      --line: #e3ebf4;
      --text: #17212b;
      --muted: #697a8c;
      --primary: #2388ff;
      --primary-dark: #1169d6;
      --danger: #ff4d4f;
      --shadow: 0 18px 45px rgba(15, 35, 60, 0.16);
      --safe-top: max(env(safe-area-inset-top), 0px);
      --safe-right: max(env(safe-area-inset-right), 0px);
      --safe-bottom: max(env(safe-area-inset-bottom), 0px);
      --safe-left: max(env(safe-area-inset-left), 0px);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      background: var(--bg);
    }

    #chatPanel {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--panel);
    }

    body.viewer-only #chatPanel {
      display: none;
    }

    #chatHeader {
      height: 72px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    #chatTitle {
      margin: 0;
      font-size: 20px;
      font-weight: 850;
      letter-spacing: -0.02em;
    }

    #chatSubtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    #connectionBadge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 30px;
      padding: 0 11px;
      border-radius: 999px;
      background: #edf4fb;
      color: #506477;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    #connectionBadge.connected {
      color: #10703a;
      background: #e7f8ee;
    }

    #quickRequestBar {
      flex: 0 0 auto;
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      border-bottom: 1px solid var(--line);
      background: #fff;
      -webkit-overflow-scrolling: touch;
    }

    .quickChip {
      flex: 0 0 auto;
      height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      background: #f1f5f9;
      color: #405265;
      font-size: 12px;
      font-weight: 800;
    }

    .quickChip:hover,
    .quickChip:focus-visible {
      background: #e8f2ff;
      color: var(--primary-dark);
    }

    #messageList {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 18px 16px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }

    #messageInner,
    #viewerChatInner {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .messageRow {
      display: flex;
      flex-direction: column;
      gap: 5px;
      width: 100%;
    }

    .messageRow.me { align-items: flex-end; }
    .messageRow.other { align-items: flex-start; }
    .messageRow.system { align-items: center; }

    .messageMeta {
      color: #7c8b9a;
      font-size: 11px;
      font-weight: 750;
      padding: 0 4px;
    }

    .bubble {
      max-width: min(76%, 560px);
      border-radius: 18px;
      padding: 11px 13px;
      font-size: 14px;
      line-height: 1.48;
      word-break: break-word;
      box-shadow: 0 6px 18px rgba(23, 33, 43, 0.06);
    }

    .messageRow.me .bubble {
      background: linear-gradient(135deg, var(--primary), #60b7ff);
      color: #fff;
      border-bottom-right-radius: 6px;
    }

    .messageRow.other .bubble {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
      border-bottom-left-radius: 6px;
    }

    .messageRow.system .bubble {
      max-width: 90%;
      padding: 8px 12px;
      color: #647587;
      background: #eef4fa;
      box-shadow: none;
      font-size: 12px;
      font-weight: 800;
    }

    .imageBubble {
      padding: 8px;
      background: #fff !important;
      border: 1px solid var(--line);
      color: var(--text) !important;
    }

    .chatImageButton {
      display: block;
      padding: 0;
      border-radius: 14px;
      overflow: hidden;
      background: #eef4fa;
      max-width: min(260px, 68vw);
    }

    .chatImageButton img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 320px;
      object-fit: contain;
    }

    .imageHint {
      padding: 8px 4px 2px;
      color: #607286;
      font-size: 12px;
      font-weight: 800;
    }

    #inputBar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 12px 14px calc(12px + var(--safe-bottom));
      border-top: 1px solid var(--line);
      background: #fff;
    }

    #messageInput,
    #viewerMessageInput {
      min-width: 0;
      flex: 1 1 auto;
      height: 44px;
      border: 1px solid #d9e4ef;
      border-radius: 14px;
      background: #f8fbff;
      color: var(--text);
      padding: 0 13px;
      outline: none;
    }

    #messageInput:focus,
    #viewerMessageInput:focus {
      border-color: var(--primary);
      background: #fff;
    }

    .iconBtn,
    #sendButton,
    #viewerSendButton {
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      background: #eef4fb;
      color: #405265;
    }

    #sendButton,
    #viewerSendButton {
      background: var(--primary);
      color: #fff;
    }

    #uploadInput {
      display: none;
    }

    #toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + var(--safe-bottom));
      transform: translateX(-50%) translateY(12px);
      z-index: 10000;
      max-width: min(92vw, 420px);
      padding: 10px 14px;
      border-radius: 999px;
      color: #fff;
      background: rgba(23, 33, 43, 0.88);
      font-size: 13px;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #viewerOverlay {
      position: fixed;
      inset: 0;
      z-index: 5000;
      display: none;
      background: #0b1118;
      color: #fff;
    }

    body.viewer-open #viewerOverlay {
      display: block;
    }

    #viewerStage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(35, 136, 255, 0.18), transparent 28%),
        #0b1118;
      touch-action: none;
    }

    #imageStage {
      position: absolute;
      inset: 0;
      overflow: hidden;
      touch-action: none;
    }

    #viewerImage,
    #drawCanvas,
    #connectorLayer,
    #noteLayer {
      position: absolute;
    }

    #viewerImage {
      display: block;
      object-fit: fill;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.34);
      background: #111923;
    }

    #drawCanvas {
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    #connectorLayer,
    #noteLayer {
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .floatingBtn {
      position: fixed;
      z-index: 5020;
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: rgba(18, 26, 36, 0.88);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(14px);
      font-size: 13px;
      font-weight: 900;
    }

    #viewerCloseButton {
      top: calc(16px + var(--safe-top));
      right: calc(16px + var(--safe-right));
    }

    #viewerToolsButton {
      top: calc(16px + var(--safe-top));
      left: calc(16px + var(--safe-left));
    }

    #viewerChatButton {
      top: calc(72px + var(--safe-top));
      left: calc(16px + var(--safe-left));
    }

    #viewerChatBadge {
      position: absolute;
      right: -7px;
      top: -7px;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 999px;
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: var(--danger);
      font-size: 11px;
      line-height: 20px;
      font-weight: 900;
    }

    #viewerChatBadge.visible {
      display: inline-flex;
    }

    #toolPanel,
    #viewerChatPanel {
      position: fixed;
      z-index: 5015;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      background: rgba(16, 24, 34, 0.92);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      color: #fff;
    }

    #toolPanel {
      left: calc(16px + var(--safe-left));
      bottom: calc(16px + var(--safe-bottom));
      width: min(440px, calc(100vw - 32px));
      padding: 12px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    #viewerChatPanel {
      right: calc(16px + var(--safe-right));
      top: calc(76px + var(--safe-top));
      bottom: calc(16px + var(--safe-bottom));
      width: min(360px, calc(100vw - 32px));
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolButton {
      height: 38px;
      min-width: 58px;
      padding: 0 12px;
      border-radius: 12px;
      color: #eaf3ff;
      background: rgba(255, 255, 255, 0.1);
      font-size: 12px;
      font-weight: 900;
    }

    .toolButton.active {
      color: #fff;
      background: var(--primary);
    }

    #colorPicker {
      width: 42px;
      height: 38px;
      padding: 3px;
      border: 0;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.12);
    }

    #thicknessRange {
      width: 110px;
      accent-color: var(--primary);
    }

    #thicknessLabel {
      min-width: 34px;
      color: #d8e7f8;
      font-size: 12px;
      font-weight: 850;
    }

    #viewerChatHeader {
      flex: 0 0 auto;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px 0 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 13px;
      font-weight: 900;
    }

    #viewerChatCloseButton {
      width: 34px;
      height: 34px;
      border-radius: 11px;
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      font-weight: 900;
    }

    #viewerChatList {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 12px;
    }

    #viewerChatInputBar {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    #viewerMessageInput {
      height: 40px;
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    #viewerSendButton {
      width: 40px;
      height: 40px;
      border-radius: 13px;
    }

    .note {
      position: absolute;
      min-width: 112px;
      min-height: 72px;
      border-radius: 12px;
      overflow: hidden;
      color: #17212b;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.22);
      pointer-events: auto;
      touch-action: none;
    }

    .noteHeader {
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 7px 0 9px;
      background: rgba(0, 0, 0, 0.08);
      cursor: grab;
      font-size: 11px;
      font-weight: 900;
    }

    .noteDelete {
      width: 20px;
      height: 20px;
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.45);
      color: #17212b;
      font-size: 12px;
      font-weight: 900;
    }

    .noteText {
      width: 100%;
      height: calc(100% - 26px);
      min-height: 46px;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: #17212b;
      padding: 8px 9px;
      font-size: 12px;
      line-height: 1.35;
    }

    body.mobile-landscape-mode {
      width: 100vw;
      height: 100dvh;
      overflow: hidden !important;
      background: #0b1118;
    }

    body.mobile-landscape-mode #viewerOverlay,
    body.mobile-landscape-mode #viewerStage {
      width: 100vw;
      height: 100dvh;
    }

    body.mobile-landscape-mode #toolPanel,
    body.mobile-landscape-mode #viewerChatPanel {
      display: none;
    }

    body.mobile-landscape-mode.viewer-tools-open #toolPanel {
      display: flex;
      top: calc(68px + var(--safe-top));
      left: calc(10px + var(--safe-left));
      bottom: auto;
      max-width: min(420px, calc(100vw - 20px - var(--safe-left) - var(--safe-right)));
      max-height: calc(100dvh - 84px - var(--safe-top) - var(--safe-bottom));
      overflow: auto;
    }

    body.mobile-landscape-mode.viewer-chat-open #viewerChatPanel {
      display: flex;
      top: calc(10px + var(--safe-top));
      right: calc(10px + var(--safe-right));
      bottom: calc(10px + var(--safe-bottom));
      width: min(360px, 52vw);
      max-width: calc(100vw - 20px - var(--safe-left) - var(--safe-right));
    }

    body.mobile-landscape-mode #viewerCloseButton {
      top: calc(10px + var(--safe-top));
      right: calc(10px + var(--safe-right));
    }

    body.mobile-landscape-mode #viewerToolsButton {
      top: calc(10px + var(--safe-top));
      left: calc(10px + var(--safe-left));
    }

    body.mobile-landscape-mode #viewerChatButton {
      top: calc(62px + var(--safe-top));
      left: calc(10px + var(--safe-left));
    }

    @media (max-width: 640px) {
      #chatHeader {
        height: 62px;
        padding: 0 14px;
      }

      #chatTitle { font-size: 18px; }
      #quickRequestBar { padding: 10px 12px; }
      #messageList { padding: 14px 12px; }
      .bubble { max-width: 84%; }
    }
  </style>
</head>
<body>
  <div id="app">
    <section id="chatPanel" aria-label="상담 채팅">
      <header id="chatHeader">
        <div>
          <h1 id="chatTitle">디자인 상담</h1>
          <div id="chatSubtitle">이미지를 올리고 필요한 부분을 함께 표시해 주세요</div>
        </div>
        <div id="connectionBadge">연결 중</div>
      </header>

      <div id="quickRequestBar" aria-label="빠른 요청">
        <button class="quickChip" type="button" data-text="공간에 어울리는 제품을 추천해 주세요.">제품 추천</button>
        <button class="quickChip" type="button" data-text="사진 속 공간 기준으로 배치 상담을 받고 싶어요.">배치 상담</button>
        <button class="quickChip" type="button" data-text="색상과 소재 조합을 같이 봐 주세요.">색상 상담</button>
        <button class="quickChip" type="button" data-text="업로드한 이미지에서 수정할 부분을 표시할게요.">이미지 표시</button>
      </div>

      <main id="messageList" aria-live="polite">
        <div id="messageInner"></div>
      </main>

      <form id="inputBar">
        <label class="iconBtn" for="uploadInput" title="이미지 업로드" aria-label="이미지 업로드">+</label>
        <input id="uploadInput" type="file" accept="image/*" />
        <input id="messageInput" type="text" autocomplete="off" placeholder="상담 내용을 입력하세요" />
        <button id="sendButton" type="submit" aria-label="전송">전송</button>
      </form>
    </section>

    <section id="viewerOverlay" aria-hidden="true" aria-label="이미지 협업 뷰어">
      <div id="viewerStage">
        <div id="imageStage">
          <img id="viewerImage" alt="협업 이미지" />
          <canvas id="drawCanvas"></canvas>
          <svg id="connectorLayer" aria-hidden="true"></svg>
          <div id="noteLayer"></div>
        </div>

        <button id="viewerCloseButton" class="floatingBtn" type="button" aria-label="닫기">닫기</button>
        <button id="viewerToolsButton" class="floatingBtn" type="button" aria-label="도구">도구</button>
        <button id="viewerChatButton" class="floatingBtn" type="button" aria-label="채팅">
          채팅
          <span id="viewerChatBadge">0</span>
        </button>

        <aside id="toolPanel" aria-label="협업 도구">
          <button class="toolButton active" id="penTool" type="button" data-tool="pen">펜</button>
          <button class="toolButton" id="eraserTool" type="button" data-tool="eraser">지우개</button>
          <button class="toolButton" id="noteTool" type="button" data-tool="note">메모</button>
          <button class="toolButton" id="undoButton" type="button">실행취소</button>
          <button class="toolButton" id="redoButton" type="button">다시실행</button>
          <button class="toolButton" id="clearButton" type="button">전체삭제</button>
          <input id="colorPicker" type="color" value="#ff3b30" aria-label="펜 색상" />
          <input id="thicknessRange" type="range" min="1" max="24" value="4" aria-label="펜 두께" />
          <span id="thicknessLabel">4px</span>
        </aside>

        <aside id="viewerChatPanel" aria-label="협업 채팅">
          <div id="viewerChatHeader">
            <span>협업 채팅</span>
            <button id="viewerChatCloseButton" type="button" aria-label="채팅 닫기">x</button>
          </div>
          <div id="viewerChatList">
            <div id="viewerChatInner"></div>
          </div>
          <form id="viewerChatInputBar">
            <input id="viewerMessageInput" type="text" autocomplete="off" placeholder="메시지 입력" />
            <button id="viewerSendButton" type="submit" aria-label="전송">전송</button>
          </form>
        </aside>
      </div>
    </section>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    (function () {
      "use strict";

      const params = new URLSearchParams(window.location.search);
      const parentOriginParam = params.get("parentOrigin") || "";
      const safeParentOrigin = parentOriginParam && parentOriginParam !== "null" ? parentOriginParam : "";
      const embedded = params.get("embed") === "1";
      const viewerOnly = params.get("viewerOnly") === "1";
      const hostView = params.get("hostView") || (window.innerWidth <= 768 ? "mobile" : "desktop");

      const state = {
        roomId: params.get("roomId") || localStorage.getItem("designChat.roomId") || createId("room"),
        userName: params.get("userName") || localStorage.getItem("designChat.userName") || "고객",
        role: params.get("role") === "admin" ? "admin" : "user",
        socketPath: "/socket.io",
        joined: false,
        messages: [],
        currentImageId: params.get("imageId") || "",
        currentImageUrl: params.get("imageUrl") || "",
        viewerOpen: false,
        viewerOnly,
        hostView,
        tool: "pen",
        color: "#ff3b30",
        thickness: 4,
        strokes: [],
        redoStack: [],
        currentStroke: null,
        notes: [],
        draggingNote: null,
        unreadViewerCount: 0,
        isViewerChatOpen: false,
        imageReady: false,
        fitRaf: 0
      };

      localStorage.setItem("designChat.roomId", state.roomId);
      localStorage.setItem("designChat.userName", state.userName);

      const el = {
        body: document.body,
        chatSubtitle: document.getElementById("chatSubtitle"),
        connectionBadge: document.getElementById("connectionBadge"),
        messageList: document.getElementById("messageList"),
        messageInner: document.getElementById("messageInner"),
        inputBar: document.getElementById("inputBar"),
        messageInput: document.getElementById("messageInput"),
        uploadInput: document.getElementById("uploadInput"),
        quickRequestBar: document.getElementById("quickRequestBar"),
        viewerOverlay: document.getElementById("viewerOverlay"),
        viewerStage: document.getElementById("viewerStage"),
        imageStage: document.getElementById("imageStage"),
        viewerImage: document.getElementById("viewerImage"),
        drawCanvas: document.getElementById("drawCanvas"),
        noteLayer: document.getElementById("noteLayer"),
        viewerCloseButton: document.getElementById("viewerCloseButton"),
        viewerToolsButton: document.getElementById("viewerToolsButton"),
        viewerChatButton: document.getElementById("viewerChatButton"),
        viewerChatBadge: document.getElementById("viewerChatBadge"),
        toolPanel: document.getElementById("toolPanel"),
        viewerChatPanel: document.getElementById("viewerChatPanel"),
        viewerChatList: document.getElementById("viewerChatList"),
        viewerChatInner: document.getElementById("viewerChatInner"),
        viewerChatInputBar: document.getElementById("viewerChatInputBar"),
        viewerMessageInput: document.getElementById("viewerMessageInput"),
        viewerChatCloseButton: document.getElementById("viewerChatCloseButton"),
        colorPicker: document.getElementById("colorPicker"),
        thicknessRange: document.getElementById("thicknessRange"),
        thicknessLabel: document.getElementById("thicknessLabel"),
        toast: document.getElementById("toast")
      };

      const ctx = el.drawCanvas.getContext("2d");
      let socket = null;
      let toastTimer = 0;
      let noteSaveTimer = 0;

      if (viewerOnly) {
        el.body.classList.add("viewer-only");
      }

      el.chatSubtitle.textContent = "상담 코드 " + state.roomId.slice(0, 8).toUpperCase();

      function createId(prefix) {
        if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
        return prefix + "-" + Date.now() + "-" + Math.random().toString(16).slice(2);
      }

      function isMobileHost() {
        return state.hostView === "mobile" || window.innerWidth <= 768;
      }

      function isOwnMessage(message) {
        if (!message || message.sender === "system") return false;
        return message.sender === state.role && (message.senderName || "") === displayName();
      }

      function displayName() {
        return state.role === "admin" ? "관리자" : state.userName;
      }

      function setConnection(text, connected) {
        el.connectionBadge.textContent = text;
        el.connectionBadge.classList.toggle("connected", Boolean(connected));
      }

      function showToast(message) {
        window.clearTimeout(toastTimer);
        el.toast.textContent = message;
        el.toast.classList.add("visible");
        toastTimer = window.setTimeout(function () {
          el.toast.classList.remove("visible");
        }, 1800);
      }

      function scrollToEnd(container) {
        requestAnimationFrame(function () {
          container.scrollTop = container.scrollHeight;
        });
      }

      function formatTime(time) {
        const date = new Date(time || Date.now());
        return date.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
      }

      function renderMessages(messages) {
        state.messages = Array.isArray(messages) ? messages.slice() : [];
        el.messageInner.innerHTML = "";
        el.viewerChatInner.innerHTML = "";
        state.messages.forEach(function (message) {
          appendMessageNode(message, el.messageInner);
          appendMessageNode(message, el.viewerChatInner);
        });
        scrollToEnd(el.messageList);
        scrollToEnd(el.viewerChatList);
      }

      function appendMessage(message) {
        state.messages.push(message);
        appendMessageNode(message, el.messageInner);
        appendMessageNode(message, el.viewerChatInner);
        scrollToEnd(el.messageList);
        scrollToEnd(el.viewerChatList);

        if (
          state.viewerOpen &&
          el.body.classList.contains("mobile-landscape-mode") &&
          !state.isViewerChatOpen &&
          !isOwnMessage(message)
        ) {
          state.unreadViewerCount += 1;
          updateViewerBadge();
        }
      }

      function appendMessageNode(message, target) {
        const row = document.createElement("div");
        const own = isOwnMessage(message);
        row.className = "messageRow " + (message.sender === "system" ? "system" : own ? "me" : "other");

        if (message.sender !== "system") {
          const meta = document.createElement("div");
          meta.className = "messageMeta";
          meta.textContent = (message.senderName || "고객") + " · " + formatTime(message.time);
          row.appendChild(meta);
        }

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        if (message.type === "image" && message.imageUrl) {
          bubble.classList.add("imageBubble");
          const button = document.createElement("button");
          button.className = "chatImageButton";
          button.type = "button";
          button.setAttribute("aria-label", "협업 뷰어 열기");
          const img = document.createElement("img");
          img.src = message.imageUrl;
          img.alt = "업로드 이미지";
          button.appendChild(img);
          button.addEventListener("click", function () {
            handleImageTap(message.imageId, message.imageUrl);
          });
          const hint = document.createElement("div");
          hint.className = "imageHint";
          hint.textContent = "이미지를 눌러 협업 화면 열기";
          bubble.appendChild(button);
          bubble.appendChild(hint);
        } else {
          bubble.textContent = message.text || "";
        }

        row.appendChild(bubble);
        target.appendChild(row);
      }

      function sendText(text) {
        const value = String(text || "").trim();
        if (!value || !socket || !state.joined) return;
        socket.emit("message", { text: value }, function (response) {
          if (!response || !response.ok) showToast((response && response.error) || "메시지 전송 실패");
        });
      }

      async function uploadImage(file) {
        if (!file || !file.type || !file.type.startsWith("image/")) {
          showToast("이미지 파일만 업로드할 수 있습니다.");
          return;
        }
        if (!socket || !state.joined) {
          showToast("서버 연결 후 다시 시도해 주세요.");
          return;
        }

        const form = new FormData();
        form.append("image", file);
        showToast("이미지를 업로드하는 중입니다.");

        try {
          const response = await fetch("/upload", { method: "POST", body: form });
          const data = await response.json();
          if (!response.ok || !data.url) throw new Error(data.error || "업로드 실패");

          socket.emit("image", { url: data.url }, function (result) {
            if (!result || !result.ok) {
              showToast((result && result.error) || "이미지 저장 실패");
              return;
            }
            showToast("이미지가 업로드되었습니다.");
          });
        } catch (error) {
          showToast(error.message || "이미지 업로드 실패");
        } finally {
          el.uploadInput.value = "";
        }
      }

      function handleImageTap(imageId, imageUrl) {
        if (!imageId || !imageUrl) return;
        if (embedded && safeParentOrigin && !viewerOnly && !isMobileHost()) {
          window.parent.postMessage({
            type: "OPEN_VIEWER_PANEL",
            roomId: state.roomId,
            userName: state.userName,
            imageId: imageId,
            imageUrl: imageUrl
          }, safeParentOrigin);
          return;
        }
        openViewer(imageId, imageUrl, { mobileLandscape: isMobileHost() });
      }

      function openViewer(imageId, imageUrl, options) {
        state.currentImageId = imageId;
        state.currentImageUrl = imageUrl;
        state.viewerOpen = true;
        state.imageReady = false;
        state.strokes = [];
        state.redoStack = [];
        state.notes = [];
        el.body.classList.add("viewer-open");
        el.viewerOverlay.setAttribute("aria-hidden", "false");
        closeViewerPanels();

        if (options && options.mobileLandscape) {
          enterMobileLandscapeMode();
        }

        if (el.viewerImage.src !== imageUrl) {
          el.viewerImage.removeAttribute("src");
          el.viewerImage.src = imageUrl;
        } else if (el.viewerImage.complete && el.viewerImage.naturalWidth) {
          handleViewerImageLoaded();
        }

        loadCollaborationState();
      }

      function closeViewer() {
        state.viewerOpen = false;
        state.currentImageId = "";
        state.currentImageUrl = "";
        state.currentStroke = null;
        el.body.classList.remove("viewer-open", "mobile-landscape-mode", "viewer-chat-open", "viewer-tools-open");
        el.viewerOverlay.setAttribute("aria-hidden", "true");
        unlockOrientation();
        exitFullscreenIfNeeded();
        if (embedded && safeParentOrigin) {
          window.parent.postMessage({ type: "CLOSE_VIEWER_PANEL" }, safeParentOrigin);
        }
      }

      function enterMobileLandscapeMode() {
        el.body.classList.add("mobile-landscape-mode");
        requestAnimationFrame(function () {
          requestFullscreenIfPossible();
          lockLandscapeIfPossible();
          scheduleFit();
        });
      }

      function requestFullscreenIfPossible() {
        const target = document.documentElement;
        if (document.fullscreenElement || !target.requestFullscreen) return;
        target.requestFullscreen().catch(function () {});
      }

      function exitFullscreenIfNeeded() {
        if (document.fullscreenElement && document.exitFullscreen) {
          document.exitFullscreen().catch(function () {});
        }
      }

      function lockLandscapeIfPossible() {
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock("landscape").catch(function () {});
        }
      }

      function unlockOrientation() {
        if (screen.orientation && screen.orientation.unlock) {
          try { screen.orientation.unlock(); } catch (error) {}
        }
      }

      function closeViewerPanels() {
        state.isViewerChatOpen = false;
        el.body.classList.remove("viewer-chat-open", "viewer-tools-open");
      }

      function toggleViewerChat(forceOpen) {
        const next = typeof forceOpen === "boolean" ? forceOpen : !el.body.classList.contains("viewer-chat-open");
        state.isViewerChatOpen = next;
        el.body.classList.toggle("viewer-chat-open", next);
        if (next) {
          el.body.classList.remove("viewer-tools-open");
          state.unreadViewerCount = 0;
          updateViewerBadge();
          scrollToEnd(el.viewerChatList);
          setTimeout(function () { el.viewerMessageInput.focus(); }, 0);
        }
      }

      function updateViewerBadge() {
        const count = Math.min(state.unreadViewerCount, 99);
        el.viewerChatBadge.textContent = state.unreadViewerCount > 99 ? "99+" : String(count);
        el.viewerChatBadge.classList.toggle("visible", state.unreadViewerCount > 0);
      }

      function toggleTools() {
        const next = !el.body.classList.contains("viewer-tools-open");
        el.body.classList.toggle("viewer-tools-open", next);
        if (next) {
          el.body.classList.remove("viewer-chat-open");
          state.isViewerChatOpen = false;
        }
      }

      function getImageDisplayRect() {
        const stage = el.imageStage.getBoundingClientRect();
        const naturalWidth = el.viewerImage.naturalWidth || 1;
        const naturalHeight = el.viewerImage.naturalHeight || 1;
        const safeWidth = stage.width * 0.8;
        const safeHeight = stage.height * 0.8;
        const scale = Math.min(safeWidth / naturalWidth, safeHeight / naturalHeight);
        const renderWidth = naturalWidth * scale;
        const renderHeight = naturalHeight * scale;
        return {
          left: (stage.width - renderWidth) / 2,
          top: (stage.height - renderHeight) / 2,
          width: renderWidth,
          height: renderHeight
        };
      }

      function clientPointToImageRelative(clientX, clientY) {
        const stage = el.imageStage.getBoundingClientRect();
        const rect = getImageDisplayRect();
        return {
          x: clamp((clientX - stage.left - rect.left) / rect.width, 0, 1),
          y: clamp((clientY - stage.top - rect.top) / rect.height, 0, 1)
        };
      }

      function relativePointToStagePoint(point) {
        const rect = getImageDisplayRect();
        return {
          x: rect.left + clamp(Number(point.x), 0, 1) * rect.width,
          y: rect.top + clamp(Number(point.y), 0, 1) * rect.height
        };
      }

      function fitCanvas() {
        const stage = el.imageStage.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        el.drawCanvas.width = Math.max(1, Math.round(stage.width * dpr));
        el.drawCanvas.height = Math.max(1, Math.round(stage.height * dpr));
        el.drawCanvas.style.width = stage.width + "px";
        el.drawCanvas.style.height = stage.height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const rect = getImageDisplayRect();
        Object.assign(el.viewerImage.style, {
          left: rect.left + "px",
          top: rect.top + "px",
          width: rect.width + "px",
          height: rect.height + "px"
        });

        redrawCanvas();
        renderNotes();
      }

      function scheduleFit() {
        cancelAnimationFrame(state.fitRaf);
        state.fitRaf = requestAnimationFrame(fitCanvas);
      }

      function redrawCanvas() {
        const stage = el.imageStage.getBoundingClientRect();
        ctx.clearRect(0, 0, stage.width, stage.height);
        state.strokes.forEach(drawStroke);
        if (state.currentStroke) drawStroke(state.currentStroke);
      }

      function drawStroke(stroke) {
        if (!stroke || !Array.isArray(stroke.points) || stroke.points.length < 2) return;
        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.globalCompositeOperation = stroke.mode === "erase" ? "destination-out" : "source-over";
        ctx.strokeStyle = stroke.color || state.color;
        ctx.lineWidth = Number(stroke.width || state.thickness);
        ctx.beginPath();
        stroke.points.forEach(function (point, index) {
          const stagePoint = relativePointToStagePoint(point);
          if (index === 0) ctx.moveTo(stagePoint.x, stagePoint.y);
          else ctx.lineTo(stagePoint.x, stagePoint.y);
        });
        ctx.stroke();
        ctx.restore();
      }

      function renderNotes() {
        el.noteLayer.innerHTML = "";
        const rect = getImageDisplayRect();
        state.notes.forEach(function (note) {
          const center = relativePointToStagePoint(note);
          const width = clamp(Number(note.width || 0.18), 0.1, 0.36) * rect.width;
          const height = clamp(Number(note.height || 0.12), 0.08, 0.32) * rect.height;
          const node = document.createElement("div");
          node.className = "note";
          node.dataset.noteId = note.id;
          node.style.left = (center.x - width / 2) + "px";
          node.style.top = (center.y - height / 2) + "px";
          node.style.width = width + "px";
          node.style.height = height + "px";
          node.style.background = note.color || "#fff7c2";

          const header = document.createElement("div");
          header.className = "noteHeader";
          header.textContent = note.updatedByName || "메모";
          header.addEventListener("pointerdown", function (event) {
            startNoteDrag(event, note);
          });

          const del = document.createElement("button");
          del.className = "noteDelete";
          del.type = "button";
          del.textContent = "x";
          del.addEventListener("click", function (event) {
            event.stopPropagation();
            deleteNote(note.id);
          });
          header.appendChild(del);

          const text = document.createElement("textarea");
          text.className = "noteText";
          text.value = note.text || "";
          text.placeholder = "메모 입력";
          text.addEventListener("input", function () {
            note.text = text.value;
            scheduleNoteSave(note);
          });
          text.addEventListener("pointerdown", function (event) {
            event.stopPropagation();
          });

          node.appendChild(header);
          node.appendChild(text);
          el.noteLayer.appendChild(node);
        });
      }

      function startNoteDrag(event, note) {
        event.preventDefault();
        event.stopPropagation();
        const pointer = clientPointToImageRelative(event.clientX, event.clientY);
        state.draggingNote = {
          id: note.id,
          offsetX: pointer.x - note.x,
          offsetY: pointer.y - note.y
        };
        event.currentTarget.setPointerCapture(event.pointerId);
      }

      function moveNoteDrag(event) {
        if (!state.draggingNote) return;
        const note = state.notes.find(function (item) { return item.id === state.draggingNote.id; });
        if (!note) return;
        const pointer = clientPointToImageRelative(event.clientX, event.clientY);
        note.x = clamp(pointer.x - state.draggingNote.offsetX, 0, 1);
        note.y = clamp(pointer.y - state.draggingNote.offsetY, 0, 1);
        renderNotes();
      }

      function endNoteDrag() {
        if (!state.draggingNote) return;
        const note = state.notes.find(function (item) { return item.id === state.draggingNote.id; });
        state.draggingNote = null;
        if (note) saveNotePatch(note, { x: note.x, y: note.y });
      }

      function scheduleNoteSave(note) {
        clearTimeout(noteSaveTimer);
        noteSaveTimer = setTimeout(function () {
          saveNotePatch(note, { text: note.text });
        }, 350);
      }

      function saveNotePatch(note, patch) {
        if (!socket || !state.currentImageId || !note) return;
        socket.emit("update-note", {
          imageId: state.currentImageId,
          noteId: note.id,
          patch: Object.assign({}, patch, {
            updatedByRole: state.role,
            updatedByName: displayName()
          })
        });
      }

      function addNoteAt(clientX, clientY) {
        if (!socket || !state.currentImageId) return;
        const point = clientPointToImageRelative(clientX, clientY);
        const note = {
          id: createId("note"),
          x: point.x,
          y: point.y,
          width: 0.18,
          height: 0.12,
          text: "",
          color: "#fff7c2",
          author: state.role,
          updatedByRole: state.role,
          updatedByName: displayName()
        };
        socket.emit("add-note", { imageId: state.currentImageId, note: note }, function (response) {
          if (!response || !response.ok) showToast((response && response.error) || "메모 추가 실패");
        });
      }

      function deleteNote(noteId) {
        if (!socket || !state.currentImageId || !noteId) return;
        socket.emit("delete-note", { imageId: state.currentImageId, noteId: noteId });
      }

      function startDrawing(event) {
        if (!state.viewerOpen || !state.currentImageId) return;
        if (state.tool === "note") {
          addNoteAt(event.clientX, event.clientY);
          return;
        }

        event.preventDefault();
        el.drawCanvas.setPointerCapture(event.pointerId);
        state.currentStroke = {
          id: createId("stroke"),
          mode: state.tool === "eraser" ? "erase" : "draw",
          color: state.color,
          width: state.tool === "eraser" ? Math.max(8, state.thickness * 2) : state.thickness,
          points: [clientPointToImageRelative(event.clientX, event.clientY)],
          sender: state.role,
          time: Date.now()
        };
        state.redoStack = [];
      }

      function moveDrawing(event) {
        if (!state.currentStroke) return;
        event.preventDefault();
        state.currentStroke.points.push(clientPointToImageRelative(event.clientX, event.clientY));
        redrawCanvas();
      }

      function endDrawing() {
        if (!state.currentStroke) return;
        const stroke = state.currentStroke;
        state.currentStroke = null;
        if (stroke.points.length < 2) {
          redrawCanvas();
          return;
        }
        state.strokes.push(stroke);
        redrawCanvas();
        socket.emit("draw-stroke", { imageId: state.currentImageId, stroke: stroke });
      }

      function undoStroke() {
        if (!state.strokes.length || !socket) return;
        state.redoStack.push(state.strokes.pop());
        replaceDrawing();
      }

      function redoStroke() {
        if (!state.redoStack.length || !socket) return;
        state.strokes.push(state.redoStack.pop());
        replaceDrawing();
      }

      function clearDrawing() {
        if (!socket || !state.currentImageId) return;
        state.strokes = [];
        state.redoStack = [];
        replaceDrawing();
      }

      function replaceDrawing() {
        redrawCanvas();
        socket.emit("replace-drawing", { imageId: state.currentImageId, strokes: state.strokes });
      }

      function setTool(tool) {
        state.tool = tool;
        document.querySelectorAll(".toolButton[data-tool]").forEach(function (button) {
          button.classList.toggle("active", button.dataset.tool === tool);
        });
      }

      function loadCollaborationState() {
        if (!socket || !state.currentImageId || !state.joined) return;
        socket.emit("get-drawing", { imageId: state.currentImageId }, function (response) {
          state.strokes = Array.isArray(response && response.strokes) ? response.strokes : [];
          state.redoStack = [];
          redrawCanvas();
        });
        socket.emit("get-notes", { imageId: state.currentImageId }, function (response) {
          state.notes = Array.isArray(response && response.notes) ? response.notes : [];
          renderNotes();
        });
      }

      function handleViewerImageLoaded() {
        state.imageReady = true;
        scheduleFit();
      }

      function clamp(value, min, max) {
        const number = Number(value);
        if (!Number.isFinite(number)) return min;
        return Math.min(max, Math.max(min, number));
      }

      async function loadConfig() {
        try {
          const response = await fetch("/config", { cache: "no-store" });
          const data = await response.json();
          if (data && data.socketPath) state.socketPath = data.socketPath;
        } catch (error) {
          state.socketPath = "/socket.io";
        }
      }

      function connectSocket() {
        setConnection("연결 중", false);
        socket = io(window.location.origin, {
          path: state.socketPath,
          transports: ["websocket", "polling"]
        });

        socket.on("connect", function () {
          setConnection("연결됨", true);
          socket.emit("join", {
            roomId: state.roomId,
            userName: state.userName,
            role: state.role
          }, function (response) {
            state.joined = Boolean(response && response.ok);
            if (state.joined && state.currentImageId && state.currentImageUrl && viewerOnly) {
              openViewer(state.currentImageId, state.currentImageUrl, { mobileLandscape: isMobileHost() });
            } else if (state.currentImageId && state.currentImageUrl) {
              loadCollaborationState();
            }
          });
        });

        socket.on("disconnect", function () {
          state.joined = false;
          setConnection("재연결 중", false);
        });

        socket.on("connect_error", function () {
          setConnection("연결 재시도 중", false);
        });

        socket.on("history", function (payload) {
          renderMessages(Array.isArray(payload && payload.messages) ? payload.messages : []);
        });

        socket.on("message", function (message) {
          appendMessage(message || {});
        });

        socket.on("drawing-replaced", function (payload) {
          if (!payload || payload.imageId !== state.currentImageId) return;
          state.strokes = Array.isArray(payload.strokes) ? payload.strokes : [];
          state.redoStack = [];
          redrawCanvas();
        });

        socket.on("draw-stroke", function (payload) {
          if (!payload || payload.imageId !== state.currentImageId || !payload.stroke) return;
          if (!state.strokes.some(function (stroke) { return stroke.id === payload.stroke.id; })) {
            state.strokes.push(payload.stroke);
            redrawCanvas();
          }
        });

        socket.on("drawing-cleared", function (payload) {
          if (!payload || payload.imageId !== state.currentImageId) return;
          state.strokes = [];
          state.redoStack = [];
          redrawCanvas();
        });

        socket.on("notes", function (payload) {
          if (!payload || payload.imageId !== state.currentImageId) return;
          state.notes = Array.isArray(payload.notes) ? payload.notes : [];
          renderNotes();
        });

        socket.on("note-added", function (payload) {
          if (!payload || payload.imageId !== state.currentImageId || !payload.note) return;
          upsertNote(payload.note);
        });

        socket.on("note-updated", function (payload) {
          if (!payload || payload.imageId !== state.currentImageId || !payload.note) return;
          upsertNote(payload.note);
        });

        socket.on("note-deleted", function (payload) {
          if (!payload || payload.imageId !== state.currentImageId) return;
          state.notes = state.notes.filter(function (note) { return note.id !== payload.noteId; });
          renderNotes();
        });
      }

      function upsertNote(note) {
        const index = state.notes.findIndex(function (item) { return item.id === note.id; });
        if (index >= 0) state.notes[index] = note;
        else state.notes.push(note);
        renderNotes();
      }

      function handleParentMessage(event) {
        if (safeParentOrigin && event.origin !== safeParentOrigin) return;
        const data = event.data || {};
        if (data.type === "SELECT_VIEWER_IMAGE" && data.imageId && data.imageUrl) {
          openViewer(data.imageId, data.imageUrl, { mobileLandscape: isMobileHost() });
        }
      }

      el.inputBar.addEventListener("submit", function (event) {
        event.preventDefault();
        sendText(el.messageInput.value);
        el.messageInput.value = "";
      });

      el.viewerChatInputBar.addEventListener("submit", function (event) {
        event.preventDefault();
        sendText(el.viewerMessageInput.value);
        el.viewerMessageInput.value = "";
      });

      el.uploadInput.addEventListener("change", function () {
        uploadImage(el.uploadInput.files && el.uploadInput.files[0]);
      });

      el.quickRequestBar.addEventListener("click", function (event) {
        const chip = event.target.closest(".quickChip");
        if (!chip) return;
        sendText(chip.dataset.text || chip.textContent);
      });

      el.viewerImage.addEventListener("load", handleViewerImageLoaded);
      el.viewerCloseButton.addEventListener("click", closeViewer);
      el.viewerToolsButton.addEventListener("click", toggleTools);
      el.viewerChatButton.addEventListener("click", function () { toggleViewerChat(); });
      el.viewerChatCloseButton.addEventListener("click", function () { toggleViewerChat(false); });
      el.drawCanvas.addEventListener("pointerdown", startDrawing);
      el.drawCanvas.addEventListener("pointermove", moveDrawing);
      el.drawCanvas.addEventListener("pointerup", endDrawing);
      el.drawCanvas.addEventListener("pointercancel", endDrawing);
      el.noteLayer.addEventListener("pointermove", moveNoteDrag);
      el.noteLayer.addEventListener("pointerup", endNoteDrag);
      el.noteLayer.addEventListener("pointercancel", endNoteDrag);

      document.querySelectorAll(".toolButton[data-tool]").forEach(function (button) {
        button.addEventListener("click", function () { setTool(button.dataset.tool); });
      });
      document.getElementById("undoButton").addEventListener("click", undoStroke);
      document.getElementById("redoButton").addEventListener("click", redoStroke);
      document.getElementById("clearButton").addEventListener("click", clearDrawing);
      el.colorPicker.addEventListener("input", function () { state.color = el.colorPicker.value; });
      el.thicknessRange.addEventListener("input", function () {
        state.thickness = Number(el.thicknessRange.value);
        el.thicknessLabel.textContent = state.thickness + "px";
      });

      window.addEventListener("message", handleParentMessage);
      window.addEventListener("resize", scheduleFit);
      window.addEventListener("orientationchange", scheduleFit);
      document.addEventListener("fullscreenchange", scheduleFit);
      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape" && state.viewerOpen) closeViewer();
      });

      loadConfig().then(connectSocket);
    })();
  </script>
</body>
</html>
