<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디자인 상담</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f8f9fa;
  height: 100vh;
  overflow: hidden;
}

/* 헤더 */
#header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 55px;
  background: white;
  border-bottom: 1px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  z-index: 10;
}

#statusIcon {
  position: absolute;
  right: 15px;
  font-size: 22px;
  cursor: pointer;
}

/* 채팅 영역 */
#chatBox {
  position: fixed;
  top: 55px;
  bottom: 80px;
  left: 0;
  width: 100%;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: width 0.3s ease;
}

.message {
  max-width: 72%;
  padding: 10px 14px;
  border-radius: 18px;
  word-break: break-word;
  line-height: 1.4;
}

.me {
  align-self: flex-end;
  background: #4dabf7;
  color: white;
}

.other {
  align-self: flex-start;
  background: white;
  border: 1px solid #ddd;
  color: #222;
}

.system {
  align-self: center;
  background: transparent;
  color: #666;
  font-size: 12px;
  padding: 4px 8px;
}

/* 이미지 */
.chat-img {
  max-width: 180px;
  border-radius: 10px;
  cursor: pointer;
  display: block;
}

/* 입력 영역 */
#inputArea {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: white;
  border-top: 1px solid #ddd;
  padding: 10px;
  z-index: 10;
}

#phoneRow {
  display: flex;
  gap: 8px;
  max-width: 600px;
  margin: 0 auto 8px auto;
}

#phoneInput {
  flex: 1;
  padding: 10px 12px;
  border: 1px solid #ccc;
  border-radius: 12px;
}

#savePhoneBtn {
  border: none;
  background: #495057;
  color: white;
  padding: 10px 14px;
  border-radius: 12px;
  cursor: pointer;
}

#inputRow {
  display: flex;
  max-width: 600px;
  margin: 0 auto;
  align-items: center;
}

#msg {
  flex: 1;
  padding: 12px;
  border-radius: 25px;
  border: 1px solid #ccc;
  outline: none;
}

#sendBtn {
  margin-left: 8px;
  padding: 10px 14px;
  border: none;
  background: #4dabf7;
  color: white;
  border-radius: 50%;
  cursor: pointer;
}

#file {
  display: none;
}

#fileLabel {
  margin-left: 8px;
  padding: 10px;
  border-radius: 50%;
  background: #e9ecef;
  cursor: pointer;
}

/* 사이드 이미지 뷰어 */
#sideViewer {
  position: fixed;
  top: 0;
  right: -400px;
  width: 400px;
  height: 100%;
  background: white;
  border-left: 1px solid #ddd;
  transition: right 0.3s ease;
  display: flex;
  flex-direction: column;
  z-index: 20;
}

#sideViewer.open {
  right: 0;
}

#sideViewer.open ~ #chatBox {
  width: calc(100% - 400px);
}

#viewerHeader {
  height: 55px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  border-bottom: 1px solid #ddd;
  font-weight: bold;
}

#viewerActions {
  display: flex;
  align-items: center;
  gap: 8px;
}

#downloadBtn,
#closeBtn {
  border: none;
  background: #f1f3f5;
  padding: 8px 10px;
  border-radius: 10px;
  cursor: pointer;
  text-decoration: none;
  color: #222;
}

#viewerBody {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  overflow: auto;
  background: #fafafa;
}

#sideImg {
  max-width: 100%;
  max-height: 100%;
  border-radius: 10px;
}

@media (max-width: 900px) {
  #sideViewer {
    width: 100%;
    right: -100%;
  }

  #sideViewer.open {
    right: 0;
  }
}
</style>
</head>

<body>

<div id="header">
  디자인 상담
  <span id="statusIcon">🟢</span>
</div>

<div id="chatBox"></div>

<div id="inputArea">
  <div id="phoneRow">
    <input id="phoneInput" placeholder="알림 받을 전화번호 입력">
    <button id="savePhoneBtn">등록</button>
  </div>

  <div id="inputRow">
    <input id="msg" placeholder="메시지 입력..." />
    <button id="sendBtn">➤</button>
    <label id="fileLabel" for="file">📎</label>
    <input type="file" id="file" accept="image/*">
  </div>
</div>

<div id="sideViewer">
  <div id="viewerHeader">
    <span>이미지 보기</span>
    <div id="viewerActions">
      <a id="downloadBtn" download>다운로드</a>
      <button id="closeBtn">닫기</button>
    </div>
  </div>
  <div id="viewerBody">
    <img id="sideImg" alt="첨부 이미지">
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const RENDER_URL = "https://chat-server-ilcq.onrender.com";
const socket = io(RENDER_URL);

const role = location.search.includes("admin") ? "admin" : "user";
let roomId = localStorage.getItem("roomId") || crypto.randomUUID();
localStorage.setItem("roomId", roomId);

const chatBox = document.getElementById("chatBox");
const msg = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");
const file = document.getElementById("file");
const fileLabel = document.getElementById("fileLabel");
const phoneInput = document.getElementById("phoneInput");
const savePhoneBtn = document.getElementById("savePhoneBtn");
const sideViewer = document.getElementById("sideViewer");
const sideImg = document.getElementById("sideImg");
const closeBtn = document.getElementById("closeBtn");
const downloadBtn = document.getElementById("downloadBtn");

socket.emit("join", { roomId, role });

function scrollToBottom() {
  requestAnimationFrame(() => {
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

function renderMessage(data) {
  const div = document.createElement("div");
  div.className = "message " + (
    data.sender === "system"
      ? "system"
      : data.sender === role
      ? "me"
      : "other"
  );
  div.textContent = data.text || "";
  chatBox.appendChild(div);
  scrollToBottom();
}

function openViewer(src) {
  sideImg.src = src;
  downloadBtn.href = src;
  sideViewer.classList.add("open");
}

function renderImage(data) {
  const wrap = document.createElement("div");
  wrap.className = "message " + (data.sender === role ? "me" : "other");

  const img = document.createElement("img");
  img.src = data.image;
  img.className = "chat-img";
  img.alt = "첨부 이미지";
  img.addEventListener("click", () => openViewer(data.image));

  wrap.appendChild(img);
  chatBox.appendChild(wrap);
  scrollToBottom();
}

function send() {
  const text = msg.value.trim();
  if (!text) return;

  socket.emit("message", { text });
  msg.value = "";
}

async function savePhone() {
  const phone = phoneInput.value.trim();
  if (!phone) {
    alert("전화번호를 입력해주세요.");
    return;
  }

  try {
    const res = await fetch(RENDER_URL + "/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ roomId, phone })
    });

    if (!res.ok) throw new Error("등록 실패");
    alert("전화번호가 등록되었습니다.");
  } catch (err) {
    alert("전화번호 등록에 실패했습니다.");
    console.error(err);
  }
}

sendBtn.addEventListener("click", send);

msg.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});

savePhoneBtn.addEventListener("click", savePhone);

file.addEventListener("change", async (e) => {
  const selected = e.target.files[0];
  if (!selected) return;

  const formData = new FormData();
  formData.append("image", selected);

  try {
    const res = await fetch(RENDER_URL + "/upload", {
      method: "POST",
      body: formData
    });

    if (!res.ok) throw new Error("업로드 실패");

    const data = await res.json();
    socket.emit("image", { url: data.url });
  } catch (err) {
    alert("이미지 업로드에 실패했습니다.");
    console.error(err);
  } finally {
    file.value = "";
  }
});

socket.on("history", (list) => {
  chatBox.innerHTML = "";
  list.forEach((item) => {
    if (item.text) renderMessage(item);
    if (item.image) renderImage(item);
  });
});

socket.on("message", (data) => {
  renderMessage(data);
});

socket.on("image", (data) => {
  renderImage(data);
});

closeBtn.addEventListener("click", () => {
  sideViewer.classList.remove("open");
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    sideViewer.classList.remove("open");
  }
});
</script>

</body>
</html>
