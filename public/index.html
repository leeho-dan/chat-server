<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>채팅 상담</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#e9ecef;
}

/* 상단 */
#header {
  position:fixed;
  top:0;
  width:100%;
  background:white;
  padding:12px;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#statusBtn {
  padding:6px 12px;
  border:none;
  border-radius:20px;
  background:#28c76f;
  color:white;
  cursor:pointer;
}

/* 채팅 */
#chatBox {
  margin-top:60px;
  height:70vh;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
}

/* 메시지 */
.message {
  max-width:65%;
  padding:10px 14px;
  margin:5px 0;
  border-radius:18px;
  font-size:14px;
}

.me {
  align-self:flex-end;
  background:#4dabf7;
  color:white;
}

.other {
  align-self:flex-start;
  background:white;
  border:1px solid #ddd;
}

/* 이미지 */
.chat-img {
  max-width:200px;
  border-radius:10px;
  cursor:pointer;
}

/* 입력 */
#inputArea {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:10px;
  border-top:1px solid #ddd;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#inputRow {
  display:flex;
  width:90%;
  max-width:500px;
  align-items:center;
}

#msg {
  flex:1;
  padding:12px;
  border-radius:25px;
  border:1px solid #ccc;
}

#sendBtn {
  margin-left:8px;
  padding:10px 14px;
  border:none;
  background:#4dabf7;
  color:white;
  border-radius:50%;
  cursor:pointer;
}

#file {
  display:none;
}

#fileLabel {
  margin-left:8px;
  background:#f1f3f5;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}

#orderBtn {
  margin-top:8px;
  width:90%;
  max-width:500px;
  padding:12px;
  background:#ff6b6b;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="header">
  <div>💬 상담채팅</div>
  <button id="statusBtn" onclick="toggleStatus()">상담 가능</button>
</div>

<div id="chatBox"></div>

<div id="inputArea">

  <div id="inputRow">
    <input id="msg" placeholder="메시지를 입력하세요..." />
    <button id="sendBtn" onclick="send()">➤</button>
    <label id="fileLabel" for="file">📎</label>
    <input type="file" id="file">
  </div>

  <button id="orderBtn" onclick="goOrder()">🛒 주문하기</button>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const chatBox = document.getElementById('chatBox');

/* =======================
   상담 상태
======================= */
let isOpen = true;

function toggleStatus() {
  const btn = document.getElementById('statusBtn');

  isOpen = !isOpen;

  if (isOpen) {
    btn.innerText = "상담 가능";
    btn.style.background = "#28c76f";
    systemMessage("상담이 다시 시작되었습니다 😊");
  } else {
    btn.innerText = "상담 불가";
    btn.style.background = "#ff4d4f";
    systemMessage("현재 상담이 종료되었습니다. 나중에 다시 시도해주세요 🙏");
  }
}

/* =======================
   시스템 메시지
======================= */
function systemMessage(text) {
  const div = document.createElement('div');
  div.className = 'message other';
  div.style.background = '#fff3cd';
  div.style.border = '1px solid #ffeeba';
  div.innerText = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

/* =======================
   메시지 전송
======================= */
function send() {
  const input = document.getElementById('msg');
  const msg = input.value.trim();

  if (!msg) return;

  if (!isOpen) {
    systemMessage("현재 상담이 불가능합니다 😢");
    input.value = "";
    return;
  }

  socket.emit('message', msg);
  addMessage(msg, 'me');

  input.value = "";
}

/* 엔터 전송 */
document.getElementById("msg").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});

/* 메시지 받기 */
socket.on('message', msg => {
  addMessage(msg, 'other');
});

/* 메시지 UI */
function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = 'message ' + type;
  div.innerText = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

/* =======================
   이미지 업로드
======================= */
document.getElementById('file').addEventListener('change', function () {

  const file = this.files[0];
  if (!file) return;

  if (!isOpen) {
    systemMessage("상담 불가 상태에서는 파일 전송이 불가능합니다");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {

    const wrapper = document.createElement('div');
    wrapper.className = 'message me';

    const link = document.createElement('a');
    link.href = e.target.result;
    link.download = '';

    const img = document.createElement('img');
    img.src = e.target.result;
    img.className = 'chat-img';

    link.appendChild(img);
    wrapper.appendChild(link);
    chatBox.appendChild(wrapper);

    chatBox.scrollTop = chatBox.scrollHeight;
  };

  reader.readAsDataURL(file);

  const formData = new FormData();
  formData.append('image', file);

  fetch('/upload', { method: 'POST', body: formData })
    .then(res => res.json())
    .then(data => {
      socket.emit('image', data.url);
    });
});

/* 이미지 수신 */
socket.on('image', url => {

  const wrapper = document.createElement('div');
  wrapper.className = 'message other';

  const link = document.createElement('a');
  link.href = url;
  link.download = '';

  const img = document.createElement('img');
  img.src = url;
  img.className = 'chat-img';

  link.appendChild(img);
  wrapper.appendChild(link);
  chatBox.appendChild(wrapper);

  chatBox.scrollTop = chatBox.scrollHeight;
});

/* =======================
   주문하기
======================= */
function goOrder() {
  window.open("https://yourshop.cafe24.com", "_blank");
}
</script>

</body>
</html>
