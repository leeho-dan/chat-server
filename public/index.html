<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>이미지 협업</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #f3f6fa;
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR";
}

/* ===== 기본 ===== */
#viewerOverlay {
  position: fixed;
  inset: 0;
  background: #fff;
  display: flex;
  flex-direction: column;
}

/* ===== 상단 (모바일에서는 숨김) ===== */
#viewerTopbar {
  height: 70px;
  padding: 0 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #eee;
}

/* ===== 메인 ===== */
#viewerMain {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ===== 작업 영역 ===== */
#viewerLeft {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

#imageStage {
  position: relative;
  width: 100%;
  height: 100%;
}

#viewerImage {
  max-width: 100%;
  max-height: 100%;
}

canvas {
  position: absolute;
  inset: 0;
}

/* ===== 툴바 ===== */
#toolbar {
  position: absolute;
  bottom: 10px;
  left: 10px;
  display: flex;
  gap: 6px;
}

.toolBtn {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: #eee;
}

/* ===== 채팅 아이콘 ===== */
#chatToggle {
  position: absolute;
  right: 12px;
  bottom: 12px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #2491ff;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

/* ===== badge ===== */
#chatBadge {
  position: absolute;
  top: -4px;
  right: -4px;
  background: red;
  color: #fff;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 999px;
  display: none;
}

/* ===== 채팅 패널 ===== */
#chatPanel {
  position: fixed;
  right: 0;
  top: 0;
  width: 80%;
  max-width: 320px;
  height: 100%;
  background: #fff;
  transform: translateX(100%);
  transition: .25s;
  display: flex;
  flex-direction: column;
}

#chatPanel.open {
  transform: translateX(0);
}

/* ===== 모바일 가로모드 ===== */
body.mobile-landscape-mode #viewerTopbar {
  display: none;
}

body.mobile-landscape-mode #toolbar {
  bottom: 6px;
}

</style>
</head>

<body>

<div id="viewerOverlay">

  <div id="viewerTopbar">
    <div>이미지 협업</div>
    <button onclick="closeViewer()">✕</button>
  </div>

  <div id="viewerMain">

    <div id="viewerLeft">
      <div id="imageStage">
        <img id="viewerImage" />
        <canvas id="drawCanvas"></canvas>
      </div>
    </div>

  </div>

  <!-- 툴 -->
  <div id="toolbar">
    <button class="toolBtn">✏️</button>
    <button class="toolBtn">🧹</button>
  </div>

  <!-- 채팅 버튼 -->
  <div id="chatToggle" onclick="toggleChat()">
    💬
    <div id="chatBadge">0</div>
  </div>

</div>

<!-- 채팅 패널 -->
<div id="chatPanel">
  <div style="padding:10px; border-bottom:1px solid #eee;">
    채팅
  </div>
  <div id="chatBox" style="flex:1; overflow:auto;"></div>
  <input id="chatInput" placeholder="메시지 입력" />
</div>

<script>

/* =========================
   모바일 강제 가로모드
========================= */
async function forceLandscape() {
  try {
    if (screen.orientation && screen.orientation.lock) {
      await screen.orientation.lock("landscape");
      document.body.classList.add("mobile-landscape-mode");
    }
  } catch(e) {
    console.log("orientation 실패");
  }

  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
  }
}

/* =========================
   채팅
========================= */
let unread = 0;
let isChatOpen = false;

function toggleChat() {
  const panel = document.getElementById("chatPanel");
  panel.classList.toggle("open");

  isChatOpen = panel.classList.contains("open");

  if (isChatOpen) {
    unread = 0;
    updateBadge();
  }
}

function addMessage(text) {
  const box = document.getElementById("chatBox");
  const div = document.createElement("div");
  div.innerText = text;
  box.appendChild(div);

  if (!isChatOpen) {
    unread++;
    updateBadge();
  }
}

function updateBadge() {
  const badge = document.getElementById("chatBadge");
  badge.innerText = unread;
  badge.style.display = unread > 0 ? "block" : "none";
}

/* =========================
   테스트용
========================= */
setInterval(() => {
  addMessage("새 메시지");
}, 5000);

/* =========================
   실행
========================= */
forceLandscape();

</script>

</body>
</html>
