<script src="/socket.io/socket.io.js"></script>
<script>
(() => {
  "use strict";

  const STORAGE_KEYS = {
    roomId: "chat_room_id",
    viewerState: "chat_last_viewer_state",
    userName: "chat_user_name"
  };

  function safeStorageGet(key) {
    try {
      return window.localStorage ? localStorage.getItem(key) : null;
    } catch (error) {
      return null;
    }
  }

  function safeStorageSet(key, value) {
    try {
      if (window.localStorage) localStorage.setItem(key, value);
    } catch (error) {
      // no-op
    }
  }

  function createUuid() {
    if (window.crypto && typeof window.crypto.randomUUID === "function") {
      return window.crypto.randomUUID();
    }
    return "room-" + Date.now() + "-" + Math.random().toString(16).slice(2);
  }

  const MAX_CLIENT_STROKES = 2000;
  const MAX_CLIENT_NOTES = 100;
  const MAX_NOTE_CHARS = 500;
  const HISTORY_LIMIT = 50;

  const params = new URLSearchParams(location.search);
  const role = params.get("role") === "admin" || params.has("admin") ? "admin" : "user";
  const userName = params.get("userName") || safeStorageGet(STORAGE_KEYS.userName) || "상담자";
  const isViewerMode = params.get("viewer") === "1";
  const isEmbeddedMode = params.get("embed") === "1" || window.parent !== window;
  const initialImageId = params.get("imageId") || "";
  const initialImageUrl = params.get("imageUrl") || "";

  safeStorageSet(STORAGE_KEYS.userName, userName);

  const state = {
    roomId: params.get("room") || safeStorageGet(STORAGE_KEYS.roomId) || createUuid(),
    currentViewerImageId: "",
    currentViewerImageUrl: "",
    lastSelectedImageId: "",
    lastSelectedImageUrl: "",
    drawMode: "draw",
    currentColor: "#ff3b30",
    currentSize: 3,
    currentNoteColor: "#fff7c2",
    currentStrokes: [],
    currentNotes: [],
    isDrawing: false,
    lastPoint: null,
    isComposingMain: false,
    isComposingViewer: false,
    historyUndoStack: [],
    historyRedoStack: [],
    historyLock: false,
    pendingStrokeBatch: [],
    pendingStrokeImageId: "",
    strokeBatchRaf: null,
    activeMarkerId: "",
    activeNoteEditorId: "",
    connectionState: "connected",
    saveState: "idle",
    saveStateTimer: null,
    noteCommitTimers: new Map(),
    noteLiveQueue: new Map(),
    noteLiveRaf: null,
    noteInteraction: {
      type: "",
      noteId: "",
      pointerId: null,
      dragOffsetX: 0,
      dragOffsetY: 0,
      startWidth: 0,
      startHeight: 0,
      startClientX: 0,
      startClientY: 0,
      moved: false
    },
    summary: {
      productName: "",
      requestTypes: [],
      detailNotes: [],
      status: "상담 시작"
    },
    summaryCollapsed: false,
    currentCursorMode: "default",
    inlineViewerExpanded: false,
    bottomSheetHeightVh: 58,
    bottomSheetDrag: {
      active: false,
      startY: 0,
      startHeightVh: 58
    },
    pendingUploads: [],
    socketConnected: false,
    socketJoined: false,
    noteTap: {
      noteId: "",
      time: 0
    }
  };

  safeStorageSet(STORAGE_KEYS.roomId, state.roomId);

  const socket = typeof window.io === "function"
    ? window.io({ transports: ["websocket", "polling"] })
    : null;

  if (!socket) {
    console.error("[socket:init] window.io가 아직 로드되지 않았습니다. /socket.io/socket.io.js 로딩 상태를 확인하세요.");
  }

  const el = {
    app: document.getElementById("app"),
    roleBadge: document.getElementById("roleBadge"),
    chatInner: document.getElementById("chatInner"),
    chatBox: document.getElementById("chatBox"),
    msgInput: document.getElementById("msgInput"),
    sendBtn: document.getElementById("sendBtn"),
    fileInput: document.getElementById("fileInput"),
    phoneInput: document.getElementById("phoneInput"),
    phoneStatus: document.getElementById("phoneStatus"),
    savePhoneBtn: document.getElementById("savePhoneBtn"),
    openViewerBtn: document.getElementById("openViewerBtn"),
    toggleContactPanelBtn: document.getElementById("toggleContactPanelBtn"),
    utilityRow: document.getElementById("utilityRow"),
    quickChips: Array.from(document.querySelectorAll(".quickChip")),
    summaryStatus: document.getElementById("summaryStatus"),
    summaryCard: document.getElementById("summaryCard"),
    summaryPreview: document.getElementById("summaryPreview"),
    summaryToggleBtn: document.getElementById("summaryToggleBtn"),
    summaryProductValue: document.getElementById("summaryProductValue"),
    summaryRequestsValue: document.getElementById("summaryRequestsValue"),
    summaryDetailValue: document.getElementById("summaryDetailValue"),
    summaryComposeBtn: document.getElementById("summaryComposeBtn"),
    summaryQuoteBtn: document.getElementById("summaryQuoteBtn"),
    viewerOverlay: document.getElementById("viewerOverlay"),
    viewerDragHandle: document.getElementById("viewerDragHandle"),
    viewerDragHandleBtn: document.getElementById("viewerDragHandleBtn"),
    closeViewerBtn: document.getElementById("closeViewerBtn"),
    viewerImage: document.getElementById("viewerImage"),
    viewerTitle: document.getElementById("viewerTitle"),
    viewerSubtitle: document.getElementById("viewerSubtitle"),
    viewerChatInner: document.getElementById("viewerChatInner"),
    toggleViewerSizeBtn: document.getElementById("toggleViewerSizeBtn"),
    popoutViewerBtn: document.getElementById("popoutViewerBtn"),
    viewerChatBox: document.getElementById("viewerChatBox"),
    viewerMsgInput: document.getElementById("viewerMsgInput"),
    viewerSendBtn: document.getElementById("viewerSendBtn"),
    downloadSketchBtn: document.getElementById("downloadSketchBtn"),
    drawingCountBadge: document.getElementById("drawingCountBadge"),
    noteCountBadge: document.getElementById("noteCountBadge"),
    syncStatusBadge: document.getElementById("syncStatusBadge"),
    imageStage: document.getElementById("imageStage"),
    drawCanvas: document.getElementById("drawCanvas"),
    textLayer: document.getElementById("textLayer"),
    penBtn: document.getElementById("penBtn"),
    eraserBtn: document.getElementById("eraserBtn"),
    addTextBtn: document.getElementById("addTextBtn"),
    clearDrawingBtn: document.getElementById("clearDrawingBtn"),
    clearNotesBtn: document.getElementById("clearNotesBtn"),
    undoBtn: document.getElementById("undoBtn"),
    redoBtn: document.getElementById("redoBtn"),
    thicknessRange: document.getElementById("thicknessRange"),
    colorRow: document.getElementById("colorRow"),
    colorSwatches: Array.from(document.querySelectorAll(".colorSwatch")),
    customColorBtn: document.getElementById("customColorBtn"),
    customColorInput: document.getElementById("customColorInput"),
    noteColorRow: document.getElementById("noteEditorColorRow"),
    noteColorSwatches: Array.from(document.querySelectorAll(".noteColorSwatch")),
    toggleNoteColorsBtn: document.getElementById("toggleNoteColorsBtn"),
    noteEditorOverlay: document.getElementById("noteEditorOverlay"),
    noteEditorTimestamp: document.getElementById("noteEditorTimestamp"),
    noteEditorAuthor: document.getElementById("noteEditorAuthor"),
    noteEditorSaveBadge: document.getElementById("noteEditorSaveBadge"),
    noteEditorTextarea: document.getElementById("noteEditorTextarea"),
    noteDeleteBtn: document.getElementById("noteDeleteBtn"),
    noteEditorDoneBtn: document.getElementById("noteEditorDoneBtn")
  };

  const ctx = el.drawCanvas.getContext("2d");
  el.roleBadge.textContent = role === "admin" ? "관리자 화면" : "고객 채팅";
  syncViewerSizeButton();
  if (isViewerMode) {
    el.toggleViewerSizeBtn.hidden = true;
    el.popoutViewerBtn.hidden = true;
  }

  function setViewportUnit() {
    const next = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    document.documentElement.style.setProperty("--vh", `${next * 0.01}px`);
  }

  function syncBodyMode() {
    document.body.classList.toggle("popup-viewer-mode", Boolean(isViewerMode && !shouldUseInlineViewer()));
  }

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value));
  }

  function deepClone(value) {
    return JSON.parse(JSON.stringify(value));
  }

  function isMobileViewport() {
    return window.innerWidth <= 900;
  }

  function shouldUseInlineViewer() {
    const coarsePointer = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
    const mobileAgent = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || "");
    return isMobileViewport() && (coarsePointer || mobileAgent);
  }

  function shouldOpenInlineViewerByDefault() {
    if (isViewerMode) return false;
    return shouldUseInlineViewer();
  }

  function syncViewerSizeButton() {
    state.inlineViewerExpanded = true;
  }

  function getBottomSheetRange() {
    return isMobileViewport()
      ? { min: 44, compact: 58, expanded: 84, max: 88 }
      : { min: 56, compact: 64, expanded: 78, max: 82 };
  }

  function applyBottomSheetHeight(vhValue) {
    const range = getBottomSheetRange();
    const next = clamp(Number(vhValue) || range.compact, range.min, range.max);
    state.bottomSheetHeightVh = next;
    document.documentElement.style.setProperty("--viewer-sheet-height", `${next}dvh`);
  }

  function setInlineViewerExpanded(expanded) {
    const range = getBottomSheetRange();
    const nextHeight = expanded ? range.expanded : range.compact;
    el.viewerOverlay.classList.toggle("compact", !expanded);
    el.viewerOverlay.classList.toggle("expanded", expanded);
    state.inlineViewerExpanded = expanded;
    applyBottomSheetHeight(nextHeight);
    syncViewerSizeButton();
  }

  function beginBottomSheetDrag(event) {
    if (!el.viewerOverlay.classList.contains("inline-sheet") || !isMobileViewport()) return;
    state.bottomSheetDrag.active = true;
    state.bottomSheetDrag.startY = event.clientY;
    state.bottomSheetDrag.startHeightVh = state.bottomSheetHeightVh || getBottomSheetRange().compact;
    el.viewerOverlay.classList.add("dragging");
  }

  function moveBottomSheetDrag(event) {
    if (!state.bottomSheetDrag.active) return;
    const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    if (!viewportHeight) return;
    const deltaPx = state.bottomSheetDrag.startY - event.clientY;
    const deltaVh = (deltaPx / viewportHeight) * 100;
    applyBottomSheetHeight(state.bottomSheetDrag.startHeightVh + deltaVh);
  }

  function endBottomSheetDrag() {
    if (!state.bottomSheetDrag.active) return;
    state.bottomSheetDrag.active = false;
    el.viewerOverlay.classList.remove("dragging");
    const range = getBottomSheetRange();
    const mid = (range.compact + range.expanded) / 2;
    setInlineViewerExpanded((state.bottomSheetHeightVh || range.compact) >= mid);
  }

  function applyInlineViewerMode(_compact = true) {
    if (isViewerMode) return;
    el.viewerOverlay.classList.add("inline-sheet");
    el.viewerOverlay.classList.remove("compact");
    el.viewerOverlay.classList.add("expanded");
    state.inlineViewerExpanded = true;
  }

  function clearInlineViewerMode() {
    el.viewerOverlay.classList.remove("inline-sheet", "compact", "expanded", "dragging");
    state.inlineViewerExpanded = false;
  }

  function toggleInlineViewerSize() {
    return;
  }

  function getDragThreshold() {
    return isMobileViewport() ? 8 : 4;
  }

  function formatTime(ts) {
    try {
      return new Date(ts).toLocaleTimeString("ko-KR", { hour: "numeric", minute: "2-digit" });
    } catch {
      return "";
    }
  }

  function formatNoteTimestamp(ts) {
    if (!ts) return "최종 수정 없음";
    try {
      return "최종 수정 " + new Date(ts).toLocaleString("ko-KR", {
        year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit"
      });
    } catch {
      return "최종 수정 없음";
    }
  }

  function getNoteEditorDisplayName(note = null) {
    if (note && note.updatedByName) return note.updatedByName;
    if (note && note.updatedByRole === "admin") return "관리자";
    return role === "admin" ? "관리자" : (userName || "고객");
  }

  function formatFileDate(date = new Date()) {
    const yyyy = date.getFullYear();
    const mm = String(date.getMonth() + 1).padStart(2, "0");
    const dd = String(date.getDate()).padStart(2, "0");
    const hh = String(date.getHours()).padStart(2, "0");
    const mi = String(date.getMinutes()).padStart(2, "0");
    return `${yyyy}${mm}${dd}_${hh}${mi}`;
  }

  function sanitizeFileName(name) {
    return String(name || "상담자").replace(/[\\/:*?"<>|]/g, "_").replace(/\s+/g, "_").slice(0, 40);
  }

  function scrollBottom(node) {
    requestAnimationFrame(() => {
      node.scrollTop = node.scrollHeight;
    });
  }

  function setPhoneStatus(message, isError = false) {
    el.phoneStatus.textContent = message;
    el.phoneStatus.style.color = isError ? "#d14343" : "#5f7286";
    el.phoneStatus.classList.toggle("show", Boolean(message));
  }

  function toggleContactPanel(forceOpen = null) {
    const next = forceOpen === null ? !el.utilityRow.classList.contains("open") : Boolean(forceOpen);
    el.utilityRow.classList.toggle("open", next);
    el.toggleContactPanelBtn.textContent = next ? "닫기" : "열기";
    el.toggleContactPanelBtn.setAttribute("aria-expanded", String(next));
  }

  function isSocketReady() {
    return Boolean(socket && socket.connected);
  }

  function canUseRealtimeRoom() {
    return isSocketReady() && state.socketJoined;
  }

  function updateRealtimeControls() {
    const joinedReady = canUseRealtimeRoom();
    if (el.sendBtn) el.sendBtn.disabled = !joinedReady;
    if (el.viewerSendBtn) el.viewerSendBtn.disabled = !joinedReady;
    if (el.fileInput) el.fileInput.disabled = !joinedReady;
    if (el.fileLabel) el.fileLabel.classList.toggle("disabled", !joinedReady);

    if (el.msgInput) {
      el.msgInput.placeholder = joinedReady
        ? "원하는 제품과 수정할 부분을 남겨주세요"
        : "상담방 연결 준비 중입니다...";
    }
    if (el.viewerMsgInput) {
      el.viewerMsgInput.placeholder = joinedReady
        ? "수정 위치나 요청을 바로 남겨주세요"
        : "협업방 입장 완료 후 입력할 수 있어요";
    }
  }

  function requestJoinRoom() {
    if (!isSocketReady()) {
      state.socketJoined = false;
      updateRealtimeControls();
      return;
    }

    state.socketJoined = false;
    updateRealtimeControls();

    socket.emit("join", { roomId: state.roomId, role }, (ack) => {
      if (ack && ack.ok) {
        state.socketJoined = true;
        updateRealtimeControls();
        flushPendingUploads();
        setSummaryStatus("상담 준비 완료", "상담방 입장이 완료되었습니다.");
        return;
      }

      state.socketJoined = false;
      updateRealtimeControls();
      if (ack && ack.error) {
        setSummaryStatus("연결 확인 필요", ack.error);
      }
    });
  }

  function flushPendingUploads() {
    if (!canUseRealtimeRoom() || !state.pendingUploads.length) return;
    const queue = state.pendingUploads.splice(0, state.pendingUploads.length);
    queue.forEach((item) => {
      socket.emit("image", { url: item.url });
    });
    setSummaryStatus("상담 진행 중", "보류 중이던 이미지가 자동 전송되었습니다.");
  }

  function setConnectionState(next) {
    state.connectionState = next;
    state.socketConnected = next === "connected";
    el.syncStatusBadge.className = "statBadge";
    if (next === "connected") {
      el.syncStatusBadge.classList.add("state-connected");
      el.syncStatusBadge.textContent = "실시간 연결됨";
      el.syncStatusBadge.dataset.count = "on";
      flushPendingUploads();
      return;
    }
    el.syncStatusBadge.classList.add("state-offline");
    el.syncStatusBadge.textContent = "연결 끊김";
    el.syncStatusBadge.dataset.count = "off";
  }

  function setSaveState(next) {
    state.saveState = next;
    if (state.saveStateTimer) {
      clearTimeout(state.saveStateTimer);
      state.saveStateTimer = null;
    }
    el.noteEditorSaveBadge.className = "";

    if (next === "pending") {
      el.noteEditorSaveBadge.className = "pending";
      el.noteEditorSaveBadge.textContent = "자동 저장 중";
      if (state.connectionState === "connected") {
        el.syncStatusBadge.className = "statBadge state-pending";
        el.syncStatusBadge.textContent = "자동 저장 중";
        el.syncStatusBadge.dataset.count = "…";
      }
      return;
    }

    if (next === "saved") {
      el.noteEditorSaveBadge.className = "saved";
      el.noteEditorSaveBadge.textContent = "저장됨";
      if (state.connectionState === "connected") {
        el.syncStatusBadge.className = "statBadge state-saved";
        el.syncStatusBadge.textContent = "저장됨";
        el.syncStatusBadge.dataset.count = "ok";
      }
      state.saveStateTimer = setTimeout(() => {
        el.noteEditorSaveBadge.className = "";
        el.noteEditorSaveBadge.textContent = "준비됨";
        if (state.connectionState === "connected") setConnectionState("connected");
      }, 1000);
      return;
    }

    if (next === "offline") {
      el.noteEditorSaveBadge.className = "offline";
      el.noteEditorSaveBadge.textContent = "오프라인";
      setConnectionState("offline");
      setSummaryStatus("연결 확인 필요", "실시간 서버 연결을 확인해 주세요.");
      return;
    }

    el.noteEditorSaveBadge.textContent = "준비됨";
    if (state.connectionState === "connected") setConnectionState("connected");
  }

  function updateViewerEntryButton() {
    const enabled = Boolean(state.lastSelectedImageId && state.lastSelectedImageUrl);
    el.openViewerBtn.disabled = !enabled;
  }

  function updateSummaryUI() {
    el.summaryCard.classList.toggle("collapsed", state.summaryCollapsed);
    el.summaryToggleBtn.setAttribute("aria-label", state.summaryCollapsed ? "현재 요청 요약 펼치기" : "현재 요청 요약 접기");
    el.summaryProductValue.textContent = state.summary.productName || "선택 대기";
    el.summaryRequestsValue.textContent = state.summary.requestTypes.length
      ? state.summary.requestTypes.join(", ")
      : "없음";
    el.summaryStatus.textContent = state.summary.status;
    el.summaryDetailValue.textContent = state.summary.detailNotes.length
      ? state.summary.detailNotes[state.summary.detailNotes.length - 1]
      : state.summary.status;

    el.quickChips.forEach((button) => {
      button.classList.toggle("active", state.summary.requestTypes.includes(button.dataset.request));
    });

    const hasActionableSummary = Boolean(state.summary.productName || state.summary.requestTypes.length || state.summary.detailNotes.length);
    el.summaryComposeBtn.disabled = !hasActionableSummary;
    el.summaryQuoteBtn.disabled = !hasActionableSummary;
    const previewRequests = state.summary.requestTypes.length ? state.summary.requestTypes.join(", ") : "요청 없음";
    const previewDetail = state.summary.detailNotes.length ? state.summary.detailNotes[state.summary.detailNotes.length - 1] : state.summary.status;
    el.summaryPreview.textContent = `${state.summary.productName || "선택 대기"} · ${previewRequests} · ${previewDetail}`;
  }

  function toggleSummaryCard(forceCollapsed = null) {
    state.summaryCollapsed = forceCollapsed === null ? !state.summaryCollapsed : Boolean(forceCollapsed);
    updateSummaryUI();
  }

  function setSummaryStatus(nextStatus, detail = "") {
    state.summary.status = nextStatus;
    if (detail) {
      state.summary.detailNotes.push(detail);
      state.summary.detailNotes = state.summary.detailNotes.slice(-3);
    }
    updateSummaryUI();
  }

  function addRequestType(requestType, draftText = "") {
    if (!requestType) return;
    if (!state.summary.requestTypes.includes(requestType)) {
      state.summary.requestTypes.push(requestType);
    }
    state.summary.status = "요청 정리 중";
    if (draftText && !el.msgInput.value.trim()) {
      el.msgInput.value = draftText;
      el.msgInput.focus();
    }
    updateSummaryUI();
  }

  function inferRequestTypesFromText(text) {
    const source = String(text || "").toLowerCase();
    const matchers = [
      { type: "색상 변경", patterns: ["색상", "컬러", "색", "블랙", "화이트", "레드", "blue", "black", "white"] },
      { type: "문구 추가", patterns: ["문구", "이니셜", "각인", "텍스트", "레터링"] },
      { type: "사이즈 조정", patterns: ["사이즈", "크기", "작게", "크게", "줄여", "늘려", "길이"] },
      { type: "디자인 수정", patterns: ["디자인", "수정", "변경", "장식", "모양", "제거", "추가"] },
      { type: "추천 요청", patterns: ["추천", "골라", "어울", "제안", "어떤 게"] },
      { type: "견적 요청", patterns: ["견적", "가격", "비용", "얼마", "주문"] }
    ];

    matchers.forEach(({ type, patterns }) => {
      if (patterns.some((pattern) => source.includes(pattern))) {
        addRequestType(type);
      }
    });
  }

  function inferProductNameFromText(text) {
    const source = String(text || "").toLowerCase();
    const products = [
      ["의자", ["의자", "체어", "chair"]],
      ["소파", ["소파", "sofa"]],
      ["가방", ["가방", "백", "bag"]],
      ["반지", ["반지", "링", "ring"]],
      ["목걸이", ["목걸이", "necklace"]],
      ["조명", ["조명", "lamp", "light"]],
      ["테이블", ["테이블", "table"]],
      ["쿠션", ["쿠션", "cushion"]]
    ];

    for (const [label, patterns] of products) {
      if (patterns.some((pattern) => source.includes(pattern))) {
        return label;
      }
    }
    return "";
  }

  function applyConversationInsights(text) {
    inferRequestTypesFromText(text);
    const productName = inferProductNameFromText(text);
    if (productName && !state.summary.productName) {
      state.summary.productName = productName;
    }

    const compact = String(text || "").replace(/\s+/g, " ").trim();
    if (compact) {
      setSummaryStatus("상담 진행 중", compact.slice(0, 42));
    }
  }

  function buildSummaryMessage(mode = "summary") {
    const product = state.summary.productName || "선택 제품";
    const requests = state.summary.requestTypes.length ? state.summary.requestTypes.join(", ") : "요청 없음";
    const detail = state.summary.detailNotes.length ? state.summary.detailNotes[state.summary.detailNotes.length - 1] : "세부 내용 추가 확인 필요";

    if (mode === "quote") {
      return [
        `현재 요청 기준으로 견적 상담을 받고 싶어요.`,
        `제품: ${product}`,
        `요청: ${requests}`,
        `세부: ${detail}`
      ].join("\n");
    }

    return [
      `현재 요청 내용을 정리할게요.`,
      `제품: ${product}`,
      `요청: ${requests}`,
      `현재 메모: ${detail}`
    ].join("\n");
  }

  function fillActiveInput(text) {
    const target = el.viewerOverlay.classList.contains("open") ? el.viewerMsgInput : el.msgInput;
    target.value = text;
    target.focus();
  }

  function inferProductNameFromImage(imageUrl) {
    if (!imageUrl) return "";
    const source = imageUrl.toLowerCase();
    if (source.includes("chair")) return "의자";
    if (source.includes("bag")) return "가방";
    if (source.includes("ring")) return "반지";
    return "선택한 제품";
  }

  function updateViewerStats() {
    el.drawingCountBadge.textContent = `선 ${state.currentStrokes.length}`;
    el.drawingCountBadge.dataset.count = String(state.currentStrokes.length);
    el.noteCountBadge.textContent = `메모 ${state.currentNotes.length}`;
    el.noteCountBadge.dataset.count = String(state.currentNotes.length);

    if (!state.currentViewerImageId) {
      el.viewerTitle.textContent = "이미지 검토 중";
      el.viewerSubtitle.textContent = "현재 이미지 선택 대기 중";
      return;
    }

    if (el.noteEditorOverlay.classList.contains("open")) {
      el.viewerTitle.textContent = "메모 편집 중";
      el.viewerSubtitle.textContent = "텍스트는 자동 저장됩니다";
      return;
    }

    if (state.drawMode === "draw") {
      el.viewerTitle.textContent = "";
      el.viewerSubtitle.textContent = "";
      return;
    }

    if (state.drawMode === "erase") {
      el.viewerTitle.textContent = "";
      el.viewerSubtitle.textContent = "";
      return;
    }

    el.viewerTitle.textContent = "이미지 검토 중";
    el.viewerSubtitle.textContent = "실시간 협업 중";
  }

  function setDrawMode(mode) {
    state.drawMode = mode;
    el.penBtn.classList.toggle("active", mode === "draw");
    el.eraserBtn.classList.toggle("active", mode === "erase");
    el.colorRow.classList.toggle("open", mode === "draw");
    updateCursorMode(mode);
    updateViewerStats();
  }

  function buildCursorCircle(size, options = {}) {
    const clamped = clamp(size, 8, 48);
    const canvasSize = Math.max(40, clamped + 16);
    const center = canvasSize / 2;
    const radius = clamped / 2;
    const stroke = options.stroke || "rgba(36,145,255,0.95)";
    const fill = options.fill || "rgba(36,145,255,0.18)";
    const dash = options.dash ? `stroke-dasharray="${options.dash}"` : "";
    return `data:image/svg+xml;utf8,${encodeURIComponent(
      `<svg xmlns="http://www.w3.org/2000/svg" width="${canvasSize}" height="${canvasSize}" viewBox="0 0 ${canvasSize} ${canvasSize}"><circle cx="${center}" cy="${center}" r="${radius}" fill="${fill}" stroke="${stroke}" stroke-width="1.5" ${dash}/></svg>`
    )}`;
  }

  function updateCursorMode(mode) {
    state.currentCursorMode = mode || "default";
    const size = clamp((state.currentSize || 3) + 6, 8, 42);
    let cursor = "crosshair";
    if (mode === "draw") {
      cursor = `url("${buildCursorCircle(size, { stroke: "rgba(36,145,255,0.95)", fill: "rgba(36,145,255,0.20)" })}") ${Math.round((size + 16) / 2)} ${Math.round((size + 16) / 2)}, crosshair`;
    } else if (mode === "erase") {
      cursor = `url("${buildCursorCircle(size, { stroke: "rgba(92,107,120,0.95)", fill: "rgba(255,255,255,0.05)" })}") ${Math.round((size + 16) / 2)} ${Math.round((size + 16) / 2)}, cell`;
    } else if (mode === "text") {
      cursor = `url("${buildCursorCircle(size, { stroke: "rgba(138,92,255,0.95)", fill: "rgba(138,92,255,0.12)", dash: "2 2" })}") ${Math.round((size + 16) / 2)} ${Math.round((size + 16) / 2)}, text`;
    }
    el.drawCanvas.style.cursor = cursor;
    el.imageStage.style.cursor = cursor;
  }

  function setActiveColor(color) {
    state.currentColor = color;
    let matched = false;
    el.colorSwatches.forEach((button) => {
      const active = button.dataset.color === color;
      button.classList.toggle("active", active);
      if (active) matched = true;
    });
    el.customColorBtn.classList.toggle("active", !matched);
    el.customColorBtn.style.setProperty("--custom-color-preview", color);
    el.customColorInput.value = color;
  }

  function setActiveNoteColor(color) {
    state.currentNoteColor = color;
    el.noteColorSwatches.forEach((button) => {
      button.classList.toggle("active", button.dataset.noteColor === color);
    });
  }

  function createTextRow(data) {
    const row = document.createElement("div");
    row.className = "messageRow " + (data.sender === role ? "me" : "other");

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = data.text || "";

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = formatTime(data.time);

    row.appendChild(bubble);
    row.appendChild(meta);
    return row;
  }

  function createImageRow(data) {
    const row = document.createElement("div");
    row.className = "messageRow " + (data.sender === role ? "me" : "other");

    const wrap = document.createElement("div");
    wrap.className = "imageBubble";

    const img = document.createElement("img");
    img.className = "chatImg";
    img.src = data.imageUrl;
    img.alt = "첨부 이미지";

    const hint = document.createElement("div");
    hint.className = "imageHint";
    hint.textContent = "눌러서 이미지 위에 수정 위치를 표시하며 상담하세요.";

    wrap.appendChild(img);
    wrap.appendChild(hint);
    wrap.addEventListener("click", () => {
      state.lastSelectedImageId = data.imageId;
      state.lastSelectedImageUrl = data.imageUrl;
      state.summary.productName = inferProductNameFromImage(data.imageUrl);
      setSummaryStatus("이미지 선택됨", "협업창이 가볍게 열렸어요. 필요하면 상단에서 더 크게 볼 수 있어요.");
      updateViewerEntryButton();
      if (shouldOpenInlineViewerByDefault()) {
        openViewerInline(data.imageId, data.imageUrl, { expanded: true });
      } else {
        openViewerPopup(data.imageId, data.imageUrl, { forcePopup: true });
      }
    });

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = formatTime(data.time);

    row.appendChild(wrap);
    row.appendChild(meta);
    return row;
  }

  function renderTextMessage(data) {
    el.chatInner.appendChild(createTextRow(data));
    scrollBottom(el.chatBox);
    if (el.viewerOverlay.classList.contains("open")) {
      el.viewerChatInner.appendChild(createTextRow(data));
      scrollBottom(el.viewerChatBox);
    }
  }

  function renderImageMessage(data) {
    el.chatInner.appendChild(createImageRow(data));
    scrollBottom(el.chatBox);
    if (el.viewerOverlay.classList.contains("open")) {
      el.viewerChatInner.appendChild(createImageRow(data));
      scrollBottom(el.viewerChatBox);
    }
    state.lastSelectedImageId = data.imageId;
    state.lastSelectedImageUrl = data.imageUrl;
    state.summary.productName = inferProductNameFromImage(data.imageUrl);
    updateViewerEntryButton();
    updateSummaryUI();
  }

  function getNormalizedPoint(event) {
    const rect = el.drawCanvas.getBoundingClientRect();
    return {
      x: clamp((event.clientX - rect.left) / rect.width, 0, 1),
      y: clamp((event.clientY - rect.top) / rect.height, 0, 1)
    };
  }

  function clearCanvas() {
    ctx.clearRect(0, 0, el.drawCanvas.width, el.drawCanvas.height);
  }

  function drawStroke(stroke) {
    if (!el.drawCanvas.width || !el.drawCanvas.height) return;
    const x1 = stroke.last.x * el.drawCanvas.width;
    const y1 = stroke.last.y * el.drawCanvas.height;
    const x2 = stroke.current.x * el.drawCanvas.width;
    const y2 = stroke.current.y * el.drawCanvas.height;

    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.lineWidth = stroke.size || 3;
    if (stroke.mode === "erase") {
      ctx.globalCompositeOperation = "destination-out";
      ctx.strokeStyle = "rgba(0,0,0,1)";
    } else {
      ctx.globalCompositeOperation = "source-over";
      ctx.strokeStyle = stroke.color || "#ff3b30";
    }
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.restore();
  }

  function redrawAllStrokes() {
    clearCanvas();
    state.currentStrokes.forEach(drawStroke);
    updateViewerStats();
  }

  function updateCanvasSize() {
    const width = el.imageStage.clientWidth;
    const height = el.imageStage.clientHeight;
    if (!width || !height) return;
    el.drawCanvas.width = width;
    el.drawCanvas.height = height;
    redrawAllStrokes();
    renderNotes();
  }

  function pushHistory() {
    if (state.historyLock || !state.currentViewerImageId) return;
    state.historyUndoStack.push(deepClone({
      strokes: state.currentStrokes,
      notes: state.currentNotes
    }));
    if (state.historyUndoStack.length > HISTORY_LIMIT) state.historyUndoStack.shift();
    state.historyRedoStack = [];
    updateHistoryButtons();
  }

  function updateHistoryButtons() {
    el.undoBtn.disabled = state.historyUndoStack.length === 0;
    el.redoBtn.disabled = state.historyRedoStack.length === 0;
  }

  function applyFullState(snapshot, sync = true) {
    if (!snapshot || !state.currentViewerImageId) return;
    state.historyLock = true;
    state.currentStrokes = deepClone(snapshot.strokes || []).slice(-MAX_CLIENT_STROKES);
    state.currentNotes = deepClone(snapshot.notes || []).slice(-MAX_CLIENT_NOTES);
    redrawAllStrokes();
    renderNotes();
    state.historyLock = false;
    if (sync && socket) {
      socket.emit("replace-drawing-history", { imageId: state.currentViewerImageId, strokes: state.currentStrokes });
      socket.emit("replace-note-history", { imageId: state.currentViewerImageId, notes: state.currentNotes });
    }
  }

  function undoAction() {
    if (!state.historyUndoStack.length) return;
    state.historyRedoStack.push(deepClone({ strokes: state.currentStrokes, notes: state.currentNotes }));
    applyFullState(state.historyUndoStack.pop(), true);
    updateHistoryButtons();
  }

  function redoAction() {
    if (!state.historyRedoStack.length) return;
    state.historyUndoStack.push(deepClone({ strokes: state.currentStrokes, notes: state.currentNotes }));
    applyFullState(state.historyRedoStack.pop(), true);
    updateHistoryButtons();
  }

  function queueStrokeSync(stroke) {
    if (!socket) return;
    state.pendingStrokeImageId = stroke.imageId;
    state.pendingStrokeBatch.push(stroke);
    if (state.strokeBatchRaf) return;
    state.strokeBatchRaf = requestAnimationFrame(() => {
      socket.emit("draw-strokes", { imageId: state.pendingStrokeImageId, strokes: state.pendingStrokeBatch });
      state.pendingStrokeBatch = [];
      state.pendingStrokeImageId = "";
      state.strokeBatchRaf = null;
    });
  }

  function estimateNoteSize(text) {
    const normalized = String(text || "");
    const lines = normalized.split("\n").length || 1;
    const longest = Math.max(...normalized.split("\n").map((line) => line.length), 6);
    return {
      width: clamp(0.12 + longest * 0.008, 0.12, 0.30),
      height: clamp(0.09 + lines * 0.03, 0.09, 0.28)
    };
  }

  function estimateMarkerPosition(index = 0) {
    return {
      x: clamp(0.14 + (index % 3) * 0.12, 0.08, 0.90),
      y: clamp(0.16 + Math.floor(index / 3) * 0.10, 0.10, 0.88)
    };
  }

  function normalizeNote(note, index = 0) {
    const base = estimateMarkerPosition(index);
    const estimated = estimateNoteSize(note && note.text);
    return {
      id: note && note.id || crypto.randomUUID(),
      x: typeof note?.x === "number" ? clamp(note.x, 0.06, 0.94) : base.x,
      y: typeof note?.y === "number" ? clamp(note.y, 0.08, 0.92) : base.y,
      width: typeof note?.width === "number" ? clamp(note.width, 0.12, 0.30) : estimated.width,
      height: typeof note?.height === "number" ? clamp(note.height, 0.09, 0.28) : estimated.height,
      text: String(note?.text || "").slice(0, MAX_NOTE_CHARS),
      color: note?.color || "#fff7c2",
      author: note?.author === "admin" ? "admin" : "user",
      updatedAt: typeof note?.updatedAt === "number" ? note.updatedAt : Date.now()
    };
  }

  function getNoteById(noteId) {
    return state.currentNotes.find((note) => note.id === noteId);
  }

  function getNotePreview(text) {
    const normalized = String(text || "").replace(/\s+/g, " ").trim();
    return normalized ? normalized.slice(0, 10) : "새 메모";
  }

  function getMarkerPosition(note) {
    return {
      left: note.x * (el.imageStage.clientWidth || 1),
      top: note.y * (el.imageStage.clientHeight || 1)
    };
  }

  function selectMarker(noteId) {
    state.activeMarkerId = noteId || "";
    el.textLayer.querySelectorAll(".noteMarker").forEach((node) => {
      node.classList.toggle("selected", node.dataset.id === state.activeMarkerId);
    });
  }

  function applyMarkerLayout(marker, note) {
    const pos = getMarkerPosition(note);
    marker.style.left = `${pos.left}px`;
    marker.style.top = `${pos.top}px`;
    marker.style.background = note.color;
    const textNode = marker.querySelector(".noteMarkerText");
    if (textNode) textNode.textContent = getNotePreview(note.text);
  }

  function clearNoteTimers(noteId) {
    const timer = state.noteCommitTimers.get(noteId);
    if (timer) {
      clearTimeout(timer);
      state.noteCommitTimers.delete(noteId);
    }
    state.noteLiveQueue.delete(noteId);
  }

  function shouldOpenNoteEditorOnTap(noteId) {
    if (!isMobileViewport()) return true;
    const now = Date.now();
    const sameTarget = state.noteTap.noteId === noteId;
    const withinWindow = now - state.noteTap.time < 320;
    state.noteTap.noteId = noteId;
    state.noteTap.time = now;
    return sameTarget && withinWindow;
  }

  function clearAsyncState() {
    if (state.saveStateTimer) clearTimeout(state.saveStateTimer);
    state.saveStateTimer = null;
    state.noteCommitTimers.forEach((timer) => clearTimeout(timer));
    state.noteCommitTimers.clear();
    state.noteLiveQueue.clear();
    if (state.noteLiveRaf) cancelAnimationFrame(state.noteLiveRaf);
    if (state.strokeBatchRaf) cancelAnimationFrame(state.strokeBatchRaf);
    state.noteLiveRaf = null;
    state.strokeBatchRaf = null;
    state.pendingStrokeBatch = [];
    state.pendingStrokeImageId = "";
    setSaveState(state.connectionState === "connected" ? "idle" : "offline");
  }

  function openNoteEditor(noteId) {
    const note = getNoteById(noteId);
    if (!note) return;
    state.activeNoteEditorId = noteId;
    el.noteEditorTextarea.value = note.text || "";
    el.noteEditorTimestamp.textContent = formatNoteTimestamp(note.updatedAt);
    el.noteEditorOverlay.classList.add("open");
    el.noteEditorOverlay.setAttribute("aria-hidden", "false");
    setSaveState(state.connectionState === "connected" ? "idle" : "offline");
    updateViewerStats();
    requestAnimationFrame(() => {
      el.noteEditorTextarea.focus();
      const length = el.noteEditorTextarea.value.length;
      try { el.noteEditorTextarea.setSelectionRange(length, length); } catch {}
    });
  }

  function closeNoteEditor(save = true) {
    const note = getNoteById(state.activeNoteEditorId);
    if (save && note && socket) {
      const nextText = String(el.noteEditorTextarea.value || "").slice(0, MAX_NOTE_CHARS);
      const size = estimateNoteSize(nextText);
      note.text = nextText;
      note.width = clamp(Math.max(note.width, size.width), 0.12, 0.30);
      note.height = clamp(Math.max(note.height, size.height), 0.09, 0.28);
      note.updatedAt = Date.now();
      upsertMarker(note);
      clearNoteTimers(note.id);
      socket.emit("update-note", {
        imageId: state.currentViewerImageId,
        noteId: note.id,
        patch: {
          text: note.text,
          width: note.width,
          height: note.height,
          updatedAt: note.updatedAt
        }
      });
      setSaveState(state.connectionState === "connected" ? "saved" : "offline");
      setSummaryStatus("요청 정리 중", "이미지 메모가 업데이트되었습니다.");
    }
    state.activeNoteEditorId = "";
    el.noteEditorOverlay.classList.remove("open");
    el.noteEditorOverlay.setAttribute("aria-hidden", "true");
    el.noteEditorTextarea.blur();
    renderNotes();
    updateViewerStats();
  }

  function createNoteMarker(note) {
    const marker = document.createElement("div");
    marker.className = "noteMarker";
    marker.dataset.id = note.id;
    marker.dataset.author = note.author;

    const text = document.createElement("span");
    text.className = "noteMarkerText";
    text.textContent = getNotePreview(note.text);

    const resize = document.createElement("button");
    resize.className = "noteResize";
    resize.type = "button";
    resize.setAttribute("aria-label", "메모 크기 조절");

    marker.appendChild(text);
    marker.appendChild(resize);

    marker.addEventListener("click", (event) => {
      event.stopPropagation();
      if (state.noteInteraction.noteId === note.id && state.noteInteraction.moved) return;
      selectMarker(note.id);
      if (!shouldOpenNoteEditorOnTap(note.id)) return;
      openNoteEditor(note.id);
    });

    marker.addEventListener("pointerdown", (event) => {
      const current = getNoteById(note.id);
      if (!current) return;
      selectMarker(note.id);

      if (event.target === resize) {
        event.preventDefault();
        pushHistory();
        state.noteInteraction = {
          type: "resize",
          noteId: note.id,
          pointerId: event.pointerId,
          dragOffsetX: 0,
          dragOffsetY: 0,
          startWidth: current.width,
          startHeight: current.height,
          startClientX: event.clientX,
          startClientY: event.clientY,
          moved: false
        };
        marker.setPointerCapture?.(event.pointerId);
        return;
      }

      event.preventDefault();
      pushHistory();
      const stageRect = el.imageStage.getBoundingClientRect();
      const pos = getMarkerPosition(current);
      state.noteInteraction = {
        type: "drag",
        noteId: note.id,
        pointerId: event.pointerId,
        dragOffsetX: event.clientX - (stageRect.left + pos.left),
        dragOffsetY: event.clientY - (stageRect.top + pos.top),
        startWidth: current.width,
        startHeight: current.height,
        startClientX: event.clientX,
        startClientY: event.clientY,
        moved: false
      };
      marker.setPointerCapture?.(event.pointerId);
    });

    applyMarkerLayout(marker, note);
    return marker;
  }

  function renderNotes() {
    el.textLayer.innerHTML = "";
    state.currentNotes = state.currentNotes.slice(-MAX_CLIENT_NOTES).map((note, index) => normalizeNote(note, index));
    state.currentNotes.forEach((note) => {
      el.textLayer.appendChild(createNoteMarker(note));
    });
    selectMarker(state.activeMarkerId);
    updateViewerStats();
  }

  function upsertMarker(note) {
    const existing = el.textLayer.querySelector(`.noteMarker[data-id="${note.id}"]`);
    if (!existing) {
      el.textLayer.appendChild(createNoteMarker(note));
      selectMarker(state.activeMarkerId);
      return;
    }
    applyMarkerLayout(existing, note);
    existing.classList.toggle("selected", existing.dataset.id === state.activeMarkerId);
  }

  function scheduleNoteLiveUpdate(noteId, patch) {
    if (!socket || !state.currentViewerImageId) return;
    state.noteLiveQueue.set(noteId, { imageId: state.currentViewerImageId, noteId, patch });
    if (state.noteLiveRaf) return;
    state.noteLiveRaf = requestAnimationFrame(() => {
      state.noteLiveQueue.forEach((payload) => socket.emit("note-live-update", payload));
      state.noteLiveQueue.clear();
      state.noteLiveRaf = null;
    });
  }

  function debounceNoteCommit(noteId, patch, delay = 260) {
    if (!socket) return;
    const prev = state.noteCommitTimers.get(noteId);
    if (prev) clearTimeout(prev);
    const timer = setTimeout(() => {
      socket.emit("update-note", { imageId: state.currentViewerImageId, noteId, patch });
      state.noteCommitTimers.delete(noteId);
    }, delay);
    state.noteCommitTimers.set(noteId, timer);
  }

  function handleNoteInteractionMove(event) {
    const interaction = state.noteInteraction;
    if (!interaction.type || !interaction.noteId || !state.currentViewerImageId) return;
    const note = getNoteById(interaction.noteId);
    const marker = el.textLayer.querySelector(`.noteMarker[data-id="${interaction.noteId}"]`);
    const stageRect = el.imageStage.getBoundingClientRect();
    if (!note || !marker || !stageRect.width || !stageRect.height) return;

    const moveX = Math.abs(event.clientX - interaction.startClientX);
    const moveY = Math.abs(event.clientY - interaction.startClientY);
    if (moveX > getDragThreshold() || moveY > getDragThreshold()) interaction.moved = true;

    if (interaction.type === "drag") {
      note.x = clamp((event.clientX - stageRect.left - interaction.dragOffsetX) / stageRect.width, 0.06, 0.94);
      note.y = clamp((event.clientY - stageRect.top - interaction.dragOffsetY) / stageRect.height, 0.08, 0.92);
      note.updatedAt = Date.now();
      applyMarkerLayout(marker, note);
      note.updatedByRole = role;
      note.updatedByName = role === "admin" ? "관리자" : (userName || "고객");
      scheduleNoteLiveUpdate(note.id, {
        x: note.x,
        y: note.y,
        updatedAt: note.updatedAt,
        updatedByRole: note.updatedByRole,
        updatedByName: note.updatedByName
      });
      return;
    }

    if (interaction.type === "resize") {
      const deltaX = event.clientX - interaction.startClientX;
      const deltaY = event.clientY - interaction.startClientY;
      note.width = clamp(interaction.startWidth + (deltaX / stageRect.width), 0.12, 0.30);
      note.height = clamp(interaction.startHeight + (deltaY / stageRect.height), 0.09, 0.28);
      note.updatedAt = Date.now();
      applyMarkerLayout(marker, note);
      note.updatedByRole = role;
      note.updatedByName = role === "admin" ? "관리자" : (userName || "고객");
      scheduleNoteLiveUpdate(note.id, {
        width: note.width,
        height: note.height,
        updatedAt: note.updatedAt,
        updatedByRole: note.updatedByRole,
        updatedByName: note.updatedByName
      });
    }
  }

  function finishNoteInteraction() {
    const interaction = state.noteInteraction;
    if (interaction.type && interaction.noteId && interaction.moved && socket) {
      const note = getNoteById(interaction.noteId);
      if (note) {
        setSaveState(state.connectionState === "connected" ? "pending" : "offline");
        socket.emit("update-note", {
          imageId: state.currentViewerImageId,
          noteId: note.id,
          patch: {
            x: note.x,
            y: note.y,
            width: note.width,
            height: note.height,
            updatedAt: note.updatedAt,
            updatedByRole: role,
            updatedByName: role === "admin" ? "관리자" : (userName || "고객")
          }
        });
      }
    }
    state.noteInteraction = {
      type: "",
      noteId: "",
      pointerId: null,
      dragOffsetX: 0,
      dragOffsetY: 0,
      startWidth: 0,
      startHeight: 0,
      startClientX: 0,
      startClientY: 0,
      moved: false
    };
  }

  function addTextNote() {
    if (!state.currentViewerImageId || !socket) return;
    pushHistory();
    const note = normalizeNote({
      id: crypto.randomUUID(),
      x: 0.14,
      y: 0.16,
      text: "",
      color: state.currentNoteColor,
      author: role,
      updatedAt: Date.now(),
      updatedByRole: role,
      updatedByName: role === "admin" ? "관리자" : (userName || "고객")
    }, state.currentNotes.length);
    state.currentNotes.push(note);
    renderNotes();
    selectMarker(note.id);
    addRequestType("이미지 메모", "");
    setSummaryStatus("요청 정리 중", "이미지에 수정 메모가 추가되었습니다.");
    socket.emit("add-note", { imageId: state.currentViewerImageId, note });
    openNoteEditor(note.id);
  }

  function deleteActiveNote() {
    if (!socket || !state.activeNoteEditorId || !state.currentViewerImageId) return;
    if (!confirm("이 메모를 삭제할까요?")) return;
    clearNoteTimers(state.activeNoteEditorId);
    state.currentNotes = state.currentNotes.filter((note) => note.id !== state.activeNoteEditorId);
    socket.emit("delete-note", {
      imageId: state.currentViewerImageId,
      noteId: state.activeNoteEditorId
    });
    closeNoteEditor(false);
    renderNotes();
  }

  function startDrawing(event) {
    if (!state.currentViewerImageId || !socket) return;
    if (state.drawMode === "text") return;
    if (event.pointerType === "mouse" && event.button !== 0) return;
    state.isDrawing = true;
    state.lastPoint = getNormalizedPoint(event);
    pushHistory();
    el.drawCanvas.setPointerCapture?.(event.pointerId);
  }

  function moveDrawing(event) {
    if (!state.isDrawing || !state.lastPoint || !state.currentViewerImageId) return;
    const current = getNormalizedPoint(event);
    const stroke = {
      imageId: state.currentViewerImageId,
      mode: state.drawMode === "erase" ? "erase" : "draw",
      color: state.currentColor,
      size: state.currentSize,
      last: state.lastPoint,
      current
    };
    state.currentStrokes.push(stroke);
    if (state.currentStrokes.length > MAX_CLIENT_STROKES) {
      state.currentStrokes = state.currentStrokes.slice(-MAX_CLIENT_STROKES);
    }
    drawStroke(stroke);
    queueStrokeSync(stroke);
    state.lastPoint = current;
    addRequestType("이미지 표시", "");
    setSummaryStatus("요청 정리 중", "이미지에 표시가 추가되었습니다.");
    updateViewerStats();
  }

  function endDrawing(event) {
    state.isDrawing = false;
    state.lastPoint = null;
    el.drawCanvas.releasePointerCapture?.(event?.pointerId);
  }

  function resetViewerState() {
    state.currentStrokes = [];
    state.currentNotes = [];
    state.historyUndoStack = [];
    state.historyRedoStack = [];
    state.activeMarkerId = "";
    state.activeNoteEditorId = "";
    clearCanvas();
    renderNotes();
    updateHistoryButtons();
  }

  function saveViewerState() {
    if (!state.currentViewerImageId || !state.currentViewerImageUrl) return;
    safeStorageSet(STORAGE_KEYS.viewerState, JSON.stringify({
      roomId: state.roomId,
      role,
      imageId: state.currentViewerImageId,
      imageUrl: state.currentViewerImageUrl,
      isOpen: el.viewerOverlay.classList.contains("open"),
      inlineViewerExpanded: state.inlineViewerExpanded,
      bottomSheetHeightVh: state.bottomSheetHeightVh,
      savedAt: Date.now()
    }));
  }

  function clearViewerState() {
    
    try {
      if (window.localStorage) localStorage.removeItem(STORAGE_KEYS.viewerState);
    } catch (error) {
      // no-op
    }
  }

  function requestViewerHistory(imageId) {
    if (!socket) return;
    socket.emit("request-drawing-history", { imageId });
    socket.emit("request-note-history", { imageId });
  }

  function prepareForImageChange() {
    clearAsyncState();
    if (state.activeNoteEditorId) closeNoteEditor(false);
    finishNoteInteraction();
  }

  function lockViewerBackground() {
    document.body.classList.add("viewer-inline-open");
  }

  function unlockViewerBackground() {
    document.body.classList.remove("viewer-inline-open");
  }

  function focusStableScroll() {
    if (!isMobileViewport()) return;
    requestAnimationFrame(() => {
      window.scrollTo(0, 0);
      el.viewerOverlay.scrollTop = 0;
    });
  }

  function openViewerInline(imageId, imageUrl, options = {}) {
    if (!imageId || !imageUrl) return;
    prepareForImageChange();
    resetViewerState();
    state.currentViewerImageId = imageId;
    state.currentViewerImageUrl = imageUrl;
    state.lastSelectedImageId = imageId;
    state.lastSelectedImageUrl = imageUrl;
    state.summary.productName = state.summary.productName || inferProductNameFromImage(imageUrl);
    lockViewerBackground();
    clearInlineViewerMode();
    if (!isViewerMode) {
      const preferCompact = isMobileViewport() ? true : options.expanded === true ? false : true;
      applyInlineViewerMode(preferCompact);
    }
    el.viewerOverlay.classList.add("open");
    el.viewerOverlay.setAttribute("aria-hidden", "false");
    el.viewerImage.src = imageUrl;
    updateViewerStats();
    updateViewerEntryButton();
    saveViewerState();
    requestViewerHistory(imageId);
    focusStableScroll();
  }

  function openViewerPopup(imageId, imageUrl, options = {}) {
    if (!imageId || !imageUrl) return;
    if (!options.forcePopup && shouldOpenInlineViewerByDefault()) {
      openViewerInline(imageId, imageUrl, { expanded: true });
      return;
    }
    const url = new URL(window.location.origin + window.location.pathname);
    url.searchParams.set("viewer", "1");
    url.searchParams.set("room", state.roomId);
    url.searchParams.set("role", role);
    url.searchParams.set("imageId", imageId);
    url.searchParams.set("imageUrl", imageUrl);
    url.searchParams.set("userName", userName);
    const popupWidth = Math.min(
      Math.max(1100, Math.round((window.screen.availWidth || 1440) * 0.78)),
      Math.max((window.screen.availWidth || 1440) - 120, 1100)
    );
    const popupHeight = Math.min(
      Math.max(760, Math.round((window.screen.availHeight || 960) * 0.82)),
      Math.max((window.screen.availHeight || 960) - 100, 760)
    );
    const left = Math.max(0, Math.round(((window.screen.availWidth || popupWidth) - popupWidth) / 2));
    const top = Math.max(0, Math.round(((window.screen.availHeight || popupHeight) - popupHeight) / 2));
    const popup = window.open(
      url.toString(),
      "designImageViewer",
      `width=${popupWidth},height=${popupHeight},left=${left},top=${top},resizable=yes,scrollbars=yes`
    );
    if (!popup) alert("브라우저에서 새 창이 차단되었습니다. 팝업 허용 후 다시 시도해주세요.");
  }

  function closeViewerWindow() {
    if (!isViewerMode) return false;
    window.close();
    setTimeout(() => {
      if (!window.closed) {
        window.location.replace("about:blank");
      }
    }, 120);
    return true;
  }

  function closeViewer() {
    if (closeViewerWindow()) return;
    prepareForImageChange();
    unlockViewerBackground();
    clearInlineViewerMode();
    el.viewerOverlay.classList.remove("open");
    el.viewerOverlay.setAttribute("aria-hidden", "true");
    state.currentViewerImageId = "";
    state.currentViewerImageUrl = "";
    resetViewerState();
    clearViewerState();
    updateCursorMode("default");
    updateViewerStats();
  }

  function restoreViewerState() {
    if (params.get("viewer") === "1" || !shouldOpenInlineViewerByDefault()) return;
    try {
      const raw = safeStorageGet(STORAGE_KEYS.viewerState);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (!data?.isOpen || data.roomId !== state.roomId || !data.imageId || !data.imageUrl) return;
      openViewerInline(data.imageId, data.imageUrl, { expanded: Boolean(data.inlineViewerExpanded) && !isMobileViewport() });
      if (typeof data.bottomSheetHeightVh === "number") {
        applyBottomSheetHeight(data.bottomSheetHeightVh);
        if (isMobileViewport()) {
          const range = getBottomSheetRange();
          setInlineViewerExpanded(data.bottomSheetHeightVh >= ((range.compact + range.expanded) / 2));
        }
      }
    } catch (error) {
      console.error("viewer 상태 복원 실패:", error);
    }
  }

  async function savePhone() {
    const phone = el.phoneInput.value.trim();
    if (!phone) {
      setPhoneStatus("전화번호를 입력해주세요.", true);
      return;
    }
    el.savePhoneBtn.disabled = true;
    setPhoneStatus("저장 중...");
    try {
      const response = await fetch("/contact", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ roomId: state.roomId, role, phone })
      });
      const result = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(result.error || "전화번호 저장에 실패했습니다.");
      el.phoneInput.value = result.phone || phone;
      setPhoneStatus("전화번호가 저장되었습니다.");
      toggleContactPanel(false);
    } catch (error) {
      setPhoneStatus(error.message || "전화번호 저장에 실패했습니다.", true);
    } finally {
      el.savePhoneBtn.disabled = false;
    }
  }

  async function uploadImage(file) {
    const formData = new FormData();
    formData.append("image", file);
    const response = await fetch("/upload", { method: "POST", body: formData });
    const result = await response.json().catch(() => ({}));
    if (!response.ok) throw new Error(result.error || "이미지 업로드 실패");
    if (!result.url) throw new Error("업로드된 이미지 URL이 없습니다.");

    if (canUseRealtimeRoom()) {
      socket.emit("image", { url: result.url });
      setSummaryStatus("상담 진행 중", "이미지가 전송되었습니다.");
      return;
    }

    if (socket) {
      state.pendingUploads.push({ url: result.url, queuedAt: Date.now() });
      const waitingMessage = isSocketReady()
        ? "이미지는 업로드되었고, 상담방 입장이 끝나면 자동 전송됩니다."
        : "이미지는 업로드되었고, 연결이 복구되면 자동 전송됩니다.";
      setSummaryStatus("연결 복구 대기", waitingMessage);
      alert(waitingMessage);
      return;
    }

    throw new Error("실시간 서버 연결이 없어 이미지를 상담방에 보낼 수 없습니다. 서버와 socket.io 연결 상태를 확인해 주세요.");
  }

  function sendMainMessage() {
    const text = el.msgInput.value.trim();
    if (!text || state.isComposingMain) return;
    if (!canUseRealtimeRoom()) {
      alert(isSocketReady()
        ? "상담방 입장이 아직 완료되지 않았습니다. 잠시 후 다시 시도해 주세요."
        : "실시간 연결이 아직 준비되지 않았습니다. 서버 연결 상태를 확인해 주세요.");
      return;
    }
    applyConversationInsights(text);
    socket.emit("message", { text });
    el.msgInput.value = "";
    setSummaryStatus("상담 진행 중", "요청 내용을 전달했습니다.");
  }

  function sendViewerMessage() {
    const text = el.viewerMsgInput.value.trim();
    if (!text || state.isComposingViewer) return;
    if (!canUseRealtimeRoom()) {
      alert(isSocketReady()
        ? "협업방 입장이 아직 완료되지 않았습니다. 잠시 후 다시 시도해 주세요."
        : "실시간 연결이 아직 준비되지 않았습니다. 서버 연결 상태를 확인해 주세요.");
      return;
    }
    applyConversationInsights(text);
    socket.emit("message", { text });
    el.viewerMsgInput.value = "";
    focusStableScroll();
    setSummaryStatus("상담 진행 중", "이미지 기준 추가 요청을 전달했습니다.");
  }

  function roundRect(ctx2d, x, y, width, height, radius) {
    ctx2d.beginPath();
    ctx2d.moveTo(x + radius, y);
    ctx2d.arcTo(x + width, y, x + width, y + height, radius);
    ctx2d.arcTo(x + width, y + height, x, y + height, radius);
    ctx2d.arcTo(x, y + height, x, y, radius);
    ctx2d.arcTo(x, y, x + width, y, radius);
    ctx2d.closePath();
  }

  function wrapTextLines(text, maxCharsPerLine) {
    const result = [];
    String(text || "").split("\n").forEach((part) => {
      if (!part) {
        result.push("");
        return;
      }
      let current = "";
      for (const ch of part) {
        current += ch;
        if (current.length >= maxCharsPerLine) {
          result.push(current);
          current = "";
        }
      }
      if (current) result.push(current);
    });
    return result.slice(0, 10);
  }

  function buildDownload() {
    if (!state.currentViewerImageUrl) return;
    const stageWidth = el.imageStage.clientWidth || 1200;
    const stageHeight = el.imageStage.clientHeight || 760;
    const fileName = `${sanitizeFileName(userName)}_상담이미지_${formatFileDate()}.png`;
    const img = new Image();

    img.onload = () => {
      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = Math.round(stageWidth * 2);
      exportCanvas.height = Math.round(stageHeight * 2);
      const exportCtx = exportCanvas.getContext("2d");
      exportCtx.fillStyle = "#f7fbff";
      exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
      exportCtx.fillStyle = "#ffffff";
      roundRect(exportCtx, 8, 8, exportCanvas.width - 16, exportCanvas.height - 16, 24);
      exportCtx.fill();

      const stageRect = el.imageStage.getBoundingClientRect();
      const imageRect = el.viewerImage.getBoundingClientRect();
      const relX = Math.max(0, imageRect.left - stageRect.left);
      const relY = Math.max(0, imageRect.top - stageRect.top);
      const relW = imageRect.width;
      const relH = imageRect.height;
      const drawX = (relX / stageRect.width) * exportCanvas.width;
      const drawY = (relY / stageRect.height) * exportCanvas.height;
      const drawW = (relW / stageRect.width) * exportCanvas.width;
      const drawH = (relH / stageRect.height) * exportCanvas.height;

      exportCtx.save();
      roundRect(exportCtx, drawX, drawY, drawW, drawH, 18);
      exportCtx.clip();
      exportCtx.drawImage(img, drawX, drawY, drawW, drawH);
      exportCtx.restore();

      state.currentStrokes.forEach((stroke) => {
        const x1 = stroke.last.x * exportCanvas.width;
        const y1 = stroke.last.y * exportCanvas.height;
        const x2 = stroke.current.x * exportCanvas.width;
        const y2 = stroke.current.y * exportCanvas.height;
        exportCtx.save();
        exportCtx.lineCap = "round";
        exportCtx.lineJoin = "round";
        exportCtx.lineWidth = (stroke.size || 3) * 2;
        if (stroke.mode === "erase") {
          exportCtx.globalCompositeOperation = "destination-out";
          exportCtx.strokeStyle = "rgba(0,0,0,1)";
        } else {
          exportCtx.globalCompositeOperation = "source-over";
          exportCtx.strokeStyle = stroke.color || "#ff3b30";
        }
        exportCtx.beginPath();
        exportCtx.moveTo(x1, y1);
        exportCtx.lineTo(x2, y2);
        exportCtx.stroke();
        exportCtx.restore();
      });

      state.currentNotes.forEach((note) => {
        const x = note.x * exportCanvas.width;
        const y = note.y * exportCanvas.height;
        const width = note.width * exportCanvas.width;
        const height = note.height * exportCanvas.height;
        exportCtx.save();
        exportCtx.fillStyle = note.color || "#fff7c2";
        exportCtx.strokeStyle = note.author === "admin" ? "#8a5cff" : "#2491ff";
        exportCtx.lineWidth = 2.5;
        roundRect(exportCtx, x, y, width, height, 16);
        exportCtx.fill();
        exportCtx.stroke();
        exportCtx.fillStyle = "#17212b";
        exportCtx.font = "bold 24px sans-serif";
        exportCtx.fillText(note.author === "admin" ? "관리자" : "고객", x + 18, y + 30);
        exportCtx.font = "24px sans-serif";
        wrapTextLines(note.text || "", 20).forEach((line, index) => {
          exportCtx.fillText(line, x + 18, y + 64 + index * 30);
        });
        exportCtx.restore();
      });

      exportCtx.fillStyle = "rgba(0,0,0,.55)";
      exportCtx.font = "20px sans-serif";
      exportCtx.fillText(`${userName} · ${new Date().toLocaleString("ko-KR")}`, 20, exportCanvas.height - 20);

      const link = document.createElement("a");
      link.href = exportCanvas.toDataURL("image/png");
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
    };

    img.onerror = () => {
      alert("이미지를 다운로드용으로 불러오지 못했습니다.");
    };
    img.src = state.currentViewerImageUrl;
  }

  function bindUI() {
    el.toggleContactPanelBtn.addEventListener("click", () => toggleContactPanel());
    el.summaryToggleBtn.addEventListener("click", () => toggleSummaryCard());

    el.quickChips.forEach((button) => {
      button.addEventListener("click", () => {
        addRequestType(button.dataset.request, button.dataset.draft || "");
        setSummaryStatus("요청 정리 중", `${button.dataset.request} 요청이 추가되었습니다.`);
        if (isMobileViewport()) toggleSummaryCard(true);
      });
    });

    el.summaryComposeBtn.addEventListener("click", () => {
      fillActiveInput(buildSummaryMessage("summary"));
      setSummaryStatus("최종 확인 대기", "요청 정리 문장을 확인하고 전송해 주세요.");
      if (isMobileViewport()) toggleSummaryCard(true);
    });

    el.summaryQuoteBtn.addEventListener("click", () => {
      fillActiveInput(buildSummaryMessage("quote"));
      toggleContactPanel(true);
      setSummaryStatus("견적 요청 준비", "연락처와 함께 견적 요청을 보내면 전환율이 높아집니다.");
      if (isMobileViewport()) toggleSummaryCard(true);
    });

    el.msgInput.addEventListener("compositionstart", () => { state.isComposingMain = true; });
    el.msgInput.addEventListener("compositionend", () => { state.isComposingMain = false; });
    el.viewerMsgInput.addEventListener("compositionstart", () => { state.isComposingViewer = true; });
    el.viewerMsgInput.addEventListener("compositionend", () => { state.isComposingViewer = false; });

    el.sendBtn.addEventListener("click", sendMainMessage);
    el.viewerSendBtn.addEventListener("click", sendViewerMessage);
    el.msgInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !state.isComposingMain) {
        event.preventDefault();
        sendMainMessage();
      }
    });
    el.viewerMsgInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !state.isComposingViewer) {
        event.preventDefault();
        sendViewerMessage();
      }
    });

    ["focus", "click", "touchstart"].forEach((type) => {
      el.viewerMsgInput.addEventListener(type, focusStableScroll, { passive: true });
      el.noteEditorTextarea.addEventListener(type, focusStableScroll, { passive: true });
    });

    el.savePhoneBtn.addEventListener("click", savePhone);
    el.phoneInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        savePhone();
      }
    });

    el.fileInput.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        await uploadImage(file);
      } catch (error) {
        alert(error.message || "이미지 업로드 중 오류가 발생했습니다.");
      } finally {
        el.fileInput.value = "";
      }
    });

    el.openViewerBtn.addEventListener("click", () => {
      if (!state.lastSelectedImageId || !state.lastSelectedImageUrl) {
        alert("먼저 이미지를 선택해 주세요.");
        return;
      }
      if (shouldOpenInlineViewerByDefault()) {
        openViewerInline(state.lastSelectedImageId, state.lastSelectedImageUrl, { expanded: true });
      } else {
        openViewerPopup(state.lastSelectedImageId, state.lastSelectedImageUrl, { forcePopup: true });
      }
    });

    el.toggleViewerSizeBtn.addEventListener("click", () => {
      if (el.viewerOverlay.classList.contains("inline-sheet")) {
        toggleInlineViewerSize();
        saveViewerState();
        return;
      }
      if (state.currentViewerImageId && state.currentViewerImageUrl) {
        openViewerInline(state.currentViewerImageId, state.currentViewerImageUrl, { expanded: false });
      }
    });

    el.popoutViewerBtn.addEventListener("click", () => {
      return;
    });

    if (el.viewerDragHandleBtn) {
      el.viewerDragHandleBtn.addEventListener("click", () => {
        return;
      });
    }

    if (el.viewerDragHandle) {
      el.viewerDragHandle.addEventListener("pointerdown", () => {});
    }

    el.closeViewerBtn.addEventListener("click", closeViewer);
    el.downloadSketchBtn.addEventListener("click", buildDownload);
    el.penBtn.addEventListener("click", () => setDrawMode("draw"));
    el.eraserBtn.addEventListener("click", () => setDrawMode("erase"));
    el.addTextBtn.addEventListener("click", () => {
      setDrawMode("text");
      addTextNote();
    });
    el.undoBtn.addEventListener("click", undoAction);
    el.redoBtn.addEventListener("click", redoAction);

    el.clearDrawingBtn.addEventListener("click", () => {
      if (!state.currentViewerImageId || !state.currentStrokes.length || !socket) return;
      if (!confirm("현재 이미지의 선을 모두 지울까요?")) return;
      pushHistory();
      state.currentStrokes = [];
      redrawAllStrokes();
      socket.emit("clear-drawing", { imageId: state.currentViewerImageId });
    });

    el.clearNotesBtn.addEventListener("click", () => {
      if (!state.currentViewerImageId || !state.currentNotes.length || !socket) return;
      if (!confirm("현재 이미지의 메모를 모두 지울까요?")) return;
      pushHistory();
      state.currentNotes = [];
      renderNotes();
      socket.emit("clear-notes", { imageId: state.currentViewerImageId });
    });

    el.thicknessRange.addEventListener("input", () => {
      state.currentSize = Number(el.thicknessRange.value || 3);
      updateCursorMode(state.drawMode);
    });

    el.colorSwatches.forEach((button) => {
      button.addEventListener("click", () => {
        if (!button.dataset.color) return;
        setActiveColor(button.dataset.color);
        setDrawMode("draw");
      });
    });

    el.customColorBtn.addEventListener("click", () => el.customColorInput.click());
    el.customColorInput.addEventListener("input", () => {
      setActiveColor(el.customColorInput.value || "#2491ff");
      setDrawMode("draw");
    });

    el.noteColorSwatches.forEach((button) => {
      button.addEventListener("click", () => setActiveNoteColor(button.dataset.noteColor));
    });
    if (el.toggleNoteColorsBtn) {
      el.toggleNoteColorsBtn.addEventListener("click", () => {
        el.noteColorRow.classList.toggle("open");
      });
    }

    el.drawCanvas.addEventListener("pointerdown", startDrawing);
    el.drawCanvas.addEventListener("pointermove", moveDrawing);
    el.drawCanvas.addEventListener("pointerup", endDrawing);
    el.drawCanvas.addEventListener("pointercancel", endDrawing);
    el.drawCanvas.addEventListener("pointerleave", endDrawing);

    window.addEventListener("pointermove", handleNoteInteractionMove);
    window.addEventListener("pointerup", finishNoteInteraction);
    window.addEventListener("pointercancel", finishNoteInteraction);
    window.addEventListener("blur", () => {
      finishNoteInteraction();
      endDrawing();
    });

    el.noteDeleteBtn.addEventListener("click", deleteActiveNote);
    el.noteEditorDoneBtn.addEventListener("click", () => closeNoteEditor(true));
    el.noteEditorOverlay.addEventListener("click", (event) => {
      if (event.target === el.noteEditorOverlay) closeNoteEditor(true);
    });

    el.noteEditorTextarea.addEventListener("input", () => {
      const note = getNoteById(state.activeNoteEditorId);
      if (!note) return;
      const nextText = String(el.noteEditorTextarea.value || "").slice(0, MAX_NOTE_CHARS);
      const size = estimateNoteSize(nextText);
      note.text = nextText;
      note.width = clamp(Math.max(note.width, size.width), 0.12, 0.30);
      note.height = clamp(Math.max(note.height, size.height), 0.09, 0.28);
      note.updatedAt = Date.now();
      el.noteEditorTimestamp.textContent = formatNoteTimestamp(note.updatedAt);
      upsertMarker(note);
      if (state.connectionState !== "connected" || !socket) {
        setSaveState("offline");
        return;
      }
      setSaveState("pending");
      scheduleNoteLiveUpdate(note.id, {
        text: note.text,
        width: note.width,
        height: note.height,
        updatedAt: note.updatedAt
      });
      debounceNoteCommit(note.id, {
        text: note.text,
        width: note.width,
        height: note.height,
        updatedAt: note.updatedAt
      });
    });

    el.viewerImage.addEventListener("load", () => {
      updateCanvasSize();
      if (state.currentViewerImageId) requestViewerHistory(state.currentViewerImageId);
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        finishNoteInteraction();
        endDrawing();
      }
    });

    window.addEventListener("resize", () => {
      setViewportUnit();
      syncBodyMode();
      if (isMobileViewport() && el.viewerOverlay.classList.contains("inline-sheet")) {
        const range = getBottomSheetRange();
        applyBottomSheetHeight(state.inlineViewerExpanded ? range.expanded : range.compact);
      }
      if (isMobileViewport() && !state.summaryCollapsed && window.innerWidth <= 900) {
        updateSummaryUI();
      }
      updateCanvasSize();
    });

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", () => {
        setViewportUnit();
        syncBodyMode();
        focusStableScroll();
      });
      window.visualViewport.addEventListener("scroll", focusStableScroll);
    }

    window.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z" && !event.shiftKey) {
        if (document.activeElement === el.noteEditorTextarea) return;
        event.preventDefault();
        undoAction();
        return;
      }
      if (((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "y") ||
          ((event.ctrlKey || event.metaKey) && event.shiftKey && event.key.toLowerCase() === "z")) {
        if (document.activeElement === el.noteEditorTextarea) return;
        event.preventDefault();
        redoAction();
        return;
      }
      if (event.key === "Escape") {
        if (el.noteEditorOverlay.classList.contains("open")) {
          closeNoteEditor(true);
          return;
        }
        if (el.viewerOverlay.classList.contains("open")) closeViewer();
      }
    });
  }

  function bindSocket() {
    if (!socket) {
      setConnectionState("offline");
      setSummaryStatus("연결 확인 필요", "socket.io 스크립트 또는 실시간 서버 연결을 확인해 주세요.");
      return;
    }

    requestJoinRoom();

    socket.on("connect", () => {
      setConnectionState("connected");
      state.socketJoined = false;
      updateRealtimeControls();
      requestJoinRoom();
      if (state.saveState === "offline") setSaveState("idle");
    });

    socket.on("disconnect", (reason) => {
      state.socketJoined = false;
      updateRealtimeControls();
      setConnectionState("offline");
      setSaveState("offline");
      setSummaryStatus("연결 확인 필요", `실시간 연결이 끊겼습니다: ${reason || "unknown"}`);
    });

    socket.on("joined", (payload = {}) => {
      if (!payload.ok) return;
      state.socketJoined = true;
      updateRealtimeControls();
      flushPendingUploads();
    });

    socket.on("join-error", (payload = {}) => {
      state.socketJoined = false;
      updateRealtimeControls();
      if (payload.error) {
        setSummaryStatus("연결 확인 필요", payload.error);
      }
    });

    socket.on("history", (messages) => {
      el.chatInner.innerHTML = "";
      el.viewerChatInner.innerHTML = "";
      (messages || []).forEach((item) => {
        if (item.type === "text") {
          inferRequestTypesFromText(item.text || "");
          const productName = inferProductNameFromText(item.text || "");
          if (productName && !state.summary.productName) {
            state.summary.productName = productName;
          }
          el.chatInner.appendChild(createTextRow(item));
          if (el.viewerOverlay.classList.contains("open")) el.viewerChatInner.appendChild(createTextRow(item));
        }
        if (item.type === "image") {
          el.chatInner.appendChild(createImageRow(item));
          if (el.viewerOverlay.classList.contains("open")) el.viewerChatInner.appendChild(createImageRow(item));
          state.lastSelectedImageId = item.imageId;
          state.lastSelectedImageUrl = item.imageUrl;
        }
      });
      updateViewerEntryButton();
      updateSummaryUI();
      scrollBottom(el.chatBox);
      scrollBottom(el.viewerChatBox);
    });

    socket.on("message", renderTextMessage);
    socket.on("image", renderImageMessage);

    socket.on("drawing-history", (payload) => {
      if (!payload || payload.imageId !== state.currentViewerImageId) return;
      state.currentStrokes = Array.isArray(payload.strokes) ? payload.strokes.slice(-MAX_CLIENT_STROKES) : [];
      redrawAllStrokes();
    });

    socket.on("draw-stroke", (stroke) => {
      if (!stroke || stroke.imageId !== state.currentViewerImageId) return;
      state.currentStrokes.push(stroke);
      if (state.currentStrokes.length > MAX_CLIENT_STROKES) state.currentStrokes = state.currentStrokes.slice(-MAX_CLIENT_STROKES);
      drawStroke(stroke);
      updateViewerStats();
    });

    socket.on("draw-strokes", (payload) => {
      if (!payload || payload.imageId !== state.currentViewerImageId) return;
      const strokes = Array.isArray(payload.strokes) ? payload.strokes : [];
      strokes.forEach((stroke) => state.currentStrokes.push(stroke));
      if (state.currentStrokes.length > MAX_CLIENT_STROKES) {
        state.currentStrokes = state.currentStrokes.slice(-MAX_CLIENT_STROKES);
        redrawAllStrokes();
      } else {
        strokes.forEach(drawStroke);
      }
      updateViewerStats();
    });

    socket.on("clear-drawing", (payload) => {
      if (!payload || payload.imageId !== state.currentViewerImageId) return;
      state.currentStrokes = [];
      redrawAllStrokes();
    });

    socket.on("note-history", (payload) => {
      if (!payload || payload.imageId !== state.currentViewerImageId) return;
      state.currentNotes = Array.isArray(payload.notes)
        ? payload.notes.map((note, index) => normalizeNote(note, index)).slice(-MAX_CLIENT_NOTES)
        : [];
      renderNotes();
    });

    socket.on("note-added", (payload) => {
      if (!payload || payload.imageId !== state.currentViewerImageId || !payload.note) return;
      if (state.currentNotes.some((note) => note.id === payload.note.id)) return;
      state.currentNotes.push(normalizeNote(payload.note, state.currentNotes.length));
      state.currentNotes = state.currentNotes.slice(-MAX_CLIENT_NOTES);
      renderNotes();
      setSaveState("saved");
    });

    socket.on("note-live-update", (payload) => {
      if (!payload || payload.imageId !== state.currentViewerImageId || !payload.noteId) return;
      const note = getNoteById(payload.noteId);
      if (!note) return;
      Object.assign(note, payload.patch || {});
      upsertMarker(note);
      if (state.activeNoteEditorId === note.id && note.updatedAt) {
        el.noteEditorTimestamp.textContent = formatNoteTimestamp(note.updatedAt);
      }
    });

    socket.on("note-updated", (payload) => {
      if (!payload || payload.imageId !== state.currentViewerImageId || !payload.noteId) return;
      const note = getNoteById(payload.noteId);
      if (!note) return;
      Object.assign(note, payload.patch || {});
      note.text = String(note.text || "").slice(0, MAX_NOTE_CHARS);
      note.updatedAt = note.updatedAt || Date.now();
      upsertMarker(note);
      if (state.activeNoteEditorId === note.id) {
        el.noteEditorTimestamp.textContent = formatNoteTimestamp(note.updatedAt);
      }
      setSaveState("saved");
      updateViewerStats();
    });

    socket.on("note-deleted", (payload) => {
      if (!payload || payload.imageId !== state.currentViewerImageId || !payload.noteId) return;
      clearNoteTimers(payload.noteId);
      state.currentNotes = state.currentNotes.filter((note) => note.id !== payload.noteId);
      if (state.activeMarkerId === payload.noteId) state.activeMarkerId = "";
      if (state.activeNoteEditorId === payload.noteId) closeNoteEditor(false);
      renderNotes();
    });

    socket.on("clear-notes", (payload) => {
      if (!payload || payload.imageId !== state.currentViewerImageId) return;
      state.currentNotes = [];
      state.activeMarkerId = "";
      if (state.activeNoteEditorId) closeNoteEditor(false);
      renderNotes();
      setSaveState("saved");
    });
  }

  function init() {
    setViewportUnit();
    syncBodyMode();
    state.summaryCollapsed = isMobileViewport();
    bindUI();
    bindSocket();
    setDrawMode("draw");
    setActiveColor(state.currentColor);
    setActiveNoteColor(state.currentNoteColor);
    updateHistoryButtons();
    updateViewerEntryButton();
    updateSummaryUI();
    toggleContactPanel(false);
    setSaveState(socket ? "idle" : "offline");

    if (isViewerMode) {
      el.app.style.display = "none";
      el.viewerOverlay.classList.add("open");
      el.viewerOverlay.setAttribute("aria-hidden", "false");
      state.currentViewerImageId = initialImageId;
      state.currentViewerImageUrl = initialImageUrl;
      state.lastSelectedImageId = initialImageId;
      state.lastSelectedImageUrl = initialImageUrl;
      if (initialImageUrl) el.viewerImage.src = initialImageUrl;
      lockViewerBackground();
      updateViewerStats();
      if (socket && initialImageId) requestViewerHistory(initialImageId);
      return;
    }

    if (!isEmbeddedMode) {
      restoreViewerState();
    } else {
      clearViewerState();
    }
  }

  init();
})();
</script>
</body>
</html>
