<!-- Chat Launcher -->
<button
  id="chat-launcher"
  type="button"
  data-ez="contents-chat-launcher"
  aria-label="디자인 상담 열기"
  aria-haspopup="dialog"
  aria-expanded="false"
  aria-controls="chat-modal"
>
  <span class="chat-launcher-icon" aria-hidden="true">💬</span>
  <span class="chat-launcher-text">상담</span>
</button>

<!-- Chat Modal -->
<div
  id="chat-modal"
  class="chat-hidden"
  data-ez="contents-chat-modal"
  aria-hidden="true"
>
  <div class="chat-overlay" aria-hidden="true"></div>

  <section
    class="chat-container"
    role="dialog"
    aria-modal="true"
    aria-labelledby="chat-modal-title"
    aria-describedby="chat-room-label"
  >
    <div class="chat-header">
      <div class="chat-title-wrap">
        <h2 class="chat-title" id="chat-modal-title">디자인 상담</h2>
        <p class="chat-subtitle" id="chat-room-label">상담 연결 준비 중</p>
      </div>

      <div class="chat-header-actions" aria-label="상담 창 제어">
        <button type="button" id="copy-room-btn" class="chat-header-btn" aria-label="상담 코드 복사">
          ⧉
        </button>
        <button type="button" id="open-chat-window-btn" class="chat-header-btn" aria-label="새 창으로 열기">
          ⤢
        </button>
        <button type="button" id="close-chat-btn" class="chat-header-btn" aria-label="닫기">
          ✕
        </button>
      </div>
    </div>

    <iframe
      id="chat-frame"
      src=""
      title="디자인 상담 채팅"
      loading="lazy"
      allow="clipboard-write; fullscreen"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
  </section>
</div>

<div data-ez-module="user-defined/1" data-ez-name="USER DEFINED" data-ez-type="plain" data-ez="module-chat-style-script">
<style>
:root {
  --chat-primary: #2491ff;
  --chat-primary-strong: #1677ff;
  --chat-primary-soft: #68beff;
  --chat-text: #17212b;
  --chat-text-muted: #6c7a89;
  --chat-surface: #ffffff;
  --chat-surface-subtle: #f8fbff;
  --chat-line: #e7edf5;
  --chat-btn-bg: #edf3f8;
  --chat-btn-text: #506274;
  --chat-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
  --chat-shadow-launcher: 0 16px 34px rgba(36, 145, 255, 0.28);
  --chat-radius-xl: 28px;
  --chat-radius-lg: 24px;
  --chat-radius-md: 18px;
  --chat-focus: 0 0 0 3px rgba(36, 145, 255, 0.22);
  --chat-z-launcher: 9999;
  --chat-z-modal: 99999;
}

#chat-launcher {
  position: fixed;
  right: max(20px, env(safe-area-inset-right));
  bottom: max(24px, env(safe-area-inset-bottom));
  width: 76px;
  height: 76px;
  background: linear-gradient(135deg, var(--chat-primary-soft), var(--chat-primary));
  color: #fff;
  border: none;
  border-radius: var(--chat-radius-lg);
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  z-index: var(--chat-z-launcher);
  box-shadow: var(--chat-shadow-launcher);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition:
    transform 0.18s ease,
    box-shadow 0.18s ease,
    filter 0.18s ease;
}

#chat-launcher:hover {
  transform: translateY(-2px);
  filter: saturate(1.04);
}

#chat-launcher:active {
  transform: translateY(0);
}

#chat-launcher:focus-visible,
.chat-header-btn:focus-visible {
  outline: none;
  box-shadow: var(--chat-focus);
}

.chat-launcher-icon {
  font-size: 24px;
  line-height: 1;
  pointer-events: none;
}

.chat-launcher-text {
  font-size: 12px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.02em;
  pointer-events: none;
}

.chat-hidden {
  display: none !important;
}

#chat-modal {
  position: fixed;
  inset: 0;
  z-index: var(--chat-z-modal);
}

.chat-overlay {
  position: absolute;
  inset: 0;
  background: rgba(15, 23, 42, 0.42);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.chat-container {
  position: absolute;
  right: max(24px, env(safe-area-inset-right));
  bottom: max(24px, env(safe-area-inset-bottom));
  width: min(1120px, calc(100vw - 48px));
  height: min(860px, calc(100dvh - 48px));
  background: var(--chat-surface);
  border-radius: var(--chat-radius-xl);
  overflow: clip;
  display: flex;
  flex-direction: column;
  box-shadow: var(--chat-shadow);
  border: 1px solid var(--chat-line);
}

.chat-header {
  min-height: 68px;
  flex-shrink: 0;
  background: var(--chat-surface-subtle);
  border-bottom: 1px solid var(--chat-line);
  color: var(--chat-text);
  padding: 0 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.chat-title-wrap {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.chat-title {
  margin: 0;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.chat-subtitle {
  margin: 0;
  font-size: 12px;
  color: var(--chat-text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chat-header-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.chat-header-btn {
  width: 40px;
  height: 40px;
  border: 1px solid transparent;
  border-radius: 999px;
  background: var(--chat-btn-bg);
  color: var(--chat-btn-text);
  font-size: 16px;
  cursor: pointer;
  transition:
    background 0.18s ease,
    transform 0.18s ease,
    border-color 0.18s ease;
}

.chat-header-btn:hover {
  background: #e4edf6;
}

.chat-header-btn:active {
  transform: scale(0.97);
}

.chat-container iframe {
  flex: 1;
  width: 100%;
  border: none;
  background: #fff;
  display: block;
}

body.chat-lock {
  overflow: hidden;
  touch-action: none;
}

@media (max-width: 768px) {
  #chat-launcher {
    right: max(16px, env(safe-area-inset-right));
    bottom: max(16px, env(safe-area-inset-bottom));
    width: 68px;
    height: 68px;
    border-radius: 22px;
  }

  .chat-launcher-icon {
    font-size: 22px;
  }

  .chat-launcher-text {
    font-size: 11px;
  }

  .chat-container {
    right: 0;
    bottom: 0;
    width: 100%;
    height: 100dvh;
    border-radius: 0;
    border-left: none;
    border-right: none;
    border-bottom: none;
  }

  .chat-header {
    padding: 0 14px;
    padding-top: max(0px, env(safe-area-inset-top));
  }

  .chat-title {
    font-size: 17px;
  }

  .chat-subtitle {
    font-size: 11px;
  }
}

@media (prefers-reduced-motion: reduce) {
  #chat-launcher,
  .chat-header-btn,
  .chat-overlay {
    transition: none !important;
  }
}
</style>

<script>
(function () {
  if (window.__designChatWidgetInitialized) return;
  window.__designChatWidgetInitialized = true;

  const RENDER_ORIGIN = "https://chat-server-ilcq.onrender.com";
  const ROOM_KEY = "design_chat_room_id";
  const NAME_KEY = "design_chat_user_name";
  const MODAL_KEY = "design_chat_open_state";

  const launcher = document.getElementById("chat-launcher");
  const modal = document.getElementById("chat-modal");
  const overlay = modal ? modal.querySelector(".chat-overlay") : null;
  const container = modal ? modal.querySelector(".chat-container") : null;
  const closeBtn = document.getElementById("close-chat-btn");
  const copyRoomBtn = document.getElementById("copy-room-btn");
  const openWindowBtn = document.getElementById("open-chat-window-btn");
  const frame = document.getElementById("chat-frame");
  const roomLabel = document.getElementById("chat-room-label");

  if (!launcher || !modal || !overlay || !container || !closeBtn || !copyRoomBtn || !openWindowBtn || !frame || !roomLabel) {
    console.warn("[design-chat] 필수 요소를 찾지 못해 위젯 초기화를 중단했습니다.");
    return;
  }

  let lastFocusedElement = null;
  let roomLabelTimer = null;

  const focusableSelector = [
    'button:not([disabled])',
    '[href]',
    'input:not([disabled]):not([type="hidden"])',
    'select:not([disabled])',
    'textarea:not([disabled])',
    '[tabindex]:not([tabindex="-1"])',
    'iframe'
  ].join(',');

  function safeStorage(type) {
    try {
      const storage = window[type];
      const testKey = "__design_chat_test__";
      storage.setItem(testKey, "1");
      storage.removeItem(testKey);
      return storage;
    } catch (error) {
      return null;
    }
  }

  const local = safeStorage("localStorage");
  const session = safeStorage("sessionStorage");

  function getStored(storage, key) {
    try {
      return storage ? storage.getItem(key) : null;
    } catch (error) {
      return null;
    }
  }

  function setStored(storage, key, value) {
    try {
      if (storage) storage.setItem(key, value);
    } catch (error) {
      /* noop */
    }
  }

  function makeRoomId() {
    if (window.crypto && typeof window.crypto.randomUUID === "function") {
      return window.crypto.randomUUID();
    }
    return "room-" + Date.now() + "-" + Math.random().toString(16).slice(2);
  }

  function getRoomId() {
    let roomId = getStored(local, ROOM_KEY);
    if (!roomId) {
      roomId = makeRoomId();
      setStored(local, ROOM_KEY, roomId);
    }
    return roomId;
  }

  function getUserName() {
    let userName = getStored(local, NAME_KEY);
    if (!userName) {
      userName = "고객";
      setStored(local, NAME_KEY, userName);
    }
    return userName;
  }

  function buildChatUrl() {
    const roomId = getRoomId();
    const userName = getUserName();
    const url = new URL(RENDER_ORIGIN);
    url.searchParams.set("room", roomId);
    url.searchParams.set("userName", userName);
    return url.toString();
  }

  function setLauncherExpanded(isOpen) {
    launcher.setAttribute("aria-expanded", String(isOpen));
  }

  function updateRoomLabel(message) {
    if (roomLabelTimer) {
      clearTimeout(roomLabelTimer);
      roomLabelTimer = null;
    }

    if (message) {
      roomLabel.textContent = message;
      roomLabelTimer = window.setTimeout(function () {
        updateRoomLabel();
      }, 1800);
      return;
    }

    const roomId = getRoomId();
    roomLabel.textContent = "상담 코드: " + roomId.slice(0, 8);
  }

  function ensureFrameLoaded() {
    const nextSrc = buildChatUrl();
    if (frame.getAttribute("src") !== nextSrc) {
      frame.setAttribute("src", nextSrc);
    }
  }

  function getFocusableElements() {
    return Array.prototype.slice
      .call(container.querySelectorAll(focusableSelector))
      .filter(function (el) {
        return !el.hasAttribute("disabled") && el.getAttribute("aria-hidden") !== "true";
      });
  }

  function focusFirstElement() {
    const focusables = getFocusableElements();
    if (focusables.length) {
      focusables[0].focus();
      return;
    }
    closeBtn.focus();
  }

  function trapFocus(event) {
    if (event.key !== "Tab") return;

    const focusables = getFocusableElements();
    if (!focusables.length) {
      event.preventDefault();
      return;
    }

    const first = focusables[0];
    const last = focusables[focusables.length - 1];
    const active = document.activeElement;

    if (event.shiftKey && active === first) {
      event.preventDefault();
      last.focus();
      return;
    }

    if (!event.shiftKey && active === last) {
      event.preventDefault();
      first.focus();
    }
  }

  function onDocumentKeydown(event) {
    const isOpen = modal.getAttribute("aria-hidden") === "false";
    if (!isOpen) return;

    if (event.key === "Escape") {
      event.preventDefault();
      closeChat();
      return;
    }

    trapFocus(event);
  }

  function openChat() {
    lastFocusedElement = document.activeElement;
    ensureFrameLoaded();
    updateRoomLabel();

    modal.classList.remove("chat-hidden");
    modal.setAttribute("aria-hidden", "false");
    document.body.classList.add("chat-lock");
    setLauncherExpanded(true);
    setStored(session, MODAL_KEY, "open");

    requestAnimationFrame(function () {
      focusFirstElement();
    });
  }

  function closeChat() {
    modal.classList.add("chat-hidden");
    modal.setAttribute("aria-hidden", "true");
    document.body.classList.remove("chat-lock");
    setLauncherExpanded(false);
    setStored(session, MODAL_KEY, "closed");

    if (lastFocusedElement && typeof lastFocusedElement.focus === "function") {
      lastFocusedElement.focus();
    } else {
      launcher.focus();
    }
  }

  async function copyRoomCode() {
    const roomId = getRoomId();

    try {
      if (!navigator.clipboard || typeof navigator.clipboard.writeText !== "function") {
        throw new Error("Clipboard API not supported");
      }
      await navigator.clipboard.writeText(roomId);
      updateRoomLabel("상담 코드가 복사되었습니다");
    } catch (error) {
      updateRoomLabel("복사에 실패했습니다");
    }
  }

  function openChatWindow() {
    const url = buildChatUrl();
    const popup = window.open(
      url,
      "designChatUser",
      "width=1320,height=860,resizable=yes,scrollbars=yes"
    );

    if (!popup) {
      updateRoomLabel("팝업이 차단되었습니다");
    }
  }

  launcher.addEventListener("click", openChat);
  closeBtn.addEventListener("click", closeChat);
  overlay.addEventListener("click", closeChat);
  copyRoomBtn.addEventListener("click", copyRoomCode);
  openWindowBtn.addEventListener("click", openChatWindow);
  document.addEventListener("keydown", onDocumentKeydown);

  if (getStored(session, MODAL_KEY) === "open") {
    openChat();
  } else {
    updateRoomLabel();
  }

  window.openChat = openChat;
  window.closeChat = closeChat;
})();
</script>
</div>
