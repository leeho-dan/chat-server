<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>디자인 상담</title>
<style>
:root{
  --vh:1vh;
  --viewer-sheet-height:58dvh;
  --bg:#f4f8fc;
  --bg-soft:#f8fbff;
  --card:#ffffff;
  --line:#e3ebf3;
  --line-strong:#d6e0ea;
  --text:#17212b;
  --text-soft:#24313f;
  --sub:#728292;
  --primary:#2491ff;
  --primary-soft:#79c7ff;
  --danger:#ff5b5b;
  --danger-soft:#fff1f1;
  --success:#2f9e44;
  --success-soft:#ebf9ee;
  --warning:#9a6500;
  --warning-soft:#fff7ea;
  --purple:#8a5cff;
  --shadow:0 18px 50px rgba(18,36,61,.10);
  --radius-xl:30px;
  --radius-lg:22px;
  --radius-md:18px;
  --safe-bottom:max(env(safe-area-inset-bottom), 0px);
}

*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background:
    radial-gradient(circle at top left, rgba(36,145,255,.08), transparent 24%),
    linear-gradient(180deg, #f9fbff 0%, #edf4fa 100%);
  color:var(--text);
}
body{
  overflow:hidden;
  -webkit-text-size-adjust:100%;
  overscroll-behavior:none;
}
body.viewer-inline-open{
  overflow:hidden;
}
body.popup-viewer-mode{
  background:#f5f8fc;
}
button,input,textarea,label{font:inherit}
button{border:none;cursor:pointer}
button:disabled{opacity:.5;cursor:not-allowed}
input,textarea{border:none;outline:none}
button:focus-visible,
input:focus-visible,
textarea:focus-visible,
label:focus-visible{
  outline:none;
  box-shadow:0 0 0 3px rgba(36,145,255,.14);
}
.btnIcon{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:1em;
  height:1em;
  line-height:1;
  flex-shrink:0;
  transform:translateY(-.02em);
}
.btnText{display:inline}

#app{
  width:100%;
  height:100%;
  padding:0;
  display:flex;
  align-items:stretch;
  justify-content:center;
}

#chatCard{
  width:min(960px,100%);
  height:calc(var(--vh) * 100);
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.82);
  border-radius:var(--radius-xl);
  box-shadow:var(--shadow);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

#header{
  height:76px;
  flex-shrink:0;
  border-bottom:1px solid var(--line);
  background:rgba(255,255,255,.96);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
#title{
  font-size:26px;
  font-weight:800;
  letter-spacing:-.03em;
}
#roleBadge{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  height:34px;
  padding:0 12px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#f7faff;
  display:flex;
  align-items:center;
  color:var(--sub);
  font-size:12px;
  font-weight:800;
}
#headerActions{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  gap:8px;
}
.iconBtn{
  width:42px;
  height:42px;
  border-radius:50%;
  background:#eef4fa;
  color:#556f84;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

#quickRequestBar{
  flex-shrink:0;
  padding:12px 14px 10px;
  background:rgba(255,255,255,.96);
  border-bottom:1px solid var(--line);
  display:flex;
  flex-direction:column;
  gap:10px;
}
#quickRequestHeader{
  display:flex;
  flex-direction:column;
  gap:3px;
}
#quickRequestTitle{
  font-size:14px;
  font-weight:800;
  color:var(--text-soft);
}
#quickRequestDesc{
  font-size:11px;
  color:var(--sub);
  line-height:1.45;
}
#quickRequestButtons{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.quickChip{
  height:34px;
  padding:0 12px;
  border-radius:999px;
  background:#edf4fa;
  color:#425466;
  font-size:12px;
  font-weight:800;
}
.quickChip.active{
  background:linear-gradient(135deg, var(--primary-soft), var(--primary));
  color:#fff;
}

#summaryCard{
  flex-shrink:0;
  margin:0 14px 12px;
  padding:12px;
  border:1px solid var(--line);
  border-radius:18px;
  background:linear-gradient(180deg, #fbfdff, #f5f9fd);
  display:flex;
  flex-direction:column;
  gap:10px;
}
#summaryCard.collapsed{
  gap:8px;
}
#summaryHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
#summaryHeaderLeft{
  min-width:0;
  display:flex;
  align-items:center;
  gap:8px;
}
#summaryTitle{
  font-size:13px;
  font-weight:800;
  color:var(--text-soft);
}
#summaryStatus{
  height:24px;
  padding:0 8px;
  border-radius:999px;
  background:#eef4fa;
  color:#5e7286;
  display:flex;
  align-items:center;
  font-size:11px;
  font-weight:800;
}
#summaryToggleBtn{
  width:30px;
  min-width:30px;
  height:30px;
  border-radius:999px;
  background:#edf4fa;
  color:#4f6579;
  font-size:13px;
  font-weight:900;
}
#summaryToggleBtn::before{content:"⌃";}
#summaryCard.collapsed #summaryToggleBtn::before{content:"⌄";}
#summaryPreview{
  display:none;
  padding:10px 12px;
  border-radius:14px;
  background:#fff;
  border:1px solid #e9eff5;
  font-size:12px;
  font-weight:700;
  color:var(--text-soft);
  line-height:1.5;
}
#summaryCard.collapsed #summaryPreview{display:block}
#summaryCard.collapsed #summaryRows,
#summaryCard.collapsed #summaryActions{display:none}
#summaryRows{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}
.summaryItem{
  min-width:0;
  padding:10px;
  border-radius:14px;
  background:#fff;
  border:1px solid #e9eff5;
  display:flex;
  flex-direction:column;
  gap:4px;
}
.summaryLabel{
  font-size:10px;
  font-weight:800;
  color:#91a0af;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.summaryValue{
  min-height:18px;
  font-size:13px;
  font-weight:700;
  line-height:1.45;
  color:var(--text);
  word-break:break-word;
}
#summaryActions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.summaryActionBtn{
  height:36px;
  padding:0 12px;
  border-radius:12px;
  background:#edf4fa;
  color:#425466;
  font-size:12px;
  font-weight:800;
}
.summaryActionBtn.primary{
  background:linear-gradient(135deg, var(--primary-soft), var(--primary));
  color:#fff;
}
.summaryActionBtn:disabled{opacity:.45}

#chatBox{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding:0 16px 12px;
  background:var(--bg-soft);
}
#chatInner{
  display:flex;
  flex-direction:column;
  gap:14px;
  min-height:100%;
}
.messageRow{display:flex;flex-direction:column;gap:5px}
.messageRow.me{align-items:flex-end}
.messageRow.other{align-items:flex-start}
.bubble{
  max-width:min(76%,560px);
  padding:12px 16px;
  border-radius:22px;
  font-size:15px;
  line-height:1.52;
  letter-spacing:-.02em;
  word-break:break-word;
}
.messageRow.me .bubble{
  background:linear-gradient(135deg, var(--primary-soft), var(--primary));
  color:#fff;
  border-bottom-right-radius:8px;
  box-shadow:0 8px 20px rgba(36,145,255,.16);
}
.messageRow.other .bubble{
  background:#fff;
  border:1px solid var(--line);
  color:var(--text);
  border-bottom-left-radius:8px;
}
.meta{font-size:10px;color:#95a3b1;padding:0 8px}
.imageBubble{
  max-width:min(72%,520px);
  background:#fff;
  border:1px solid var(--line);
  border-radius:22px;
  padding:8px;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(18,36,61,.04);
}
.messageRow.me .imageBubble{border-bottom-right-radius:8px}
.messageRow.other .imageBubble{border-bottom-left-radius:8px}
.chatImg{display:block;width:100%;max-width:240px;border-radius:14px}
.imageHint{
  margin-top:8px;
  padding:8px 10px;
  border-radius:12px;
  background:#f6fbff;
  color:#557086;
  font-size:10px;
  font-weight:800;
}

#inputArea{
  flex-shrink:0;
  border-top:1px solid var(--line);
  background:rgba(255,255,255,.97);
  padding:10px 14px calc(12px + var(--safe-bottom));
  display:flex;
  flex-direction:column;
  gap:8px;
}
#contactToggleBar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 12px;
  border:1px solid var(--line);
  border-radius:16px;
  background:#fbfdff;
}
#contactToggleText{display:flex;flex-direction:column;gap:2px;min-width:0}
#contactToggleTitle{font-size:13px;font-weight:800;color:var(--text-soft)}
#contactToggleDesc{font-size:10px;color:var(--sub)}
#toggleContactPanelBtn{
  height:34px;
  padding:0 12px;
  border-radius:999px;
  background:#edf4fa;
  color:#425466;
  font-size:12px;
  font-weight:800;
}
#utilityRow{display:none}
#utilityRow.open{display:block}
#phonePanel{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:12px;
  border:1px solid #dce7f1;
  border-radius:18px;
  background:linear-gradient(180deg, #f8fbff, #f3f8fd);
}
#phonePanelHeader{display:flex;align-items:flex-start;gap:10px}
#phonePanelIcon{
  width:34px;height:34px;border-radius:12px;background:#e8f2ff;color:#3d88ea;
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
#phonePanelTitle{font-size:13px;font-weight:800;color:var(--text-soft)}
#phonePanelDesc{font-size:12px;color:#708092;line-height:1.45}
#phoneRow{display:flex;gap:8px}
#phoneStatus{display:none;font-size:12px;color:#5f7286;padding:0 2px}
#phoneStatus.show{display:block}
#phoneInput,#msgInput,#viewerMsgInput,#noteEditorTextarea{border:1px solid var(--line-strong);background:#f8fbff}
#phoneInput{flex:1;height:42px;border-radius:16px;padding:0 14px;font-size:16px}
#savePhoneBtn{height:42px;min-width:64px;padding:0 16px;border-radius:16px;background:#607082;color:#fff;font-weight:800}
#messageRow{display:flex;align-items:center;gap:8px}
#msgInput{flex:1;height:48px;border-radius:18px;padding:0 16px;font-size:16px}
#sendBtn{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg, var(--primary-soft), var(--primary));color:#fff;font-size:20px;font-weight:800}
#fileInput{display:none}
#fileLabel{width:48px;height:48px;border-radius:50%;background:#f2f6fa;color:#7b8d9f;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;border:1px solid #e5edf4}
#fileLabel.disabled{opacity:.45;cursor:not-allowed;pointer-events:none}

#viewerOverlay{position:fixed;inset:0;z-index:120;display:none;flex-direction:column;width:100vw;height:calc(var(--vh) * 100);background:rgba(245,248,252,.985);overscroll-behavior:none}
#viewerOverlay.open{display:flex}
#viewerTopbar{height:74px;flex-shrink:0;border-bottom:1px solid var(--line);background:rgba(255,255,255,.96);display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 14px}
#viewerTopLeft{min-width:0;display:flex;flex-direction:column;gap:4px}
#viewerTitle{font-size:18px;font-weight:800}
#viewerSubtitle{font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#viewerStats{display:flex;gap:8px;flex-wrap:wrap}
.statBadge{height:30px;padding:0 10px;border-radius:999px;display:flex;align-items:center;background:#eef4fa;color:#587085;font-size:12px;font-weight:700}
.state-connected{background:var(--success-soft);color:#2f7b42}
.state-pending{background:var(--warning-soft);color:var(--warning)}
.state-saved{background:var(--success-soft);color:#2f7b42}
.state-offline{background:#fff3f3;color:#c74242}
#viewerActions{display:flex;gap:8px;flex-shrink:0}
.viewerBtn{height:38px;padding:0 14px;border-radius:12px;background:#edf4fa;color:#425466;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:800}
#viewerMain{flex:1;min-height:0;display:grid;grid-template-columns:7fr 3fr}
#viewerLeft{min-width:0;display:flex;flex-direction:column;border-right:1px solid var(--line);background:#f8fbff}
#canvasWrap{flex:1;min-height:0;padding:14px;display:flex;align-items:center;justify-content:center}
#imageStage{position:relative;width:min(100%,1200px);height:min(100%,760px);min-height:420px;border-radius:22px;background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(247,251,255,.96));border:1px solid #dfe9f3;box-shadow:0 18px 38px rgba(18,36,61,.08);overflow:hidden}
#viewerImage{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);max-width:84%;max-height:84%;border-radius:18px;box-shadow:0 14px 32px rgba(18,36,61,.12);pointer-events:none;user-select:none;-webkit-user-drag:none;z-index:1}
#drawCanvas{position:absolute;inset:0;width:100%;height:100%;border-radius:22px;touch-action:none;z-index:2}
#textLayer{position:absolute;inset:0;z-index:3;pointer-events:none}
.noteMarker{position:absolute;min-width:56px;height:42px;padding:0 12px;border-radius:14px;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.74);backdrop-filter:blur(8px);border:1px solid rgba(36,145,255,.18);box-shadow:0 10px 18px rgba(18,36,61,.08);transform:translate(-50%,-50%);pointer-events:auto;user-select:none}
.noteMarker[data-author="admin"]{border-color:rgba(138,92,255,.22)}
.noteMarker.selected{border-color:rgba(255,139,61,.55);box-shadow:0 0 0 3px rgba(255,139,61,.14), 0 10px 18px rgba(18,36,61,.10)}
.noteMarkerText{max-width:132px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;font-weight:800;color:var(--text)}
.noteResize{position:absolute;right:-5px;bottom:-5px;width:14px;height:14px;border-radius:5px;background:#2491ff;box-shadow:0 4px 10px rgba(36,145,255,.18)}
.noteMarker[data-author="admin"] .noteResize{background:var(--purple)}

#toolbar{flex-shrink:0;border-top:1px solid var(--line);background:#fff;padding:14px 12px 16px;display:flex;flex-direction:column;gap:14px}
.toolSection{display:flex;flex-direction:column;gap:10px}
.toolSectionLabel{font-size:11px;font-weight:800;color:#8e9baa;text-transform:uppercase;letter-spacing:.04em}
.toolRow{display:flex;align-items:center;justify-content:space-between;gap:10px}
#drawControlSide{display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-wrap:wrap}
.toolGroup{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.toolGroup.fill{flex:1}
.toolBtn{height:38px;padding:0 12px;border-radius:12px;background:#edf4fa;color:#425466;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-weight:800;white-space:nowrap}
.toolBtn.active{background:linear-gradient(135deg, var(--primary-soft), var(--primary));color:#fff}
.toolBtn.danger{background:var(--danger-soft);color:#c74242}
#thicknessWrap{display:flex;align-items:center;gap:8px;color:var(--sub);font-size:12px;font-weight:700}
#thicknessRange{width:120px}
#colorRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:6px 8px;border:1px solid #dce7f1;border-radius:999px;background:#f8fbff;box-shadow:0 10px 24px rgba(18,36,61,.08)}
.colorSwatch,.noteColorSwatch{border-radius:50%;box-shadow:0 0 0 1px rgba(0,0,0,.10)}
.colorSwatch{width:24px;height:24px}
.noteColorSwatch{width:22px;height:22px}
.colorSwatch.active{box-shadow:0 0 0 3px rgba(36,145,255,.20)}
.noteColorSwatch.active{box-shadow:0 0 0 3px rgba(36,145,255,.18)}
#customColorBtn{position:relative;overflow:hidden;background:linear-gradient(135deg, rgba(255,255,255,.98), rgba(235,241,247,.98)), conic-gradient(from 180deg, #ff3b30, #2491ff, #22c55e, #facc15, #111827, #ffffff, #ff3b30)}
#customColorBtn::before{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--custom-color-preview, linear-gradient(135deg, #ffffff, #dde8f3))}
#customColorBtn::after{content:"";position:absolute;inset:7px;border-radius:50%;border:1.5px dashed rgba(79,101,121,.55)}
#customColorInput{position:absolute;pointer-events:none;opacity:0}

#viewerRight{min-width:0;display:flex;flex-direction:column;background:#fff}
#viewerChatHeader{height:52px;flex-shrink:0;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800}
#viewerChatBox{flex:1;min-height:0;overflow-y:auto;padding:12px;background:#fbfdff;-webkit-overflow-scrolling:touch}
#viewerChatInner{display:flex;flex-direction:column;gap:10px}
#viewerInputBar{flex-shrink:0;border-top:1px solid var(--line);padding:10px 12px calc(12px + var(--safe-bottom));background:#fff;display:flex;gap:8px}
#viewerMsgInput{flex:1;height:44px;border-radius:16px;padding:0 14px;font-size:16px}
#viewerSendBtn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg, var(--primary-soft), var(--primary));color:#fff;font-size:18px;font-weight:800}

body.popup-viewer-mode #viewerTopbar{height:64px;padding:0 12px}
body.popup-viewer-mode #viewerTitle{font-size:16px}
body.popup-viewer-mode #viewerSubtitle{font-size:11px}
body.popup-viewer-mode #viewerMain{grid-template-columns:minmax(0,1fr) 320px}
body.popup-viewer-mode #canvasWrap{padding:10px}
body.popup-viewer-mode #imageStage{width:100%;height:100%;min-height:0}
body.popup-viewer-mode #toolbar{padding:10px 10px 12px;gap:10px}
body.popup-viewer-mode .toolSection{gap:8px}
body.popup-viewer-mode .toolSectionLabel{font-size:10px}
body.popup-viewer-mode .toolBtn,body.popup-viewer-mode .viewerBtn{min-width:40px;height:36px;padding:0 10px}
body.popup-viewer-mode .toolBtn .btnText,body.popup-viewer-mode .viewerBtn .btnText{display:none}
body.popup-viewer-mode .toolBtn .btnIcon,body.popup-viewer-mode .viewerBtn .btnIcon{display:inline-flex}
body.popup-viewer-mode #drawControlSide{justify-content:space-between}
body.popup-viewer-mode #thicknessRange{width:96px}
body.popup-viewer-mode #colorRow{padding:5px 7px;gap:6px}
body.popup-viewer-mode .colorSwatch{width:22px;height:22px}
body.popup-viewer-mode #viewerChatHeader{height:44px;font-size:14px}
body.popup-viewer-mode #viewerChatBox{padding:10px}
body.popup-viewer-mode #viewerInputBar{padding:8px 10px 10px}
body.popup-viewer-mode #viewerMsgInput{height:40px;font-size:14px}
body.popup-viewer-mode #viewerSendBtn{width:40px;height:40px}

.imageBubble{transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease}
.imageBubble:hover{transform:translateY(-2px);border-color:#cfe0f1;box-shadow:0 12px 24px rgba(18,36,61,.08)}
#summaryCard{position:relative}
#summaryCard::after{content:"";position:absolute;inset:0;border-radius:18px;pointer-events:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.7)}

#viewerOverlay.inline-sheet{inset:0;width:100vw;height:calc(var(--vh) * 100);border-radius:0;overflow:hidden;background:rgba(245,248,252,.985);border:none;box-shadow:none}
#viewerOverlay.inline-sheet.compact,#viewerOverlay.inline-sheet.expanded{height:calc(var(--vh) * 100)}
#viewerOverlay.inline-sheet #viewerTopbar{height:74px;padding:0 14px}
#viewerOverlay.inline-sheet #viewerTitle{font-size:18px}
#viewerOverlay.inline-sheet #viewerSubtitle{font-size:12px}
#viewerOverlay.inline-sheet #viewerMain{grid-template-columns:7fr 3fr}
#viewerOverlay.inline-sheet #canvasWrap{padding:14px}
#viewerOverlay.inline-sheet #imageStage{width:min(100%, 1200px);height:min(100%, 760px);min-height:420px}
#viewerOverlay.inline-sheet #viewerChatHeader{height:52px;font-size:16px;display:flex}
#viewerOverlay.inline-sheet #viewerChatBox{padding:12px}
#viewerOverlay.inline-sheet #viewerInputBar{padding:10px 12px calc(12px + var(--safe-bottom))}
#viewerOverlay.inline-sheet #viewerMsgInput{height:44px;font-size:16px}
#viewerOverlay.inline-sheet #viewerSendBtn{width:44px;height:44px}

#noteEditorOverlay{position:fixed;inset:0;z-index:220;display:none;flex-direction:column;width:100vw;height:calc(var(--vh) * 100);background:rgba(245,248,252,.99)}
#noteEditorOverlay.open{display:flex}
#noteEditorHeader{min-height:70px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);background:#fff}
#noteEditorTitleWrap{min-width:0;display:flex;flex-direction:column;gap:4px}
#noteEditorTitle{font-size:17px;font-weight:800}
#noteEditorMeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#noteEditorTimestamp{font-size:12px;color:var(--sub)}
#noteEditorSaveBadge{height:24px;padding:0 8px;border-radius:999px;display:inline-flex;align-items:center;background:#eef4fa;color:#587085;font-size:11px;font-weight:800}
#noteEditorSaveBadge.pending{background:var(--warning-soft);color:var(--warning)}
#noteEditorSaveBadge.saved{background:var(--success-soft);color:#2f7b42}
#noteEditorSaveBadge.offline{background:#fff3f3;color:#c74242}
#noteEditorActions{display:flex;align-items:center;gap:8px}
.noteEditorDangerBtn,.noteEditorGhostBtn,#noteEditorDoneBtn{height:38px;padding:0 12px;border-radius:12px;font-weight:800}
.noteEditorDangerBtn{background:var(--danger-soft);color:#c74242}
.noteEditorGhostBtn{background:#edf4fa;color:#425466}
#noteEditorDoneBtn{background:linear-gradient(135deg, var(--primary-soft), var(--primary));color:#fff}
#noteEditorBody{flex:1;min-height:0;padding:14px;background:#f7fbff;display:flex;flex-direction:column;gap:10px}
#noteEditorTools{display:flex;flex-direction:column;gap:8px}
#noteEditorColorRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
#noteEditorMetaLine{display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--sub);font-size:12px;font-weight:700}
#noteEditorTextarea{width:100%;height:100%;border-radius:20px;resize:none;padding:16px;font-size:16px;line-height:1.55;color:var(--text)}

#msgInput:focus,#phoneInput:focus,#viewerMsgInput:focus,#noteEditorTextarea:focus{background:#fff;border-color:rgba(36,145,255,.45);box-shadow:0 0 0 4px rgba(36,145,255,.08)}

@media (max-width:900px){
  #app{padding:0}
  #chatCard{width:100%;height:calc(var(--vh) * 100);border-radius:0}
  #header{height:64px;min-height:64px}
  #title{font-size:22px}
  #roleBadge{left:10px;height:30px;padding:0 10px;font-size:11px}
  #quickRequestBar{padding:10px 10px 8px;gap:8px}
  #quickRequestButtons{flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  #quickRequestButtons::-webkit-scrollbar{display:none}
  .quickChip{flex:0 0 auto}
  #summaryCard{margin:0 10px 10px;gap:8px}
  #summaryRows{grid-template-columns:1fr;gap:8px}
  #summaryCard{margin:0 10px 8px}
  #summaryCard.collapsed{margin-bottom:6px}
  #summaryActions{display:grid;grid-template-columns:1fr 1fr}
  #chatBox{padding:0 12px 8px}
  .bubble{max-width:86%;font-size:14px;padding:11px 14px}
  .chatImg{max-width:200px}
  #inputArea{padding:8px 10px calc(10px + var(--safe-bottom));gap:6px}
  #contactToggleBar{padding:9px 10px}
  #contactToggleDesc{font-size:10px}
  #phoneRow{flex-direction:column}
  #savePhoneBtn{width:100%}
  #msgInput,#sendBtn,#fileLabel{height:44px}
  #sendBtn,#fileLabel{width:44px}
  #viewerTopbar{min-height:0;height:auto;display:grid;grid-template-columns:auto minmax(0,1fr) auto;grid-template-areas:"stats title actions";gap:6px 10px;align-items:center;padding:8px 10px}
  #viewerTopLeft{grid-area:title;gap:0}
  #viewerTitle{font-size:15px;line-height:1.2}
  #viewerSubtitle{display:none}
  #viewerStats{grid-area:stats;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
  #viewerStats::-webkit-scrollbar{display:none}
  .statBadge{height:24px;padding:0 7px;gap:0;font-size:0;white-space:nowrap}
  .statBadge::before{content:attr(data-icon);font-size:11px;line-height:1}
  .statBadge::after{content:attr(data-count);margin-left:4px;font-size:10px;line-height:1;font-weight:800}
  #viewerActions{grid-area:actions}
  #viewerMain{display:flex;flex-direction:column;min-height:0}
  #viewerLeft{display:contents}
  #canvasWrap{flex:5 1 0;min-height:0;padding:8px}
  #imageStage{min-height:0;height:100%;border-radius:18px}
  #toolbar{flex:2 1 0;min-height:0;padding:8px 10px 10px;gap:10px;overflow:hidden}
  .toolRow{flex-direction:column;align-items:stretch;gap:8px}
  #drawControlSide{width:100%;justify-content:space-between}
  .toolGroup{flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding-bottom:6px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .toolGroup::-webkit-scrollbar{display:none}
  .toolBtn,.viewerBtn{min-width:42px;height:40px;padding:0 10px}
  .toolBtn .btnText,.viewerBtn .btnText{display:none}
  .toolBtn .btnIcon,.viewerBtn .btnIcon{display:inline-flex}
  #thicknessWrap{justify-content:flex-start}
  #thicknessRange{width:82px}
  #colorRow{padding:5px 7px;gap:6px}
  .colorSwatch{width:22px;height:22px}
  #viewerRight{flex:3 1 0;min-height:0;border-top:1px solid var(--line)}
  #viewerChatHeader{display:none}
  #viewerChatBox{padding:10px 10px 6px}
  #viewerInputBar{padding:8px 10px calc(10px + var(--safe-bottom))}
  #viewerMsgInput{height:42px;font-size:16px}
  #viewerSendBtn{width:42px;height:42px}
  .noteMarker{min-width:50px;height:38px;padding:0 10px}
  .noteMarkerText{max-width:96px;font-size:11px}
  #noteEditorHeader{align-items:flex-start;padding:10px 12px}
  #noteEditorActions{flex-wrap:wrap;justify-content:flex-end}
  #noteEditorBody{padding:8px;gap:8px}
  #noteEditorMetaLine{flex-direction:column;align-items:flex-start;gap:4px}
}
</style>
