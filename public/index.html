<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>디자인 상담</title>

<style>
* { box-sizing: border-box; }
body { margin:0; font-family: Arial; background:#f8f9fa; }

/* 헤더 */
#header {
  position:fixed; top:0; width:100%; height:55px;
  background:white; border-bottom:1px solid #ddd;
  display:flex; align-items:center; justify-content:center;
  font-weight:bold; z-index:10;
}
#statusIcon { position:absolute; right:15px; cursor:pointer; }

/* 채팅 */
#chatBox {
  position:fixed; top:55px; bottom:110px; width:100%;
  overflow-y:auto; padding:15px; display:flex; flex-direction:column;
}
.message { max-width:70%; padding:10px; margin:5px; border-radius:15px; }
.me { align-self:flex-end; background:#4dabf7; color:white; }
.other { align-self:flex-start; background:white; border:1px solid #ddd; }

.chat-img { max-width:150px; cursor:pointer; }

/* 입력 */
#inputArea {
  position:fixed; bottom:0; width:100%;
  background:white; padding:10px; border-top:1px solid #ddd;
}
#inputRow { display:flex; max-width:600px; margin:auto; }
#msg { flex:1; padding:10px; }
#sendBtn { margin-left:5px; }

#file { display:none; }

/* ===== 사이드 뷰어 ===== */
#sideViewer {
  position:fixed; top:55px; right:0;
  width:40%; height:calc(100% - 55px);
  background:white; border-left:1px solid #ddd;
  display:none; flex-direction:column;
}

#viewerHeader {
  height:50px; display:flex; justify-content:space-between;
  align-items:center; padding:0 10px;
  border-bottom:1px solid #eee;
}

#viewerBody {
  position:relative; flex:1;
}

#sideImg {
  width:100%; height:100%; object-fit:contain;
}

#drawCanvas {
  position:absolute; top:0; left:0;
}

#commentList {
  max-height:120px;
  overflow:auto;
  border-top:1px solid #eee;
  padding:5px;
}

#commentBox {
  display:flex;
  border-top:1px solid #eee;
}
#commentInput { flex:1; }

#chatBox.shrink { width:60%; }
</style>
</head>

<body>

<div id="header">
  디자인 상담
  <span id="statusIcon" onclick="toggleStatus()">🟢</span>
</div>

<div id="chatBox"></div>

<div id="inputArea">
  <div id="inputRow">
    <input id="msg">
    <button id="sendBtn" onclick="send()">전송</button>
    <input type="file" id="file">
  </div>
</div>

<!-- 사이드 뷰어 -->
<div id="sideViewer">
  <div id="viewerHeader">
    이미지 보기
    <div>
      <button id="drawToggle">✏️</button>
      <span id="viewerClose">✕</span>
    </div>
  </div>

  <div id="viewerBody">
    <img id="sideImg">
    <canvas id="drawCanvas"></canvas>
  </div>

  <div id="commentList"></div>

  <div id="commentBox">
    <input id="commentInput">
    <button id="commentSend">전송</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
const role = "admin"; // 👉 user로 바꾸면 상담자

const chatBox = document.getElementById('chatBox');

/* 상태 */
let isOpen = true;
function toggleStatus(){
  isOpen=!isOpen;
}

/* ===== 채팅 ===== */
function send(){
  const text = msg.value.trim();
  if(!text) return;

  socket.emit('message',{ text, sender:role });
  msg.value="";
}

socket.on('message', data=>{
  const type = data.sender === role ? 'me' : 'other';
  addMessage(data.text, type);
});

function addMessage(text,type){
  const div=document.createElement('div');
  div.className='message '+type;
  div.innerText=text;
  chatBox.appendChild(div);
}

/* ===== 이미지 ===== */
file.onchange=function(){
  const f=this.files[0];
  if(!f) return;

  const reader=new FileReader();
  reader.onload=e=>{
    createImage(e.target.result,'me');
  };
  reader.readAsDataURL(f);

  const fd=new FormData();
  fd.append('image',f);

  fetch('/upload',{method:'POST',body:fd})
    .then(r=>r.json())
    .then(d=>{
      socket.emit('image',{ url:d.url, sender:role });
    });
};

socket.on('image', data=>{
  const type = data.sender === role ? 'me' : 'other';
  createImage(data.url,type);
});

function createImage(src,type){
  const div=document.createElement('div');
  div.className='message '+type;

  const img=document.createElement('img');
  img.src=src;
  img.className='chat-img';
  img.onclick=()=>openImage(src);

  div.appendChild(img);
  chatBox.appendChild(div);
}

/* ===== 사이드 뷰 ===== */
const sideViewer = document.getElementById("sideViewer");
const sideImg = document.getElementById("sideImg");
const viewerClose = document.getElementById("viewerClose");

function openImage(src){
  sideViewer.style.display="flex";
  sideImg.src=src;
  chatBox.classList.add("shrink");

  setTimeout(()=>{
    drawCanvas.width = sideImg.clientWidth;
    drawCanvas.height = sideImg.clientHeight;
  },100);
}

viewerClose.onclick=()=>{
  sideViewer.style.display="none";
  chatBox.classList.remove("shrink");
};

/* ===== 그리기 (실시간 공유) ===== */
const drawCanvas = document.getElementById("drawCanvas");
const ctx = drawCanvas.getContext("2d");

let drawing=false;
let drawMode=false;

drawToggle.onclick=()=> drawMode=!drawMode;

drawCanvas.onmousedown=e=>{
  if(!drawMode) return;
  drawing=true;
  ctx.beginPath();
  ctx.moveTo(e.offsetX,e.offsetY);

  socket.emit('draw',{ x:e.offsetX, y:e.offsetY, type:"start" });
};

drawCanvas.onmousemove=e=>{
  if(!drawing) return;

  ctx.lineTo(e.offsetX,e.offsetY);
  ctx.stroke();

  socket.emit('draw',{ x:e.offsetX, y:e.offsetY, type:"draw" });
};

drawCanvas.onmouseup=()=>{
  drawing=false;
};

/* 수신 */
socket.on('draw', data=>{
  if(data.type==="start"){
    ctx.beginPath();
    ctx.moveTo(data.x,data.y);
  }else{
    ctx.lineTo(data.x,data.y);
    ctx.stroke();
  }
});

/* ===== 코멘트 (실시간) ===== */
const commentList = document.getElementById("commentList");

commentSend.onclick=()=>{
  const text = commentInput.value.trim();
  if(!text) return;

  socket.emit('comment',{ text, sender:role });
  commentInput.value="";
};

socket.on('comment', data=>{
  const div=document.createElement("div");
  div.innerText = data.sender + " : " + data.text;
  commentList.appendChild(div);
});

</script>

</body>
</html>
