<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>디자인 상담</title>

<style>
:root{
  --bg:#f3f5f9;
  --panel:#ffffff;
  --panel-soft:#f8fafc;
  --line:#e5e7eb;
  --text:#111827;
  --sub:#6b7280;
  --primary:#2390ff;
  --primary-soft:#5bb5ff;
  --shadow:0 18px 50px rgba(15, 23, 42, 0.10);
  --radius-xl:32px;
  --radius-lg:24px;
  --radius-md:18px;
}

*{
  box-sizing:border-box;
}

html, body{
  margin:0;
  height:100%;
  font-family:-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  background:
    radial-gradient(circle at top left, rgba(35,144,255,0.08), transparent 24%),
    linear-gradient(180deg, #f8fbff 0%, #eef2f7 100%);
  color:var(--text);
}

body{
  overflow:hidden;
}

/* 전체 레이아웃 */
#appShell{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  padding:20px;
}

/* 왼쪽 이미지 패널 */
#imagePanel{
  width:0;
  min-width:0;
  opacity:0;
  pointer-events:none;
  transition:width .28s ease, opacity .2s ease;
  height:min(92vh, 920px);
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.6);
  border-radius:34px;
  box-shadow:var(--shadow);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

#imagePanel.open{
  width:min(420px, 35vw);
  opacity:1;
  pointer-events:auto;
}

#panelHeader{
  height:72px;
  padding:0 18px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(255,255,255,0.85);
}

#panelTitleWrap{
  display:flex;
  align-items:center;
  gap:10px;
}

#panelTitleIcon{
  width:38px;
  height:38px;
  border-radius:14px;
  background:linear-gradient(135deg, #d7ebff, #a8d3ff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

#panelTitle{
  font-size:18px;
  font-weight:800;
  letter-spacing:-0.02em;
}

#panelActionRow{
  display:flex;
  gap:8px;
}

.panelBtn{
  height:42px;
  border:none;
  border-radius:14px;
  padding:0 14px;
  background:#eef2f7;
  color:#374151;
  text-decoration:none;
  font-weight:700;
  cursor:pointer;
}

#panelBody{
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
}

#imageStageWrap{
  flex:1;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:14px;
  background:linear-gradient(180deg, #f8fbff 0%, #f1f5f9 100%);
}

#imageStage{
  position:relative;
  max-width:100%;
  max-height:100%;
  display:inline-block;
}

#panelImg{
  display:block;
  max-width:100%;
  max-height:calc(100vh - 280px);
  border-radius:22px;
  box-shadow:0 16px 36px rgba(15, 23, 42, 0.12);
}

#drawCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border-radius:22px;
  touch-action:none;
}

#drawToolbar{
  border-top:1px solid var(--line);
  background:rgba(255,255,255,0.88);
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

#toolbarTop{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

#drawToggle{
  height:42px;
  border:none;
  border-radius:14px;
  padding:0 16px;
  background:#eaf3ff;
  color:#1667c9;
  font-weight:800;
  cursor:pointer;
}

#drawToggle.active{
  background:linear-gradient(135deg, var(--primary-soft), var(--primary));
  color:white;
}

#thicknessWrap{
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--sub);
  font-size:13px;
  font-weight:700;
}

#thicknessRange{
  width:140px;
}

#colorRow{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.colorSwatch{
  width:28px;
  height:28px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  box-shadow:0 0 0 1px rgba(0,0,0,0.10);
}

.colorSwatch.active{
  box-shadow:0 0 0 3px rgba(35,144,255,0.22);
}

/* 메인 카드 */
#chatCard{
  width:min(860px, 100%);
  height:min(92vh, 920px);
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.6);
  border-radius:34px;
  box-shadow:var(--shadow);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* 1:6:3 비율 */
#header{
  flex:1;
  min-height:88px;
  border-bottom:1px solid var(--line);
  background:rgba(255,255,255,0.84);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

#leftBadge{
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%);
  background:#f7f9fc;
  border:1px solid var(--line);
  color:var(--sub);
  font-size:13px;
  font-weight:700;
  border-radius:999px;
  padding:10px 14px;
}

#headerTitle{
  font-size:30px;
  font-weight:800;
  letter-spacing:-0.03em;
}

#headerActions{
  position:absolute;
  right:18px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  align-items:center;
  gap:10px;
}

.headerIconBtn{
  width:46px;
  height:46px;
  border:none;
  border-radius:50%;
  background:#eef2f7;
  color:#475467;
  font-size:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.headerIconBtn.primary{
  background:linear-gradient(135deg, #b8f5c8, #67de8a);
  color:#0f5132;
}

#chatBox{
  flex:6;
  min-height:0;
  overflow-y:auto;
  padding:20px 22px 12px;
  background:#f8fafc;
  scroll-behavior:smooth;
}

#chatInner{
  display:flex;
  flex-direction:column;
  gap:14px;
  min-height:100%;
}

.message-row{
  display:flex;
  flex-direction:column;
  gap:5px;
}

.message-row.me{
  align-items:flex-end;
}

.message-row.other{
  align-items:flex-start;
}

.message-row.system{
  align-items:center;
}

.bubble{
  max-width:min(76%, 520px);
  padding:14px 18px;
  border-radius:26px;
  font-size:16px;
  line-height:1.48;
  letter-spacing:-0.02em;
  word-break:break-word;
}

.message-row.me .bubble{
  background:linear-gradient(135deg, var(--primary-soft), var(--primary));
  color:white;
  border-bottom-right-radius:10px;
  box-shadow:0 8px 22px rgba(35,144,255,0.16);
}

.message-row.other .bubble{
  background:var(--panel);
  border:1px solid var(--line);
  color:var(--text);
  border-bottom-left-radius:10px;
}

.message-row.system .bubble{
  background:transparent;
  color:var(--sub);
  font-size:12px;
  padding:4px 8px;
}

.meta{
  font-size:11px;
  color:var(--sub);
  padding:0 6px;
}

.image-bubble{
  max-width:min(76%, 520px);
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:24px;
  padding:10px;
  overflow:hidden;
  cursor:pointer;
}

.message-row.me .image-bubble{
  border-bottom-right-radius:10px;
}

.message-row.other .image-bubble{
  border-bottom-left-radius:10px;
}

.chat-img{
  display:block;
  width:100%;
  max-width:240px;
  border-radius:16px;
}

#inputArea{
  flex:3;
  min-height:190px;
  border-top:1px solid var(--line);
  background:rgba(255,255,255,0.90);
  padding:14px 18px 18px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

#phoneRow{
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

#phoneInput,
#msg{
  width:100%;
  border:1px solid #d9dee7;
  background:#f8fafc;
  color:var(--text);
  border-radius:22px;
  outline:none;
  transition:.2s ease;
}

#phoneInput{
  height:54px;
  padding:0 18px;
  font-size:15px;
}

#msg{
  height:58px;
  padding:0 22px;
  font-size:17px;
}

#phoneInput:focus,
#msg:focus{
  background:white;
  border-color:rgba(35,144,255,0.45);
  box-shadow:0 0 0 4px rgba(35,144,255,0.10);
}

#savePhoneBtn,
#sendBtn,
#fileLabel{
  border:none;
  cursor:pointer;
}

#savePhoneBtn{
  height:54px;
  padding:0 22px;
  border-radius:22px;
  background:#5b6470;
  color:white;
  font-size:16px;
  font-weight:800;
}

#inputRow{
  display:flex;
  align-items:center;
  gap:10px;
}

#sendBtn{
  width:58px;
  height:58px;
  border-radius:50%;
  background:linear-gradient(135deg, #7bc5ff, var(--primary));
  color:white;
  font-size:24px;
  font-weight:800;
  box-shadow:0 8px 22px rgba(35,144,255,0.18);
}

#file{
  display:none;
}

#fileLabel{
  width:58px;
  height:58px;
  border-radius:50%;
  background:#eef2f7;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  color:#64748b;
}

#helperText{
  position:absolute;
  bottom:16px;
  left:30px;
  font-size:12px;
  color:rgba(0,0,0,0.28);
}

/* 전체화면 */
.fullscreen-mode #appShell{
  padding:0;
}

.fullscreen-mode #chatCard{
  width:calc(100vw - 24px);
  height:calc(100vh - 24px);
  max-width:none;
  border-radius:0;
}

.fullscreen-mode #imagePanel{
  height:calc(100vh - 24px);
  border-radius:0;
}

@media (max-width:1100px){
  #appShell{
    padding:14px;
  }

  #imagePanel{
    position:fixed;
    left:14px;
    top:14px;
    bottom:14px;
    z-index:50;
    width:0 !important;
  }

  #imagePanel.open{
    width:calc(100vw - 28px) !important;
  }
}

@media (max-width:680px){
  #appShell{
    padding:0;
  }

  #chatCard{
    width:100%;
    height:100%;
    border-radius:0;
  }

  #headerTitle{
    font-size:24px;
  }

  #leftBadge{
    left:12px;
    padding:8px 12px;
    font-size:12px;
  }

  .bubble{
    max-width:84%;
    font-size:15px;
  }

  .chat-img{
    max-width:200px;
  }
}
</style>
</head>
<body>

<div id="appShell">
  <aside id="imagePanel" aria-hidden="true">
    <div id="panelHeader">
      <div id="panelTitleWrap">
        <span id="panelTitleIcon">🖼️</span>
        <span id="panelTitle">이미지 검토</span>
      </div>

      <div id="panelActionRow">
        <a id="downloadBtn" class="panelBtn" download>다운로드</a>
        <button id="closePanelBtn" class="panelBtn" type="button">닫기</button>
      </div>
    </div>

    <div id="panelBody">
      <div id="imageStageWrap">
        <div id="imageStage">
          <img id="panelImg" alt="첨부 이미지" />
          <canvas id="drawCanvas"></canvas>
        </div>
      </div>

      <div id="drawToolbar">
        <div id="toolbarTop">
          <button id="drawToggle" type="button">펜 끄기</button>

          <div id="thicknessWrap">
            <span>두께</span>
            <input id="thicknessRange" type="range" min="1" max="24" value="3" />
          </div>
        </div>

        <div id="colorRow">
          <button class="colorSwatch active" type="button" data-color="#ff3b30" style="background:#ff3b30;"></button>
          <button class="colorSwatch" type="button" data-color="#0a84ff" style="background:#0a84ff;"></button>
          <button class="colorSwatch" type="button" data-color="#22c55e" style="background:#22c55e;"></button>
          <button class="colorSwatch" type="button" data-color="#111111" style="background:#111111;"></button>
          <button class="colorSwatch" type="button" data-color="#f59e0b" style="background:#f59e0b;"></button>
          <button class="colorSwatch" type="button" data-color="#a855f7" style="background:#a855f7;"></button>
        </div>
      </div>
    </div>
  </aside>

  <section id="chatCard">
    <div id="header">
      <div id="leftBadge">고객 채팅</div>
      <div id="headerTitle">디자인 상담</div>

      <div id="headerActions">
        <button id="fullscreenBtn" class="headerIconBtn" type="button" aria-label="전체화면">⛶</button>
        <button id="headerStateIcon" class="headerIconBtn primary" type="button" aria-label="상담 상태">💬</button>
      </div>
    </div>

    <div id="chatBox">
      <div id="chatInner"></div>
    </div>

    <div id="inputArea">
      <div id="phoneRow">
        <input id="phoneInput" type="tel" placeholder="알림 받을 전화번호 입력" />
        <button id="savePhoneBtn" type="button">등록</button>
      </div>

      <div id="inputRow">
        <input id="msg" type="text" placeholder="메시지 입력..." autocomplete="off" />
        <button id="sendBtn" type="button" aria-label="전송">➤</button>
        <label id="fileLabel" for="file" aria-label="이미지 첨부">📎</label>
        <input id="file" type="file" accept="image/*" />
      </div>
    </div>
  </section>

  <div id="helperText">실시간 상담 채팅</div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const RENDER_URL = "https://chat-server-ilcq.onrender.com";
const socket = io(RENDER_URL, {
  transports: ["websocket", "polling"]
});

const params = new URLSearchParams(location.search);
const role = params.has("admin") ? "admin" : "user";
let roomId = params.get("room") || localStorage.getItem("roomId") || crypto.randomUUID();
localStorage.setItem("roomId", roomId);

const chatInner = document.getElementById("chatInner");
const chatBox = document.getElementById("chatBox");
const msg = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");
const file = document.getElementById("file");
const phoneInput = document.getElementById("phoneInput");
const savePhoneBtn = document.getElementById("savePhoneBtn");
const leftBadge = document.getElementById("leftBadge");

const imagePanel = document.getElementById("imagePanel");
const panelImg = document.getElementById("panelImg");
const closePanelBtn = document.getElementById("closePanelBtn");
const downloadBtn = document.getElementById("downloadBtn");
const fullscreenBtn = document.getElementById("fullscreenBtn");

const drawCanvas = document.getElementById("drawCanvas");
const drawToggle = document.getElementById("drawToggle");
const thicknessRange = document.getElementById("thicknessRange");
const colorSwatches = Array.from(document.querySelectorAll(".colorSwatch"));
const ctx = drawCanvas.getContext("2d");

leftBadge.textContent = role === "admin" ? "관리자 화면" : "고객 채팅";

if (role === "admin") {
  document.getElementById("phoneRow").style.display = "none";
}

/* 한글 조합 중복 방지 */
let isComposing = false;
msg.addEventListener("compositionstart", () => { isComposing = true; });
msg.addEventListener("compositionend", () => { isComposing = false; });

socket.emit("join", { roomId, role });

function scrollToBottom() {
  requestAnimationFrame(() => {
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

function formatTime(ts) {
  try {
    return new Date(ts).toLocaleTimeString("ko-KR", {
      hour: "numeric",
      minute: "2-digit"
    });
  } catch {
    return "";
  }
}

function makeMessageRow(type, time) {
  const row = document.createElement("div");
  row.className = "message-row " + type;

  const meta = document.createElement("div");
  meta.className = "meta";
  meta.textContent = time ? formatTime(time) : "";

  return { row, meta };
}

function renderTextMessage(data) {
  const senderType =
    data.sender === "system"
      ? "system"
      : data.sender === role
      ? "me"
      : "other";

  const { row, meta } = makeMessageRow(senderType, data.time);
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = data.text || "";

  row.appendChild(bubble);
  if (senderType !== "system") row.appendChild(meta);

  chatInner.appendChild(row);
  scrollToBottom();
}

function renderImageMessage(data) {
  const senderType = data.sender === role ? "me" : "other";
  const { row, meta } = makeMessageRow(senderType, data.time);

  const wrap = document.createElement("div");
  wrap.className = "image-bubble";

  const img = document.createElement("img");
  img.src = data.image;
  img.className = "chat-img";
  img.alt = "첨부 이미지";

  wrap.addEventListener("click", () => openImagePanel(data.image));
  wrap.appendChild(img);

  row.appendChild(wrap);
  row.appendChild(meta);

  chatInner.appendChild(row);
  scrollToBottom();
}

async function savePhone() {
  const phone = phoneInput.value.trim();
  if (!phone) {
    alert("전화번호를 입력해주세요.");
    return;
  }

  try {
    const response = await fetch(RENDER_URL + "/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ roomId, phone })
    });

    const result = await response.json().catch(() => ({}));
    if (!response.ok) {
      throw new Error(result.error || "전화번호 등록 실패");
    }

    alert("전화번호가 등록되었습니다.");
  } catch (error) {
    console.error(error);
    alert("전화번호 등록에 실패했습니다.");
  }
}

/* 핵심: 로컬에 먼저 그리지 않고 서버 에코만 렌더 */
function send() {
  const text = msg.value.trim();
  if (!text) return;
  if (isComposing) return;

  socket.emit("message", { text });
  msg.value = "";
}

async function toggleFullscreen() {
  try {
    if (!document.fullscreenElement) {
      await document.documentElement.requestFullscreen();
      document.body.classList.add("fullscreen-mode");
    } else {
      await document.exitFullscreen();
      document.body.classList.remove("fullscreen-mode");
    }
  } catch (error) {
    console.error("fullscreen error:", error);
  }
}

document.addEventListener("fullscreenchange", () => {
  if (!document.fullscreenElement) {
    document.body.classList.remove("fullscreen-mode");
  }
});

/* 이미지 패널 + 드로잉 */
let currentImageUrl = "";
let drawingEnabled = false;
let isDrawing = false;
let currentColor = "#ff3b30";
let currentSize = 3;
let currentStrokes = [];
let lastPoint = null;

function updateCanvasSize() {
  const width = panelImg.clientWidth;
  const height = panelImg.clientHeight;
  if (!width || !height) return;

  drawCanvas.width = width;
  drawCanvas.height = height;
  redrawAllStrokes();
}

function clearCanvas() {
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
}

function drawStroke(stroke) {
  if (!drawCanvas.width || !drawCanvas.height) return;

  const x1 = stroke.last.x * drawCanvas.width;
  const y1 = stroke.last.y * drawCanvas.height;
  const x2 = stroke.cur.x * drawCanvas.width;
  const y2 = stroke.cur.y * drawCanvas.height;

  ctx.beginPath();
  ctx.strokeStyle = stroke.color || "#ff3b30";
  ctx.lineWidth = stroke.size || 3;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

function redrawAllStrokes() {
  clearCanvas();
  currentStrokes.forEach(drawStroke);
}

function openImagePanel(src) {
  currentImageUrl = src;
  currentStrokes = [];
  imagePanel.classList.add("open");
  imagePanel.setAttribute("aria-hidden", "false");
  panelImg.src = src;
  downloadBtn.href = src;
}

function closeImagePanel() {
  imagePanel.classList.remove("open");
  imagePanel.setAttribute("aria-hidden", "true");
  currentImageUrl = "";
  currentStrokes = [];
  clearCanvas();
}

function getNormalizedPoint(evt) {
  const rect = drawCanvas.getBoundingClientRect();
  return {
    x: Math.max(0, Math.min(1, (evt.clientX - rect.left) / rect.width)),
    y: Math.max(0, Math.min(1, (evt.clientY - rect.top) / rect.height))
  };
}

drawCanvas.addEventListener("pointerdown", (evt) => {
  if (!drawingEnabled || !currentImageUrl) return;
  if (!drawCanvas.width || !drawCanvas.height) return;

  isDrawing = true;
  lastPoint = getNormalizedPoint(evt);
  drawCanvas.setPointerCapture(evt.pointerId);
});

drawCanvas.addEventListener("pointermove", (evt) => {
  if (!drawingEnabled || !isDrawing || !currentImageUrl || !lastPoint) return;

  const curPoint = getNormalizedPoint(evt);
  const stroke = {
    imageUrl: currentImageUrl,
    last: lastPoint,
    cur: curPoint,
    color: currentColor,
    size: currentSize
  };

  currentStrokes.push(stroke);
  drawStroke(stroke);
  socket.emit("draw", stroke);

  lastPoint = curPoint;
});

function stopDrawing() {
  isDrawing = false;
  lastPoint = null;
}

drawCanvas.addEventListener("pointerup", stopDrawing);
drawCanvas.addEventListener("pointercancel", stopDrawing);
drawCanvas.addEventListener("pointerleave", stopDrawing);

drawToggle.addEventListener("click", () => {
  drawingEnabled = !drawingEnabled;
  drawToggle.classList.toggle("active", drawingEnabled);
  drawToggle.textContent = drawingEnabled ? "펜 켜짐" : "펜 끄기";
});

thicknessRange.addEventListener("input", () => {
  currentSize = Number(thicknessRange.value || 3);
});

colorSwatches.forEach((btn) => {
  btn.addEventListener("click", () => {
    currentColor = btn.dataset.color || "#ff3b30";
    colorSwatches.forEach((item) => item.classList.remove("active"));
    btn.classList.add("active");
  });
});

panelImg.addEventListener("load", () => {
  updateCanvasSize();
  if (currentImageUrl) {
    socket.emit("request-draw-history", { imageUrl: currentImageUrl });
  }
});

window.addEventListener("resize", updateCanvasSize);

/* 이벤트 */
sendBtn.addEventListener("click", send);

msg.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    if (isComposing || e.isComposing) return;
    e.preventDefault();
    send();
  }
});

savePhoneBtn.addEventListener("click", savePhone);

file.addEventListener("change", async (e) => {
  const selected = e.target.files[0];
  if (!selected) return;

  const formData = new FormData();
  formData.append("image", selected);

  try {
    const response = await fetch(RENDER_URL + "/upload", {
      method: "POST",
      body: formData
    });

    const result = await response.json().catch(() => ({}));
    if (!response.ok) {
      throw new Error(result.error || "이미지 업로드 실패");
    }
    if (!result.url) {
      throw new Error("업로드된 이미지 URL이 없습니다.");
    }

    socket.emit("image", { url: result.url });
  } catch (error) {
    console.error(error);
    alert(error.message || "이미지 업로드에 실패했습니다.");
  } finally {
    file.value = "";
  }
});

closePanelBtn.addEventListener("click", closeImagePanel);
fullscreenBtn.addEventListener("click", toggleFullscreen);

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    closeImagePanel();
  }
});

/* 소켓 수신 */
socket.on("history", (list) => {
  chatInner.innerHTML = "";
  (list || []).forEach((item) => {
    if (item.text) renderTextMessage(item);
    if (item.image) renderImageMessage(item);
  });
});

socket.on("message", (data) => {
  renderTextMessage(data);
});

socket.on("image", (data) => {
  renderImageMessage(data);
});

socket.on("draw-history", (payload) => {
  if (!payload || payload.imageUrl !== currentImageUrl) return;
  currentStrokes = Array.isArray(payload.strokes) ? payload.strokes : [];
  redrawAllStrokes();
});

socket.on("draw", (stroke) => {
  if (!stroke || stroke.imageUrl !== currentImageUrl) return;
  currentStrokes.push(stroke);
  drawStroke(stroke);
});
</script>
</body>
</html>
