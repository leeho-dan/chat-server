<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디자인 상담</title>

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family: Arial;
  background:#f8f9fa;
}

/* 헤더 */
#header {
  position:fixed;
  top:0;
  width:100%;
  height:55px;
  background:white;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  z-index:10;
}

#statusIcon {
  position:absolute;
  right:15px;
  cursor:pointer;
}

/* 채팅 */
#chatBox {
  position:fixed;
  top:55px;
  bottom:110px;
  width:100%;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
}

/* 메시지 */
.message {
  max-width:70%;
  padding:10px 14px;
  margin:6px 0;
  border-radius:18px;
  word-break:break-word;
}

.me {
  align-self:flex-end;
  background:#4dabf7;
  color:white;
}

.other {
  align-self:flex-start;
  background:white;
  border:1px solid #ddd;
}

/* 이미지 */
.chat-img {
  max-width:160px;
  border-radius:10px;
  cursor:pointer;
}

/* 입력 */
#inputArea {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  border-top:1px solid #ddd;
  padding:10px;
}

#inputRow {
  display:flex;
  max-width:600px;
  margin:0 auto;
}

#msg {
  flex:1;
  padding:12px;
  border-radius:25px;
  border:1px solid #ccc;
}

#sendBtn {
  margin-left:8px;
  border:none;
  background:#4dabf7;
  color:white;
  border-radius:50%;
  padding:10px 14px;
  cursor:pointer;
}

#file { display:none; }

#fileLabel {
  margin-left:8px;
  padding:10px;
  border-radius:50%;
  background:#e9ecef;
  cursor:pointer;
}

/* 사이드 이미지 */
#sideViewer {
  position:fixed;
  top:0;
  right:-400px;
  width:400px;
  height:100%;
  background:white;
  border-left:1px solid #ddd;
  transition:0.3s;
  display:flex;
  flex-direction:column;
  z-index:20;
}

#sideViewer.open {
  right:0;
}

#viewerHeader {
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #ddd;
}

#viewerBody {
  flex:1;
  position:relative;
}

#sideImg {
  width:100%;
  height:100%;
  object-fit:contain;
}

#closeBtn {
  cursor:pointer;
}
</style>
</head>

<body>

<div id="header">
  디자인 상담
  <span id="statusIcon">🟢</span>
</div>

<div id="chatBox"></div>

<div id="inputArea">
  <div id="inputRow">
    <input id="msg" placeholder="메시지 입력..." />
    <button id="sendBtn">➤</button>
    <label id="fileLabel" for="file">📎</label>
    <input type="file" id="file">
  </div>
</div>

<!-- 이미지 사이드뷰 -->
<div id="sideViewer">
  <div id="viewerHeader">
    <span>이미지 보기</span>
    <span id="closeBtn">✕</span>
  </div>
  <div id="viewerBody">
    <img id="sideImg">
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>

/* ===== 중요: Render 주소 넣기 ===== */
const socket = io("https://너의-render-주소.onrender.com");

/* 역할 구분 */
const role = location.search.includes("admin") ? "admin" : "user";

/* 방 ID */
let roomId = localStorage.getItem("roomId") || crypto.randomUUID();
localStorage.setItem("roomId", roomId);

/* 입장 */
socket.emit("join", { roomId, role });

const chatBox = document.getElementById("chatBox");
const msg = document.getElementById("msg");

/* ===== 메시지 보내기 ===== */
function send(){
  const text = msg.value.trim();
  if(!text) return;

  socket.emit("message", { text });
  msg.value="";
}

sendBtn.onclick = send;

/* 엔터 전송 */
msg.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    send();
  }
});

/* ===== 메시지 받기 ===== */
socket.on("message", renderMessage);

function renderMessage(d){
  const div=document.createElement("div");
  div.className="message "+(d.sender===role?"me":"other");
  div.innerText=d.text;

  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
}

/* ===== 히스토리 ===== */
socket.on("history", list=>{
  list.forEach(item=>{
    if(item.text) renderMessage(item);
    if(item.image) renderImage(item);
  });
});

/* ===== 이미지 업로드 ===== */
file.onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;

  const fd=new FormData();
  fd.append("image",f);

  fetch("https://너의-render-주소.onrender.com/upload",{
    method:"POST",
    body:fd
  })
  .then(r=>r.json())
  .then(d=>{
    socket.emit("image",{ url:d.url });
  });
};

/* ===== 이미지 받기 ===== */
socket.on("image", renderImage);

function renderImage(d){
  const wrap=document.createElement("div");
  wrap.className="message "+(d.sender===role?"me":"other");

  const img=document.createElement("img");
  img.src=d.image;
  img.className="chat-img";
  img.onclick=()=>openViewer(img.src);

  wrap.appendChild(img);
  chatBox.appendChild(wrap);
}

/* ===== 사이드 이미지 ===== */
const viewer=document.getElementById("sideViewer");
const sideImg=document.getElementById("sideImg");

function openViewer(src){
  viewer.classList.add("open");
  sideImg.src=src;
}

closeBtn.onclick=()=>{
  viewer.classList.remove("open");
};

</script>

</body>
</html>
