<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디자인 상담</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:#f5f5f7;
}

/* 전체 */
#app{
  width:100%;
  max-width:420px;
  height:100vh;
  margin:auto;
  display:flex;
  flex-direction:column;
  background:white;
  border-radius:30px;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

/* ===== 헤더 (1) ===== */
#header{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  font-size:18px;
  border-bottom:1px solid #eee;
}

/* ===== 채팅 (6) ===== */
#chat{
  flex:6;
  overflow-y:auto;
  padding:15px;
  background:#fafafa;
}

/* 메시지 */
.msg{
  max-width:70%;
  padding:10px 14px;
  margin:6px 0;
  border-radius:18px;
  font-size:14px;
}

.me{
  background:#0a84ff;
  color:white;
  margin-left:auto;
}

.other{
  background:white;
  border:1px solid #ddd;
}

/* ===== 입력 (3) ===== */
#inputArea{
  flex:3;
  border-top:1px solid #eee;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:10px;
}

/* 전화번호 */
#phoneRow{
  display:flex;
  margin-bottom:8px;
}

#phone{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
}

#save{
  margin-left:6px;
  padding:10px;
  border:none;
  background:#444;
  color:white;
  border-radius:15px;
}

/* 메시지 입력 */
#msgRow{
  display:flex;
}

#msg{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:1px solid #ddd;
}

#send{
  margin-left:6px;
  width:45px;
  height:45px;
  border-radius:50%;
  border:none;
  background:#0a84ff;
  color:white;
  font-size:18px;
}

#file{
  display:none;
}

#fileLabel{
  margin-left:6px;
  width:45px;
  height:45px;
  background:#eee;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="app">

  <!-- 헤더 -->
  <div id="header">
    디자인 상담
  </div>

  <!-- 채팅 -->
  <div id="chat"></div>

  <!-- 입력 -->
  <div id="inputArea">

    <div id="phoneRow">
      <input id="phone" placeholder="전화번호 입력">
      <button id="save">등록</button>
    </div>

    <div id="msgRow">
      <input id="msg" placeholder="메시지 입력">
      <button id="send">➤</button>
      <label id="fileLabel" for="file">📎</label>
      <input type="file" id="file">
    </div>

  </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io("https://chat-server-ilcq.onrender.com");

const chat = document.getElementById("chat");
const msg = document.getElementById("msg");

socket.emit("join",{roomId:"room1",role:"user"});

/* 메시지 보내기 */
function send(){
  const text = msg.value.trim();
  if(!text) return;

  socket.emit("message",{text});
  add(text,"me");
  msg.value="";
}

/* 엔터 */
msg.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    send();
  }
});

/* 받기 */
socket.on("message",data=>{
  add(data.text,"other");
});

/* 출력 */
function add(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
