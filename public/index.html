<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>디자인 상담</title>

<style>
:root{
  --bg:#f4f8fc;
  --card:#ffffff;
  --soft:#f8fbff;
  --line:#e4ebf3;
  --text:#17212b;
  --sub:#758394;
  --primary:#2491ff;
  --primary-soft:#6fc3ff;
  --shadow:0 18px 50px rgba(18,36,61,0.10);
  --radius-xl:28px;
  --radius-lg:20px;
  --radius-md:16px;
}

*{
  box-sizing:border-box;
}

html, body{
  margin:0;
  width:100%;
  height:100%;
  font-family:-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  background:
    radial-gradient(circle at top left, rgba(36,145,255,0.08), transparent 24%),
    linear-gradient(180deg, #f9fbff 0%, #edf4fa 100%);
  color:var(--text);
}

body{
  overflow:hidden;
}

button,
input,
label{
  font:inherit;
}

button{
  cursor:pointer;
}

#app{
  width:100%;
  height:100%;
  padding:14px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#chatCard{
  width:min(920px, 100%);
  height:min(94dvh, 860px);
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.8);
  border-radius:30px;
  box-shadow:var(--shadow);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* 헤더 */
#header{
  height:74px;
  flex-shrink:0;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  background:rgba(255,255,255,0.9);
}

#title{
  font-size:26px;
  font-weight:800;
  letter-spacing:-0.03em;
}

#roleBadge{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  padding:8px 12px;
  border-radius:999px;
  background:#f7faff;
  border:1px solid var(--line);
  color:var(--sub);
  font-size:12px;
  font-weight:700;
}

#headerActions{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  gap:8px;
}

.iconBtn{
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:#edf4fa;
  color:#557086;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

/* 채팅 영역 */
#chatBox{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding:16px 16px 10px;
  background:#f8fbff;
}

#chatInner{
  display:flex;
  flex-direction:column;
  gap:12px;
  min-height:100%;
}

.messageRow{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.messageRow.me{
  align-items:flex-end;
}

.messageRow.other{
  align-items:flex-start;
}

.bubble{
  max-width:min(74%, 520px);
  padding:12px 16px;
  border-radius:22px;
  font-size:15px;
  line-height:1.45;
  letter-spacing:-0.02em;
  word-break:break-word;
}

.messageRow.me .bubble{
  background:linear-gradient(135deg, var(--primary-soft), var(--primary));
  color:white;
  border-bottom-right-radius:8px;
  box-shadow:0 8px 20px rgba(36,145,255,0.16);
}

.messageRow.other .bubble{
  background:#ffffff;
  color:var(--text);
  border:1px solid var(--line);
  border-bottom-left-radius:8px;
}

.meta{
  font-size:11px;
  color:var(--sub);
  padding:0 6px;
}

.imageBubble{
  max-width:min(72%, 500px);
  background:#ffffff;
  border:1px solid var(--line);
  border-radius:22px;
  padding:8px;
  cursor:pointer;
}

.messageRow.me .imageBubble{
  border-bottom-right-radius:8px;
}

.messageRow.other .imageBubble{
  border-bottom-left-radius:8px;
}

.chatImg{
  display:block;
  width:100%;
  max-width:230px;
  border-radius:14px;
}

/* 입력 영역 */
#inputArea{
  flex-shrink:0;
  border-top:1px solid var(--line);
  background:rgba(255,255,255,0.94);
  padding:10px 14px 12px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

#utilityRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

#togglePhoneBtn{
  border:none;
  background:#eef4fa;
  color:#5c7085;
  height:34px;
  padding:0 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

#phoneRow{
  display:none;
  gap:8px;
}

#phoneRow.open{
  display:flex;
}

#phoneInput{
  flex:1;
  height:42px;
  border:1px solid #d8e2ec;
  background:#f8fbff;
  border-radius:16px;
  outline:none;
  padding:0 14px;
  font-size:14px;
}

#savePhoneBtn{
  height:42px;
  border:none;
  border-radius:16px;
  padding:0 16px;
  background:#607082;
  color:white;
  font-weight:800;
}

#messageRow{
  display:flex;
  align-items:center;
  gap:8px;
}

#msgInput{
  flex:1;
  height:48px;
  border:1px solid #d8e2ec;
  background:#f8fbff;
  border-radius:18px;
  outline:none;
  padding:0 16px;
  font-size:15px;
}

#msgInput:focus,
#phoneInput:focus,
#viewerMsgInput:focus{
  background:#ffffff;
  border-color:rgba(36,145,255,0.45);
  box-shadow:0 0 0 4px rgba(36,145,255,0.08);
}

#sendBtn{
  width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  background:linear-gradient(135deg, #79c7ff, var(--primary));
  color:white;
  font-size:20px;
  font-weight:800;
  box-shadow:0 8px 20px rgba(36,145,255,0.16);
}

#fileInput{
  display:none;
}

#fileLabel{
  width:48px;
  height:48px;
  border-radius:50%;
  background:#edf4fa;
  color:#5e7185;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
}

/* 뷰어 */
#viewerOverlay{
  position:fixed;
  inset:0;
  z-index:100;
  display:none;
  flex-direction:column;
  background:rgba(245,248,252,0.98);
}

#viewerOverlay.open{
  display:flex;
}

#viewerTopbar{
  height:60px;
  flex-shrink:0;
  border-bottom:1px solid var(--line);
  background:rgba(255,255,255,0.96);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 14px;
}

#viewerTitle{
  font-size:18px;
  font-weight:800;
}

#viewerActions{
  display:flex;
  gap:8px;
}

.viewerBtn{
  height:38px;
  border:none;
  border-radius:12px;
  padding:0 14px;
  background:#edf4fa;
  color:#425466;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

#viewerMain{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns: 7fr 3fr;
}

#viewerLeft{
  min-width:0;
  display:flex;
  flex-direction:column;
  border-right:1px solid var(--line);
  background:#f8fbff;
}

#canvasWrap{
  flex:1;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px;
}

#imageStage{
  position:relative;
  max-width:100%;
  max-height:100%;
  display:inline-block;
}

#viewerImage{
  display:block;
  max-width:100%;
  max-height:calc(100vh - 150px);
  border-radius:18px;
  box-shadow:0 14px 32px rgba(18,36,61,0.10);
  pointer-events:none;
  user-select:none;
  -webkit-user-drag:none;
}

#drawCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border-radius:18px;
  touch-action:none;
  pointer-events:auto;
}

#toolbar{
  border-top:1px solid var(--line);
  background:#ffffff;
  padding:10px 12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

#toolRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

#drawModeWrap{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.toolBtn{
  height:36px;
  border:none;
  border-radius:12px;
  padding:0 12px;
  background:#edf4fa;
  color:#425466;
  font-weight:700;
}

.toolBtn.active{
  background:linear-gradient(135deg, #79c7ff, var(--primary));
  color:white;
}

#thicknessWrap{
  display:flex;
  align-items:center;
  gap:8px;
  color:var(--sub);
  font-size:12px;
  font-weight:700;
}

#thicknessRange{
  width:120px;
}

#colorRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.colorSwatch{
  width:24px;
  height:24px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  box-shadow:0 0 0 1px rgba(0,0,0,0.10);
}

.colorSwatch.active{
  box-shadow:0 0 0 3px rgba(36,145,255,0.20);
}

#viewerRight{
  min-width:0;
  display:flex;
  flex-direction:column;
  background:#ffffff;
}

#viewerChatHeader{
  height:52px;
  flex-shrink:0;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  font-weight:800;
}

#viewerChatBox{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding:12px;
  background:#fbfdff;
}

#viewerChatInner{
  display:flex;
  flex-direction:column;
  gap:10px;
}

#viewerInputBar{
  flex-shrink:0;
  border-top:1px solid var(--line);
  padding:10px 12px 12px;
  background:#ffffff;
  display:flex;
  gap:8px;
}

#viewerMsgInput{
  flex:1;
  height:44px;
  border:1px solid #d8e0ea;
  background:#f8fbff;
  border-radius:16px;
  outline:none;
  padding:0 14px;
  font-size:14px;
}

#viewerSendBtn{
  width:44px;
  height:44px;
  border:none;
  border-radius:50%;
  background:linear-gradient(135deg, #79c7ff, var(--primary));
  color:white;
  font-size:18px;
  font-weight:800;
}

@media (max-width: 900px){
  #app{
    padding:0;
  }

  #chatCard{
    width:100%;
    height:100dvh;
    border-radius:0;
  }

  #header{
    height:64px;
    min-height:64px;
  }

  #title{
    font-size:22px;
  }

  #roleBadge{
    left:10px;
    padding:6px 10px;
    font-size:11px;
  }

  #chatBox{
    padding:14px 12px 8px;
  }

  .bubble{
    max-width:84%;
    font-size:14px;
    padding:11px 14px;
  }

  .chatImg{
    max-width:200px;
  }

  #inputArea{
    padding:8px 10px 10px;
    gap:6px;
  }

  #msgInput,
  #sendBtn,
  #fileLabel{
    height:44px;
  }

  #sendBtn,
  #fileLabel{
    width:44px;
  }

  #viewerMain{
    grid-template-columns:1fr;
    grid-template-rows:56vh 44vh;
  }

  #viewerLeft{
    border-right:none;
    border-bottom:1px solid var(--line);
  }

  #viewerImage{
    max-height:calc(56vh - 80px);
  }

  #viewerTopbar{
    height:56px;
  }
}
</style>
</head>
<body>

<div id="app">
  <section id="chatCard">
    <div id="header">
      <div id="roleBadge">고객 채팅</div>
      <div id="title">디자인 상담</div>
      <div id="headerActions">
        <button id="openViewerBtn" class="iconBtn" type="button" aria-label="새 창으로 열기">⛶</button>
      </div>
    </div>

    <div id="chatBox">
      <div id="chatInner"></div>
    </div>

    <div id="inputArea">
      <div id="utilityRow">
        <button id="togglePhoneBtn" type="button">전화번호 입력</button>
      </div>

      <div id="phoneRow">
        <input id="phoneInput" type="tel" placeholder="전화번호 입력" />
        <button id="savePhoneBtn" type="button">등록</button>
      </div>

      <div id="messageRow">
        <input id="msgInput" type="text" placeholder="메시지 입력..." autocomplete="off" />
        <button id="sendBtn" type="button" aria-label="전송">➤</button>
        <label id="fileLabel" for="fileInput" aria-label="이미지 첨부">📎</label>
        <input id="fileInput" type="file" accept="image/*" />
      </div>
    </div>
  </section>
</div>

<div id="viewerOverlay" aria-hidden="true">
  <div id="viewerTopbar">
    <div id="viewerTitle">이미지 협업 상담</div>
    <div id="viewerActions">
      <a id="downloadSketchBtn" class="viewerBtn" download="sketch.png">다운로드</a>
      <button id="closeViewerBtn" class="viewerBtn" type="button">닫기</button>
    </div>
  </div>

  <div id="viewerMain">
    <section id="viewerLeft">
      <div id="canvasWrap">
        <div id="imageStage">
          <img id="viewerImage" alt="상담 이미지" />
          <canvas id="drawCanvas"></canvas>
        </div>
      </div>

      <div id="toolbar">
        <div id="toolRow">
          <div id="drawModeWrap">
            <button id="penBtn" class="toolBtn active" type="button">펜</button>
            <button id="eraserBtn" class="toolBtn" type="button">지우개</button>
            <button id="clearBtn" class="toolBtn" type="button">전체지우기</button>
          </div>

          <div id="thicknessWrap">
            <span>두께</span>
            <input id="thicknessRange" type="range" min="1" max="48" value="3" />
          </div>
        </div>

        <div id="colorRow">
          <button class="colorSwatch active" type="button" data-color="#ff3b30" style="background:#ff3b30;"></button>
          <button class="colorSwatch" type="button" data-color="#2491ff" style="background:#2491ff;"></button>
          <button class="colorSwatch" type="button" data-color="#22c55e" style="background:#22c55e;"></button>
          <button class="colorSwatch" type="button" data-color="#111827" style="background:#111827;"></button>
          <button class="colorSwatch" type="button" data-color="#f59e0b" style="background:#f59e0b;"></button>
          <button class="colorSwatch" type="button" data-color="#a855f7" style="background:#a855f7;"></button>
        </div>
      </div>
    </section>

    <section id="viewerRight">
      <div id="viewerChatHeader">채팅</div>
      <div id="viewerChatBox">
        <div id="viewerChatInner"></div>
      </div>
      <div id="viewerInputBar">
        <input id="viewerMsgInput" type="text" placeholder="메시지 입력..." autocomplete="off" />
        <button id="viewerSendBtn" type="button">➤</button>
      </div>
    </section>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const params = new URLSearchParams(location.search);
const role = params.has("admin") ? "admin" : "user";
let roomId = params.get("room") || localStorage.getItem("roomId") || crypto.randomUUID();
localStorage.setItem("roomId", roomId);

const socket = io({
  transports: ["websocket", "polling"]
});

const roleBadge = document.getElementById("roleBadge");
const chatInner = document.getElementById("chatInner");
const chatBox = document.getElementById("chatBox");
const msgInput = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");
const fileInput = document.getElementById("fileInput");
const phoneInput = document.getElementById("phoneInput");
const savePhoneBtn = document.getElementById("savePhoneBtn");
const openViewerBtn = document.getElementById("openViewerBtn");
const togglePhoneBtn = document.getElementById("togglePhoneBtn");
const phoneRow = document.getElementById("phoneRow");

const viewerOverlay = document.getElementById("viewerOverlay");
const closeViewerBtn = document.getElementById("closeViewerBtn");
const viewerImage = document.getElementById("viewerImage");
const viewerChatInner = document.getElementById("viewerChatInner");
const viewerChatBox = document.getElementById("viewerChatBox");
const viewerMsgInput = document.getElementById("viewerMsgInput");
const viewerSendBtn = document.getElementById("viewerSendBtn");
const downloadSketchBtn = document.getElementById("downloadSketchBtn");

const drawCanvas = document.getElementById("drawCanvas");
const ctx = drawCanvas.getContext("2d");
const penBtn = document.getElementById("penBtn");
const eraserBtn = document.getElementById("eraserBtn");
const clearBtn = document.getElementById("clearBtn");
const thicknessRange = document.getElementById("thicknessRange");
const colorSwatches = Array.from(document.querySelectorAll(".colorSwatch"));

roleBadge.textContent = role === "admin" ? "관리자 화면" : "고객 채팅";

/* 한글 조합 중복 전송 방지 */
let isComposingMain = false;
let isComposingViewer = false;

msgInput.addEventListener("compositionstart", () => { isComposingMain = true; });
msgInput.addEventListener("compositionend", () => { isComposingMain = false; });
viewerMsgInput.addEventListener("compositionstart", () => { isComposingViewer = true; });
viewerMsgInput.addEventListener("compositionend", () => { isComposingViewer = false; });

/* 현재 선택 이미지 */
let lastSelectedImageId = "";
let lastSelectedImageUrl = "";

/* 뷰어 상태 */
let currentViewerImageId = "";
let currentViewerImageUrl = "";
let currentStrokes = [];
let drawMode = "draw";
let currentColor = "#ff3b30";
let currentSize = 3;
let isDrawing = false;
let lastPoint = null;

/* 새 창 모드 여부 */
const isViewerMode = params.get("viewer") === "1";
const initialImageId = params.get("imageId") || "";
const initialImageUrl = params.get("imageUrl") || "";

socket.emit("join", { roomId, role });

if (isViewerMode) {
  document.getElementById("app").style.display = "none";
  viewerOverlay.classList.add("open");
  viewerOverlay.setAttribute("aria-hidden", "false");

  if (initialImageId && initialImageUrl) {
    currentViewerImageId = initialImageId;
    currentViewerImageUrl = initialImageUrl;
    viewerImage.src = initialImageUrl;
  }
}

togglePhoneBtn.addEventListener("click", () => {
  phoneRow.classList.toggle("open");
});

function scrollBottom(container) {
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

function formatTime(ts) {
  try {
    return new Date(ts).toLocaleTimeString("ko-KR", {
      hour: "numeric",
      minute: "2-digit"
    });
  } catch {
    return "";
  }
}

function createTextRow(data) {
  const row = document.createElement("div");
  row.className = "messageRow " + (data.sender === role ? "me" : "other");

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = data.text || "";

  const meta = document.createElement("div");
  meta.className = "meta";
  meta.textContent = formatTime(data.time);

  row.appendChild(bubble);
  row.appendChild(meta);
  return row;
}

function createImageRow(data) {
  const row = document.createElement("div");
  row.className = "messageRow " + (data.sender === role ? "me" : "other");

  const wrap = document.createElement("div");
  wrap.className = "imageBubble";

  const img = document.createElement("img");
  img.className = "chatImg";
  img.src = data.imageUrl;
  img.alt = "첨부 이미지";

  wrap.appendChild(img);
  wrap.addEventListener("click", () => {
    openViewerPopup(data.imageId, data.imageUrl);
  });

  const meta = document.createElement("div");
  meta.className = "meta";
  meta.textContent = formatTime(data.time);

  row.appendChild(wrap);
  row.appendChild(meta);
  return row;
}

function syncViewerChatFromMain() {
  viewerChatInner.innerHTML = chatInner.innerHTML;
  scrollBottom(viewerChatBox);
}

function renderTextMessage(data) {
  chatInner.appendChild(createTextRow(data));
  scrollBottom(chatBox);

  if (viewerOverlay.classList.contains("open")) {
    viewerChatInner.appendChild(createTextRow(data));
    scrollBottom(viewerChatBox);
  }
}

function renderImageMessage(data) {
  chatInner.appendChild(createImageRow(data));
  scrollBottom(chatBox);

  if (viewerOverlay.classList.contains("open")) {
    viewerChatInner.appendChild(createImageRow(data));
    scrollBottom(viewerChatBox);
  }

  lastSelectedImageId = data.imageId;
  lastSelectedImageUrl = data.imageUrl;
}

function sendMainMessage() {
  const text = msgInput.value.trim();
  if (!text || isComposingMain) return;
  socket.emit("message", { text });
  msgInput.value = "";
}

function sendViewerMessage() {
  const text = viewerMsgInput.value.trim();
  if (!text || isComposingViewer) return;
  socket.emit("message", { text });
  viewerMsgInput.value = "";
}

async function savePhone() {
  const phone = phoneInput.value.trim();
  if (!phone) {
    alert("전화번호를 입력해주세요.");
    return;
  }
  alert("전화번호 저장 기능은 현재 최소 버전에서는 UI만 포함되어 있습니다.");
}

async function uploadImage(file) {
  const formData = new FormData();
  formData.append("image", file);

  const response = await fetch("/upload", {
    method: "POST",
    body: formData
  });

  const result = await response.json().catch(() => ({}));
  if (!response.ok) {
    throw new Error(result.error || "이미지 업로드 실패");
  }
  if (!result.url) {
    throw new Error("업로드된 이미지 URL이 없습니다.");
  }

  socket.emit("image", { url: result.url });
}

function openViewerPopup(imageId, imageUrl) {
  const url = new URL(window.location.origin + window.location.pathname);
  url.searchParams.set("viewer", "1");
  url.searchParams.set("room", roomId);
  url.searchParams.set("role", role);
  url.searchParams.set("imageId", imageId);
  url.searchParams.set("imageUrl", imageUrl);

  window.open(
    url.toString(),
    "designImageViewer",
    "width=1320,height=860,resizable=yes,scrollbars=yes"
  );
}

function closeViewer() {
  viewerOverlay.classList.remove("open");
  viewerOverlay.setAttribute("aria-hidden", "true");
  currentViewerImageId = "";
  currentViewerImageUrl = "";
  currentStrokes = [];
  clearCanvas();
}

function updateCanvasSize() {
  const width = viewerImage.clientWidth;
  const height = viewerImage.clientHeight;
  if (!width || !height) return;

  drawCanvas.width = width;
  drawCanvas.height = height;
  redrawAllStrokes();
}

function clearCanvas() {
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
}

function drawStroke(stroke) {
  if (!drawCanvas.width || !drawCanvas.height) return;

  const x1 = stroke.last.x * drawCanvas.width;
  const y1 = stroke.last.y * drawCanvas.height;
  const x2 = stroke.current.x * drawCanvas.width;
  const y2 = stroke.current.y * drawCanvas.height;

  ctx.save();
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.lineWidth = stroke.size || 3;

  if (stroke.mode === "erase") {
    ctx.globalCompositeOperation = "destination-out";
    ctx.strokeStyle = "rgba(0,0,0,1)";
  } else {
    ctx.globalCompositeOperation = "source-over";
    ctx.strokeStyle = stroke.color || "#ff3b30";
  }

  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.restore();
}

function redrawAllStrokes() {
  clearCanvas();
  currentStrokes.forEach(drawStroke);
}

function getNormalizedPoint(evt) {
  const rect = drawCanvas.getBoundingClientRect();
  return {
    x: Math.max(0, Math.min(1, (evt.clientX - rect.left) / rect.width)),
    y: Math.max(0, Math.min(1, (evt.clientY - rect.top) / rect.height))
  };
}

function setActiveTools() {
  penBtn.classList.toggle("active", drawMode === "draw");
  eraserBtn.classList.toggle("active", drawMode === "erase");
}

function setActiveColor(color) {
  colorSwatches.forEach((btn) => {
    btn.classList.toggle("active", btn.dataset.color === color);
  });
}

function buildDownload() {
  if (!currentViewerImageUrl) return;

  const img = new Image();
  img.onload = () => {
    const exportCanvas = document.createElement("canvas");
    exportCanvas.width = img.naturalWidth;
    exportCanvas.height = img.naturalHeight;

    const exportCtx = exportCanvas.getContext("2d");
    exportCtx.drawImage(img, 0, 0);

    currentStrokes.forEach((stroke) => {
      const x1 = stroke.last.x * exportCanvas.width;
      const y1 = stroke.last.y * exportCanvas.height;
      const x2 = stroke.current.x * exportCanvas.width;
      const y2 = stroke.current.y * exportCanvas.height;

      exportCtx.save();
      exportCtx.lineCap = "round";
      exportCtx.lineJoin = "round";
      exportCtx.lineWidth = stroke.size || 3;

      if (stroke.mode === "erase") {
        exportCtx.globalCompositeOperation = "destination-out";
        exportCtx.strokeStyle = "rgba(0,0,0,1)";
      } else {
        exportCtx.globalCompositeOperation = "source-over";
        exportCtx.strokeStyle = stroke.color || "#ff3b30";
      }

      exportCtx.beginPath();
      exportCtx.moveTo(x1, y1);
      exportCtx.lineTo(x2, y2);
      exportCtx.stroke();
      exportCtx.restore();
    });

    downloadSketchBtn.href = exportCanvas.toDataURL("image/png");
  };
  img.src = currentViewerImageUrl;
}

/* 이벤트 */
sendBtn.addEventListener("click", sendMainMessage);
viewerSendBtn.addEventListener("click", sendViewerMessage);

msgInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    if (isComposingMain || e.isComposing) return;
    e.preventDefault();
    sendMainMessage();
  }
});

viewerMsgInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    if (isComposingViewer || e.isComposing) return;
    e.preventDefault();
    sendViewerMessage();
  }
});

savePhoneBtn.addEventListener("click", savePhone);

fileInput.addEventListener("change", async (e) => {
  const selected = e.target.files[0];
  if (!selected) return;

  try {
    await uploadImage(selected);
  } catch (error) {
    console.error(error);
    alert(error.message || "이미지 업로드에 실패했습니다.");
  } finally {
    fileInput.value = "";
  }
});

openViewerBtn.addEventListener("click", () => {
  if (!lastSelectedImageId || !lastSelectedImageUrl) {
    alert("먼저 채팅에서 이미지를 선택해주세요.");
    return;
  }
  openViewerPopup(lastSelectedImageId, lastSelectedImageUrl);
});

closeViewerBtn.addEventListener("click", () => {
  if (isViewerMode) {
    window.close();
    return;
  }
  closeViewer();
});

viewerImage.addEventListener("load", () => {
  updateCanvasSize();
  if (currentViewerImageId) {
    socket.emit("request-drawing-history", { imageId: currentViewerImageId });
  }
});

window.addEventListener("resize", updateCanvasSize);

penBtn.addEventListener("click", () => {
  drawMode = "draw";
  setActiveTools();
});

eraserBtn.addEventListener("click", () => {
  drawMode = "erase";
  setActiveTools();
});

clearBtn.addEventListener("click", () => {
  if (!currentViewerImageId) return;
  socket.emit("clear-drawing", { imageId: currentViewerImageId });
});

thicknessRange.addEventListener("input", () => {
  currentSize = Number(thicknessRange.value || 3);
});

colorSwatches.forEach((btn) => {
  btn.addEventListener("click", () => {
    currentColor = btn.dataset.color || "#ff3b30";
    setActiveColor(currentColor);
  });
});

drawCanvas.addEventListener("pointerdown", (evt) => {
  if (!currentViewerImageId) return;
  isDrawing = true;
  lastPoint = getNormalizedPoint(evt);
  drawCanvas.setPointerCapture(evt.pointerId);
});

drawCanvas.addEventListener("pointermove", (evt) => {
  if (!isDrawing || !currentViewerImageId || !lastPoint) return;

  const current = getNormalizedPoint(evt);
  const stroke = {
    imageId: currentViewerImageId,
    mode: drawMode,
    color: currentColor,
    size: currentSize,
    last: lastPoint,
    current
  };

  currentStrokes.push(stroke);
  drawStroke(stroke);
  socket.emit("draw-stroke", stroke);
  lastPoint = current;
});

function stopDrawing() {
  isDrawing = false;
  lastPoint = null;
}

drawCanvas.addEventListener("pointerup", stopDrawing);
drawCanvas.addEventListener("pointercancel", stopDrawing);
drawCanvas.addEventListener("pointerleave", stopDrawing);

downloadSketchBtn.addEventListener("click", buildDownload);

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    if (isViewerMode) {
      window.close();
      return;
    }
    closeViewer();
  }
});

/* 소켓 수신 */
socket.on("history", (messages) => {
  chatInner.innerHTML = "";
  viewerChatInner.innerHTML = "";

  (messages || []).forEach((item) => {
    if (item.type === "text") renderTextMessage(item);
    if (item.type === "image") renderImageMessage(item);
  });
});

socket.on("message", (data) => {
  renderTextMessage(data);
});

socket.on("image", (data) => {
  renderImageMessage(data);
});

socket.on("drawing-history", (payload) => {
  if (!payload || payload.imageId !== currentViewerImageId) return;
  currentStrokes = Array.isArray(payload.strokes) ? payload.strokes : [];
  redrawAllStrokes();
});

socket.on("draw-stroke", (stroke) => {
  if (!stroke || stroke.imageId !== currentViewerImageId) return;
  currentStrokes.push(stroke);
  drawStroke(stroke);
});

socket.on("clear-drawing", (payload) => {
  if (!payload || payload.imageId !== currentViewerImageId) return;
  currentStrokes = [];
  clearCanvas();
});
</script>
