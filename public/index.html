<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>디자인 상담</title>

<style>
:root{
  --bg:#f4f8fc;
  --card:#ffffff;
  --soft:#f8fbff;
  --line:#e4ebf3;
  --text:#17212b;
  --sub:#758394;
  --primary:#2491ff;
  --primary-soft:#6fc3ff;
  --shadow:0 18px 50px rgba(18,36,61,0.10);
}

*{ box-sizing:border-box; }

html, body{
  margin:0;
  width:100%;
  height:100%;
  font-family:-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  background:
    radial-gradient(circle at top left, rgba(36,145,255,0.08), transparent 24%),
    linear-gradient(180deg, #f9fbff 0%, #edf4fa 100%);
  color:var(--text);
}

body{ overflow:hidden; }

body.viewer-inline-open #app{
  visibility:visible;
}

button,input,textarea,label{ font:inherit; }
button{ cursor:pointer; }

.btnIcon{
  display:none;
  align-items:center;
  justify-content:center;
  width:1em;
  height:1em;
  font-size:17px;
  line-height:1;
  flex-shrink:0;
  transform:translateY(-0.02em);
}

.viewerBtn .btnIcon{
  display:inline-flex;
}

.viewerBtn .btnText{
  display:none;
}

.srOnly{
  position:absolute;
  width:1px;
  height:1px;
  padding:0;
  margin:-1px;
  overflow:hidden;
  clip:rect(0, 0, 0, 0);
  white-space:nowrap;
  border:0;
}

#app{
  width:100%;
  height:100%;
  padding:14px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#chatCard{
  width:min(920px, 100%);
  height:min(94dvh, 860px);
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.8);
  border-radius:30px;
  box-shadow:var(--shadow);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

#header{
  height:74px;
  flex-shrink:0;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  background:rgba(255,255,255,0.9);
}

#title{
  font-size:26px;
  font-weight:800;
  letter-spacing:-0.03em;
}

#roleBadge{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  padding:8px 12px;
  border-radius:999px;
  background:#f7faff;
  border:1px solid var(--line);
  color:var(--sub);
  font-size:12px;
  font-weight:700;
}

#headerActions{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  gap:8px;
}

.iconBtn{
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:#edf4fa;
  color:#557086;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  line-height:1;
}

#chatBox{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding:16px 16px 10px;
  background:#f8fbff;
}

#chatInner{
  display:flex;
  flex-direction:column;
  gap:12px;
  min-height:100%;
}

.messageRow{ display:flex; flex-direction:column; gap:4px; }
.messageRow.me{ align-items:flex-end; }
.messageRow.other{ align-items:flex-start; }

.bubble{
  max-width:min(74%, 520px);
  padding:12px 16px;
  border-radius:22px;
  font-size:15px;
  line-height:1.45;
  letter-spacing:-0.02em;
  word-break:break-word;
}

.messageRow.me .bubble{
  background:linear-gradient(135deg, var(--primary-soft), var(--primary));
  color:white;
  border-bottom-right-radius:8px;
  box-shadow:0 8px 20px rgba(36,145,255,0.16);
}

.messageRow.other .bubble{
  background:#ffffff;
  color:var(--text);
  border:1px solid var(--line);
  border-bottom-left-radius:8px;
}

.meta{
  font-size:11px;
  color:var(--sub);
  padding:0 6px;
}

.imageBubble{
  max-width:min(72%, 500px);
  background:#ffffff;
  border:1px solid var(--line);
  border-radius:22px;
  padding:8px;
  cursor:pointer;
}

.messageRow.me .imageBubble{ border-bottom-right-radius:8px; }
.messageRow.other .imageBubble{ border-bottom-left-radius:8px; }

.chatImg{
  display:block;
  width:100%;
  max-width:230px;
  border-radius:14px;
}

#inputArea{
  flex-shrink:0;
  border-top:1px solid var(--line);
  background:rgba(255,255,255,0.94);
  padding:10px 14px 12px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

#utilityRow{
  display:block;
}

#phonePanel{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:12px;
  border:1px solid #dce7f1;
  border-radius:18px;
  background:linear-gradient(180deg, #f8fbff, #f3f8fd);
}

#phonePanelHeader{
  display:flex;
  align-items:flex-start;
  gap:10px;
}

#phonePanelIcon{
  width:34px;
  height:34px;
  border-radius:12px;
  background:#e8f2ff;
  color:#3d88ea;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  line-height:1;
  flex-shrink:0;
}

#phonePanelText{
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:3px;
}

#phonePanelTitle{
  font-size:13px;
  font-weight:800;
  color:#24313f;
  letter-spacing:-0.01em;
}

#phonePanelDesc{
  font-size:12px;
  color:#708092;
  line-height:1.45;
}

#phoneRow{
  display:flex;
  gap:8px;
}

#phoneStatus{
  display:none;
  font-size:12px;
  color:#5f7286;
  padding:0 2px;
}

#phoneStatus.show{
  display:block;
}

#phoneInput{
  flex:1;
  height:42px;
  border:1px solid #d8e2ec;
  background:#f8fbff;
  border-radius:16px;
  outline:none;
  padding:0 14px;
  font-size:14px;
}

#savePhoneBtn{
  height:42px;
  border:none;
  border-radius:16px;
  min-width:58px;
  padding:0 16px;
  background:#607082;
  color:white;
  font-weight:800;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

#messageRow{
  display:flex;
  align-items:center;
  gap:8px;
}

#msgInput{
  flex:1;
  height:48px;
  border:1px solid #d8e2ec;
  background:#f8fbff;
  border-radius:18px;
  outline:none;
  padding:0 16px;
  font-size:15px;
}

#msgInput:focus,
#phoneInput:focus,
#viewerMsgInput:focus{
  background:#ffffff;
  border-color:rgba(36,145,255,0.45);
  box-shadow:0 0 0 4px rgba(36,145,255,0.08);
}

#sendBtn{
  width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  background:linear-gradient(135deg, #79c7ff, var(--primary));
  color:white;
  font-size:20px;
  font-weight:800;
  box-shadow:0 8px 20px rgba(36,145,255,0.16);
}

#fileInput{ display:none; }

#fileLabel{
  width:48px;
  height:48px;
  border-radius:50%;
  background:#edf4fa;
  color:#5e7185;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
}

#viewerOverlay{
  position:fixed;
  inset:0;
  z-index:100;
  display:none;
  flex-direction:column;
  background:rgba(245,248,252,0.98);
}

#viewerOverlay.open{ display:flex; }

#viewerTopbar{
  height:68px;
  flex-shrink:0;
  border-bottom:1px solid var(--line);
  background:rgba(255,255,255,0.96);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 14px;
  gap:12px;
}

#viewerTopLeft{
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:3px;
}

#viewerTitle{
  font-size:18px;
  font-weight:800;
}

#viewerSubtitle{
  font-size:12px;
  color:var(--sub);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

#viewerStats{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.statBadge{
  height:30px;
  padding:0 10px;
  border-radius:999px;
  background:#eef4fa;
  color:#587085;
  font-size:12px;
  display:flex;
  align-items:center;
  font-weight:700;
}

#viewerActions{
  display:flex;
  gap:8px;
  flex-shrink:0;
}

.viewerBtn{
  height:38px;
  border:none;
  border-radius:12px;
  padding:0 14px;
  background:#edf4fa;
  color:#425466;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-weight:700;
  line-height:1;
}

#viewerMain{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns: 7fr 3fr;
}

#viewerLeft{
  min-width:0;
  display:flex;
  flex-direction:column;
  border-right:1px solid var(--line);
  background:#f8fbff;
}

#canvasWrap{
  flex:1;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:14px;
  background:#f7fbff;
}

#imageStage{
  position:relative;
  width:min(100%, 1200px);
  height:min(100%, 760px);
  min-height:420px;
  border-radius:22px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.92), rgba(247,251,255,0.96));
  border:1px solid #dfe9f3;
  box-shadow:0 18px 38px rgba(18,36,61,0.08);
  overflow:hidden;
}

#viewerImage{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%);
  max-width:84%;
  max-height:84%;
  border-radius:18px;
  box-shadow:0 14px 32px rgba(18,36,61,0.12);
  pointer-events:none;
  user-select:none;
  -webkit-user-drag:none;
  z-index:1;
}

#drawCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border-radius:22px;
  touch-action:none;
  pointer-events:auto;
  z-index:2;
}

#textLayer{
  position:absolute;
  inset:0;
  z-index:3;
  pointer-events:none;
}

.text-note{
  position:absolute;
  min-width:120px;
  min-height:40px;
  max-width:240px;
  padding:8px 10px 10px;
  border-radius:14px;
  border:2px solid #2491ff;
  box-shadow:0 10px 20px rgba(36,145,255,0.12);
  pointer-events:auto;
  will-change: transform, width, height;
}

.text-note.collapsed{
  width:44px !important;
  height:44px !important;
  min-width:44px;
  min-height:44px;
  padding:0;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.text-note[data-author="me"]{
  border-color:#2491ff;
  box-shadow:0 10px 20px rgba(36,145,255,0.12);
}

.text-note[data-author="other"]{
  border-color:#8a5cff;
  box-shadow:0 10px 20px rgba(138,92,255,0.14);
}

.text-note.selected{
  box-shadow:0 0 0 3px rgba(255,139,61,0.18);
}

.text-note.collapsed.selected{
  box-shadow:0 0 0 3px rgba(255,139,61,0.18);
}

.text-note-header{
  height:14px;
  margin:-2px -2px 4px;
  cursor:move;
}

.text-note.collapsed .text-note-header,
.text-note.collapsed .text-note-author,
.text-note.collapsed textarea,
.text-note.collapsed .text-note-delete,
.text-note.collapsed .text-note-resize{
  display:none;
}

.text-note-author{
  display:inline-flex;
  align-items:center;
  height:20px;
  padding:0 8px;
  border-radius:999px;
  font-size:10px;
  font-weight:800;
  margin-bottom:4px;
  letter-spacing:-0.01em;
}

.text-note[data-author="me"] .text-note-author{
  background:#e8f2ff;
  color:#216fcb;
}

.text-note[data-author="other"] .text-note-author{
  background:#f0e9ff;
  color:#7a46d1;
}

.text-note textarea{
  width:100%;
  min-height:20px;
  resize:none;
  border:none;
  background:transparent;
  outline:none;
  color:var(--text);
  font-size:13px;
  line-height:1.35;
  overflow:hidden;
  padding:0;
}

.text-note-toggle{
  width:28px;
  height:28px;
  border:none;
  border-radius:10px;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:15px;
  font-weight:800;
  background:rgba(255,255,255,0.72);
  color:#273342;
}

.text-note.collapsed .text-note-toggle{
  display:inline-flex;
}

.text-note-delete{
  position:absolute;
  top:-10px;
  right:-10px;
  width:24px;
  height:24px;
  border:none;
  border-radius:50%;
  background:#ff5b5b;
  color:white;
  font-size:12px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
}

.text-note-resize{
  position:absolute;
  right:4px;
  bottom:4px;
  width:14px;
  height:14px;
  border-radius:4px;
  background:#2491ff;
  cursor:nwse-resize;
}

#toolbar{
  border-top:1px solid var(--line);
  background:#ffffff;
  padding:10px 12px 12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  flex-shrink:0;
}

#toolRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

#drawModeWrap{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  flex:1;
}

.toolBtn{
  height:36px;
  border:none;
  border-radius:12px;
  padding:0 12px;
  background:#edf4fa;
  color:#425466;
  font-weight:700;
  white-space:nowrap;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  line-height:1;
}

#openViewerBtn{
  font-size:17px;
  line-height:1;
}

#downloadSketchBtn .btnIcon{
  transform:translateY(-0.06em);
}

#closeViewerBtn .btnIcon{
  transform:translateY(-0.03em);
}

#penBtn .btnIcon{
  transform:translateY(-0.05em);
}

#eraserBtn .btnIcon,
#clearDrawingBtn .btnIcon,
#clearNotesBtn .btnIcon{
  transform:translateY(-0.04em);
}

#undoBtn .btnIcon,
#redoBtn .btnIcon{
  transform:translateY(-0.04em);
}

.toolBtn.active{
  background:linear-gradient(135deg, #79c7ff, var(--primary));
  color:white;
}

#thicknessWrap{
  display:flex;
  align-items:center;
  gap:8px;
  color:var(--sub);
  font-size:12px;
  font-weight:700;
  flex-shrink:0;
}

#thicknessRange{ width:120px; }

#colorRow, #noteColorRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
  min-height:30px;
}

#colorRow{
  display:none;
  padding:8px 10px;
  border:1px solid #dce7f1;
  border-radius:14px;
  background:#f8fbff;
  box-shadow:0 10px 24px rgba(18,36,61,0.08);
}

#colorRow.open{
  display:flex;
}

#noteColorHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}

#noteColorTitle{
  font-size:12px;
  font-weight:800;
  color:var(--sub);
}

#toggleNoteColorsBtn{
  height:30px;
  border:none;
  border-radius:999px;
  padding:0 12px;
  background:#edf4fa;
  color:#425466;
  font-size:12px;
  font-weight:700;
}

.colorSwatch{
  width:26px;
  height:26px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  box-shadow:0 0 0 1px rgba(0,0,0,0.10);
  flex:0 0 auto;
}

.colorSwatch.active{
  box-shadow:0 0 0 3px rgba(36,145,255,0.20);
}

#customColorBtn{
  position:relative;
  overflow:hidden;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.95), rgba(228,236,245,0.95)),
    conic-gradient(from 180deg, #ff3b30, #f59e0b, #22c55e, #2491ff, #a855f7, #ff3b30);
}

#customColorBtn::before{
  content:"";
  position:absolute;
  inset:4px;
  border-radius:50%;
  background:var(--custom-color-preview, conic-gradient(from 180deg, #ff3b30, #f59e0b, #22c55e, #2491ff, #a855f7, #ff3b30));
}

#customColorBtn::after{
  content:"+";
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ffffff;
  font-size:14px;
  font-weight:900;
  text-shadow:0 1px 2px rgba(0,0,0,0.35);
}

#customColorInput{
  position:absolute;
  pointer-events:none;
  opacity:0;
}

.noteColorSwatch{
  width:22px;
  height:22px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  box-shadow:0 0 0 1px rgba(0,0,0,0.10);
}

.noteColorSwatch.active{
  box-shadow:0 0 0 3px rgba(36,145,255,0.18);
}

#historyRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

#viewerRight{
  min-width:0;
  display:flex;
  flex-direction:column;
  background:#ffffff;
}

#viewerChatHeader{
  height:52px;
  flex-shrink:0;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  font-weight:800;
}

#viewerChatBox{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding:12px;
  background:#fbfdff;
}

#viewerChatInner{
  display:flex;
  flex-direction:column;
  gap:10px;
}

#viewerInputBar{
  flex-shrink:0;
  border-top:1px solid var(--line);
  padding:10px 12px 12px;
  background:#ffffff;
  display:flex;
  gap:8px;
}

#viewerMsgInput{
  flex:1;
  height:44px;
  border:1px solid #d8e0ea;
  background:#f8fbff;
  border-radius:16px;
  outline:none;
  padding:0 14px;
  font-size:14px;
}

#viewerSendBtn{
  width:44px;
  height:44px;
  border:none;
  border-radius:50%;
  background:linear-gradient(135deg, #79c7ff, var(--primary));
  color:white;
  font-size:18px;
  font-weight:800;
}

@media (max-width: 900px){
  body.viewer-inline-open #app{
    visibility:hidden;
  }

  body.viewer-inline-open #viewerOverlay{
    background:#f5f8fc;
  }

  #app{ padding:0; }

  #chatCard{
    width:100%;
    height:100dvh;
    border-radius:0;
  }

  #header{
    height:64px;
    min-height:64px;
  }

  #title{ font-size:22px; }

  #roleBadge{
    left:10px;
    padding:6px 10px;
    font-size:11px;
  }

  #chatBox{ padding:14px 12px 8px; }

  .bubble{
    max-width:84%;
    font-size:14px;
    padding:11px 14px;
  }

  .chatImg{ max-width:200px; }

  #inputArea{
    padding:8px 10px 10px;
    gap:6px;
  }

  #msgInput, #sendBtn, #fileLabel{ height:44px; }
  #sendBtn, #fileLabel{ width:44px; }

  #savePhoneBtn,
  .viewerBtn,
  .toolBtn{
    min-width:40px;
    width:40px;
    padding:0;
    border-radius:12px;
  }

  #savePhoneBtn .btnText,
  .viewerBtn .btnText,
  .toolBtn .btnText{
    display:none;
  }

  #savePhoneBtn .btnIcon,
  .viewerBtn .btnIcon,
  .toolBtn .btnIcon{
    display:inline-flex;
  }

  #phonePanel{
    padding:11px;
    gap:9px;
  }

  #phonePanelHeader{
    gap:8px;
  }

  #phonePanelIcon{
    width:32px;
    height:32px;
    border-radius:10px;
  }

  #phoneRow{
    flex-direction:column;
  }

  #savePhoneBtn{
    width:100%;
    min-width:0;
  }

  #viewerTopbar{
    height:auto;
    min-height:0;
    display:grid;
    grid-template-columns:auto minmax(0, 1fr) auto;
    grid-template-areas:"stats title actions";
    align-items:center;
    gap:6px 10px;
    padding:8px 10px;
  }

  #viewerTopLeft{
    grid-area:title;
    width:100%;
    gap:0;
    justify-self:start;
  }

  #viewerTitle{
    font-size:15px;
    line-height:1.2;
  }

  #viewerSubtitle{
    display:none;
  }

  #viewerStats{
    grid-area:stats;

</style>
</head>
<body>

<div id="app">
  <section id="chatCard">
    <div id="header">
      <div id="roleBadge">고객 채팅</div>
      <div id="title">디자인 상담</div>
      <div id="headerActions">
        <button id="openViewerBtn" class="iconBtn" type="button" aria-label="새 창으로 열기">⛶</button>
      </div>
    </div>

    <div id="chatBox">
      <div id="chatInner"></div>
    </div>

    <div id="inputArea">
      <div id="utilityRow">
        <div id="phonePanel">
          <div id="phonePanelHeader">
            <div id="phonePanelIcon" aria-hidden="true">☎</div>
            <div id="phonePanelText">
              <div id="phonePanelTitle">연락처 남기기</div>
              <div id="phonePanelDesc">연락받으실 전화번호를 입력해 주세요.</div>
            </div>
          </div>

          <div id="phoneRow">
            <input id="phoneInput" type="tel" placeholder="연락받으실 전화번호를 입력해 주세요." />
            <button id="savePhoneBtn" type="button" aria-label="전화번호 등록">
              <span class="btnIcon">✓</span>
              <span class="btnText">등록</span>
            </button>
          </div>
        </div>
      </div>
      <div id="phoneStatus" aria-live="polite"></div>

      <div id="messageRow">
        <input id="msgInput" type="text" placeholder="메시지 입력..." autocomplete="off" />
        <button id="sendBtn" type="button" aria-label="전송">➤</button>
        <label id="fileLabel" for="fileInput" aria-label="이미지 첨부">📎</label>
        <input id="fileInput" type="file" accept="image/*" />
      </div>
    </div>
  </section>
</div>

<div id="viewerOverlay" aria-hidden="true">
  <div id="viewerTopbar">
    <div id="viewerTopLeft">
      <div id="viewerTitle">이미지 협업 상담</div>
      <div id="viewerSubtitle">현재 이미지 선택 대기 중</div>
    </div>

    <div id="viewerStats">
      <div class="statBadge" id="drawingCountBadge" data-icon="〰" data-count="0">선 0</div>
      <div class="statBadge" id="noteCountBadge" data-icon="✎" data-count="0">메모 0</div>
      <div class="statBadge" id="connectionBadge" data-icon="●" data-count="on">연결됨</div>
    </div>

    <div id="viewerActions">
      <button id="downloadSketchBtn" class="viewerBtn" type="button" aria-label="스케치 다운로드">
        <span class="btnIcon">↓</span>
        <span class="btnText">다운로드</span>
      </button>
      <button id="closeViewerBtn" class="viewerBtn" type="button" aria-label="뷰어 닫기">
        <span class="btnIcon">✕</span>
        <span class="btnText">닫기</span>
      </button>
    </div>
  </div>

  <div id="viewerMain">
    <section id="viewerLeft">
      <div id="canvasWrap">
        <div id="imageStage">
          <img id="viewerImage" alt="상담 이미지" />
          <canvas id="drawCanvas"></canvas>
          <div id="textLayer"></div>
        </div>
      </div>

      <div id="toolbar">
        <div id="toolRow">
          <div id="drawModeWrap">
            <button id="penBtn" class="toolBtn active" type="button" aria-label="펜">
              <span class="btnIcon">✎</span>
              <span class="btnText">펜</span>
            </button>
            <button id="eraserBtn" class="toolBtn" type="button" aria-label="지우개">
              <span class="btnIcon">⌫</span>
              <span class="btnText">지우개</span>
            </button>
            <button id="addTextBtn" class="toolBtn" type="button" aria-label="텍스트 추가">
              <span class="btnIcon">T</span>
              <span class="btnText">텍스트 추가</span>
            </button>
            <button id="clearDrawingBtn" class="toolBtn" type="button" aria-label="선 지우기">
              <span class="btnIcon">⌧</span>
              <span class="btnText">선지우기</span>
            </button>
            <button id="clearNotesBtn" class="toolBtn" type="button" aria-label="메모 지우기">
              <span class="btnIcon">⌦</span>
              <span class="btnText">메모지우기</span>
            </button>
          </div>

          <div id="thicknessWrap">
            <span>두께</span>
            <input id="thicknessRange" type="range" min="1" max="48" value="3" />
          </div>
        </div>

        <div id="historyRow">
          <button id="undoBtn" class="toolBtn" type="button" aria-label="실행 취소">
            <span class="btnIcon">↶</span>
            <span class="btnText">Undo</span>
          </button>
          <button id="redoBtn" class="toolBtn" type="button" aria-label="다시 실행">
            <span class="btnIcon">↷</span>
            <span class="btnText">Redo</span>
          </button>
        </div>

        <div id="colorRow">
          <button class="colorSwatch" type="button" data-color="#111827" style="background:#111827;" aria-label="검정"></button>
          <button class="colorSwatch active" type="button" data-color="#ff3b30" style="background:#ff3b30;" aria-label="빨강"></button>
          <button class="colorSwatch" type="button" data-color="#facc15" style="background:#facc15;" aria-label="노랑"></button>
          <button id="customColorBtn" class="colorSwatch" type="button" aria-label="다른 색상 선택"></button>
          <input id="customColorInput" type="color" value="#2491ff" aria-label="사용자 지정 색상" />
        </div>

        <div id="noteColorHeader">
          <div id="noteColorTitle">메모 색상</div>
          <button id="toggleNoteColorsBtn" type="button">메모 색상</button>
        </div>

        <div id="noteColorRow">
          <button class="noteColorSwatch active" type="button" data-note-color="#fff7c2" style="background:#fff7c2;"></button>
          <button class="noteColorSwatch" type="button" data-note-color="#dff5ff" style="background:#dff5ff;"></button>
          <button class="noteColorSwatch" type="button" data-note-color="#e8ffd9" style="background:#e8ffd9;"></button>
          <button class="noteColorSwatch" type="button" data-note-color="#ffe4ef" style="background:#ffe4ef;"></button>
          <button class="noteColorSwatch" type="button" data-note-color="#efe7ff" style="background:#efe7ff;"></button>
        </div>
      </div>
    </section>

    <section id="viewerRight">
      <div id="viewerChatHeader">채팅</div>
      <div id="viewerChatBox">
        <div id="viewerChatInner"></div>
      </div>
      <div id="viewerInputBar">
        <input id="viewerMsgInput" type="text" placeholder="메시지 입력..." autocomplete="off" />
        <button id="viewerSendBtn" type="button">➤</button>
      </div>
    </section>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const STORAGE_KEYS = {
  roomId: "chat_room_id",
  viewerState: "chat_last_viewer_state",
  userName: "chat_user_name"
};
const EMBED_MESSAGE_NAMESPACE = "design-chat-widget";
const MAX_CLIENT_STROKES = 2000;
const MAX_CLIENT_NOTES = 100;

const params = new URLSearchParams(location.search);
const role = params.get("role") === "admin" || params.has("admin") ? "admin" : "user";
const userName =
  params.get("userName") ||
  localStorage.getItem(STORAGE_KEYS.userName) ||
  "상담자";

localStorage.setItem(STORAGE_KEYS.userName, userName);

let roomId = params.get("room") || localStorage.getItem(STORAGE_KEYS.roomId) || crypto.randomUUID();
localStorage.setItem(STORAGE_KEYS.roomId, roomId);

const socket = io({
  transports: ["websocket", "polling"]
});

const roleBadge = document.getElementById("roleBadge");
const chatInner = document.getElementById("chatInner");
const chatBox = document.getElementById("chatBox");
const msgInput = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");
const fileInput = document.getElementById("fileInput");
const phoneInput = document.getElementById("phoneInput");
const phoneStatus = document.getElementById("phoneStatus");
const savePhoneBtn = document.getElementById("savePhoneBtn");
const openViewerBtn = document.getElementById("openViewerBtn");

const viewerOverlay = document.getElementById("viewerOverlay");
const closeViewerBtn = document.getElementById("closeViewerBtn");
const viewerImage = document.getElementById("viewerImage");
const viewerChatInner = document.getElementById("viewerChatInner");
const viewerChatBox = document.getElementById("viewerChatBox");
const viewerMsgInput = document.getElementById("viewerMsgInput");
const viewerSendBtn = document.getElementById("viewerSendBtn");
const downloadSketchBtn = document.getElementById("downloadSketchBtn");
const viewerSubtitle = document.getElementById("viewerSubtitle");
const drawingCountBadge = document.getElementById("drawingCountBadge");
const noteCountBadge = document.getElementById("noteCountBadge");
const connectionBadge = document.getElementById("connectionBadge");

const drawCanvas = document.getElementById("drawCanvas");
const ctx = drawCanvas.getContext("2d");
const penBtn = document.getElementById("penBtn");
const eraserBtn = document.getElementById("eraserBtn");
const addTextBtn = document.getElementById("addTextBtn");
const clearDrawingBtn = document.getElementById("clearDrawingBtn");
const clearNotesBtn = document.getElementById("clearNotesBtn");
const undoBtn = document.getElementById("undoBtn");
const redoBtn = document.getElementById("redoBtn");
const thicknessRange = document.getElementById("thicknessRange");
const colorRow = document.getElementById("colorRow");
const colorSwatches = Array.from(document.querySelectorAll(".colorSwatch"));
const customColorBtn = document.getElementById("customColorBtn");
const customColorInput = document.getElementById("customColorInput");
const noteColorSwatches = Array.from(document.querySelectorAll(".noteColorSwatch"));
const noteColorRow = document.getElementById("noteColorRow");
const toggleNoteColorsBtn = document.getElementById("toggleNoteColorsBtn");
const textLayer = document.getElementById("textLayer");
const imageStage = document.getElementById("imageStage");

roleBadge.textContent = role === "admin" ? "관리자 화면" : "고객 채팅";

let isComposingMain = false;
let isComposingViewer = false;

msgInput.addEventListener("compositionstart", () => { isComposingMain = true; });
msgInput.addEventListener("compositionend", () => { isComposingMain = false; });
viewerMsgInput.addEventListener("compositionstart", () => { isComposingViewer = true; });
viewerMsgInput.addEventListener("compositionend", () => { isComposingViewer = false; });

let lastSelectedImageId = "";
let lastSelectedImageUrl = "";

let currentViewerImageId = "";
let currentViewerImageUrl = "";
let currentStrokes = [];
let currentNotes = [];
let drawMode = "draw";
let currentColor = "#ff3b30";
let currentSize = 3;
let currentNoteColor = "#fff7c2";
let isDrawing = false;
let lastPoint = null;
let pendingStrokeBatch = [];
let pendingStrokeImageId = "";
let strokeBatchRaf = null;

let draggingNoteId = null;
let resizingNoteId = null;
let dragOffset = { x: 0, y: 0 };
let resizeStart = { x: 0, y: 0, width: 0, height: 0 };
let activeNoteNode = null;

const noteLiveQueue = new Map();
let noteLiveRaf = null;
const noteTextTimers = new Map();
let isColorPaletteOpen = false;

let historyUndoStack = [];
let historyRedoStack = [];
let historyLock = false;
let parentReadySent = false;

function notifyParent(type, payload = {}) {
  if (window.parent === window) return;

  window.parent.postMessage(
    {
      source: EMBED_MESSAGE_NAMESPACE,
      type,
      payload
    },
    "*"
  );
}

function announceReadyToParent() {
  if (parentReadySent) return;
  parentReadySent = true;
  notifyParent("chat-ready", {
    roomId,
    role
  });
}

function saveViewerState() {
  if (!currentViewerImageId || !currentViewerImageUrl) return;
  const payload = {
    roomId,
    role,
    imageId: currentViewerImageId,
    imageUrl: currentViewerImageUrl,
    isOpen: viewerOverlay.classList.contains("open"),
    savedAt: Date.now()
  };
  localStorage.setItem(STORAGE_KEYS.viewerState, JSON.stringify(payload));
}

function clearViewerState() {
  localStorage.removeItem(STORAGE_KEYS.viewerState);
}

function restoreViewerState() {
  if (params.get("viewer") === "1") return;

  try {
    const raw = localStorage.getItem(STORAGE_KEYS.viewerState);
    if (!raw) return;
    const data = JSON.parse(raw);

    if (!data || !data.isOpen) return;
    if (!data.roomId || data.roomId !== roomId) return;
    if (!data.imageId || !data.imageUrl) return;

    currentViewerImageId = data.imageId;
    currentViewerImageUrl = data.imageUrl;
    viewerOverlay.classList.add("open");
    viewerOverlay.setAttribute("aria-hidden", "false");
    viewerImage.src = data.imageUrl;
    updateViewerStats();
  } catch (error) {
    console.error("viewer 상태 복원 실패:", error);
  }
}

function cloneState() {
  return {
    strokes: JSON.parse(JSON.stringify(currentStrokes)),
    notes: JSON.parse(JSON.stringify(currentNotes))
  };
}

function pushHistory() {
  if (historyLock || !currentViewerImageId) return;
  historyUndoStack.push(cloneState());
  if (historyUndoStack.length > 50) historyUndoStack.shift();
  historyRedoStack = [];
  updateHistoryButtons();
}

function applyFullState(state, sync = true) {
  if (!state || !currentViewerImageId) return;

  historyLock = true;
  currentStrokes = JSON.parse(JSON.stringify(state.strokes || []));
  currentNotes = JSON.parse(JSON.stringify(state.notes || []));
  redrawAllStrokes();
  renderNotes();
  updateViewerStats();
  historyLock = false;

  if (sync) {
    socket.emit("replace-drawing-history", {
      imageId: currentViewerImageId,
      strokes: currentStrokes
    });

    socket.emit("replace-note-history", {
      imageId: currentViewerImageId,
      notes: currentNotes
    });
  }
}

function undoAction() {
  if (!historyUndoStack.length) return;
  historyRedoStack.push(cloneState());
  const prev = historyUndoStack.pop();
  applyFullState(prev, true);
  updateHistoryButtons();
}

function redoAction() {
  if (!historyRedoStack.length) return;
  historyUndoStack.push(cloneState());
  const next = historyRedoStack.pop();
  applyFullState(next, true);
  updateHistoryButtons();
}

function updateHistoryButtons() {
  undoBtn.disabled = historyUndoStack.length === 0;
  redoBtn.disabled = historyRedoStack.length === 0;
  undoBtn.style.opacity = undoBtn.disabled ? "0.45" : "1";
  redoBtn.style.opacity = redoBtn.disabled ? "0.45" : "1";
}

function updateViewerStats() {
  drawingCountBadge.textContent = `선 ${currentStrokes.length}`;
  drawingCountBadge.dataset.count = String(currentStrokes.length);
  noteCountBadge.textContent = `메모 ${currentNotes.length}`;
  noteCountBadge.dataset.count = String(currentNotes.length);
  if (currentViewerImageId) {
    viewerSubtitle.textContent = `현재 이미지 ID: ${currentViewerImageId.slice(0, 8)} · 실시간 협업 중`;
  } else {
    viewerSubtitle.textContent = "현재 이미지 선택 대기 중";
  }
}

function scheduleNoteLiveUpdate(noteId, imageId, patch) {
  noteLiveQueue.set(noteId, { imageId, noteId, patch });

  if (noteLiveRaf) return;

  noteLiveRaf = requestAnimationFrame(() => {
    noteLiveQueue.forEach((payload) => {
      socket.emit("note-live-update", payload);
    });
    noteLiveQueue.clear();
    noteLiveRaf = null;
  });
}

function debounceNoteCommit(noteId, fn, delay = 220) {
  const prev = noteTextTimers.get(noteId);
  if (prev) clearTimeout(prev);

  const timer = setTimeout(() => {
    fn();
    noteTextTimers.delete(noteId);
  }, delay);

  noteTextTimers.set(noteId, timer);
}

function updateCustomColorPreview(color) {
  customColorBtn.style.setProperty("--custom-color-preview", color);
  customColorInput.value = color;
}

function setColorPaletteOpen(nextOpen) {
  isColorPaletteOpen = Boolean(nextOpen);
  colorRow.classList.toggle("open", isColorPaletteOpen);
}

const isViewerMode = params.get("viewer") === "1";
const isEmbeddedMode = params.get("embed") === "1" || window.parent !== window;
const initialImageId = params.get("imageId") || "";
const initialImageUrl = params.get("imageUrl") || "";

socket.on("connect", () => {
  connectionBadge.textContent = "연결됨";
  connectionBadge.dataset.count = "on";
  announceReadyToParent();
});

socket.on("disconnect", () => {
  connectionBadge.textContent = "연결 끊김";
  connectionBadge.dataset.count = "off";
});

socket.emit("join", { roomId, role });

if (isViewerMode) {
  document.getElementById("app").style.display = "none";
  viewerOverlay.classList.add("open");
  viewerOverlay.setAttribute("aria-hidden", "false");

  if (initialImageId && initialImageUrl) {
    currentViewerImageId = initialImageId;
    currentViewerImageUrl = initialImageUrl;
    viewerImage.src = initialImageUrl;
    saveViewerState();
  }
  updateViewerStats();
  updateHistoryButtons();
} else if (!isEmbeddedMode) {
  restoreViewerState();
} else {
  clearViewerState();
}

function setPhoneStatus(message, isError = false) {
  phoneStatus.textContent = message;
  phoneStatus.style.color = isError ? "#d14343" : "#5f7286";
  phoneStatus.classList.toggle("show", Boolean(message));
}

function scrollBottom(container) {
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

function formatTime(ts) {
  try {
    return new Date(ts).toLocaleTimeString("ko-KR", {
      hour: "numeric",
      minute: "2-digit"
    });
  } catch {
    return "";
  }
}

function formatFileDate(date = new Date()) {
  const yyyy = date.getFullYear();
  const mm = String(date.getMonth() + 1).padStart(2, "0");
  const dd = String(date.getDate()).padStart(2, "0");
  const hh = String(date.getHours()).padStart(2, "0");
  const mi = String(date.getMinutes()).padStart(2, "0");
  return `${yyyy}${mm}${dd}_${hh}${mi}`;
}

function sanitizeFileName(name) {
  return String(name || "상담자")
    .replace(/[\\/:*?"<>|]/g, "_")
    .replace(/\s+/g, "_")
    .slice(0, 40);
}

function createTextRow(data) {
  const row = document.createElement("div");
  row.className = "messageRow " + (data.sender === role ? "me" : "other");

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = data.text || "";

  const meta = document.createElement("div");
  meta.className = "meta";
  meta.textContent = formatTime(data.time);

  row.appendChild(bubble);
  row.appendChild(meta);
  return row;
}

function createImageRow(data) {
  const row = document.createElement("div");
  row.className = "messageRow " + (data.sender === role ? "me" : "other");

  const wrap = document.createElement("div");
  wrap.className = "imageBubble";

  const img = document.createElement("img");
  img.className = "chatImg";
  img.src = data.imageUrl;
  img.alt = "첨부 이미지";

  wrap.appendChild(img);
  wrap.addEventListener("click", () => {
    openViewerPopup(data.imageId, data.imageUrl);
  });

  const meta = document.createElement("div");
  meta.className = "meta";
  meta.textContent = formatTime(data.time);

  row.appendChild(wrap);
  row.appendChild(meta);
  return row;
}

function renderTextMessage(data) {
  chatInner.appendChild(createTextRow(data));
  scrollBottom(chatBox);

  if (viewerOverlay.classList.contains("open")) {
    viewerChatInner.appendChild(createTextRow(data));
    scrollBottom(viewerChatBox);
  }
}

function renderImageMessage(data) {
  chatInner.appendChild(createImageRow(data));
  scrollBottom(chatBox);

  if (viewerOverlay.classList.contains("open")) {
    viewerChatInner.appendChild(createImageRow(data));
    scrollBottom(viewerChatBox);
  }

        role,

    const result = await response.json().catch(() => ({}));

async function uploadImage(file) {

  formData.append("image", file);

  const result = await response.json().catch(() => ({}));

function updateCanvasSize() {

  const height = imageStage.clientHeight;
  if (!width || !height) return;

  drawCanvas.width = width;
  drawCanvas.height = height;

  redrawAllStrokes();
  renderNotes();
}

function clearCanvas() {
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
}

function drawStroke(stroke) {
  if (!drawCanvas.width || !drawCanvas.height) return;

  const x1 = stroke.last.x * drawCanvas.width;
  const y1 = stroke.last.y * drawCanvas.height;
  const x2 = stroke.current.x * drawCanvas.width;
  const y2 = stroke.current.y * drawCanvas.height;

  ctx.save();
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.lineWidth = stroke.size || 3;

  if (stroke.mode === "erase") {
    ctx.globalCompositeOperation = "destination-out";
    ctx.strokeStyle = "rgba(0,0,0,1)";
  } else {
    ctx.globalCompositeOperation = "source-over";
    ctx.strokeStyle = stroke.color || "#ff3b30";
  }

  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.restore();
}

function flushStrokeBatch() {
  if (!pendingStrokeBatch.length || !pendingStrokeImageId) {
    strokeBatchRaf = null;
    return;
  }

  socket.emit("draw-strokes", {
    imageId: pendingStrokeImageId,
    strokes: pendingStrokeBatch
  });

  pendingStrokeBatch = [];
  pendingStrokeImageId = "";
  strokeBatchRaf = null;
}

function queueStrokeForSync(stroke) {
  pendingStrokeImageId = stroke.imageId;
  pendingStrokeBatch.push(stroke);

  if (strokeBatchRaf) return;

  strokeBatchRaf = requestAnimationFrame(flushStrokeBatch);
}

function redrawAllStrokes() {
  clearCanvas();
  currentStrokes.forEach(drawStroke);
  updateViewerStats();
}

function getNormalizedPoint(evt) {
  const rect = drawCanvas.getBoundingClientRect();
  return {
    x: Math.max(0, Math.min(1, (evt.clientX - rect.left) / rect.width)),
    y: Math.max(0, Math.min(1, (evt.clientY - rect.top) / rect.height))
  };
}

function setActiveTools() {
  penBtn.classList.toggle("active", drawMode === "draw");
  eraserBtn.classList.toggle("active", drawMode === "erase");
}

function setActiveColor(color) {
  const normalizedColor = (color || "").toLowerCase();
  let matchedPreset = false;

  colorSwatches.forEach((btn) => {
    const swatchColor = (btn.dataset.color || "").toLowerCase();
    const isActive = swatchColor && swatchColor === normalizedColor;
    btn.classList.toggle("active", isActive);
    if (isActive) matchedPreset = true;
  });

  customColorBtn.classList.toggle("active", !matchedPreset);
  updateCustomColorPreview(color);
}

function setActiveNoteColor(color) {
  noteColorSwatches.forEach((btn) => {
    btn.classList.toggle("active", btn.dataset.noteColor === color);
  });
}

function roundRect(ctx, x, y, width, height, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.arcTo(x + width, y, x + width, y + height, radius);
  ctx.arcTo(x + width, y + height, x, y + height, radius);
  ctx.arcTo(x, y + height, x, y, radius);
  ctx.arcTo(x, y, x + width, y, radius);
  ctx.closePath();
}

function wrapTextLines(text, maxCharsPerLine) {
  const result = [];
  const source = String(text || "").split("\n");

  source.forEach((part) => {
    if (!part) {
      result.push("");
      return;
    }
    let current = "";
    for (const ch of part) {
      current += ch;
      if (current.length >= maxCharsPerLine) {
        result.push(current);
        current = "";
      }
    }
    if (current) result.push(current);
  });

  return result.slice(0, 10);
}

function buildDownload() {
  if (!currentViewerImageUrl) return;

  const stageWidth = imageStage.clientWidth || 1200;
  const stageHeight = imageStage.clientHeight || 760;
  const fileName = `${sanitizeFileName(userName)}_상담이미지_${formatFileDate()}.png`;
  const img = new Image();

  img.onload = () => {
    const exportCanvas = document.createElement("canvas");
    exportCanvas.width = Math.round(stageWidth * 2);
    exportCanvas.height = Math.round(stageHeight * 2);

    const exportCtx = exportCanvas.getContext("2d");

    exportCtx.fillStyle = "#f7fbff";
    exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

    exportCtx.fillStyle = "#ffffff";
    roundRect(exportCtx, 8, 8, exportCanvas.width - 16, exportCanvas.height - 16, 24);
    exportCtx.fill();

    const stageRect = imageStage.getBoundingClientRect();
    const imageRect = viewerImage.getBoundingClientRect();

    const relX = Math.max(0, imageRect.left - stageRect.left);
    const relY = Math.max(0, imageRect.top - stageRect.top);
    const relW = imageRect.width;
    const relH = imageRect.height;

    const drawX = (relX / stageRect.width) * exportCanvas.width;
    const drawY = (relY / stageRect.height) * exportCanvas.height;
    const drawW = (relW / stageRect.width) * exportCanvas.width;
    const drawH = (relH / stageRect.height) * exportCanvas.height;

    exportCtx.save();
    roundRect(exportCtx, drawX, drawY, drawW, drawH, 18);
    exportCtx.clip();
    exportCtx.drawImage(img, drawX, drawY, drawW, drawH);
    exportCtx.restore();

    currentStrokes.forEach((stroke) => {
      const x1 = stroke.last.x * exportCanvas.width;
      const y1 = stroke.last.y * exportCanvas.height;
      const x2 = stroke.current.x * exportCanvas.width;
      const y2 = stroke.current.y * exportCanvas.height;

      exportCtx.save();
      exportCtx.lineCap = "round";
      exportCtx.lineJoin = "round";
      exportCtx.lineWidth = (stroke.size || 3) * 2;

      if (stroke.mode === "erase") {
        exportCtx.globalCompositeOperation = "destination-out";
        exportCtx.strokeStyle = "rgba(0,0,0,1)";
      } else {
        exportCtx.globalCompositeOperation = "source-over";
        exportCtx.strokeStyle = stroke.color || "#ff3b30";
      }

      exportCtx.beginPath();
      exportCtx.moveTo(x1, y1);
      exportCtx.lineTo(x2, y2);
      exportCtx.stroke();
      exportCtx.restore();
    });

    currentNotes.forEach((note) => {
      const x = note.x * exportCanvas.width;
      const y = note.y * exportCanvas.height;
      const width = note.width * exportCanvas.width;
      const height = note.height * exportCanvas.height;

      exportCtx.save();
      exportCtx.fillStyle = note.color || "#fff7c2";
      exportCtx.strokeStyle = note.author === "admin" ? "#8a5cff" : "#2491ff";
      exportCtx.lineWidth = 2.5;

      roundRect(exportCtx, x, y, width, height, 16);
      exportCtx.fill();
      exportCtx.stroke();

      exportCtx.fillStyle = "#17212b";
      exportCtx.font = "bold 24px sans-serif";
      exportCtx.fillText(note.author === "admin" ? "관리자" : "고객", x + 18, y + 30);

      exportCtx.font = "24px sans-serif";
      const lines = wrapTextLines(note.text || "", 20);
      const lineHeight = 30;
      lines.forEach((line, idx) => {
        exportCtx.fillText(line, x + 18, y + 64 + idx * lineHeight);
      });

      exportCtx.restore();
    });

    exportCtx.save();
    exportCtx.fillStyle = "rgba(0,0,0,0.55)";
    exportCtx.font = "20px sans-serif";
    exportCtx.fillText(
      `${userName} · ${new Date().toLocaleString("ko-KR")}`,
      20,
      exportCanvas.height - 20
    );
    exportCtx.restore();

    const link = document.createElement("a");
    link.href = exportCanvas.toDataURL("image/png");
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    link.remove();
  };

  img.onerror = () => {
    alert("이미지를 다운로드용으로 불러오지 못했습니다.");
  };

  img.src = currentViewerImageUrl;
}

function getNoteById(noteId) {
  return currentNotes.find((n) => n.id === noteId);
}

function createNoteNode(note) {
  const node = document.createElement("div");
  node.className = "text-note";
  node.dataset.id = note.id;
  node.dataset.author = note.author === role ? "me" : "other";

  const header = document.createElement("div");
  header.className = "text-note-header";

  const delBtn = document.createElement("button");
  delBtn.className = "text-note-delete";
  delBtn.type = "button";
  delBtn.textContent = "✕";

  const authorLabel = document.createElement("div");
  authorLabel.className = "text-note-author";
  authorLabel.textContent = note.author === "admin" ? "관리자 메모" : "고객 메모";

  const toggleBtn = document.createElement("button");
  toggleBtn.className = "text-note-toggle";
  toggleBtn.type = "button";
  toggleBtn.textContent = "📝";

  const textarea = document.createElement("textarea");
  textarea.value = note.text || "";

  const resize = document.createElement("div");
  resize.className = "text-note-resize";

  delBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    if (!confirm("이 메모를 삭제할까요?")) return;
    pushHistory();

    socket.emit("delete-note", {
      imageId: currentViewerImageId,
      noteId: note.id
    });
  });

  toggleBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    const model = getNoteById(note.id);
    if (!model) return;
    model.expanded = true;
    applyNoteLayout(node, model);
    requestAnimationFrame(() => {
      textarea.focus();
    });
  });

  textarea.addEventListener("focus", () => {
    const model = getNoteById(note.id);
    if (model) {
      model.expanded = true;
      applyNoteLayout(node, model);
    }
    pushHistory();
  }, { once: true });

  textarea.addEventListener("input", () => {
    const model = getNoteById(note.id);
    if (!model) return;

    textarea.style.height = "auto";
    textarea.style.height = textarea.scrollHeight + "px";

    const nextHeight = Math.max(0.06, (textarea.scrollHeight + 24) / Math.max(drawCanvas.height, 1));
    model.text = textarea.value;
    model.height = nextHeight;

    applyNoteLayout(node, model);

    scheduleNoteLiveUpdate(note.id, currentViewerImageId, {
      text: model.text,
      height: model.height
    });

    debounceNoteCommit(note.id, () => {
      socket.emit("update-note", {
        imageId: currentViewerImageId,
        noteId: note.id,
        patch: {
          text: model.text,
          height: model.height
        }
      });
    });
  });

  header.addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    const model = getNoteById(note.id);
    if (!model) return;

    pushHistory();
    draggingNoteId = note.id;
    activeNoteNode = node;
    node.classList.add("selected");

    const rect = textLayer.getBoundingClientRect();
    const noteLeftPx = model.x * rect.width;
    const noteTopPx = model.y * rect.height;

    dragOffset.x = e.clientX - rect.left - noteLeftPx;
    dragOffset.y = e.clientY - rect.top - noteTopPx;

    e.preventDefault();
  });

  resize.addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    const model = getNoteById(note.id);
    if (!model) return;

    pushHistory();
    resizingNoteId = note.id;
    activeNoteNode = node;

    const rect = textLayer.getBoundingClientRect();
    resizeStart = {
      x: e.clientX,
      y: e.clientY,
      width: model.width * rect.width,
      height: model.height * rect.height
    };

    e.preventDefault();
  });

  node.appendChild(header);
  node.appendChild(delBtn);
  node.appendChild(authorLabel);
  node.appendChild(toggleBtn);
  node.appendChild(textarea);
  node.appendChild(resize);

  applyNoteLayout(node, note);
  return node;
}

function applyNoteLayout(node, note) {
  if (!node || !note) return;

  node.style.left = (note.x * 100) + "%";
  node.style.top = (note.y * 100) + "%";
  const isExpanded = note.expanded !== false;
  node.classList.toggle("collapsed", !isExpanded);
  node.style.width = isExpanded ? (note.width * 100) + "%" : "44px";
  node.style.height = isExpanded ? Math.max(40, note.height * drawCanvas.height) + "px" : "44px";
  node.style.background = note.color || "#fff7c2";

  const textarea = node.querySelector("textarea");
  if (textarea && textarea.value !== note.text) {
    textarea.value = note.text || "";
  }
  if (textarea && isExpanded) {
    textarea.style.height = "auto";
    textarea.style.height = textarea.scrollHeight + "px";
  }
}

function renderNotes() {
  textLayer.innerHTML = "";
  if (currentNotes.length > MAX_CLIENT_NOTES) {
    currentNotes = currentNotes.slice(-MAX_CLIENT_NOTES);
  }
  currentNotes.forEach((note) => {
    textLayer.appendChild(createNoteNode(note));
  });
  updateViewerStats();
}

function upsertNoteNode(note) {
  const existing = textLayer.querySelector(`.text-note[data-id="${note.id}"]`);
  if (existing) {
    applyNoteLayout(existing, note);
    return;
  }
  textLayer.appendChild(createNoteNode(note));
  updateViewerStats();
}

window.addEventListener("pointermove", (e) => {
  if (!currentViewerImageId) return;
  const rect = textLayer.getBoundingClientRect();
  if (!rect.width || !rect.height) return;

  if (draggingNoteId && activeNoteNode) {
    const note = getNoteById(draggingNoteId);
    if (!note) return;

    const noteWidthPx = note.width * rect.width;
    const noteHeightPx = Math.max(60, note.height * rect.height);

    let leftPx = e.clientX - rect.left - dragOffset.x;
    let topPx = e.clientY - rect.top - dragOffset.y;

    leftPx = Math.max(0, Math.min(rect.width - noteWidthPx, leftPx));
    topPx = Math.max(0, Math.min(rect.height - noteHeightPx, topPx));

    note.x = leftPx / rect.width;
    note.y = topPx / rect.height;

    applyNoteLayout(activeNoteNode, note);

    scheduleNoteLiveUpdate(note.id, currentViewerImageId, {
      x: note.x,
      y: note.y
    });
    return;
  }

  if (resizingNoteId && activeNoteNode) {
    const note = getNoteById(resizingNoteId);
    if (!note) return;

    const deltaX = e.clientX - resizeStart.x;
    const deltaY = e.clientY - resizeStart.y;

    const nextWidthPx = Math.max(120, Math.min(rect.width * 0.6, resizeStart.width + deltaX));
    const nextHeightPx = Math.max(56, Math.min(rect.height * 0.5, resizeStart.height + deltaY));

    note.width = nextWidthPx / rect.width;
    note.height = nextHeightPx / rect.height;

    applyNoteLayout(activeNoteNode, note);

    scheduleNoteLiveUpdate(note.id, currentViewerImageId, {
      width: note.width,
      height: note.height
    });
  }
});

window.addEventListener("pointerup", () => {
  if (draggingNoteId) {
    const note = getNoteById(draggingNoteId);
    if (note) {
      socket.emit("update-note", {
        imageId: currentViewerImageId,
        noteId: note.id,
        patch: {
          x: note.x,
          y: note.y
        }
      });
    }
  }

  if (resizingNoteId) {
    const note = getNoteById(resizingNoteId);
    if (note) {
      socket.emit("update-note", {
        imageId: currentViewerImageId,
        noteId: note.id,
        patch: {
          width: note.width,
          height: note.height
        }
      });
    }
  }

  draggingNoteId = null;
  resizingNoteId = null;
  activeNoteNode = null;
});

document.addEventListener("click", (event) => {
  if (!isColorPaletteOpen) return;
  const target = event.target;
  if (penBtn.contains(target) || colorRow.contains(target)) return;
  setColorPaletteOpen(false);
});

noteColorSwatches.forEach((btn) => {
  btn.addEventListener("click", () => {
    currentNoteColor = btn.dataset.noteColor || "#fff7c2";
    setActiveNoteColor(currentNoteColor);
  });
});

drawCanvas.addEventListener("pointerdown", (evt) => {
  if (!currentViewerImageId) return;
  pushHistory();
  isDrawing = true;
  lastPoint = getNormalizedPoint(evt);
  drawCanvas.setPointerCapture(evt.pointerId);
});

drawCanvas.addEventListener("pointermove", (evt) => {
  if (!isDrawing || !currentViewerImageId || !lastPoint) return;

  const current = getNormalizedPoint(evt);
  const stroke = {
    imageId: currentViewerImageId,
    mode: drawMode,
    color: currentColor,
    size: currentSize,
    last: lastPoint,
    current
  };

  currentStrokes.push(stroke);
  drawStroke(stroke);
  updateViewerStats();
  queueStrokeForSync(stroke);
  lastPoint = current;
});

function stopDrawing() {
  isDrawing = false;
  lastPoint = null;
}

drawCanvas.addEventListener("pointerup", stopDrawing);
drawCanvas.addEventListener("pointercancel", stopDrawing);
drawCanvas.addEventListener("pointerleave", stopDrawing);

downloadSketchBtn.addEventListener("click", buildDownload);

document.addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "z" && !e.shiftKey) {
    e.preventDefault();
    undoAction();
    return;
  }

  if (((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "y") ||
      ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === "z")) {
    e.preventDefault();
    redoAction();
    return;
  }

  if (e.key === "Escape") {
    if (isViewerMode) {
      window.close();
      return;
    }
    closeViewer();
  }
});

socket.on("history", (messages) => {
  chatInner.innerHTML = "";
  viewerChatInner.innerHTML = "";

  (messages || []).forEach((item) => {
    if (item.type === "text") renderTextMessage(item);
    if (item.type === "image") renderImageMessage(item);
  });

  announceReadyToParent();
});

socket.on("message", (data) => {
  renderTextMessage(data);
});

socket.on("image", (data) => {
  renderImageMessage(data);
});

socket.on("drawing-history", (payload) => {
  if (!payload || payload.imageId !== currentViewerImageId) return;
  currentStrokes = Array.isArray(payload.strokes)
    ? payload.strokes.slice(-MAX_CLIENT_STROKES)
    : [];
  redrawAllStrokes();
  updateViewerStats();
});

socket.on("draw-stroke", (stroke) => {
  if (!stroke || stroke.imageId !== currentViewerImageId) return;
  currentStrokes.push(stroke);
  if (currentStrokes.length > MAX_CLIENT_STROKES) {
    currentStrokes.splice(0, currentStrokes.length - MAX_CLIENT_STROKES);
  }
  drawStroke(stroke);
  updateViewerStats();
});

socket.on("draw-strokes", (payload) => {
  if (!payload || payload.imageId !== currentViewerImageId) return;

  const strokes = Array.isArray(payload.strokes) ? payload.strokes : [];
  strokes.forEach((stroke) => {
    currentStrokes.push(stroke);
  });
  if (currentStrokes.length > MAX_CLIENT_STROKES) {
    currentStrokes.splice(0, currentStrokes.length - MAX_CLIENT_STROKES);
    redrawAllStrokes();
  } else {
    strokes.forEach((stroke) => {
      drawStroke(stroke);
    });
  }
  updateViewerStats();
});

socket.on("clear-drawing", (payload) => {
  if (!payload || payload.imageId !== currentViewerImageId) return;
  currentStrokes = [];
  clearCanvas();
  updateViewerStats();
});

socket.on("note-history", (payload) => {
  if (!payload || payload.imageId !== currentViewerImageId) return;
  currentNotes = Array.isArray(payload.notes)
    ? payload.notes.slice(-MAX_CLIENT_NOTES).map((note) => ({
        ...note,
        expanded: false
      }))
    : [];
  renderNotes();
});

socket.on("note-added", (payload) => {
  if (!payload || payload.imageId !== currentViewerImageId || !payload.note) return;

  const exists = currentNotes.some((n) => n.id === payload.note.id);
  if (!exists) {
    currentNotes.push({
      ...payload.note,
      expanded: false
    });
    if (currentNotes.length > MAX_CLIENT_NOTES) {
      currentNotes.splice(0, currentNotes.length - MAX_CLIENT_NOTES);
      renderNotes();
      return;
    }
    upsertNoteNode(payload.note);
    updateViewerStats();
  }
});

socket.on("note-live-update", (payload) => {
  if (!payload || payload.imageId !== currentViewerImageId || !payload.noteId) return;

  const note = currentNotes.find((n) => n.id === payload.noteId);
  if (!note) return;

  Object.assign(note, payload.patch || {});
  const node = textLayer.querySelector(`.text-note[data-id="${note.id}"]`);
  if (node) {
    applyNoteLayout(node, note);
  }
});

socket.on("note-updated", (payload) => {
  if (!payload || payload.imageId !== currentViewerImageId || !payload.noteId) return;

  const note = currentNotes.find((n) => n.id === payload.noteId);
  if (!note) return;

  Object.assign(note, payload.patch || {});
  const node = textLayer.querySelector(`.text-note[data-id="${note.id}"]`);
  if (node) {
    applyNoteLayout(node, note);
  }
  updateViewerStats();
});

socket.on("note-deleted", (payload) => {
  if (!payload || payload.imageId !== currentViewerImageId || !payload.noteId) return;

  currentNotes = currentNotes.filter((n) => n.id !== payload.noteId);
  const node = textLayer.querySelector(`.text-note[data-id="${payload.noteId}"]`);
  if (node) node.remove();
  updateViewerStats();
});

socket.on("clear-notes", (payload) => {
  if (!payload || payload.imageId !== currentViewerImageId) return;
  currentNotes = [];
  renderNotes();
  updateViewerStats();
});

setActiveTools();
setActiveColor(currentColor);
setActiveNoteColor(currentNoteColor);
updateHistoryButtons();
</script>
</body>
</html>
