<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>디자인 상담 · RENDER</title>

  <style>
    :root {
      --bg: #f3f6fa;
      --panel: #ffffff;
      --panel-soft: #f8fbfe;
      --line: #e3ebf3;
      --line-strong: #d9e2ec;
      --text: #17212b;
      --sub: #728292;
      --primary: #2491ff;
      --primary-soft: #79c7ff;
      --danger: #ff5b5b;
      --shadow: 0 18px 40px rgba(18, 36, 61, 0.08);
      --safe-bottom: max(env(safe-area-inset-bottom), 0px);
      --selected-draw-color: #ff3b30;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    body {
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
      font-size: 14px;
    }

    button,
    input,
    textarea,
    label {
      font: inherit;
    }

    button {
      border: none;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    input,
    textarea {
      outline: none;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    #chatCard {
      width: 100%;
      height: 100%;
      background: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #header {
      height: 84px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--line);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      box-shadow: 0 1px 0 rgba(18, 36, 61, 0.04);
    }

    #title {
      font-size: 22px;
      font-weight: 800;
      color: #24313f;
    }

    #connectionBadge {
      height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: #edf4fa;
      color: #53687a;
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      font-weight: 800;
    }

    #quickRequestBar {
      flex-shrink: 0;
      padding: 12px 18px 10px;
      background: #fff;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #quickRequestTitle {
      font-size: 13px;
      font-weight: 800;
      color: #24313f;
    }

    #quickRequestButtons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .quickChip {
      height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      background: #f1f5f9;
      color: #4b5b6b;
      font-size: 12px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition:
        transform 0.15s ease,
        background 0.15s ease,
        box-shadow 0.15s ease;
    }

    .quickChip:hover {
      background: #eaf2fb;
    }

    .quickChip.active {
      background: linear-gradient(135deg, #79c7ff, #2491ff);
      color: #fff;
    }

    #chatBox {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px 18px 10px;
      background: #fff;
    }

    #chatInner,
    #viewerChatInner {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 100%;
    }

    .messageRow {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
    }

    .messageRow.me {
      align-items: flex-end;
    }

    .messageRow.other {
      align-items: flex-start;
    }

    .messageRow.system {
      align-items: center;
    }

    .messageBody {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 100%;
    }

    .messageRow.me .messageBody {
      justify-content: flex-end;
    }

    .messageRow.other .messageBody {
      justify-content: flex-start;
    }

    .senderAvatar {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: #e7edf6;
      color: #526171;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .messageStack {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: min(72%, 520px);
    }

    .messageRow.me .messageStack {
      align-items: flex-end;
    }

    .messageRow.other .messageStack {
      align-items: flex-start;
    }

    .senderLine {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 2px;
    }

    .senderName {
      font-size: 12px;
      font-weight: 800;
      color: #2f3d4a;
    }

    .senderTime {
      font-size: 11px;
      color: #95a3b1;
    }

    .bubble {
      max-width: 100%;
      padding: 13px 15px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      letter-spacing: -0.02em;
      word-break: break-word;
    }

    .messageRow.me .bubble {
      background: linear-gradient(135deg, #79c7ff, #2491ff);
      color: #fff;
      border-bottom-right-radius: 10px;
    }

    .messageRow.other .bubble {
      background: #eef2f6;
      border: 1px solid #e3e9f1;
      color: #17212b;
      border-bottom-left-radius: 10px;
    }

    .messageRow.system .bubble {
      background: #f2f7ff;
      color: #4b6784;
      font-size: 12px;
      font-weight: 700;
      padding: 8px 12px;
      max-width: 92%;
    }

    .meta {
      font-size: 11px;
      color: #95a3b1;
      padding: 0 4px;
    }

    .messageRow.me .meta {
      text-align: right;
    }

    .messageRow.other .meta {
      text-align: left;
    }

    .imageBubble {
      max-width: 100%;
      background: #fff;
      border: 1px solid #e3ebf3;
      border-radius: 18px;
      padding: 6px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(18, 36, 61, 0.04);
    }

    .chatImg {
      display: block;
      width: 100%;
      max-width: 360px;
      border-radius: 14px;
    }

    .imageHint {
      margin-top: 6px;
      padding: 6px 8px;
      border-radius: 10px;
      background: #f6fbff;
      color: #557086;
      font-size: 10px;
      font-weight: 800;
    }

    #inputArea {
      flex-shrink: 0;
      border-top: 1px solid var(--line);
      background: #fff;
      padding: 12px 18px calc(18px + var(--safe-bottom));
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #messageRowBar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border: 1px solid #dfe7f0;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(18, 36, 61, 0.04);
    }

    .inputGuide {
      font-size: 11px;
      color: #7d8b99;
      padding: 0 2px;
      line-height: 1.5;
    }

    #msgInput,
    #viewerMsgInput,
    #noteEditorTextarea {
      border: 1px solid #d6e0ea;
      background: #fff;
    }

    #msgInput {
      flex: 1;
      min-width: 0;
      height: 44px;
      border-radius: 14px;
      padding: 0 12px;
      font-size: 14px;
    }

    #msgInput::placeholder,
    #viewerMsgInput::placeholder {
      font-size: 13px;
    }

    #sendBtn,
    #fileLabel {
      width: 44px;
      height: 44px;
      min-width: 44px;
      min-height: 44px;
      border-radius: 14px;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #sendBtn {
      background: linear-gradient(135deg, #79c7ff, #2491ff);
      color: #fff;
    }

    #fileInput {
      display: none;
    }

    #fileLabel {
      background: #f2f6fa;
      color: #7b8d9f;
      border: 1px solid #e5edf4;
    }

    #viewerOverlay,
    #noteEditorOverlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      flex-direction: column;
      width: 100vw;
      height: 100dvh;
      min-height: 100dvh;
      background: var(--bg);
    }

    #viewerOverlay {
      opacity: 0;
      transform: translateY(8px);
      transition:
        opacity 0.2s ease,
        transform 0.2s ease;
    }

    #viewerOverlay.open {
      display: flex;
      opacity: 1;
      transform: translateY(0);
    }

    #noteEditorOverlay.open {
      display: flex;
    }

    body.viewer-inline-open {
      overflow: hidden;
      touch-action: none;
    }

    #viewerTopbar {
      height: 84px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--line);
      background: #fff;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 0 22px;
      position: relative;
      z-index: 40;
      box-shadow: 0 1px 0 rgba(18, 36, 61, 0.04);
    }

    #viewerTopLeft {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 2px;
      min-width: 0;
    }

    #viewerTopTitle {
      font-size: 22px;
      font-weight: 800;
      color: #24313f;
      line-height: 1.1;
    }

    #viewerTopSub {
      font-size: 13px;
      color: #728292;
      line-height: 1.2;
    }

    #viewerActions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      position: relative;
      z-index: 41;
    }

    .viewerBtn,
    .toolBtn {
      transition:
        transform 0.15s ease,
        background 0.15s ease,
        box-shadow 0.15s ease;
    }

    .viewerBtn:hover,
    .toolBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(18, 36, 61, 0.08);
    }

    .viewerBtn {
      min-width: 42px;
      width: 42px;
      height: 42px;
      min-height: 42px;
      padding: 0;
      border-radius: 14px;
      background: #f1f5f9;
      color: #4b5b6b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
    }

    #viewerMain {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.7fr);
      gap: 18px;
      padding: 18px;
    }

    body.viewer-only-mode #viewerMain {
      grid-template-columns: minmax(0, 1.75fr) minmax(360px, 0.7fr);
    }

    #viewerLeft,
    #viewerRight {
      min-width: 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      background: #fff;
      box-shadow: var(--shadow);
      position: relative;
      z-index: 10;
    }

    #canvasWrap {
      flex: 1;
      min-height: 0;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 11;
      background: #fff;
    }

    #imageStage {
      position: relative;
      width: 100%;
      height: min(100%, 760px);
      min-height: 420px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(247,251,255,.96));
      border: 1px solid #dfe9f3;
      overflow: hidden;
      z-index: 12;
    }

    #viewerImage {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      max-width: 92%;
      max-height: 88%;
      border-radius: 18px;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      z-index: 1;
    }

    #drawCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 22px;
      touch-action: none;
      z-index: 2;
    }

    #textLayer {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    #brushCursor {
      position: absolute;
      left: 0;
      top: 0;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(42, 140, 255, 0.12);
      border: 1.5px solid rgba(42, 140, 255, 0.55);
      box-shadow: 0 0 0 1px rgba(255,255,255,.55) inset;
      pointer-events: none;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 15;
    }

    #drawCanvas.cursor-preview {
      cursor: none;
    }

    .noteMarker {
      position: absolute;
      min-width: 56px;
      min-height: 42px;
      padding: 0 12px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(36,145,255,.22);
      box-shadow: 0 6px 14px rgba(18, 36, 61, 0.10);
      transform: translate(-50%, -50%);
      pointer-events: auto;
      user-select: none;
      z-index: 20;
      touch-action: none;
      cursor: grab;
    }

    .noteMarker.selected {
      border-color: rgba(255,139,61,.55);
      box-shadow:
        0 0 0 3px rgba(255,139,61,.14),
        0 10px 18px rgba(18, 36, 61, 0.12);
    }

    .noteMarkerText {
      max-width: 3em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 800;
      color: #17212b;
    }

    .noteMarker.expanded {
      align-items: flex-start;
      padding: 10px 12px;
    }

    .noteMarker.expanded .noteMarkerText {
      max-width: 220px;
      white-space: normal;
      overflow: visible;
      text-overflow: unset;
      line-height: 1.45;
    }

    .noteDot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
      border: 1px solid rgba(0,0,0,.1);
    }

    #toolbar {
      flex-shrink: 0;
      border-top: 1px solid var(--line);
      background: #fff;
      padding: 12px 14px 14px;
      position: relative;
      z-index: 50;
      overflow: visible;
    }

    #toolbarGuide {
      margin-bottom: 8px;
      font-size: 11px;
      color: #728292;
      font-weight: 700;
      line-height: 1.35;
    }

    #toolbarInline {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
    }

    #toolbarInline::-webkit-scrollbar {
      display: none;
    }

    .viewerBtn svg,
    .toolBtn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .toolBtn {
      min-width: 40px;
      width: 40px;
      height: 40px;
      min-height: 40px;
      padding: 0;
      border-radius: 12px;
      background: #f1f5f9;
      color: #4b5b6b;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      flex: 0 0 auto;
      position: relative;
      z-index: 51;
    }

    .toolBtn.active {
      background: linear-gradient(135deg, #79c7ff, #2491ff);
      color: #fff;
    }

    .toolBtnSmall {
      min-width: 32px;
      width: 32px;
      height: 32px;
      border-radius: 10px;
    }

    .noteToolBtn {
      width: auto !important;
      padding: 0 12px !important;
      gap: 6px;
    }

    .toolBtnLabel {
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }

    #thicknessWrap {
      display: flex;
      align-items: center;
      padding: 0 8px;
      height: 40px;
      border-radius: 12px;
      background: #fcfdff;
      border: 1px solid #e7edf4;
      flex: 0 0 auto;
    }

    #thicknessRange {
      width: 88px;
    }

    #paletteWrap {
      position: relative;
      z-index: 60;
      flex: 0 0 auto;
    }

    #paletteBtn {
      position: relative;
      overflow: visible;
      background: #edf4fa;
      color: #425466;
      z-index: 61;
    }

    #palettePreview {
      position: absolute;
      right: 4px;
      bottom: 4px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--selected-draw-color, #ff3b30);
      border: 1px solid rgba(255,255,255,.92);
      box-shadow: 0 1px 4px rgba(18, 36, 61, 0.16);
      z-index: 3;
      pointer-events: none;
    }

    #colorPopover {
      position: fixed;
      left: 0;
      top: 0;
      display: none;
      width: 172px;
      padding: 10px;
      border-radius: 16px;
      background: rgba(255,255,255,.99);
      border: 1px solid #dfe7f0;
      box-shadow: 0 18px 36px rgba(18, 36, 61, 0.18);
      z-index: 999999;
    }

    #colorPopover.open {
      display: block;
    }

    #colorPopoverGrid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .colorChip {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.95);
      box-shadow: 0 0 0 1px rgba(18, 36, 61, 0.12);
      cursor: pointer;
    }

    .colorChip.active {
      box-shadow:
        0 0 0 3px rgba(36,145,255,.20),
        0 0 0 1px rgba(18, 36, 61, 0.12);
    }

    .noteColorSwatch {
      border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(0,0,0,.10);
      display: inline-flex;
      width: 22px;
      height: 22px;
      cursor: pointer;
    }

    .noteColorSwatch.active {
      box-shadow: 0 0 0 3px rgba(36,145,255,.18);
    }

    #viewerChatBox {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 14px;
      background: #fff;
    }

    #viewerChatInner .meta {
      display: none;
    }

    #viewerInputBar {
      flex-shrink: 0;
      border-top: 1px solid var(--line);
      padding: 12px 14px calc(14px + var(--safe-bottom));
      background: #fff;
      display: flex;
      gap: 8px;
      position: relative;
      z-index: 50;
      box-shadow: 0 8px 18px rgba(18, 36, 61, 0.04);
    }

    #viewerMsgInput {
      flex: 1;
      height: 46px;
      border-radius: 16px;
      padding: 0 14px;
      font-size: 14px;
    }

    #viewerSendBtn {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      background: linear-gradient(135deg, #79c7ff, #2491ff);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
    }

    #noteEditorHeader {
      min-height: 70px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    #noteEditorTitleWrap {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #noteEditorTitle {
      font-size: 17px;
      font-weight: 800;
    }

    #noteEditorMeta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    #noteEditorSaveBadge {
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      background: #eef4fa;
      color: #587085;
      font-size: 11px;
      font-weight: 800;
    }

    #noteEditorSaveBadge.pending {
      background: #fff7ea;
      color: #9a6500;
    }

    #noteEditorSaveBadge.saved {
      background: #ebf9ee;
      color: #2f7b42;
    }

    #noteEditorSaveBadge.offline {
      background: #fff3f3;
      color: #c74242;
    }

    #noteEditorActions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .noteEditorDangerBtn,
    #noteEditorDoneBtn {
      height: 38px;
      padding: 0 12px;
      border-radius: 12px;
      font-weight: 800;
    }

    .noteEditorDangerBtn {
      background: #fff1f1;
      color: #c74242;
    }

    #noteEditorDoneBtn {
      background: linear-gradient(135deg, #79c7ff, #2491ff);
      color: #fff;
    }

    #noteEditorBody {
      flex: 1;
      min-height: 0;
      padding: 14px;
      background: #f7fbff;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #noteEditorTools {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #noteEditorColorRow {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    #noteEditorMetaLine {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: #728292;
      font-size: 12px;
      font-weight: 700;
    }

    #noteEditorTextarea {
      width: 100%;
      height: 100%;
      border-radius: 20px;
      resize: none;
      padding: 16px;
      font-size: 14px;
      line-height: 1.5;
      color: #17212b;
    }

    #noteEditorCounter {
      font-size: 11px;
    }

    #uploadLoading {
      position: fixed;
      inset: 0;
      z-index: 260;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(245,248,252,.72);
      backdrop-filter: blur(4px);
    }

    #uploadLoading.show {
      display: flex;

    #uploadLoadingCard {

      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(255,255,255,.96);
      border: 1px solid #e3ebf3;
      box-shadow: 0 18px 40px rgba(18, 36, 61, 0.12);
      display: flex;
      align-items: center;
      gap: 12px;

    .uploadSpinner {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(36,145,255,.18);
      border-top-color: #2491ff;
      animation: spin .85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #floatingToast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(12px);
      min-width: 220px;
      max-width: min(88vw, 420px);
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(23,33,43,.92);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
      text-align: center;
      box-shadow: 0 14px 34px rgba(18, 36, 61, 0.22);
      opacity: 0;
      pointer-events: none;
      transition:
        opacity .18s ease,
        transform .18s ease;
      z-index: 10050;
    }

    #floatingToast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

      position: fixed;

      align-items: center;
      justify-content: center;

      border-radius: 14px;
      background: linear-gradient(135deg, #79c7ff, #2491ff);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
    }
