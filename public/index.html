<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>채팅</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f5f5f5;
}

#chatBox {
  height:80vh;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
}

/* 메시지 공통 */
.message {
  max-width:60%;
  padding:10px 14px;
  margin:5px 0;
  border-radius:15px;
  font-size:14px;
}

/* 내 메시지 */
.me {
  align-self:flex-end;
  background:#000;
  color:white;
}

/* 상대 메시지 */
.other {
  align-self:flex-start;
  background:#e5e5ea;
}

/* 입력 영역 */
#inputArea {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  border-top:1px solid #ddd;
}

/* 입력창 + 버튼 */
#inputRow {
  display:flex;
  width:90%;
  max-width:500px;
}

#msg {
  flex:1;
  padding:12px;
  border-radius:20px;
  border:1px solid #ccc;
  outline:none;
}

#sendBtn {
  margin-left:8px;
  padding:12px 16px;
  border:none;
  background:black;
  color:white;
  border-radius:20px;
}

/* 파일 버튼 아래 배치 */
#file {
  margin-top:8px;
}

/* 파일 텍스트 숨기기 */
input[type="file"]::file-selector-button {
  padding:6px 10px;
  border:none;
  background:#ddd;
  border-radius:8px;
  cursor:pointer;
}

input[type="file"] {
  color:transparent;
}

.preview {
  width:150px;
  margin-top:5px;
  border-radius:10px;
}
 #orderBtn {
  margin-top:8px;
  padding:12px;
  width:90%;
  max-width:500px;
  background:#ff5a5f;
  color:white;
  border:none;
  border-radius:10px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="chatBox"></div>

<div id="inputArea">

  <div id="inputRow">
    <input id="msg" placeholder="메시지 입력..." />
    <button id="sendBtn" onclick="send()">전송</button>
  </div>

  <input type="file" id="file">

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const chatBox = document.getElementById('chatBox');

/* =======================
   메시지 전송
======================= */
function send() {
  const input = document.getElementById('msg');
  const msg = input.value.trim();

  if (!msg) return;

  socket.emit('message', msg);
  addMessage(msg, 'me');

  input.value = "";
}

/* =======================
   엔터 전송
======================= */
document.getElementById("msg").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});

/* =======================
   메시지 받기
======================= */
socket.on('message', msg => {
  addMessage(msg, 'other');
});

/* =======================
   메시지 UI 추가
======================= */
function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = 'message ' + type;
  div.innerText = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

/* =======================
   이미지 업로드 + 미리보기
======================= */
document.getElementById('file').addEventListener('change', function () {

  const file = this.files[0];
  if (!file) return;

  /* 👉 미리보기 */
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = document.createElement('img');
    img.src = e.target.result;
    img.className = 'preview';
    chatBox.appendChild(img);
    chatBox.scrollTop = chatBox.scrollHeight;
  };
  reader.readAsDataURL(file);

  /* 👉 서버 업로드 */
  const formData = new FormData();
  formData.append('image', file);

  fetch('/upload', { method: 'POST', body: formData })
    .then(res => res.json())
    .then(data => {
      socket.emit('image', data.url);
    });
});

/* =======================
   이미지 수신
======================= */
socket.on('image', url => {
  const img = document.createElement('img');
  img.src = url;
  img.className = 'preview';
  chatBox.appendChild(img);
  chatBox.scrollTop = chatBox.scrollHeight;
});
</script>

</body>
</html>
