<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>

const socket = io("https://너의-render-주소.onrender.com");

const role = location.search.includes("admin") ? "admin" : "user";

let roomId = localStorage.getItem("roomId") || crypto.randomUUID();
localStorage.setItem("roomId", roomId);

socket.emit("join", { roomId, role });

const chatBox = document.getElementById("chatBox");
const msg = document.getElementById("msg");

/* 메시지 보내기 */
function send(){
  const text = msg.value.trim();
  if(!text) return;

  socket.emit("message", { text });
  msg.value="";
}

/* 엔터 전송 */
msg.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    send();
  }
});

/* 메시지 받기 */
socket.on("message", renderMessage);

function renderMessage(d){
  const wrap=document.createElement("div");
  wrap.className="message "+(d.sender===role?"me":"other");

  const bubble=document.createElement("div");
  bubble.innerText=d.text;

  wrap.appendChild(bubble);
  chatBox.appendChild(wrap);
}

/* 히스토리 */
socket.on("history", list=>{
  list.forEach(item=>{
    if(item.text) renderMessage(item);
    if(item.image) renderImage(item);
  });
});

/* 이미지 업로드 */
file.onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;

  const fd=new FormData();
  fd.append("image",f);

  fetch("https://너의-render-주소.onrender.com/upload",{
    method:"POST",
    body:fd
  })
  .then(r=>r.json())
  .then(d=>{
    socket.emit("image",{ url:d.url });
  });
};

/* 이미지 */
socket.on("image", renderImage);

function renderImage(d){
  const img=document.createElement("img");
  img.src=d.image;
  img.style.maxWidth="150px";

  const wrap=document.createElement("div");
  wrap.className="message "+(d.sender===role?"me":"other");

  wrap.appendChild(img);
  chatBox.appendChild(wrap);
}

</script>
